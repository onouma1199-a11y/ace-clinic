window.deleteDrugMaster = function(idx) {
    if(confirm("ต้องการลบข้อมูลตั้งค่าของยานี้ใช่หรือไม่?")) {
        let drugDB = JSON.parse(localStorage.getItem('drugMasterDB')) || [];
        drugDB.splice(idx, 1);
        localStorage.setItem('drugMasterDB', JSON.stringify(drugDB));
        document.getElementById('drugMasterModal').remove();
        openDrugMasterSettings();
    }
};

window.autoFillDrugInfo = function(drugName) {
    const drugDB = JSON.parse(localStorage.getItem('drugMasterDB')) || [];
    const drug = drugDB.find(d => d.name === drugName);
    if (drug) {
        if(document.getElementById('lblUsage')) document.getElementById('lblUsage').value = drug.usage || '';
        if(document.getElementById('lblDetail')) document.getElementById('lblDetail').value = drug.detail || '';
    }
};

window.saveDrugMaster = function() {
    const name = document.getElementById('mDrugName').value.trim();
    const usage = document.getElementById('mDrugUsage').value;
    const detail = document.getElementById('mDrugDetail').value;

    if (!name) { alert("⚠️ ระบุชื่อยาด้วยค่ะ"); return; }
    let drugDB = JSON.parse(localStorage.getItem('drugMasterDB')) || [];
    drugDB.unshift({ name, usage, detail });
    localStorage.setItem('drugMasterDB', JSON.stringify(drugDB));

    alert("✅ บันทึกสูตรยามาตรฐานเรียบร้อย!");
    document.getElementById('drugMasterModal').remove();
    openDrugMasterSettings(); 
};

        name: name, nickname: document.getElementById('newNickname').value,

        data.staffId = branchCode + thaiYear + String(staffDB.length + 1).padStart(4, '0');
        staffDB.push(data);
    }

    localStorage.setItem('staffDB', JSON.stringify(staffDB));
    document.getElementById('staffModalContainer').remove();
    alert("บันทึกข้อมูลเรียบร้อยแล้วค่ะ! ✨");

window.showStaffAttendance = function(idx) {

window.calcPayrollLogic = function() {
    const salary = parseFloat(document.getElementById('mSalary').value) || 0;
    const comm = parseFloat(document.getElementById('mComm').value) || 0;
    const hourRate = (salary / 30) / 8;

    const absD = parseFloat(document.getElementById('mAbsDays').value) || 0;
    const absDayDeduct = absD * (salary / 30);
    const commDeduct = (absD > 0) ? (comm / 30) * absD : 0;
    document.getElementById('valAbsDayDeduct').innerText = `หัก: ฿${(absDayDeduct + commDeduct).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const absHIn = parseFloat(document.getElementById('mAbsHours').value) || 0;
    const h = Math.floor(absHIn);
    const m = (absHIn - h) * 100;
    const absHourDeduct = (h + (m/60)) * hourRate;
    document.getElementById('valAbsHourDeduct').innerText = `หัก: ฿${absHourDeduct.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const lateM = parseFloat(document.getElementById('mLateMin').value) || 0;
    let lateDeduct = 0;
    if (lateM > 10 && lateM <= 30) lateDeduct = lateM * 5;
    else if (lateM > 30) lateDeduct = (lateM / 60) * hourRate;
    document.getElementById('valLateDeduct').innerText = `หัก: ฿${lateDeduct.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const totalD = absDayDeduct + commDeduct + absHourDeduct + lateDeduct;
    document.getElementById('resDeductTotal').innerText = `- ฿${totalD.toLocaleString(undefined, {minimumFractionDigits: 3})}`;

    const sso = Math.min(875, salary * 0.05);
    document.getElementById('mSSO').value = sso.toFixed(0);

    const income = salary + comm + (parseFloat(document.getElementById('mDF').value) || 0) + (parseFloat(document.getElementById('mOT').value) || 0);
    const net = income - totalD - sso - (parseFloat(document.getElementById('mTax').value) || 0);
    document.getElementById('mNet').innerText = `฿${net.toLocaleString(undefined, {minimumFractionDigits: 3})}`;
};

window.saveAndPrintPayroll = function(idx, period) {
    const allStaff = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staff = allStaff[idx];
    if(!staff) return Swal.fire('Error', 'ไม่พบข้อมูลพนักงาน', 'error');

    const data = {
        staffId: staff.staffId,
        period: period,
        salary: parseFloat(document.getElementById('mSalary').value) || 0,
        comm: parseFloat(document.getElementById('mComm').value) || 0,
        df: parseFloat(document.getElementById('mDF').value) || 0,
        ot: parseFloat(document.getElementById('mOT').value) || 0,
        tax: parseFloat(document.getElementById('mTax').value) || 0,
        absDays: parseFloat(document.getElementById('mAbsDays').value) || 0,
        absHours: parseFloat(document.getElementById('mAbsHours').value) || 0,
        lateMins: parseFloat(document.getElementById('mLateMin').value) || 0,
        netPay: document.getElementById('mNet').innerText,
        timestamp: new Date().getTime()
    };

    let history = JSON.parse(localStorage.getItem('payrollHistoryDB')) || [];
    const exIdx = history.findIndex(p => p.staffId === staff.staffId && p.period === period);
    
    if(exIdx !== -1) { history[exIdx] = data; } 
    else { history.push(data); }
    
    localStorage.setItem('payrollHistoryDB', JSON.stringify(history));

    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ',
        text: 'ข้อมูลเงินเดือนงวด ' + period + ' ถูกบันทึกแล้ว',
        showConfirmButton: false,
        timer: 1500
    }).then(() => {
        if (window.printSlip) window.printSlip(data, staff); 
        document.getElementById('payrollModal').remove();
        renderPayrollSystem(); 
    });
};

window.drawCalendar = function() {
    const grid = document.getElementById('calendarGrid');
    const label = document.getElementById('monthYearLabel');
    if (!grid || !label) return;

    const year = window.currentViewDate.getFullYear();
    const month = window.currentViewDate.getMonth();
    const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
    
    label.innerText = `${monthNames[month]} ${year + 543}`;

    const holidays = JSON.parse(localStorage.getItem('clinicHolidaysDB')) || [];
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const daysHeader = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัส', 'ศุกร์', 'เสาร์'];
    grid.innerHTML = daysHeader.map(d => `
        <div class="text-[12px] font-black text-white bg-[#D48197] py-4 rounded-2xl mb-2 shadow-sm uppercase italic flex items-center justify-center text-center">
            ${d}
        </div>
    `).join('');

    for(let i=0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    for(let d=1; d <= daysInMonth; d++) {
        const checkDate = new Date(year, month, d);
        checkDate.setHours(0,0,0,0);
        
        const isHoliday = holidays.find(h => {
            const start = new Date(h.start);
            const end = new Date(h.end);
            start.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            return checkDate >= start && checkDate <= end;
        });

        const isToday = d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();

        grid.innerHTML += `
            <div class="relative h-24 border-2 border-slate-50 rounded-[2rem] flex flex-col items-center justify-center transition-all shadow-sm
                ${isHoliday ? 'bg-pink-100 border-pink-300' : 'bg-white hover:border-pink-200'}">
                <span class="text-sm font-black ${isToday ? 'bg-[#D48197] text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg' : 'text-slate-600'}">${d}</span>
                ${isHoliday ? `<span class="text-[9px] text-[#D48197] font-black mt-2 px-1 truncate w-full text-center uppercase italic">${isHoliday.title}</span>` : ''}
            </div>
        `;
    }
};

window.updateHolidayDisplay = function() {
    const listArea = document.getElementById('holidayList');

    let holidays = JSON.parse(localStorage.getItem('clinicHolidaysDB')) || [];

window.saveClinicFullConfig = function() {
    const branchData = [];
    const names = ['บางพลี', 'อุดมสุข', 'ชลบุรี'];
    for(let i=0; i<3; i++) {
        branchData.push({
            n: names[i],
            addr: document.getElementById(`brAddr_${i}`).value,
            license: document.getElementById(`brLic_${i}`).value,
            tel: document.getElementById(`brTel_${i}`).value,
            email: document.getElementById(`brEmail_${i}`).value,
            line: document.getElementById(`brLine_${i}`).value
        });
    }
    localStorage.setItem('clinicConfig', JSON.stringify({ branches: branchData }));
    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: 'ข้อมูลสาขาจะถูกนำไปใช้ในใบเสร็จอัตโนมัติ', timer: 2000, showConfirmButton: false });
};

// 3. ฟังก์ชันสลับสถานะ ปิด/เปิด สิทธิ์พนักงาน
window.toggleUserStatus = function(idx) {
    let db = JSON.parse(localStorage.getItem('staffDB')) || [];
    db[idx].isLocked = !db[idx].isLocked;
    localStorage.setItem('staffDB', JSON.stringify(db));
    window.switchSettingsTab('users', document.querySelector('.settings-nav-btn.active'));
};

window.deleteStaffUser = function(idx) {

    let db = JSON.parse(localStorage.getItem('staffDB')) || [];
    const user = db[idx];
    if (!user) return;

    Swal.fire({
        icon: 'warning',
        title: 'ยืนยันลบบัญชี',
        text: `ต้องการลบ ${user.name} ออกจากระบบใช่ไหม`,
        showCancelButton: true,
        confirmButtonText: 'ลบเลย',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#dc2626',
        cancelButtonColor: '#94a3b8'
    }).then((result) => {

        if (result.isConfirmed) {

            db.splice(idx,1);

            localStorage.setItem('staffDB', JSON.stringify(db));

            Swal.fire({
                icon:'success',
                title:'ลบเรียบร้อย',
                timer:1200,
                showConfirmButton:false
            });

            window.switchSettingsTab('users', document.querySelector('.settings-nav-btn.active'));

        }

    });

};

// 4. ฟังก์ชันบันทึกตารางสิทธิ์ (Matrix)
window.saveRolePermissions = function() {
    const roles = ['แอดมินหลัก', 'CEO', 'ผู้จัดการ', 'พนักงานทรีทเม้นท์', 'หมอ'];
    let permissionData = {};
    
    roles.forEach(role => {
        permissionData[role] = [];
        const cbs = document.querySelectorAll(`.role-checkbox[data-role="${role}"]`);
        cbs.forEach(cb => { 
            // 🎯 บันทึก id เมนูเป็น String เพื่อให้ตรงกับการเช็คในจุดที่ 1
            if (cb.checked) permissionData[role].push(String(cb.dataset.menuid)); 
        });
    });

    localStorage.setItem('ace_permissions', JSON.stringify(permissionData));
    
    Swal.fire({ 
        icon: 'success', 
        title: 'บันทึกสิทธิ์เรียบร้อย!', 
        text: 'พนักงานในตำแหน่งที่เลือกจะเห็นเมนูตามนี้ทันทีค่ะ',
        timer: 1500, 
        showConfirmButton: false 
    });

    // 🔄 อัปเดตเมนูที่แสดงอยู่ตอนนี้ทันที
    if (window.currentUser) renderMenuByRole(window.currentUser.role);
};

window.previewStaffPhoto = function(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('previewImg').classList.remove('hidden');
            if(document.getElementById('uploadText')) document.getElementById('uploadText').classList.add('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }
};

function updateHeaderTime() {
    const timeEl = document.getElementById('headerLastUpdate');
    if (timeEl) timeEl.innerText = new Date().toLocaleTimeString('th-TH', { hour12: false });
}
setInterval(updateHeaderTime, 1000);

window.onload = () => { 
    if(document.getElementById('headerDatePicker')) document.getElementById('headerDatePicker').valueAsDate = new Date();

function aceToggleSidebar() {
    const body = document.body;
    const isCollapsed = body.classList.toggle('sidebar-collapsed');
    document.getElementById('ace-arrow-icon').innerText = isCollapsed ? '❯' : '❮';
    if (window.lucide) { lucide.createIcons(); }
}

function manageBtnVisibility() {
    const loginPage = document.getElementById('loginPage');
    const btn = document.getElementById('ace-toggle-btn');
    if (loginPage && (loginPage.classList.contains('hidden') || loginPage.style.display === 'none')) {
        btn.style.display = 'flex';
    } else {
        btn.style.display = 'none';
    }
}

const aceObserver = new MutationObserver(manageBtnVisibility);
window.addEventListener('load', () => {
    const loginPage = document.getElementById('loginPage');
    if (loginPage) aceObserver.observe(loginPage, { attributes: true, attributeFilter: ['class', 'style'] });
    manageBtnVisibility();
});

window.requestNotificationPermission = function() {
    if (!("Notification" in window)) return;
    Notification.requestPermission();
};

setTimeout(window.requestNotificationPermission, 2000);

// 1. ฟังก์ชันสมัครสิทธิ์พนักงานใหม่ (เก็บอันนี้ไว้เพียงอันเดียวค่ะ)
window.processNewRegistration = function() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value.trim();
    const role = document.getElementById('regRole').value;
    const branch = document.getElementById('regBranch').value;

    if(!name || !phone || !password) {
        return Swal.fire({ icon: 'warning', text: 'กรุณากรอกข้อมูลพนักงานให้ครบถ้วนนะคะ', confirmButtonColor: '#D48197' });
    }

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    
    if(staffDB.some(s => s.phone === phone)) {
        return Swal.fire({ icon: 'error', text: 'เบอร์โทรศัพท์นี้ถูกใช้งานในระบบแล้วค่ะ', confirmButtonColor: '#D48197' });
    }

    staffDB.push({
        staffId: 'ST' + Date.now().toString().slice(-4),
        name: name,
        phone: phone,
        password: password,
        role: role,
        branch: branch,
        status: 'ทำงาน',
        isLocked: false,
        createdAt: new Date().toLocaleDateString('th-TH')
    });

    localStorage.setItem('staffDB', JSON.stringify(staffDB));
    Swal.fire({ icon: 'success', title: 'สมัครสิทธิ์สำเร็จ!', text: `คุณ ${name} เข้าใช้งานได้แล้วค่ะ`, confirmButtonColor: '#D48197' });

    document.getElementById('regName').value = '';
    document.getElementById('regUser').value = '';
    document.getElementById('regPass').value = '';
};

// 1. ฟังก์ชันส่งข้อมูลไปหน้าตีบิล
window.linkToBilling = function(courseName, price) {
    window.loadPage(3, 'ตีบิลใบเสร็จ');
    setTimeout(() => {
        window.openBillingTab('', true); // เปิดโหมด Standalone
        setTimeout(() => {
            const nameInput = document.getElementById('itemName');
            const priceInput = document.getElementById('billPrice');
            if(nameInput && priceInput) {
                nameInput.value = courseName;
                priceInput.value = price;
                Swal.fire({ toast: true, position: 'top', icon: 'info', title: 'เพิ่มคอร์สเรียบร้อย กรุณาเลือกคนไข้ค่ะ', showConfirmButton: false, timer: 2500 });
            }
        }, 400);
    }, 200);
};

// 2. ฟังก์ชันส่งชื่อคนไข้ Walk-in เข้าคิว
window.linkToQueue = function(courseName) {
    Swal.fire({
        title: 'ส่งลูกค้า Walk-in เข้าคิว',
        text: `คอร์ส: ${courseName}`,
        input: 'text',
        inputPlaceholder: 'ระบุชื่อ-นามสกุล คนไข้...',
        showCancelButton: true,
        confirmButtonColor: '#D48197',
        confirmButtonText: '✅ ส่งเข้าห้องคิว',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed && result.value) {
            let todayQueue = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
            const newQ = {
                queueId: "Q-" + Math.floor(1000 + Math.random() * 9000),
                hn: "Walk-in",
                name: result.value,
                course: courseName,
                time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
                status: "รอรับบริการ",
                date: new Date().toLocaleDateString('th-TH')
            };
            todayQueue.push(newQ);
            localStorage.setItem('todayQueueDB', JSON.stringify(todayQueue));
            window.loadPage(52, 'ห้องจัดการคิว'); // กระโดดไปหน้าคิวทันที
        }
    });
};

// ฟังก์ชันลบรายการคอร์สออกจากฐานข้อมูลถาวร
window.deleteMasterCourse = function(idx) {
    let masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const course = masterDB[idx];
    
    if (!course) return;

    Swal.fire({
        title: '<span class="text-slate-800 font-black italic uppercase">🗑️ ยืนยันการลบข้อมูล?</span>',
        html: `คุณกำลังจะลบรายการ <b class="text-rose-500">"${course.name}"</b><br>ออกจากระบบถาวร ไม่สามารถย้อนคืนได้ค่ะ`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444', // สีแดงสำหรับลบ
        cancelButtonColor: '#94a3b8',  // สีเทาสำหรับยกเลิก
        confirmButtonText: 'ใช่, ลบเลย!',
        cancelButtonText: 'ยกเลิก',
        customClass: {
            popup: 'rounded-[2.5rem]',
            confirmButton: 'rounded-2xl px-6 py-3 font-bold uppercase italic',
            cancelButton: 'rounded-2xl px-6 py-3 font-bold uppercase italic'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            // ลบข้อมูลตามตำแหน่ง Index
            masterDB.splice(idx, 1);
            
            // บันทึกค่าใหม่ลงเครื่อง
            localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));
            
            // แจ้งเตือนสำเร็จ
            Swal.fire({
                icon: 'success',
                title: 'ลบสำเร็จ!',
                text: 'รายการคอร์สถูกตัดออกจากฐานข้อมูลแล้วค่ะ',
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-[2.5rem]' }
            });
            
            // สั่งให้ตารางวาดใหม่ทันที
            if (typeof updateCourseMasterTable === "function") {
                updateCourseMasterTable();
            }
        }
    });
};
