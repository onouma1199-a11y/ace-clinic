<style>

/* 🎯 [ส่วนสำคัญ] ป้องกันหน้าจอซ้อน: ล็อกหน้า Login ให้บังหน้าอื่น 100% */
#loginPage {
    position: fixed;
    inset: 0;
    z-index: 99999; 
    background-color: #FDF7F8;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* ซ่อนหน้า Login เมื่อล็อกอินสำเร็จ */
#loginPage.hidden {
    display: none !important;
}

/* ซ่อนหน้า Dashboard หลักไว้ก่อนจนกว่าจะล็อกอิน */
#mainDashboard {
    display: none;
}

/* แสดงหน้า Dashboard เมื่อได้รับอนุญาตเท่านั้น */
#mainDashboard:not(.hidden) {
    display: flex;
}

/* ========================================= */
/* 💎 สไตล์ความสวยงามเดิมของคุณ (อลิซเก็บไว้ให้ครบค่ะ) */
/* ========================================= */

body { font-family: 'Sarabun', sans-serif; background-color: #FDF7F8; color: #4B5563; font-weight: 300; }

/* เอฟเฟกต์ไฟกะพริบแจ้งคิว */
@keyframes blink-pink {
    0% { background-color: rgba(212,129,151,0); }
    50% { background-color: rgba(212,129,151,0.2); }
    100% { background-color: rgba(212,129,151,0); }
}
.animate-blink { animation: blink-pink 1.5s infinite; }

/* 🖨️ ตั้งค่าการพิมพ์รายงาน และ OPD */
@media print {
    body * { visibility:hidden; }
    aside, header, button, select, input, .no-print { display:none !important; }
    #dynamicContent, #dynamicContent *, #opd-card-printable, #opd-card-printable * { visibility:visible; }
    #dynamicContent, #opd-card-printable { position:absolute; left:0; top:0; width:100%; }
    @page { size:A4 landscape; margin:1cm; }
}

/* ตารางรายการคอร์ส (Luxury ACE Look) */
.course-tag {
    background: transparent !important;
    color: #1a1a1a !important;
    padding: 2px 0;
    font-weight: 500;
    display: block;
    font-size: 13px;
}

.course-header-row {
    background-color: #D48197 !important;
    color: white !important;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 1px;
    text-align: center;
}

.course-header-row th {
    padding-top: 12px !important;
    padding-bottom: 12px !important;
    white-space: nowrap;
}

.glass-card {
    background: white;
    border-radius: 1.5rem;
    padding: 1rem;
    border: 1px solid #FDF2F4;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    overflow-x: auto;
}

/* Sidebar และ Navigation */
.sidebar-item { transition: 0.3s; border-radius: 15px; cursor: pointer; display: flex; align-items: center; padding: 0.9rem 1.2rem; margin-bottom: 5px; font-weight: 600; }
.sidebar-item:hover { background-color: #FFF0F3; color: #D48197; transform: translateX(5px); }
.active-menu { background-color: #D48197 !important; color: white !important; }

/* แท็บโปรไฟล์ลูกค้า */
.profile-tab {
    padding: 12px 25px;
    color: #9CA3AF;
    background: transparent !important;
    border-bottom: 2px solid transparent;
    transition: all 0.3s ease;
    cursor: pointer;
}
.profile-tab.active {
    color: #D48197 !important;
    border-bottom: 2px solid #D48197;
    font-weight: 600;
}

/* ไฟกะพริบสีเขียว (Live Indicator) */
.live-indicator { 
    width: 8px; height: 8px; 
    background-color: #2ecc71; 
    border-radius: 50%; 
    display: inline-block; 
    animation: blink 2s infinite;
    box-shadow: 0 0 8px rgba(46, 204, 113, 0.6); 
}
@keyframes blink { 
    0% { opacity: 1; transform: scale(1); } 
    50% { opacity: 0.4; transform: scale(1.1); } 
    100% { opacity: 1; transform: scale(1); } 
}

/* เอาลูกศรออกจากช่องตัวเลข */
input[type=number]::-webkit-inner-spin-button, 
input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; margin: 0; 
}

.gold-bg { background: linear-gradient(45deg, #D48197, #C5A059) !important; }
</style>


<style id="ace-simple-theme">

:root{
  --ace-pink:#D48197;
  --ace-gold:#C5A059;
  --ace-bg:#F7F8FC;
  --ace-card:#FFFFFF;
  --ace-border:#E2E8F0;
  --ace-text:#0F172A;
  --ace-muted:#64748B;
  --ace-muted2:#94A3B8;
  --ace-shadow: 0 10px 24px rgba(15,23,42,.06);
}

/* Typography */
html,body{
  background:var(--ace-bg)!important;
  color:var(--ace-text)!important;
  font-family: "Sarabun", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"!important;
  font-size:14px;
  line-height:1.5;
}
h1,h2,h3{letter-spacing:-.02em!important;}
/* Make UI clearer (less decorative) */
.italic{font-style:normal!important;}
.uppercase{text-transform:none!important;}
.tracking-widest,.tracking-tighter{
  letter-spacing:normal!important;
}

/* Sidebar */
aside{
  background:var(--ace-card)!important;
  border-right:1px solid var(--ace-border)!important;
}
.sidebar-item{
  border-radius:14px!important;
  box-shadow:none!important;
  transform:none!important;
  font-weight:700!important;
  color:var(--ace-text)!important;
}
.sidebar-item:hover{
  background:#F1F5F9!important;
  color:var(--ace-text)!important;
}
.sidebar-item:hover svg{color:var(--ace-pink)!important;}
.active-menu{
  background:rgba(212,129,151,.12)!important;
  color:var(--ace-text)!important;
  border:1px solid rgba(212,129,151,.25)!important;
}
.active-menu svg{color:var(--ace-pink)!important;}
/* Header chips / pills */
.gold-bg{background:var(--ace-pink)!important;}

/* Cards / panels */
.glass-card,
.bg-white.rounded-\[2\.5rem\],
.bg-white.rounded-\[2\.2rem\],
.bg-white.rounded-\[3rem\]{
  border-radius:20px!important;
  border:1px solid var(--ace-border)!important;
  box-shadow:var(--ace-shadow)!important;
}
.border-pink-50,.border-pink-100,.border-red-50,.border-red-100{
  border-color:var(--ace-border)!important;
}
.shadow-xl,.shadow-2xl,.shadow-lg,.shadow-sm{
  box-shadow:var(--ace-shadow)!important;
}

/* Inputs */
input,select,textarea{
  border-color:var(--ace-border)!important;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--ace-pink)!important;
  box-shadow:0 0 0 3px rgba(212,129,151,.14)!important;
}

/* Tables: clearer grid */
table{border-collapse:separate!important;border-spacing:0!important;}
thead th{
  background:#F8FAFC!important;
  color:var(--ace-muted)!important;
  border-bottom:1px solid var(--ace-border)!important;
}
td,th{border-bottom:1px solid var(--ace-border)!important;}
tbody tr:hover{background:#FAFAFF!important;}
/* Ensure outer border looks clear when wrapper exists */
.table-wrap{border:1px solid var(--ace-border)!important;border-radius:18px!important;overflow:hidden!important;}

/* Small text colors */
.text-slate-400{color:var(--ace-muted2)!important;}
.text-slate-600{color:var(--ace-muted)!important;}
.ace-pink{color:var(--ace-pink)!important;}

</style>

</head>

window.normalizeBranch = function(branch = '') {
    const raw = String(branch || '').trim();
    if (!raw) return 'สาขาบางพลี';
    if (raw === 'ทุกสาขา') return 'ทุกสาขา';
    if (raw === 'บางพลี' || raw === 'สาขาบางพลี') return 'สาขาบางพลี';
    if (raw === 'ชลบุรี' || raw === 'สาขาชลบุรี') return 'สาขาชลบุรี';
    if (raw === 'อุดมสุข' || raw === 'สาขาอุดมสุข') return 'สาขาอุดมสุข';
    if (raw === 'ส่วนกลาง') return 'ส่วนกลาง';
    if (raw.startsWith('สาขา')) return raw;
    return `สาขา${raw}`;
};

window.getBranchCode = function(branch) {
    const map = {
        'สาขาบางพลี': 'BP',
        'สาขาชลบุรี': 'CB',
        'สาขาอุดมสุข': 'UD'
    };
    return map[branch] || 'OT'; // OT = other
};

window.getUserHomeBranch = function() {

};

};

window.canViewAllBranches = function() {

    return ['แอดมินหลัก', 'CEO', 'admin'].includes(role) && viewingBranch === 'ทุกสาขา';
};

window.filterByBranch = function(list = [], getBranchFn) {
    const viewingBranch = window.getCurrentViewingBranch();

    if (window.canViewAllBranches()) return list;

    return list.filter(item => {

window.initAccountSuggestion = function() {
    const uInput = document.getElementById('uIn');
    if (!uInput) return;

    const oldContainer = document.getElementById('savedAccountsContainer');
    if (oldContainer) oldContainer.style.display = 'none';

    let suggestionBox = document.getElementById('accountSuggestionBox');
    if (!suggestionBox) {
        suggestionBox = document.createElement('div');
        suggestionBox.id = 'accountSuggestionBox';
        uInput.parentElement.style.position = 'relative';
        suggestionBox.style.cssText = `
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: white; border: 1px solid #ffe4e6; border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 9999;
            display: none; max-height: 180px; overflow-y: auto; text-align: left;
        `;
        uInput.insertAdjacentElement('afterend', suggestionBox);
    }

    uInput.addEventListener('focus', () => {
        const savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        if (savedList.length === 0) return;

        suggestionBox.innerHTML = savedList.map(acc => `
            <div onclick="window.selectAccount('${String(acc.user || '').replace(/'/g, "\\'")}', '')" class="flex items-center gap-3 p-3 hover:bg-pink-50 cursor-pointer border-b border-pink-50 last:border-0">

                    <p class="text-[9px] text-slate-400 uppercase m-0">${acc.role || '-'} | ${acc.branch || ''}</p>
                </div>
                <button onclick="event.stopPropagation(); window.removeSavedAccount('${String(acc.user || '').replace(/'/g, "\\'")}')" class="text-slate-300 hover:text-red-500 p-1 text-xs">✕</button>
            </div>
        `).join('');

        suggestionBox.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
        if (!uInput.contains(e.target) && !suggestionBox.contains(e.target)) {
            suggestionBox.style.display = 'none';
        }
    });
};

window.addEventListener('DOMContentLoaded', () => {
    async function secureInit() {
        try {
            if (!window.supabaseClient) {
                console.error('ยังไม่พบ supabaseClient');
                showLoginPage();
                return;
            }

            const { data, error } = await window.supabaseClient.auth.getSession();
            if (error) {
                console.error('getSession error:', error);
                showLoginPage();
                return;
            }

            const session = data?.session || null;

            if (!session || !session.user) {
                showLoginPage();
                return;
            }

            const authUser = session.user;

            const user = {
                id: authUser.id,
                email: authUser.email || '',
                username: authUser.email || '',
                name: authUser.user_metadata?.full_name || authUser.email || 'User',
                role: authUser.user_metadata?.role || 'แอดมินหลัก',
                branch: authUser.user_metadata?.branch || 'ทุกสาขา',
                homeBranch: authUser.user_metadata?.homeBranch || authUser.user_metadata?.branch || 'ทุกสาขา',
                viewingBranch: authUser.user_metadata?.viewingBranch || authUser.user_metadata?.branch || 'ทุกสาขา',
                phone: authUser.phone || ''
            };

            window.executeLogin(user, user.email || user.username || '', '');
        } catch (e) {
            console.error('secureInit exception:', e);
            showLoginPage();
        }
    }

    function showLoginPage() {
        document.getElementById('loginPage')?.classList.remove('hidden');
        document.getElementById('mainDashboard')?.classList.add('hidden');
    }

    secureInit();
    setTimeout(window.initAccountSuggestion, 300);
});

window.executeLogin = function(user, loginUserStr, loginPassStr) {
    const remember = document.getElementById('rememberMe')?.checked;

    if (remember) {
        let savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        savedList = savedList.filter(acc => acc.user !== loginUserStr);
        savedList.unshift({
            user: loginUserStr,
            pass: '',
            name: user.name || '',
            role: user.role || '',
            branch: user.branch || ''
        });
        if (savedList.length > 3) savedList.pop();
        localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
    }

    // ✅ set current user
    window.currentUser = user;
    localStorage.setItem('currentUser', JSON.stringify(user));

    // ✅ switch UI
    document.getElementById('loginPage')?.classList.add('hidden');
    document.getElementById('mainDashboard')?.classList.remove('hidden');

    // =========================
    // 🔴 START REALTIME ALL SYSTEM
    // =========================
    if (typeof window.startCustomerRealtime === 'function') {
        window.startCustomerRealtime();
    }
    if (typeof window.startPermissionRealtime === 'function') {
        window.startPermissionRealtime();
    }
    if (typeof window.startStaffRealtime === 'function') {
        window.startStaffRealtime();
    }
   
    if (typeof window.startPayrollRealtime === 'function') {
        window.startPayrollRealtime();
    }

    // =========================
    // 👤 PROFILE UI
    // =========================
    if (document.getElementById('userNameLabel')) {
        document.getElementById('userNameLabel').innerText = `${user.name} (${user.role})`;
    }
    if (document.getElementById('userBranchBadge')) {
        document.getElementById('userBranchBadge').innerText = `สาขา: ${user.branch || 'ทุกสาขา'}`;
    }
    if (document.getElementById('userInitial')) {
        document.getElementById('userInitial').innerText = (user.name || 'U').substring(0, 2);
    }

    const initialStr = user.name ? user.name.substring(0, 2).toUpperCase() : 'ON';
    if (document.getElementById('topProfileInitial')) document.getElementById('topProfileInitial').innerText = initialStr;
    if (document.getElementById('dropProfileInitial')) document.getElementById('dropProfileInitial').innerText = initialStr;
    if (document.getElementById('dropProfileName')) document.getElementById('dropProfileName').innerText = user.name || 'User';
    if (document.getElementById('dropProfileRole')) document.getElementById('dropProfileRole').innerText = user.role || 'แอดมินหลัก';
    if (document.getElementById('dropProfileContact')) document.getElementById('dropProfileContact').innerText = user.phone || user.email || 'พนักงานคลินิก';

    // =========================
    // 🚀 CONTINUE LOAD SYSTEM
    // =========================
    const continueLoginRender = async () => {
        try {
            // โหลด permission จาก Supabase
            if (typeof window.loadPermissionsFromSupabase === 'function') {
                await window.loadPermissionsFromSupabase();
            }

            // render menu ตาม role
            if (typeof renderMenuByRole === 'function') {
                renderMenuByRole(user.role || 'แอดมินหลัก');
            }

            // render dropdown สาขา
            if (typeof renderBranchDropdown === 'function') {
                renderBranchDropdown();
            }

            // redirect หน้า
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('target') === 'ceo_board') {
                loadPage(10, 'บอร์ดรวมทุกสาขา');
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                loadPage(1, 'Dashboard ภาพรวม');
            }

            // toast
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: `ยินดีต้อนรับ ${user.name || 'User'}`,
                showConfirmButton: false,
                timer: 1500
            });

        } catch (e) {
            console.error('continueLoginRender error:', e);
            Swal.fire({
                icon: 'error',
                title: 'เข้าสู่ระบบไม่สำเร็จ',
                text: e?.message || 'เกิดข้อผิดพลาดหลังเข้าสู่ระบบ',
                confirmButtonColor: '#D48197'
            });
        }

window.renderBranchDropdown = function() {
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = user.role || '';
    const currentBranch = String(user.branch || 'บางพลี').replace('สาขา', '').trim();
    const homeBranch = String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();
    const branches = ['บางพลี', 'อุดมสุข', 'ชลบุรี'];
    let html = '';

    branches.forEach(b => {
        if (!['แอดมินหลัก', 'CEO', 'ผู้จัดการ'].includes(role) && b !== homeBranch) return;

        const isActive = b === currentBranch;

        html += `
            <div onclick="window.changeBranch('${b}')" class="flex items-center gap-4 p-3 rounded-2xl cursor-pointer transition-all hover:bg-pink-50 ${isActive ? 'bg-slate-50 shadow-sm border border-slate-100' : 'border border-transparent'}">
                <img src="ace-logo.jpg" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm shrink-0" onerror="this.src='https://via.placeholder.com/150'">
                <div class="flex-1 text-left">
                    <h4 class="text-[13px] font-bold text-slate-800 leading-tight mb-1">เอซ คลินิกสาขา${b}</h4>
                    <div class="flex items-center gap-2">
                        <span class="text-[11px] text-slate-500 font-bold">${role}</span>
                        ${isActive ? '<span class="px-2 py-[2px] border border-green-500 text-green-500 rounded-full text-[9px] font-bold tracking-wider">ใช้งาน</span>' : ''}
                    </div>
                </div>
            </div>`;
    });

    if (['แอดมินหลัก', 'CEO'].includes(role)) {
        const isAllBranches = currentBranch === 'ทุกสาขา';

        html += `
        <div class="mt-1 pt-2 border-t border-slate-100">
            <div onclick="window.changeBranch('ทุกสาขา')" class="w-full text-center p-3 rounded-xl ${isAllBranches ? 'bg-[#C5A059]' : 'bg-slate-800 hover:bg-[#C5A059]'} text-white text-[11px] font-bold cursor-pointer transition-all uppercase tracking-widest shadow-sm">
                🌐 ดูภาพรวมทุกสาขา
            </div>
        </div>`;
    }

    const container = document.getElementById('branchListContainer');
    if (container) container.innerHTML = html;
};

window.changeBranch = function(branchName) {
    Swal.close();

    let user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = user.role || '';
    const homeBranch = String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();
    const cleanBranch = String(branchName || '').replace('สาขา', '').trim();

    if (!['แอดมินหลัก', 'CEO', 'ผู้จัดการ'].includes(role)) {
        user.branch = homeBranch;
        user.isCrossBranchView = false;
        localStorage.setItem('currentUser', JSON.stringify(user));
        window.currentUser = user;

        Swal.fire({
            icon: 'warning',
            title: 'ไม่อนุญาต',
            text: 'ตำแหน่งของคุณใช้งานได้เฉพาะสาขาต้นสังกัดเท่านั้นค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    if (role === 'ผู้จัดการ' && cleanBranch === 'ทุกสาขา') {
        Swal.fire({
            icon: 'warning',
            title: 'ไม่อนุญาต',
            text: 'ผู้จัดการสามารถดูข้อมูลแยกได้ตามรายสาขาเท่านั้นค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    user.branch = cleanBranch;

    // ✅ เพิ่มตรงนี้: ถ้าไปดูสาขาอื่น ให้ระบบรู้ว่ากำลัง cross-branch
    user.isCrossBranchView = (
        cleanBranch !== 'ทุกสาขา' &&
        cleanBranch !== homeBranch
    );

    localStorage.setItem('currentUser', JSON.stringify(user));
    localStorage.setItem('selectedBranch', cleanBranch);
    window.currentUser = user;

    if (document.getElementById('userBranchBadge')) {
        document.getElementById('userBranchBadge').innerText = `สาขา: ${cleanBranch}`;
    }

    Swal.fire({
        title: `กำลังสลับไป "${cleanBranch}"`,
        text: 'ระบบกำลังกรองข้อมูลสาขาใหม่ค่ะ...',
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    setTimeout(() => {
        Swal.close();

        // ✅ ถ้ามีระบบ render menu ให้เรียกใหม่
        if (typeof window.renderMenuByRole === 'function') {
            window.renderMenuByRole(user.role || '');
        }

        // ✅ ถ้ากดดูภาพรวมทุกสาขา ให้ไปหน้าบอร์ดรวม
        if (cleanBranch === 'ทุกสาขา') {
            if (typeof window.loadPage === 'function') {
                window.loadPage(10, 'บอร์ดรวมทุกสาขา');
                return;
            }
        }

        // ✅ ถ้าอยู่หน้าไหนอยู่ ก็ให้รีโหลดหน้าแบบนุ่ม ๆ
        const pageTitle = String(document.getElementById('pageTitle')?.innerText || '').trim();

        if (pageTitle.includes('จัดการลูกค้า') || pageTitle.includes('ประวัติ')) {
            return window.loadPage?.(2, 'จัดการลูกค้า/ประวัติ');
        }

        if (pageTitle.includes('ระบบนัดหมาย')) {
            return window.loadPage?.(4, 'ระบบนัดหมาย');
        }

        if (pageTitle.includes('จัดการพนักงาน')) {
            return window.loadPage?.(7, 'จัดการพนักงาน');
        }

        if (pageTitle.includes('ตั้งค่าระบบ')) {
            return window.loadPage?.(8, 'ตั้งค่าระบบ');
        }

        // fallback
        if (typeof window.loadPage === 'function') {
            window.loadPage(1, 'Dashboard ภาพรวม');
        } else {
            location.reload();
        }
    }, 600);
};

window.processPasswordChange = function(oldPass, newPass) {
    const currentUser = window.getCurrentUserSafe ? window.getCurrentUserSafe() : JSON.parse(localStorage.getItem('currentUser')) || {};

    if (!currentUser || (!currentUser.id && !currentUser.staffId)) {
        return Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูลผู้ใช้งานปัจจุบัน กรุณาเข้าสู่ระบบใหม่', 'error');
    }

    if (currentUser.role === 'แอดมินหลัก' || currentUser.role === 'CEO') {
        return Swal.fire('ไม่อนุญาต', 'บัญชีผู้บริหารระดับสูง ไม่สามารถเปลี่ยนรหัสผ่านหน้านี้ได้ค่ะ', 'error');
    }

    const safeOldPass = String(oldPass || '').trim();
    const safeNewPass = String(newPass || '').trim();

    if (!safeOldPass || !safeNewPass) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกรหัสผ่านปัจจุบันและรหัสผ่านใหม่ให้ครบค่ะ', 'warning');
    }

    if (safeNewPass.length < 4) {
        return Swal.fire('รหัสผ่านสั้นเกินไป', 'รหัสผ่านใหม่ต้องมีอย่างน้อย 4 ตัวอักษรค่ะ', 'warning');
    }

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staffIndex = staffDB.findIndex(s => String(s.id || s.staffId) === String(currentUser.id || currentUser.staffId));

    if (staffIndex === -1) {
        return Swal.fire('ข้อผิดพลาด', 'ไม่พบประวัติพนักงานของคุณในระบบ', 'error');
    }

    const staff = staffDB[staffIndex] || {};
    const phoneLast4 = staff.phone ? String(staff.phone).slice(-4) : '9999';
    const actualPass = String(staff.password || phoneLast4);

    if (safeOldPass !== actualPass && safeOldPass !== '1111') {
        return Swal.fire('ผิดพลาด', 'รหัสผ่านปัจจุบันไม่ถูกต้องค่ะ', 'error');
    }

    staffDB[staffIndex].password = safeNewPass;
    localStorage.setItem('staffDB', JSON.stringify(staffDB));

    let savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
    const savedIndex = savedList.findIndex(acc =>
        String(acc.id || acc.staffId || acc.user) === String(currentUser.id || currentUser.staffId || currentUser.phone)
    );

    if (savedIndex !== -1) {
        savedList[savedIndex].pass = safeNewPass;
        localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
    }

    Swal.fire({
        icon: 'success',
        title: 'เปลี่ยนรหัสผ่านสำเร็จ!',
        text: 'ใช้รหัสใหม่เข้าระบบครั้งหน้านะคะ',
        confirmButtonColor: '#D48197'
    });
};

window.normalizeAuthLogin = function(input) {
    const raw = String(input || '').trim().toLowerCase();
    if (!raw) return '';

    if (raw.includes('@')) return raw;

    const digits = raw.replace(/\D/g, '');
    if (digits) return `${digits}@ace.local`;

    return `${raw}@ace.local`;
};

window.renderDashboard = async function(target, period = 'day') {
    if (!target) return;
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const viewingBranch = user.branch || 'ทุกสาขา';
    const isShowAll = (viewingBranch === 'ทุกสาขา'); 
    
    // ✅ เรียกผ่าน ID Based security
    const customerDB = await window.getCustomersFromSupabase();
    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const appointmentDB = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    const currentMonth = today.substring(0, 7);
    const currentYear = today.substring(0, 4);
    const todayThai = now.toLocaleDateString("th-TH");

    const cleanViewingBranch = viewingBranch.replace('สาขา', '').trim();

    let statsIncomes = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายรับ" && item.status === "เสร็จสิ้น" && (isShowAll || itemBranch === cleanViewingBranch);
    });

    let statsExpenses = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายจ่าย" && (isShowAll || itemBranch === cleanViewingBranch);
    });

    let statsApps = appointmentDB.filter(a => {
        const aBranch = String(a.branch || '').replace('สาขา', '').trim();
        return (isShowAll || aBranch === cleanViewingBranch);
    });

    let statsCustomers = customerDB.filter(c => {
        const cBranch = String(c.branch || '').replace('สาขา', '').trim();
        return (isShowAll || cBranch === cleanViewingBranch);
    });

    if (period === 'day') {
        statsIncomes = statsIncomes.filter(i => i.date === today);
        statsExpenses = statsExpenses.filter(e => e.date === today);

// 1. ฟังก์ชันเช็คสิทธิ์เข้าถึงตามสาขาและบทบาท
window.canAccessMenuByBranch = function(menuId) {
    const user = window.getCurrentUserSafe(); // ✅ เรียกผ่าน Helper กลาง
    const role = user.role || '';
    const currentBranch = window.normalizeBranch(user.branch || 'ทุกสาขา');
    const homeBranch = window.getUserHomeBranch(); // ✅ ดึงสาขาต้นสังกัดผ่าน ID-Based Helper

    // แอดมินหลัก และ CEO เข้าได้ทุกสาขา
    if (role === 'แอดมินหลัก' || role === 'CEO') return true;

    // 💼 ล็อกสิทธิ์ผู้จัดการ: ถ้าอยู่สาขาอื่น ให้ผ่านแค่เมนู 2 (ลูกค้า) และ 4 (นัดหมาย)
    if (role === 'ผู้จัดการ') {
        if (currentBranch === homeBranch) return true;
        return ['2', '4'].includes(String(menuId)); 
    }

    // พนักงานทั่วไป: ต้องตรงสาขาต้นสังกัดเท่านั้น
    return currentBranch === homeBranch;
};

        const roleAllowed = (role === 'แอดมินหลัก') || (userAllowedMenus.includes(String(id)) && (user.staffId || user.id));

// 3. ฟังก์ชันหลักในการเปลี่ยนหน้าจอ
window.loadPage = function(id, title) {
    const target = document.getElementById('dynamicContent');
    if (!target || id === -1) return;

    // ✅ ระบบ Branch Guard: ป้องกันการเข้าถึงข้ามสาขาโดยไม่ได้รับอนุญาต
    if (!window.canAccessMenuByBranch(id)) {
        Swal.fire({
            icon: 'error',
            title: 'ไม่มีสิทธิ์เข้าถึง',
            text: 'ตำแหน่งนี้ไม่สามารถดูเมนูนี้ในสาขาที่เลือกได้ค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    const titleEl = document.getElementById('pageTitle');
    if (titleEl) titleEl.innerText = title.toUpperCase();
    
    const periodZone = document.getElementById('dynamicPeriodZone');
    if (periodZone) periodZone.style.display = (id === 1) ? 'flex' : 'none';

    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active-menu'));
    
    const allSidebarItems = document.querySelectorAll('.sidebar-item');
    allSidebarItems.forEach(item => { 
        if(item.innerText.trim().toUpperCase() === title.trim().toUpperCase()) { 
            item.classList.add('active-menu'); 
            const parentSubmenu = item.closest('.submenu');
            if (parentSubmenu) {
                parentSubmenu.style.maxHeight = "300px"; 
                parentSubmenu.style.opacity = "1";
                const arrow = parentSubmenu.previousElementSibling?.querySelector('.arrow-icon');
                if(arrow) arrow.classList.add('rotate');
            }
        } 
    });

    const routes = {
        1: () => typeof renderDashboard === 'function' && renderDashboard(target),
        2: () => typeof renderCustomerList === 'function' && renderCustomerList(target),
        3: () => typeof renderSalesPage === 'function' && renderSalesPage(),
        4: () => typeof renderAppointmentPage === 'function' && renderAppointmentPage(),
        6: () => typeof renderReportPage === 'function' && renderReportPage(),
        7: () => typeof renderStaffManagement === 'function' && renderStaffManagement(),
        8: () => typeof renderSettingsPage === 'function' && renderSettingsPage(),
        9: () => typeof renderExpensePage === 'function' && renderExpensePage(),
        11: () => typeof renderPayrollSystem === 'function' && renderPayrollSystem(),
        12: () => typeof renderAttendanceRecord === 'function' && renderAttendanceRecord(),
        51: () => typeof renderCourseMasterPage === 'function' && renderCourseMasterPage(),
        52: () => typeof renderQueuePage === 'function' && renderQueuePage(),
        53: () => typeof renderStockPage === 'function' && renderStockPage(),
        66: () => typeof renderDFReportPage === 'function' && renderDFReportPage(),
        10: () => {
            if(typeof renderSettingsPage === 'function') {
                renderSettingsPage();
                setTimeout(() => {
                    const btn = document.querySelector('button[onclick*="allBranchBoard"]');
                    if(btn) window.switchSettingsTab('allBranchBoard', btn);
                }, 100);
            }
        }
    };

    if (routes[id]) {
        routes[id]();
    } else {
        target.innerHTML = `<div class="glass-card py-32 text-center text-slate-300 font-bold uppercase text-xl italic">เมนู ${title} <br> กำลังพัฒนา...</div>`;

window.handleSubmenu = function(targetId, targetArrowId, otherId, otherArrowId) {
    const target = document.getElementById(targetId);
    const arrow = document.getElementById(targetArrowId);
    
    window.closeSubmenu(otherId, otherArrowId);

    if (!target || !arrow) return; 

    const isOpen = target.style.maxHeight !== "0px" && target.style.maxHeight !== "";

    if (!isOpen) {
        target.style.maxHeight = "300px";
        target.style.opacity = "1";
        target.style.marginTop = "5px";
        target.style.pointerEvents = "auto"; 
        arrow.style.transform = "rotate(180deg)";
    } else {
        window.closeSubmenu(targetId, targetArrowId);
    }
};

window.closeSubmenu = function(id, arrowId) {
    const el = document.getElementById(id);
    const arrow = document.getElementById(arrowId);
    if (el) {
        el.style.maxHeight = "0px";
        el.style.opacity = "0";
        el.style.marginTop = "0px";
        el.style.pointerEvents = "none";
    }
    if (arrow) {
        arrow.style.transform = "rotate(0deg)";
    }
};

// --- ฟังก์ชันบันทึกข้อมูลลูกค้า (เชื่อมต่อ Supabase & ใช้ UUID) ---
window.saveCustomer = async function () {
    const isEdit = !!window.editingCustomerId;

    if (isEdit && !window.hasActionPermission('customer_edit')) {
        await Swal.fire({
            icon: 'warning',
            title: 'ไม่มีสิทธิ์',
            text: 'คุณไม่มีสิทธิ์แก้ไขข้อมูลลูกค้า',
            confirmButtonColor: '#D48197'
        });
        return false;
    }

    if (!isEdit && !window.hasActionPermission('customer_create')) {
        await Swal.fire({
            icon: 'warning',
            title: 'ไม่มีสิทธิ์',
            text: 'คุณไม่มีสิทธิ์เพิ่มข้อมูลลูกค้า',
            confirmButtonColor: '#D48197'
        });
        return false;
    }

    const firstName = document.getElementById("modalFirstName")?.value?.trim() || "";
    const lastName = document.getElementById("modalLastName")?.value?.trim() || "";
    const phone = document.getElementById("modalPhone")?.value?.trim() || "";
    const branchRaw = document.getElementById("modalBranch")?.value || "สาขาบางพลี";
    const branch = window.normalizeBranch ? window.normalizeBranch(branchRaw) : branchRaw;

    if (!firstName || !phone) {
        await Swal.fire({
            icon: 'warning',
            title: 'ข้อมูลไม่ครบ',
            text: 'กรุณากรอกชื่อจริงและเบอร์โทรศัพท์ค่ะ',
            confirmButtonColor: '#D48197'
        });
        return false;
    }

    const hn = (document.getElementById("modalHN")?.value || "").trim();
    if (!hn || hn === "กำลังโหลด...") {
        await Swal.fire({
            icon: 'warning',
            title: 'กรุณารอสักครู่',
            text: 'ระบบกำลังสร้างรหัส HN',
            confirmButtonColor: '#D48197'
        });
        return false;
    }

    const oldPhoto = isEdit ? (window.activeCustomer?.photo || "") : "";
    const oldAvatar = isEdit ? (window.activeCustomer?.avatar_url || window.activeCustomer?.photo || "") : "";

    const payload = {
        id: window.editingCustomerId || crypto.randomUUID(),
        hn: hn,
        first_name: firstName,
        last_name: lastName,
        fullname: `${firstName} ${lastName}`.trim(),
        nickname: document.getElementById("modalNickname")?.value?.trim() || "",
        phone: phone,
        email: document.getElementById("modalEmail")?.value?.trim() || "",
        line_id: document.getElementById("modalLine")?.value?.trim() || "",
        birth_date: typeof convertThaiDateToISO === "function"
            ? convertThaiDateToISO(document.getElementById("modalBirthDate")?.value)
            : null,
        citizen_id: document.getElementById("modalCitizenId")?.value?.trim() || "",
        address: document.getElementById("modalAddress")?.value?.trim() || "",
        allergy: document.getElementById("modalAllergy")?.value?.trim() || "ไม่มี",
        branch: branch,
        status: document.getElementById("modalStatus")?.value || "ปกติ",
        photo: window.currentPhotoData || oldPhoto,
        avatar_url: window.currentPhotoData || oldAvatar,
        created_at: isEdit
            ? (window.activeCustomer?.created_at || new Date().toISOString())
            : new Date().toISOString()
    };

    if (!window.supabaseClient) {
        await Swal.fire({
            icon: 'error',
            title: 'ระบบยังไม่พร้อม',
            text: 'ยังไม่พบการเชื่อมต่อ Supabase',
            confirmButtonColor: '#D48197'
        });
        return false;
    }

    let data = null;
    let error = null;

    if (isEdit) {
        ({ data, error } = await window.supabaseClient
            .from("customers")
            .update({
                hn: payload.hn,
                first_name: payload.first_name,
                last_name: payload.last_name,
                fullname: payload.fullname,
                nickname: payload.nickname,
                phone: payload.phone,
                email: payload.email,
                line_id: payload.line_id,
                birth_date: payload.birth_date,
                citizen_id: payload.citizen_id,
                address: payload.address,
                allergy: payload.allergy,
                branch: payload.branch,
                status: payload.status,
                photo: payload.photo,
                avatar_url: payload.avatar_url,
                updated_at: new Date().toISOString()
            })
            .eq("id", payload.id)
            .select()
            .single());
    } else {
        ({ data, error } = await window.supabaseClient
            .from("customers")
            .insert([{
                ...payload,
                updated_at: new Date().toISOString()
            }])
            .select()
            .single());
    }

    if (error) {
        console.error("saveCustomer error:", error);
        await Swal.fire({
            icon: 'error',
            title: 'บันทึกไม่สำเร็จ',
            text: error.message || 'เกิดข้อผิดพลาดในการบันทึกข้อมูล',
            confirmButtonColor: '#D48197'
        });
        return false;
    }

    let customerDB = [];
    try {
        customerDB = window.getCustomers() || [];
    } catch (e) {
        customerDB = [];
    }

    const existingIndex = customerDB.findIndex(c => String(c.id || '') === String(data.id || ''));
    if (existingIndex !== -1) {
        customerDB[existingIndex] = { ...customerDB[existingIndex], ...data };
    } else {
        customerDB.unshift(data);
    }

    localStorage.setItem("customerDB", JSON.stringify(customerDB));

    window.activeCustomer = data;
    window.editingCustomerId = null;

    await Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ!',
        text: isEdit ? 'อัปเดตข้อมูลลูกค้าเรียบร้อยแล้วค่ะ' : 'เพิ่มลูกค้าใหม่เรียบร้อยแล้วค่ะ',
        timer: 1500,
        showConfirmButton: false
    });

    if (typeof window.closeModal === 'function') {
        window.closeModal();
    }

    if (typeof window.applyCustomerFilter === 'function') {
        await window.applyCustomerFilter();
    }

    return true;
};

    const customerDB = await window.getCustomersFromSupabase();
    const c = customerDB.find(item => String(item.id) === String(customerId));
    if (!c) return;

    const target = document.getElementById('dynamicContent');
    
    // ฟังก์ชัน autoFillCourse (ปรับปรุงให้ใช้ภายใน Scope)
    window.autoFillCourse = function(courseName, amount, totalPrice) {
        const typeSelect = document.getElementById('opdTypeSelector');
        if (typeSelect && typeSelect.value !== 'skin_injection') {
            alert('กรุณาเลือกประเภท OPD เป็น "คอร์สฉีดผิว" ก่อนนะคะ');
            return;
        }
        const tables = document.querySelectorAll('#opd-dynamic-layout table');
        let allCells = []; 
        tables.forEach(table => {
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => { if(row.cells[2]) allCells.push(row.cells[2]); });
        });
        
        let startIndex = allCells.findIndex(cell => cell.innerText.trim() === "");
        if (startIndex === -1) return;
        
        for (let i = 0; i < amount; i++) {
            if (allCells[startIndex + i]) {
                allCells[startIndex + i].innerText = `${courseName} ${i+1}/${amount}`;
            }
        }
    };

    // คำนวณอายุคนไข้
    const getAge = (dateString) => {
        if (!dateString) return "-";
        const today = new Date();
        const birth = new Date(dateString);
        let age = today.getFullYear() - birth.getFullYear();
        if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
        return age;
    };

    window.renderOPDByType = function(type) {
        const printableArea = document.getElementById('opd-dynamic-layout');
        let layoutHtml = '';

        if (type === 'skin_injection') {
            const row = (i) => `<tr class="border-b border-slate-300 h-7">
                <td class="p-1 text-center border-r font-bold bg-slate-50">${i}</td>
                <td class="p-1 border-r w-20"></td>
                <td class="p-1 border-r font-normal text-[9px] text-slate-700 text-left pl-2"></td>
                <td class="p-1 w-24"></td>
            </tr>`;
            layoutHtml = `
                <div class="mt-[1cm] animate-in fade-in">
                    <div class="text-center mb-1"><p class="text-[11px] font-bold ace-pink uppercase tracking-widest underline">ประวัติการรักษา (คอร์สฉีดผิว)</p></div>
                    <div class="grid grid-cols-2 gap-2">
                        <table class="w-full border border-slate-400 text-center">
                            <thead class="bg-slate-100 text-[9px]"><tr><th class="p-1 border-r w-8 font-bold">ครั้งที่</th><th class="p-1 border-r font-bold w-20">วันที่</th><th class="p-1 border-r font-bold">รายการคอร์ส</th><th class="p-1 font-bold w-24">ผู้ทำ / เซ็น</th></tr></thead>
                            <tbody>${[1,2,3,4,5,6,7].map(i => row(i)).join('')}</tbody>
                        </table>
                        <table class="w-full border border-slate-400 text-center">
                            <thead class="bg-slate-100 text-[9px]"><tr><th class="p-1 border-r w-8 font-bold">ครั้งที่</th><th class="p-1 border-r font-bold w-20">วันที่</th><th class="p-1 border-r font-bold">รายการคอร์ส</th><th class="p-1 font-bold w-24">ผู้ทำ / เซ็น</th></tr></thead>
                            <tbody>${[8,9,10,11,12,13,14].map(i => row(i)).join('')}</tbody>
                        </table>
                    </div>
                </div>`;
        } else {
            layoutHtml = `
                <div class="mt-4 border border-slate-300 h-[440px] bg-slate-50/10 p-4 animate-in fade-in text-left">
                    <p class="text-[11px] font-bold ace-pink text-center mb-4 uppercase tracking-widest underline">ประวัติการรักษาทั่วไป</p>
                    <textarea id="treatmentNotesGeneral" class="w-full h-80 bg-transparent border-none outline-none no-print text-sm" placeholder="พิมพ์ประวัติการรักษาที่นี่..."></textarea>

        }

    };

    target.innerHTML = `

// --- ฟังก์ชันบันทึกประวัติการรักษาลง Database (ใช้ customer_id) ---
window.saveTreatmentHistory = async function(customerId) {
    const detailToSave = document.getElementById('treatmentNotesGeneral')?.value.trim();
    if (!detailToSave) return alert("⚠️ กรุณากรอกข้อมูลก่อนบันทึกค่ะ");

    const payload = {
        customer_id: customerId,
        detail: detailToSave,
        date: new Date().toISOString()
    };

    const { error } = await window.supabaseClient
        .from('treatments')
        .insert([payload]);

    if (error) {
        console.error("saveTreatmentHistory error:", error);
        return alert("❌ ไม่สามารถบันทึกข้อมูลได้");
    }
    
    alert("✅ บันทึกประวัติการรักษาเรียบร้อยแล้วค่ะ!");
};


window.prepareAndPrintOPD = function() {
    const notesEl = document.getElementById('treatmentNotes');
    if (notesEl) {
        const notes = notesEl.value;
        const displayEl = document.getElementById('printableNotesDisplay');
        if (displayEl) displayEl.innerText = notes;
    }
    window.print();
};
window.deleteTreatmentRecord = async function(customerId, recordId) {
    if (!confirm("คุณต้องการลบบันทึกการรักษานี้ใช่หรือไม่?")) return;

    try {
        const { error } = await window.supabaseClient
            .from('treatments')
            .delete()
            .eq('id', recordId)
            .eq('customer_id', customerId);

        if (error) {
            console.error('deleteTreatmentRecord error:', error);
            alert("❌ ไม่สามารถลบบันทึกการรักษาได้");
            return;
        }

        alert("✅ ลบบันทึกการรักษาเรียบร้อยแล้ว");

        if (typeof window.viewCustomerDetailById === 'function') {
            await window.viewCustomerDetailById(customerId);
        }
    } catch (e) {
        console.error('deleteTreatmentRecord catch:', e);
        alert("❌ เกิดข้อผิดพลาดในการลบข้อมูล");
    }
};

/* --- CLEAN CUSTOMER SYSTEM (IIFE) --- */
(function () {
  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  window.editingCustomerId = null;
 window.currentPhotoData = "";

  function ensureCustomerEnhancements() {
    const modal = document.getElementById("customerModal");
    if (!modal || modal.dataset.customerEnhanced === "1") return;

    const body = modal.querySelector(".max-h-\\[80vh\\]") || modal.querySelector(".overflow-y-auto");
    if (body) body.classList.remove("bg-[#FDF7F8]"), body.classList.add("bg-white");

    const leftCol = modal.querySelector(".w-full.lg\\:w-\\[300px\\]") || modal.querySelector(".lg\\:col-span-4");
    if (leftCol && !document.getElementById("parseBox")) {
      const box = document.createElement("div");
      box.className = "bg-white p-5 rounded-2xl border-2 border-pink-200 shadow-sm";
      box.innerHTML = `
        <div class="flex items-center justify-between mb-2">
          <label class="text-[11px] font-bold text-[#D48197] uppercase">แยกข้อมูล</label>
          <span class="text-[10px] text-slate-400">วางข้อความรวมแล้วกดแยก</span>
        </div>
        <textarea id="parseBox" class="w-full border-2 border-pink-200 p-3 rounded-xl text-sm text-slate-700 h-28 outline-none"></textarea>
        <button id="btnParseData" class="mt-3 bg-black text-white px-4 py-2 rounded-xl text-xs font-bold hover:opacity-90 transition-all">
          แยกข้อมูล
        </button>
      `;
      leftCol.insertBefore(box, leftCol.firstElementChild);
    }

    const allergyInput = document.getElementById("modalAllergy");
    if (allergyInput && !document.getElementById("modalChronic")) {
      const parent = allergyInput.closest(".col-span-2, .col-span-4, div");
      if (parent && parent.parentElement) {
        const block = document.createElement("div");
        block.className = parent.className || "col-span-2 space-y-1";
        block.innerHTML = `
          <label class="text-[11px] font-bold text-[#D48197] uppercase">โรคประจำตัว / ยาที่ทานประจำ</label>
          <textarea id="modalChronic" class="w-full border-2 border-pink-200 p-3 rounded-xl text-base font-bold text-slate-900 h-24 outline-none"></textarea>
        `;
        parent.parentElement.insertBefore(block, parent.nextSibling);
      }
    }

    const closeBtn = modal.querySelector("#btnCloseCustomerModal");
    if (closeBtn) closeBtn.className = "text-gray-400 hover:text-gray-700 font-bold";

    modal.dataset.customerEnhanced = "1";

    const parseBtn = document.getElementById("btnParseData");
    if (parseBtn) parseBtn.onclick = window.applyParsedCustomerData;
  }

  window.handlePhotoUpload = function (event) {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      window.currentPhotoData = e.target.result || "";
      const preview = document.getElementById("photoPreview");
      const placeholder = document.getElementById("uploadPlaceholder");
      if (preview) {
        preview.src = window.currentPhotoData;
        preview.classList.remove("hidden");
      }
      if (placeholder) placeholder.classList.add("hidden");
    };
    reader.readAsDataURL(file);
  };

  window.applyParsedCustomerData = function () {
    const raw = (document.getElementById("parseBox")?.value || "").trim();
    if (!raw) return;

    const lines = raw.split(/\n+/).map(x => x.trim()).filter(Boolean);
    const phone = (raw.match(/0\d{8,9}/) || [])[0] || "";
    const email = (raw.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i) || [])[0] || "";

    if (phone) document.getElementById("modalPhone").value = phone;
    if (email) document.getElementById("modalEmail").value = email;

    const branch =
      raw.includes("ชลบุรี") ? "สาขาชลบุรี" :
      raw.includes("อุดมสุข") ? "สาขาอุดมสุข" :
      raw.includes("บางพลี") ? "สาขาบางพลี" : "";
    if (branch && document.getElementById("modalBranch")) {
      document.getElementById("modalBranch").value = branch;
    }

    if (lines[0]) {
      const firstLine = lines[0];
      if (!/0\d{8,9}/.test(firstLine) && firstLine.length <= 90) {
        const parts = firstLine.split(" ").filter(Boolean);
        if (parts.length >= 2) {
          document.getElementById("modalFirstName").value = parts[0];
          document.getElementById("modalLastName").value = parts.slice(1).join(" ");
        } else {
          document.getElementById("modalFirstName").value = firstLine;
        }
      }
    }

    let addr = raw;
    if (email) addr = addr.replace(email, "");
    if (phone) addr = addr.replace(phone, "");
    if (lines[0]) addr = addr.replace(lines[0], "");
    addr = addr.trim();
    if (addr && document.getElementById("modalAddress")) {
      document.getElementById("modalAddress").value = addr;
    }
  };

window.generateHN = async function () {
    const el = document.getElementById("modalHN");
    if (!el || window.editingCustomerId) return;

    const branch = document.getElementById("modalBranch")?.value || "สาขาบางพลี";
    const branchCode = window.getBranchCode(branch);
    const thaiYear = (new Date().getFullYear() + 543).toString().slice(-2);

    const { data, error } = await window.supabaseClient
        .from("customers")
        .select("hn")
        .eq("branch", window.normalizeBranch(branch));

    if (error) {
        console.error("generateHN error:", error);
        el.value = `HN-${branchCode}-${thaiYear}0001`;
        return;
    }

    const list = Array.isArray(data) ? data : [];

    const sameBranchSameYear = list
        .map(x => String(x.hn || "").trim())
        .filter(hn => hn.startsWith(`HN-${branchCode}-${thaiYear}`));

    let maxRunning = 0;

    sameBranchSameYear.forEach(hn => {
        const runningPart = parseInt(hn.slice(-4), 10);
        if (!isNaN(runningPart) && runningPart > maxRunning) {
            maxRunning = runningPart;
        }
    });

    const nextRunning = String(maxRunning + 1).padStart(4, "0");
    el.value = `HN-${branchCode}-${thaiYear}${nextRunning}`;
};

window.bindBranchHNChange = function () {
    const branchEl = document.getElementById("modalBranch");
    if (!branchEl || branchEl.dataset.hnBound === "1") return;

    branchEl.addEventListener("change", async function () {
        if (!window.editingCustomerId) {
            await window.generateHN();
        }
    });

    branchEl.dataset.hnBound = "1";
};

 // 🎯 เปิด modal แก้ไขลูกค้าแบบ ID-based
window.openModalForEdit = function (customerId) {
    ensureCustomerEnhancements();

    const db = window.currentCustomerFilteredData?.length
        ? window.currentCustomerFilteredData
        : (typeof window.getCustomers === "function" ? window.getCustomers() : []);

    const c = db.find(item => String(item.id || "") === String(customerId || ""));
    if (!c) return;

    window.editingCustomerId = c.id;

    const modal = document.getElementById("customerModal");
    if (!modal) return;

    modal.classList.remove("hidden");
    modal.classList.add("flex");

    const title = document.getElementById("modalTitle");
    if (title) {
        title.innerText = "แก้ไขข้อมูลลูกค้า";
        title.className = "text-2xl font-bold text-slate-800 tracking-tight";
    }

    const hn = document.getElementById("modalHN");
    if (hn) hn.value = c.hn || "";

    const firstName = document.getElementById("modalFirstName");
    if (firstName) {
        firstName.value = c.first_name || c.firstName || (c.fullname || "").split(" ")[0] || "";
    }

    const lastName = document.getElementById("modalLastName");
    if (lastName) {
        lastName.value = c.last_name || c.lastName || (c.fullname || "").split(" ").slice(1).join(" ") || "";
    }

    const nickname = document.getElementById("modalNickname");
    if (nickname) nickname.value = c.nickname || "";

    const bd = document.getElementById("modalBirthDate");
    if (bd) bd.value = c.birth_date || c.birthDate || "";

    const phone = document.getElementById("modalPhone");
    if (phone) phone.value = c.phone || "";

    const email = document.getElementById("modalEmail");
    if (email) email.value = c.email || "";

    const ln = document.getElementById("modalLine");
    if (ln) ln.value = c.line_id || c.line || "";

    const allergy = document.getElementById("modalAllergy");
    if (allergy) allergy.value = c.allergy || "";

    const chronic = document.getElementById("modalChronic");
    if (chronic) chronic.value = c.chronic || "";

    const cid = document.getElementById("modalCitizenId");
    if (cid) cid.value = c.citizen_id || c.citizenId || "";

    const address = document.getElementById("modalAddress");
    if (address) address.value = c.address || "";

    const branch = document.getElementById("modalBranch");
    if (branch) branch.value = c.branch || "สาขาบางพลี";

    const status = document.getElementById("modalStatus");
    if (status) status.value = c.status || "ปกติ";

    const sellerField = document.getElementById("modalSeller");
    if (sellerField) {
        sellerField.value = c.seller || c.sellerName || c.seller_name || "";
        if (sellerField.value.trim()) {
            sellerField.disabled = true;
            sellerField.classList.add("bg-slate-100", "text-slate-400");
        } else {
            sellerField.disabled = false;
            sellerField.classList.remove("bg-slate-100", "text-slate-400");
        }
    }

    window.currentPhotoData = c.photo || c.avatar_url || "";

    const preview = document.getElementById("photoPreview");
    const placeholder = document.getElementById("uploadPlaceholder");

    if (preview && placeholder) {
        if (window.currentPhotoData) {
            preview.src = window.currentPhotoData;
            preview.classList.remove("hidden");
            placeholder.classList.add("hidden");
        } else {
            preview.src = "";
            preview.classList.add("hidden");
            placeholder.classList.remove("hidden");
        }
    }
};

// 2. จัดการ Dropdown Menu โดยใช้ ID
window.toggleDropdown = function (customerId) {
    document.querySelectorAll("[id^='action-menu-']").forEach(el => {
        if (el.id !== `action-menu-${customerId}`) el.classList.add("hidden");
    });

    const menu = document.getElementById(`action-menu-${customerId}`);
    if (menu) menu.classList.toggle("hidden");
};

// 3. หยุดการกระจาย Event และเปิดเมนูด้วย ID
window.toggleActionMenu = function(event, customerId) {
    event.stopPropagation();
    window.toggleDropdown(customerId);
};

        }

        const result = await Swal.fire({
            title: 'ยืนยันการลบลูกค้า?',
            text: 'ข้อมูลลูกค้าจะถูกลบออกจากระบบ',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'ลบข้อมูล',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#ef4444'
        });

        if (!result.isConfirmed) return;

        const { error } = await window.supabaseClient
            .from('customers')
            .delete()
            .eq('id', customerId);

        if (error) {
            console.error('deleteCustomer error:', error);
            Swal.fire('ลบไม่สำเร็จ', error.message || 'เกิดข้อผิดพลาดในการลบข้อมูล', 'error');
            return;
        }

        let db = [];
        try {
            db = JSON.parse(localStorage.getItem('customerDB')) || [];
        } catch (e) {
            db = [];
        }

        db = db.filter(c => String(c.id || '') !== String(customerId || ''));
        localStorage.setItem('customerDB', JSON.stringify(db));

        Swal.fire({
            icon: 'success',
            title: 'ลบข้อมูลสำเร็จ',
            timer: 1200,
            showConfirmButton: false
        });

        if (window.__customerLastTarget && typeof window.renderCustomerList === 'function') {
            await window.renderCustomerList(window.__customerLastTarget);
        }

    } catch (e) {
        console.error('deleteCustomer catch:', e);
        Swal.fire('ข้อผิดพลาด', e.message || 'ไม่สามารถลบข้อมูลได้', 'error');
    }
};

/* =======================================================
    👁️ ฟังก์ชันดูข้อมูลลูกค้า (Stable ID 100% + UI Reset)
   ======================================================= */
window.viewCustomerDetailById = function (customerId) {
    document.querySelectorAll('[id^="action-menu-"]').forEach(m => m.classList.add('hidden'));

    const db = window.getCustomers() || [];
    const c = db.find(item => String(item.id || "").trim() === String(customerId || "").trim());

    if (!c) {
        Swal.fire('ไม่พบข้อมูล', 'ไม่สามารถดึงข้อมูลลูกค้าคนนี้ได้ กรุณาลองใหม่ค่ะ', 'error');
        return;
    }

    if (typeof ensureCustomerProfileModal === 'function') {
        ensureCustomerProfileModal();
    }

    const modal = document.getElementById("customerProfileModal");
    if (!modal) {
        if (typeof renderProfileInMainContent === 'function') {
            renderProfileInMainContent(c);
        }
        return;
    }

    const box = document.getElementById("profileTabContent");
    if (box) {
        box.innerHTML = '<div class="flex justify-center p-10"><span class="animate-spin text-3xl">⌛</span></div>';
    }

    modal.dataset.customerId = String(c.id || "");
    modal.dataset.hn = String(c.hn || "");
    window.activeCustomer = c;

    const setEl = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.textContent = val || "-";
    };

    setEl("profileName", c.fullname || `${c.first_name || ''} ${c.last_name || ''}`.trim());
    setEl("profileNick", c.nickname ? `(${c.nickname})` : "");
    setEl("profileHN", c.hn || "-");
    setEl("profilePhone", c.phone || "-");
    setEl("profileBranch", c.branch || "-");
    setEl("profileSeller", c.seller || c.sellerName || c.seller_name || "-");

    const img = document.getElementById("profilePhoto");
    const ph = document.getElementById("profilePhotoPlaceholder");
    const photoSrc = c.photo || c.avatar_url || "";

    if (img && ph) {
        if (photoSrc && photoSrc.length > 10) {
            img.src = photoSrc;
            img.classList.remove("hidden");
            ph.classList.add("hidden");
        } else {
            img.src = "";
            img.classList.add("hidden");
            ph.classList.remove("hidden");
        }
    }

    if (typeof window.switchProfileTab === 'function') {
        setTimeout(() => {
            window.switchProfileTab("info", c.id);
        }, 50);
    }

    modal.classList.remove("hidden");
    modal.classList.add("flex");
    modal.style.zIndex = "10001";

    document.body.classList.remove('sidebar-open');
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

/* =======================================================
   📊 ฟังก์ชันวาดเนื้อหาในแท็บโปรไฟล์ (ID BASED)
   ======================================================= */
window.renderProfileTab = function(tab, customerId) {
    const box = document.getElementById("profileTabContent");
    const alternateBox = document.getElementById("profileTabBody");
    const contentArea = box || alternateBox;

    if (!contentArea) return;

    const customerDB = JSON.parse(localStorage.getItem("customerDB")) || [];
    const c = customerDB.find(item => String(item.id || "").trim() === String(customerId || "").trim());

    if (!c) {
        contentArea.innerHTML = `<p class="text-center py-10 text-slate-400">ไม่พบข้อมูลลูกค้า</p>`;
        return;
    }

    contentArea.innerHTML = "";

    if (tab === "courses" || tab === "course") {
        let items = Array.isArray(c.courses) ? [...c.courses] : [];

        if (items.length === 0) {
            contentArea.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 opacity-30">
                    <span class="text-5xl mb-4">🎫</span>
                    <p class="font-bold italic text-slate-400">คนไข้ท่านนี้ยังไม่มีรายการคอร์สค่ะ</p>
                </div>`;
            return;
        }

        items.sort((a, b) => {
            const aRemain = parseInt(a.amount || a.remain || 0);
            const bRemain = parseInt(b.amount || b.remain || 0);
            return (aRemain === 0) - (bRemain === 0);
        });

        contentArea.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500 p-4">
                ${items.map(x => {
                    const total = parseInt(x.totalAmount || x.amount || 0);
                    const remain = parseInt(x.amount || x.remain || 0);
                    const used = Math.max(0, total - remain);
                    const percent = total > 0 ? Math.min(100, Math.floor((used / total) * 100)) : 0;

                    return `
                    <div class="bg-white border border-pink-100 rounded-3xl p-5 shadow-sm relative overflow-hidden ${remain === 0 ? 'opacity-70 bg-slate-50' : ''}">
                        <div class="absolute top-0 left-0 w-1.5 h-full ${remain === 0 ? 'bg-slate-300' : 'bg-[#D48197]'}"></div>
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-left">
                                <h5 class="text-[14px] font-black text-slate-800 leading-tight">${x.name || '-'}</h5>
                                <p class="text-[9px] text-slate-400 font-bold mt-1 uppercase">วันที่ซื้อ: ${x.date || '-'}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-black ${remain === 0 ? 'text-slate-400' : 'text-[#D48197]'}">${used}/${total}</span>
                                <p class="text-[8px] font-bold text-slate-300 uppercase">ใช้ไปแล้ว</p>
                            </div>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-2">
                            <div class="h-full bg-[#D48197]" style="width: ${percent}%"></div>
                        </div>
                        <div class="text-[9px] font-bold ${remain === 0 ? 'text-slate-400' : 'text-[#D48197]'} uppercase text-right">
                            ${remain === 0 ? 'คอร์สเสร็จสมบูรณ์' : `คงเหลือ ${remain} ครั้ง`}
                        </div>
                    </div>`;
                }).join("")}
            </div>`;
        return;
    }

    if (tab === "appointments" || tab === "appointment") {
        const appointmentDB = JSON.parse(localStorage.getItem("appointmentDB")) || [];

        const items = appointmentDB.filter(x =>
            String(x.customer_id || "").trim() === String(c.id || "").trim()
        );

        contentArea.innerHTML = items.length
            ? `<div class="space-y-3 p-4">
                ${items.map(x => `
                    <div class="border border-pink-50 rounded-2xl p-4 bg-white flex justify-between items-center shadow-sm">
                        <div>
                            <div class="font-bold text-slate-700 text-sm">${x.date || '-'} | ${x.time || '-'}</div>
                            <div class="text-[10px] text-slate-400 uppercase font-bold mt-1">รายการ: ${x.course || '-'}</div>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[9px] font-bold bg-blue-50 text-blue-500 border border-blue-100">${x.status || '-'}</span>
                    </div>
                `).join("")}
            </div>`
            : `<div class="text-center py-10 text-slate-300 italic text-sm">ไม่มีประวัตินัดหมายค่ะ</div>`;
        return;
    }

    if (tab === "receipts" || tab === "receipt") {
        const accountDB = JSON.parse(localStorage.getItem("accountDB")) || [];

        const items = accountDB.filter(x =>
            String(x.type || '').trim() === 'รายรับ' &&
            String(x.customer_id || '').trim() === String(c.id || '').trim()
        );

        contentArea.innerHTML = items.length
            ? `<div class="space-y-3 p-4">
                ${items.map(x => `
                    <div class="border border-pink-50 rounded-2xl p-4 bg-white flex items-center justify-between shadow-sm">
                        <div>
                            <div class="font-bold text-slate-700 text-sm">
                                วันที่ ${x.date || '-'} | ฿${parseFloat(String(x.total || 0).replace(/[^0-9.-]+/g, "") || 0).toLocaleString()}
                            </div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase mt-1">
                                วิธีชำระ: ${x.payment || '-'}
                            </div>
                        </div>
                        <button onclick="window.printReceipt('${x.id}', '${c.hn || ''}', 'A5')"
                            class="px-4 py-2 rounded-xl bg-[#D48197] text-white text-[10px] font-bold shadow-sm hover:bg-black transition-all">
                            พิมพ์ใบเสร็จ
                        </button>
                    </div>
                `).join("")}
            </div>`
            : `<div class="text-center py-10 text-slate-300 italic text-sm">ไม่มีประวัติใบเสร็จค่ะ</div>`;
        return;
    }

    if (tab === "files" || tab === "file") {
        const items = Array.isArray(c.files) ? c.files : [];

        contentArea.innerHTML = items.length
            ? `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4">
                ${items.map(x => `
                    <div class="border border-pink-50 rounded-2xl p-4 bg-white text-xs font-bold text-slate-500 shadow-sm">
                        ${x.name || x.fileName || x.url || 'ไฟล์แนบ'}
                    </div>
                `).join("")}
            </div>`
            : `<div class="text-center py-10 text-slate-300 italic text-sm">ยังไม่มีเอกสารแนบค่ะ</div>`;
        return;
    }

    if (tab === "info") {
        contentArea.innerHTML = `
            <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-slate-600">
                <div><b class="text-slate-800">ชื่อ-สกุล:</b> ${c.fullname || '-'}</div>
                <div><b class="text-slate-800">ชื่อเล่น:</b> ${c.nickname || '-'}</div>
                <div><b class="text-slate-800">HN:</b> ${c.hn || '-'}</div>
                <div><b class="text-slate-800">เบอร์โทร:</b> ${c.phone || '-'}</div>
                <div><b class="text-slate-800">สาขา:</b> ${c.branch || '-'}</div>
                <div><b class="text-slate-800">ผู้ดูแล:</b> ${c.seller || c.sellerName || c.seller_name || '-'}</div>
                <div><b class="text-slate-800">แพ้ยา:</b> ${c.allergy || 'ไม่มี'}</div>
                <div><b class="text-slate-800">โรคประจำตัว:</b> ${c.chronic || '-'}</div>
                <div class="md:col-span-2"><b class="text-slate-800">ที่อยู่:</b> ${c.address || '-'}</div>
            </div>
        `;
        return;
    }

    contentArea.innerHTML = `<div class="text-center py-10 text-slate-300 italic text-sm">ยังไม่มีข้อมูลในแท็บนี้ค่ะ</div>`;
};

/* =======================================================
   🔁 ฟังก์ชันสลับแท็บโปรไฟล์
   ======================================================= */
window.switchProfileTab = function(tabName, customerId) {
    document.querySelectorAll('.profileTab, .profile-tab').forEach(btn => {
        btn.classList.remove('bg-pink-50', 'text-[#D48197]', 'active');
        btn.classList.add('bg-white', 'text-slate-600');
    });

    const targetBtn = document.querySelector(`.profileTab[data-tab="${tabName}"], .profile-tab[data-tab="${tabName}"]`);
    if (targetBtn) {
        targetBtn.classList.remove('bg-white', 'text-slate-600');
        targetBtn.classList.add('bg-pink-50', 'text-[#D48197]', 'active');
    }

    window.renderProfileTab(tabName, customerId);
};

window.applyCustomerFilter = async function () {
    const keyword = (document.getElementById("customerSearchInput")?.value || "").toLowerCase().trim();
    const tableBranchSelect = document.getElementById("branchFilterSelect")?.value || "ทั้งหมด";
    const pageSize = Number(document.getElementById("pageSizeSelect")?.value || "10");

    // ✅ ดึงจาก Supabase โดยตรง
    const db = await window.getCustomersFromSupabase();

    const filtered = db.filter((c) => {
        const fullName = String(c.fullname || `${c.first_name || ''} ${c.last_name || ''}`.trim()).toLowerCase();
        const hn = String(c.hn || '').toLowerCase();
        const phone = String(c.phone || '');
        const branch = String(c.branch || '').trim();

        const k =
            fullName.includes(keyword) ||
            hn.includes(keyword) ||
            phone.includes(keyword);

        const b =
            tableBranchSelect === "ทั้งหมด" ||
            tableBranchSelect === "ทุกสาขา" ||
            branch === tableBranchSelect ||
            branch === `สาขา${tableBranchSelect}`;

        return k && b;
    });

    window.currentCustomerFilteredData = filtered;

    const totalPages = Math.ceil(filtered.length / pageSize) || 1;
    if ((window.currentCustomerPage || 1) > totalPages) {
        window.currentCustomerPage = 1;
    }

    const start = ((window.currentCustomerPage || 1) - 1) * pageSize;
    window.renderCustomerTable(filtered.slice(start, start + pageSize));
    renderCustomerPagination(filtered.length, pageSize);
};


  function renderCustomerPagination(totalItems, pageSize) {
    const container = document.getElementById("customerPagination");
    if (!container) return;

    const totalPages = Math.ceil(totalItems / pageSize);

    if (totalPages <= 1) {
      container.innerHTML = "";
      return;
    }

    let html = "";

    html += `<button onclick="changeCustomerPage(${currentCustomerPage - 1})"
      class="px-3 py-2 rounded-xl text-xs font-bold border border-pink-100 bg-white ${currentCustomerPage === 1 ? 'opacity-40 pointer-events-none' : 'hover:bg-pink-50'}">ก่อนหน้า</button>`;

    for (let i = 1; i <= totalPages; i++) {
      html += `<button onclick="changeCustomerPage(${i})"
        class="px-3 py-2 rounded-xl text-xs font-bold border ${i === currentCustomerPage ? 'bg-[#D48197] text-white border-[#D48197]' : 'bg-white text-slate-600 border-pink-100 hover:bg-pink-50'}">${i}</button>`;
    }

    html += `<button onclick="changeCustomerPage(${currentCustomerPage + 1})"
      class="px-3 py-2 rounded-xl text-xs font-bold border border-pink-100 bg-white ${currentCustomerPage === totalPages ? 'opacity-40 pointer-events-none' : 'hover:bg-pink-50'}">ถัดไป</button>`;

    container.innerHTML = html;
  }

  window.changeCustomerPage = async function (page) {
    currentCustomerPage = page;
    await window.applyCustomerFilter();
};

  function bindCustomerPageEvents(target) {
    if (!target || target.__boundCustomer) return;
    target.__boundCustomer = true;

    target.addEventListener("click", async (e) => {
        if (e.target.closest("#btnAddCustomer")) {
            window.openModalForAdd();
            return;
        }
        if (e.target.closest("#btnCustomerSearch")) {
            currentCustomerPage = 1;
            await window.applyCustomerFilter();
            return;
        }
    });

    target.addEventListener("keydown", async (e) => {
        if (e.target.matches("#customerSearchInput") && e.key === "Enter") {
            currentCustomerPage = 1;
            await window.applyCustomerFilter();
        }
    });

    target.addEventListener("change", async (e) => {
        if (e.target.matches("#pageSizeSelect, #branchFilterSelect")) {
            currentCustomerPage = 1;
            await window.applyCustomerFilter();
        }
    });
}
  
})();

window.normalizeCourseName = function(name = '') {
    return String(name).replace(/\s*\(\d+\/\d+\)\s*$/, '').trim();
};

// ✅ แก้ไข: ใช้ ID ในการดึงข้อมูลจาก Supabase แทน Index
window.getNextCourseLabel = async function(customerId, courseName) {
    const { data: appointmentDB } = await window.supabaseClient
        .from('appointments')
        .select('course')
        .eq('customer_id', customerId);

    const normalizedName = window.normalizeCourseName(courseName);

    // นับจำนวนครั้งที่เคยนัดคอร์สนี้ไปแล้วผ่าน ID
    const usedCount = (appointmentDB || []).filter(ap => {
        const courses = String(ap.course || '')
            .split(',')
            .map(x => window.normalizeCourseName(x));
        return courses.includes(normalizedName);
    }).length;

    // หาจำนวนทั้งหมด (Total) จากฐานข้อมูลลูกค้า
    const { data: customer } = await window.supabaseClient
        .from('customers')
        .select('courses')
        .eq('id', customerId)
        .single();

    let total = 1;
    if (customer && Array.isArray(customer.courses)) {
        const found = customer.courses.find(c =>
            window.normalizeCourseName(c.name) === normalizedName
        );
        if (found) {
            total = parseInt(found.totalAmount || found.amount || 1) || 1;
        }
    }

    const nextRound = usedCount + 1;
    return `${normalizedName} (${nextRound}/${total})`;
};

    return window.filterByBranch(db, c => c.branch);

window.getBranchStaffOptions = function(allowedRoles = [], selectedValue = '') {
    const staffDB = typeof window.getStaff === 'function' ? window.getStaff() : [];
    const viewingBranch = typeof window.getCurrentViewingBranch === 'function'
        ? window.getCurrentViewingBranch()
        : 'ทุกสาขา';

    let filtered = Array.isArray(staffDB) ? staffDB : [];

    if (typeof window.canViewAllBranches === 'function' && typeof window.filterByBranch === 'function') {
        if (!window.canViewAllBranches()) {
            filtered = window.filterByBranch(filtered, item => item.branch);

    if (Array.isArray(allowedRoles) && allowedRoles.length > 0) {
        filtered = filtered.filter(s => allowedRoles.includes(String(s.role || '').trim()));

    if (filtered.length === 0) {

    return filtered.map(s => {
        const value = s.name || s.fullname || s.staffId || '-';

        return `<option value="${value}" ${selected}>${value}</option>`;
    }).join('');
};

window.loadPermissionsFromSupabase = async function() {
    if (!window.supabaseClient) return {};

    const { data, error } = await window.supabaseClient
        .from('role_menu_permissions')
        .select('role, menu_id, allowed');

    if (error) {
        console.error('loadPermissionsFromSupabase error:', error);
        return {};
    }

    const map = {};

    (data || []).forEach(row => {
        const role = row.role || '';
        const menuId = String(row.menu_id || '');
        const allowed = !!row.allowed;

        if (!map[role]) map[role] = [];
        if (allowed) map[role].push(menuId);
    });

    localStorage.setItem('ace_permissions', JSON.stringify(map));
    return map;
};

window.getCurrentUserSafe = function() {
    return JSON.parse(localStorage.getItem('currentUser')) || {};
};

window.getRolePermissions = function(role = '') {
    const perms = JSON.parse(localStorage.getItem('ace_permissions')) || {};
    return perms[role] || [];
};

        },

// ✅ แก้ไข: ใช้ customerId (UUID) แทน Index ในการดึงคอร์สคงเหลือ
window.getCustomerRemainingCourses = function(customerId) {
    const customerDB = window.getCustomers() || [];
    const customer = customerDB.find(c => String(c.id) === String(customerId));
    if (!customer || !Array.isArray(customer.courses)) return [];

    const courseMasterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];

    return customer.courses
        .map(c => {
            const remain = parseInt(c.amount || 0);
            const total = parseInt(c.totalAmount || c.amount || 1);
            const used = total - remain;
            const nextRound = used + 1;

            const master = courseMasterDB.find(m =>
                window.normalizeCourseName(m.name || '') === window.normalizeCourseName(c.name || '')
            ) || {};

            return {
                ...c,
                remain,
                total,
                used,
                nextRound,
                staffDF: parseFloat(master.staffDF || master.df || 0),
                doctorDF: parseFloat(master.doctorDF || 0),
                displayLabel: `${c.name} (${nextRound}/${total})`
            };
        })
        .filter(c => c.remain > 0);
};

// ✅ 1. ฟังก์ชันหาป้ายชื่อคอร์ส (ใช้ customerId เป็นหลัก)
window.getCustomerCourseDisplayLabel = function(customerId, courseName) {
    if (!customerId) return courseName;

    const customerDB = window.getCustomers() || [];
    const customer = customerDB.find(c => String(c.id) === String(customerId));
    if (!customer || !Array.isArray(customer.courses)) return courseName;

    const found = customer.courses.find(c =>
        window.normalizeCourseName(c.name || '') === window.normalizeCourseName(courseName || '')
    );

    if (!found) return courseName;

    const total = parseInt(found.totalAmount || found.amount || 1) || 1;
    const remain = parseInt(found.amount || 0) || 0;

    let nextRound = (total - remain) + 1;
    if (nextRound < 1) nextRound = 1;
    if (nextRound > total) nextRound = total;

    return `${window.normalizeCourseName(courseName)} (${nextRound}/${total})`;
};

window.getAppointmentCourseLabels = function(customerId, selectedCourses = []) {
    return (selectedCourses || []).map(courseName => {
        return window.getCustomerCourseDisplayLabel(customerId, courseName);
    });
};
