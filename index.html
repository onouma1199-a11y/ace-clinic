};

window.updateDFBySelectedCourse = function(courseName) {
    const courseMasterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const normalized = window.normalizeCourseName(courseName);

    const found = courseMasterDB.find(c =>
        window.normalizeCourseName(c.name || '') === normalized
    );

    const staffDFInput = document.getElementById('staffDF');
    const doctorDFInput = document.getElementById('doctorDF');

    if (!staffDFInput || !doctorDFInput) return;

    if (found) {
        staffDFInput.value = found.staffDF || 0;
        doctorDFInput.value = found.doctorDF || 0;
    } else {
        staffDFInput.value = 0;
        doctorDFInput.value = 0;
    }
};

window.syncProcessCourseSelection = function() {
    const checks = [...document.querySelectorAll('.process-course-check:checked')];
    const selectedNames = checks.map(c => c.value);

    const displayBox = document.getElementById('processCourseSelectedSummary');
    if (displayBox) {
        displayBox.innerHTML = selectedNames.length > 0
            ? selectedNames.map(name => `
                <span class="inline-flex items-center px-2.5 py-1 rounded-xl bg-white border border-pink-100 text-[10px] text-slate-600 mr-1 mb-1">
                    ${name}
                </span>
            `).join('')
            : `<span class="text-slate-300 text-xs">ยังไม่ได้เลือกรายการ</span>`;
    }

    let staffDF = 0;
    let doctorDF = 0;

    checks.forEach(chk => {
        staffDF += parseFloat(chk.dataset.staffdf || 0);
        doctorDF += parseFloat(chk.dataset.doctordf || 0);
    });

    const staffDFInput = document.getElementById('staffDF');
    const doctorDFInput = document.getElementById('doctorDF');

    if (staffDFInput) staffDFInput.value = staffDF;
    if (doctorDFInput) doctorDFInput.value = doctorDF;
};

// 🎯 ฟังก์ชันบันทึกงานเสร็จสิ้น: หักคอร์สเศษส่วน และ Sync สถานะนัดหมาย (ID-Based)
window.finishService = function(qId) {
    let allQueue = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
    const qIndex = allQueue.findIndex(item => item.queueId === qId);
    if (qIndex === -1) return;

    const qData = allQueue[qIndex];

    // 1. ดึงรายการคอร์สที่ติ๊กเลือกทำจริง
    const selectedCourseChecks = [...document.querySelectorAll('.process-course-check:checked')];
    const selectedCourses = selectedCourseChecks.map(chk => chk.value);

    if (selectedCourses.length === 0) {
        Swal.fire('กรุณาเลือกรายการ', 'กรุณาเลือกคอร์สที่ทำจริงเพื่อหักยอดค่ะ', 'warning');
        return;
    }

    // 2. เริ่มกระบวนการหักคอร์สใน Database ลูกค้า
    let customers = JSON.parse(localStorage.getItem('customerDB')) || [];
    let custIdx = customers.findIndex(c => c.hn === qData.hn);

    if (custIdx !== -1) {
        selectedCourses.forEach(courseName => {
            const courseIdx = customers[custIdx].courses.findIndex(c => 
                window.normalizeCourseName(c.name) === window.normalizeCourseName(courseName)
            );

            if (courseIdx !== -1) {
                let currentAmt = parseInt(customers[custIdx].courses[courseIdx].amount || 0);
                if (currentAmt > 0) {
                    // 🎯 หักออก 1 ครั้ง (เพื่อให้แสดงผลเช่น 2/5 ได้จากการคำนวณ totalAmount - amount)
                    customers[custIdx].courses[courseIdx].amount = currentAmt - 1;
                }
            }
        });
        localStorage.setItem('customerDB', JSON.stringify(customers));
    }

    // 3. ดึงค่ามือ (DF) จาก Input ใน Modal มาบันทึกลงคิว (สำหรับทำรายงาน DF)
    qData.staffDF = parseFloat(document.getElementById('staffDF')?.value || 0);
    qData.doctorDF = parseFloat(document.getElementById('doctorDF')?.value || 0);
    qData.staff = document.getElementById('procStaffName')?.value || qData.staff;
    qData.doctor = document.getElementById('procDoctorName')?.value || qData.doctor;

    // 4. อัปเดตสถานะคิว
    qData.status = "เสร็จสิ้น";
    qData.finishTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    
    // 5. ⚡ Sync สถานะกลับไปที่หน้านัดหมายอัตโนมัติ โดยใช้ ID อ้างอิง
    let appointments = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    const appRefId = qData.appRefId || qData.appointmentId; // ใช้รหัสอ้างอิงที่ส่งมาจากหน้านัดหมาย
    const appIdx = appointments.findIndex(a => String(a.createdAt) === String(appRefId));
    
    if (appIdx !== -1) {
        appointments[appIdx].status = "เสร็จสิ้น";
        localStorage.setItem('appointmentDB', JSON.stringify(appointments));
    }

    // บันทึกข้อมูลคิวลง Database
    localStorage.setItem('todayQueueDB', JSON.stringify(allQueue));
    
    // ปิด Modal และรีเฟรชหน้าจอ
    document.getElementById('processModal')?.remove();

    Swal.fire({ 
        icon: 'success', 
        title: 'บันทึกสำเร็จ', 
        text: 'หักคอร์สและอัปเดตสถานะนัดหมายเรียบร้อยแล้วค่ะ',
        timer: 1500, 
        showConfirmButton: false 
    });

    renderQueuePage();
    if (typeof renderAppointmentPage === 'function') renderAppointmentPage();
};

// 🎯 ฟังก์ชันยกเลิกคิวและคืนคอร์ส
window.deleteQueueItem = function(qId) {
    Swal.fire({
        title: 'ยืนยันการลบคิว?',
        text: "หากคิวนี้หักคอร์สไปแล้ว ระบบจะคืนคอร์สให้ลูกค้าอัตโนมัติค่ะ",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ใช่, ลบและคืนคอร์ส',
        confirmButtonColor: '#ef4444'
    }).then((result) => {
        if (result.isConfirmed) {
            let db = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
            const targetIdx = db.findIndex(item => item.queueId === qId);
            if (targetIdx === -1) return;

            const item = db[targetIdx];

            // คืนคอร์สถ้าสถานะคือเสร็จสิ้น
            if (item.status === "เสร็จสิ้น") {
                let customers = JSON.parse(localStorage.getItem('customerDB')) || [];
                const cIdx = customers.findIndex(c => c.hn === item.hn);
                if (cIdx !== -1) {
                    const coursesDone = String(item.course).split(',').map(x => x.trim());
                    coursesDone.forEach(cName => {
                        const bcIdx = customers[cIdx].courses.findIndex(bc => 
                            window.normalizeCourseName(bc.name) === window.normalizeCourseName(cName)
                        );
                        if (bcIdx !== -1) {
                            customers[cIdx].courses[bcIdx].amount = (parseInt(customers[cIdx].courses[bcIdx].amount || 0) + 1);
                        }
                    });
                    localStorage.setItem('customerDB', JSON.stringify(customers));
                }
            }

            db.splice(targetIdx, 1);
            localStorage.setItem('todayQueueDB', JSON.stringify(db));
            renderQueuePage();
            Swal.fire('ลบสำเร็จ', 'ระบบลบคิวและคืนคอร์สเรียบร้อยแล้วค่ะ', 'success');
        }
    });
};

window.renderSalesPage = function() {
    const target = document.getElementById('dynamicContent');
    if (!target) return;
    
    const incomes = JSON.parse(localStorage.getItem('accountDB')) || [];
    const today = new Date().toISOString().split('T')[0];
    
    const dateFilter = document.getElementById('billDateFilter')?.value || today;
    const currentSearch = document.getElementById('billSearchInput')?.value || "";
    const statusFilter = document.getElementById('billStatusFilter')?.value || "ทั้งหมด";
    const billPageSize = parseInt(document.getElementById('billPageSize')?.value) || 10;

    // ค้นหาบรรทัดนี้ในฟังก์ชัน renderSalesPage แล้วแทนที่ด้วย logic กรองสาขา
let filteredData = incomes.filter(item => {
    if (item.type !== "รายรับ") return false; 
    
    // --- เพิ่มส่วนกรองสาขาตรงนี้ ---
    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
    const viewingBranch = (currentUser.branch || '').replace('สาขา', '').trim();
    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(currentUser.role);
    const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
    
    // ถ้าไม่ใช่ Admin บิลต้องตรงสาขาเท่านั้น
    const matchBranch = (viewingBranch === 'ทุกสาขา' && isAdmin) || (itemBranch === viewingBranch);
    // ----------------------------

    const nameVal = String(item.customerName || item.customer || "").toLowerCase();
    const hnVal = String(item.hn || "").toLowerCase();
    const searchVal = currentSearch.toLowerCase().trim();
    
    return matchBranch && // กรองสาขา
           (nameVal.includes(searchVal) || hnVal.includes(searchVal)) &&
           (statusFilter === "ทั้งหมด" || item.status === statusFilter) &&
           (!dateFilter || item.date === dateFilter);
});

    filteredData.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    if (typeof window.currentBillPage === 'undefined') window.currentBillPage = 1;
    
    const totalPages = Math.max(1, Math.ceil(filteredData.length / billPageSize));
    if (window.currentBillPage > totalPages) window.currentBillPage = totalPages;
    if (window.currentBillPage < 1) window.currentBillPage = 1;

    const startIndex = (window.currentBillPage - 1) * billPageSize;

    // 💡 แก้ไข HTML: ลบ overflow-hidden ออกจากส่วนตาราง เพื่อให้เมนูเด้งทับได้
    target.innerHTML = `

                        <option value="10" ${billPageSize === 10 ? 'selected' : ''}>10 รายการ</option>
                        <option value="30" ${billPageSize === 30 ? 'selected' : ''}>30 รายการ</option>
                        <option value="50" ${billPageSize === 50 ? 'selected' : ''}>50 รายการ</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1 shrink-0">
                    <label class="text-[10px] font-bold text-[#D48197] uppercase ml-2">สถานะ</label>
                    <select id="billStatusFilter" onchange="window.currentBillPage=1; renderSalesPage()" class="border border-pink-100 px-4 py-2.5 rounded-2xl text-[13px] font-light bg-slate-50 outline-none shadow-sm min-w-[140px] text-slate-600 appearance-none cursor-pointer">
                        <option value="ทั้งหมด" ${statusFilter === 'ทั้งหมด' ? 'selected' : ''}>ทั้งหมด</option>
                        <option value="เสร็จสิ้น" ${statusFilter === 'เสร็จสิ้น' ? 'selected' : ''}>✅ เสร็จสิ้น</option>
                        <option value="ยกเลิก" ${statusFilter === 'ยกเลิก' ? 'selected' : ''}>❌ ยกเลิก</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1 shrink-0">
                    <label class="text-[10px] font-bold text-[#D48197] uppercase ml-2">เลือกวันที่</label>

// --- ฟังก์ชันเปิด-ปิดเมนู ▼ (ฉบับแก้ไข: ID 100% และดันแถวขึ้นหน้าสุด) ---
window.safeToggleMenu = function(event, billId) {
    event.stopPropagation();
    
    // 1. หาเมนูเป้าหมายโดยใช้ ID ของบิล (ไม่ใช่ index)
    const targetMenu = document.getElementById(`action-menu-${billId}`);
    if (!targetMenu) return;
    
    const isHidden = targetMenu.classList.contains('hidden');

    // 2. ปิดเมนูอื่นๆ ทั้งหมดที่เปิดค้างอยู่ (ใช้ Selector หา ID ที่ขึ้นต้นด้วย action-menu-)
    document.querySelectorAll('[id^="action-menu-"]').forEach(m => m.classList.add('hidden'));
    
    // 3. รีเซ็ต z-index ทุกแถวในตารางให้กลับเป็นปกติ
    document.querySelectorAll('#salesTableBody tr').forEach(tr => {
        tr.style.zIndex = "1"; 
        tr.style.position = "relative"; 
    });

    // 4. ถ้าเมนูเดิมปิดอยู่ ให้เปิดและดัน "แถวนี้" ให้ลอยสูงสุดด้วย z-index
    if (isHidden) {
        targetMenu.classList.remove('hidden');
        const parentRow = targetMenu.closest('tr');
        if (parentRow) {
            // 🎯 บังคับให้แถวที่มีเมนูเปิดอยู่ ลอยทับแถวอื่น 100%
            parentRow.style.zIndex = "9999"; 
        }
    }
};

// 💡 คลิกที่ว่างบนหน้าจอเพื่อปิดเมนู (ฉบับ ID 100% และ Clean Up)
document.addEventListener('click', function (e) {
    // เช็คก่อนว่าคลิกข้างนอกปุ่มเมนูจริงๆ หรือไม่ (ป้องกันเมนูเด้งปิดทันทีที่กดเปิด)
    if (!e.target.closest('[id^="action-menu-"]') && !e.target.closest('.inline-flex')) {
        
        // 1. ปิดเมนูทั้งหมดที่ขึ้นต้นด้วย action-menu-
        document.querySelectorAll('[id^="action-menu-"]').forEach(menu => {
            menu.classList.add('hidden');
        });

        // 2. รีเซ็ต z-index ของทุกแถวในตารางยอดขาย
        document.querySelectorAll('#salesTableBody tr').forEach(tr => {
            tr.style.zIndex = "1";
            // tr.style.position = "static"; // ถ้าต้องการให้กลับเป็นค่าเริ่มต้นจริงๆ
        });
    }
});

// --- ❌ ฟังก์ชันยกเลิกบิล (ฉบับแก้ไข Logic คืนคอร์สให้แม่นยำ 100%) ---
window.cancelBillProcess = function(billId, hn) {
    Swal.fire({
        title: '🚨 ยืนยันการยกเลิกบิล?',
        text: "ระบบจะเปลี่ยนสถานะเป็น 'ยกเลิก' และหักจำนวนคอร์สที่เคยเพิ่มให้ออก",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#888',
        confirmButtonText: 'ใช่, ยกเลิกบิลนี้!',
        cancelButtonText: 'ปิดหน้าต่าง',
        customClass: { popup: 'rounded-[2rem]' }
    }).then((result) => {
        if (result.isConfirmed) {
            try {
                // 1. จัดการฝั่งบัญชี (Account DB)
                let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
                const billIdx = accountDB.findIndex(b => String(b.id) === String(billId));
                
                if (billIdx === -1) return Swal.fire('ไม่พบข้อมูล', 'ไม่พบเลขที่บิลนี้ในระบบ', 'error');
                if (accountDB[billIdx].status === "ยกเลิก") return Swal.fire('แจ้งเตือน', 'บิลนี้ถูกยกเลิกไปแล้ว', 'info');

                const targetBill = accountDB[billIdx];

                // 2. จัดการฝั่งลูกค้า (Customer DB) - คืนค่าคอร์ส
                let customers = JSON.parse(localStorage.getItem('customerDB')) || [];
                const cIdx = customers.findIndex(c => String(c.hn) === String(hn));
                
                if (cIdx !== -1 && targetBill.items && targetBill.items.length > 0) {
                    targetBill.items.forEach(billItem => {
                        // ค้นหาคอร์สในตัวลูกค้าที่ชื่อตรงกัน
                        const cCourseIdx = customers[cIdx].courses.findIndex(bc => bc.name === billItem.name);
                        
                        if (cCourseIdx !== -1) {
                            // 🎯 ลบจำนวนที่เคยเพิ่มเข้าไปในตอนออกบิล
                            const qtyToSubtract = parseInt(billItem.qty || 1);
                            customers[cIdx].courses[cCourseIdx].amount -= qtyToSubtract;

                            // ถ้าหักจนหมด หรือติดลบ (กรณีมีการใช้ไปก่อนแล้ว) ให้ลบรายการคอร์สนั้นออก
                            if (customers[cIdx].courses[cCourseIdx].amount <= 0) {
                                customers[cIdx].courses.splice(cCourseIdx, 1);
                            }
                        }
                    });
                    localStorage.setItem('customerDB', JSON.stringify(customers));
                }

                // 3. อัปเดตสถานะบิลเป็นยกเลิก
                accountDB[billIdx].status = "ยกเลิก";
                accountDB[billIdx].cancelledAt = new Date().toISOString(); // เก็บเวลาที่ยกเลิกไว้ตรวจสอบ
                
                localStorage.setItem('accountDB', JSON.stringify(accountDB));
                
                Swal.fire({ 
                    icon: 'success', 
                    title: 'ยกเลิกบิลสำเร็จ', 
                    text: 'หักคืนจำนวนคอร์สเรียบร้อยแล้ว',
                    showConfirmButton: false, 
                    timer: 1500 
                });
                
                if (typeof renderSalesPage === 'function') renderSalesPage(); 

            } catch (e) { 
                console.error(e);
                Swal.fire('ข้อผิดพลาด', 'เกิดปัญหาทางเทคนิคในการยกเลิกบิล', 'error'); 
            }
        }
    });
};

// --- ฟังก์ชันเลือกวิธีชำระเงิน (สลับสีปุ่มที่ถูกกด) ---
window.selectPaymentType = function(btn, type) {
    // ล้างสีปุ่มอื่น
    document.querySelectorAll('#paymentMethods button').forEach(b => {
        b.classList.remove('border-pink-400', 'text-[#FF4B91]', 'bg-pink-50', 'shadow-inner');
        b.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
    });
    // ระบายสีปุ่มที่เลือก
    btn.classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
    btn.classList.add('border-pink-400', 'text-[#FF4B91]', 'bg-pink-50', 'shadow-inner');
    
    // เก็บค่าลงตัวแปร
    window.selectedPaymentMethod = type; 
};

// --- 3. ฟังก์ชันค้นหาคนไข้ (ฉบับปลดล็อกให้ดึงชื่อใช้ได้ทุกสาขา 100%) ---
window.searchCustomerForBill = function(val) {
    const resDiv = document.getElementById('customerSearchResult');
    if (!resDiv) return;

    const keyword = String(val || '').trim().toLowerCase();

    if (!keyword) {
        resDiv.innerHTML = '';
        resDiv.classList.add('hidden');
        return;
    }

    // 🎯 แก้ไขจุดนี้: ดึงจาก localStorage โดยตรง ไม่ผ่าน getCustomerSharedDB 
    // เพื่อให้ข้ามระบบกรองสิทธิ์สาขา และค้นหาเจอคนไข้จากทุกสาขาครับ
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];

    const matches = customerDB.filter(c => {
        const fullName = String(c.fullname || c.fullName || '').toLowerCase();
        const hn = String(c.hn || '').toLowerCase();
        const phone = String(c.phone || '');
        return fullName.includes(keyword) || hn.includes(keyword) || phone.includes(keyword);
    });

    // --- 3. ส่วนแสดงผลการค้นหาคนไข้ (ในฟังก์ชัน searchCustomerForBill) ---
    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(c => `
            <div onclick="window.selectCustomerToBill('${String(c.hn || '').replace(/'/g, "\\'")}')" 
                class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between items-center bg-white transition-all">
                <div>
                    <span class="text-sm text-slate-700 font-bold">${c.fullname || c.fullName || '-'}</span>
                    <p class="text-[9px] text-slate-400 font-bold uppercase italic">📌 สาขาที่สมัคร: ${c.branch || 'ไม่ระบุ'}</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] bg-cyan-50 text-cyan-600 px-3 py-1 rounded-full font-bold">${c.hn || '-'}</span>
                </div>
            </div>
        `).join('');
    } else {
        resDiv.innerHTML = '<div class="p-4 text-center text-xs text-slate-300 italic">ไม่พบรายชื่อในฐานข้อมูล...</div>';
    }

    resDiv.classList.remove('hidden');
}; // ปิดฟังก์ชัน searchCustomerForBill

// --- 4. ฟังก์ชันเลือกคนไข้เข้ากล่อง (ฉบับดั้งเดิมที่ใช้กับไฟล์คุณได้ 100%) ---
window.selectCustomerToBill = function(hn) {
    if (!window.requirePermission(3, 'เลือกคนไข้เพื่อตีบิล')) return;

    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const c = customerDB.find(item => String(item.hn) === String(hn));
    if (!c) return;

    window.activeCustomer = c;

    // เติมข้อมูลลง ID ต่างๆ ตามโครงสร้างเดิมในหน้าบิล
    if(document.getElementById('billHN')) document.getElementById('billHN').innerText = c.hn || '-';
    if(document.getElementById('billFullName')) document.getElementById('billFullName').innerText = c.fullname || '-';
    if(document.getElementById('billNickName')) document.getElementById('billNickName').innerText = c.nickname || '-';
    if(document.getElementById('billPhone')) document.getElementById('billPhone').innerText = c.phone || '-';
    if(document.getElementById('billAllergy')) document.getElementById('billAllergy').innerText = c.allergy || 'ไม่มี';
    if(document.getElementById('billNationality')) document.getElementById('billNationality').innerText = c.nationality || '-';
    if(document.getElementById('billRight')) document.getElementById('billRight').innerText = c.right || 'ทั่วไป';

    const img = document.getElementById('billCustPhoto');
    const icon = document.getElementById('billPhotoIcon');
    if (img && icon) {
        if (c.photo) {
            img.src = c.photo;
            img.classList.remove('hidden');
            icon.classList.add('hidden');
        } else {
            img.src = "";
            img.classList.add('hidden');
            icon.classList.remove('hidden');
        }
    }

    // จัดการ UI การแสดงผล
    const resDiv = document.getElementById('customerSearchResult');
    if (resDiv) resDiv.classList.add('hidden');
    
    const searchInp = document.getElementById('custSearchForBillInp');
    if (searchInp) searchInp.value = c.fullname || '';

    const billArea = document.getElementById('billingFormArea');
    if (billArea) billArea.classList.remove('hidden', 'opacity-0');
    
    const hint = document.getElementById('noCustomerHint');
    if (hint) hint.classList.add('hidden');
};
   
// --- 6. เพิ่มรายการลงตาราง (ฉบับปรับปรุงแก้ไขการเพิ่มรายการไม่ได้) ---
window.addItemToBill = function() {
    // 🛡️ 1. เช็คสิทธิ์การเข้าถึง (ID 3 คือ ระบบบัญชี)
    if (!window.requirePermission(3, 'เพิ่มรายการบิล')) return;

    const nameInp = document.getElementById('itemName');
    const priceInp = document.getElementById('billPrice');
    const qtyInp = document.getElementById('billQty');

    const name = nameInp ? nameInp.value.trim() : "";
    const price = priceInp ? parseFloat(priceInp.value) || 0 : 0;
    const qty = qtyInp ? parseFloat(qtyInp.value) || 0 : 0;
    
    // ดึงหมวดหมู่จาก Dataset (ที่มาจากฟังก์ชันค้นหา)
    const cat = nameInp.dataset.category || 'general';

    // ⚠️ 2. ตรวจสอบความถูกต้องก่อนเพิ่ม
    if (!name) {
        Swal.fire({ icon: 'warning', text: 'กรุณาระบุชื่อรายการก่อนค่ะ', confirmButtonColor: '#D48197' });
        return;
    }
    if (price <= 0) {
        Swal.fire({ icon: 'warning', text: 'กรุณาระบุราคาที่ถูกต้องค่ะ', confirmButtonColor: '#D48197' });
        return;
    }

    // ➕ 3. เพิ่มลงในรายการบิลชั่วคราว
    window.currentBillItems.push({ 
        name: name, 
        price: price, 
        qty: qty, 
        cat: cat, 
        total: price * qty 
    });

    // 🔄 4. รีเฟรชตารางแสดงผลด้านล่าง
    if(typeof renderBillItems === 'function') renderBillItems();
    
    // 🧹 5. ล้างช่องพิมพ์เพื่อรอรายการถัดไป
    nameInp.value = '';
    priceInp.value = '';
    qtyInp.value = '1';
    delete nameInp.dataset.category; // ล้างค่าหมวดหมู่เก่าทิ้งเพื่อป้องกันข้อมูลปนกัน
};
// --- 7. วาดตารางบิล (ฉบับดึงข้อมูลและแสดงผลประเภทรายการ) ---
window.renderBillItems = function() {
    const listBody = document.getElementById('billItemsList');
    if (!listBody) return;
    
    let grandTotal = 0;

    if (!window.currentBillItems || window.currentBillItems.length === 0) {
        listBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-300 font-normal italic">ยังไม่มีรายการ...</td></tr>`;
        // รีเซ็ตยอดรวมเป็น 0 เมื่อไม่มีรายการ
        const totalDisplay = document.getElementById('grandTotalDisplay');
        if (totalDisplay) totalDisplay.innerText = '฿0.00';
    } else {
        listBody.innerHTML = window.currentBillItems.map((item, index) => {
            // คำนวณยอดรวมสะสม
            const itemTotal = parseFloat(item.total || 0);
            grandTotal += itemTotal;

            // กำหนดป้ายกำกับประเภท (สินค้า หรือ คอร์ส)
            const categoryTag = item.cat === 'medicine' || item.type === 'product' 
                ? '<span class="bg-blue-50 text-blue-500 px-2 py-0.5 rounded text-[9px] uppercase font-bold">สินค้า</span>'
                : '<span class="bg-pink-50 text-[#FF4B91] px-2 py-0.5 rounded text-[9px] uppercase font-bold">คอร์ส</span>';

            return `
                <tr class="hover:bg-slate-50 transition-all group border-b border-slate-100">
                    <td class="py-4 pl-4 text-left">
                        <div class="flex items-center gap-2">
                            ${categoryTag}
                            <span class="text-slate-700 font-bold">${item.name}</span>
                        </div>
                    </td>
                    <td class="py-4 text-center text-slate-600 font-bold">${item.qty}</td>
                    <td class="py-4 text-center text-slate-600">${parseFloat(item.price || 0).toLocaleString()}</td>
                    <td class="py-4 text-right text-slate-700 font-black">฿${itemTotal.toLocaleString()}</td>
                    <td class="py-4 text-right pr-4">
                        <button onclick="removeItemFromBill(${index})" 
                                class="bg-white p-2 rounded-full shadow-sm border border-slate-100 hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all text-xs opacity-50 group-hover:opacity-100">
                            ✕
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // อัปเดตตัวเลขยอดรวมสุทธิ (Grand Total)
    const totalDisplay = document.getElementById('grandTotalDisplay');
    if (totalDisplay) {
        totalDisplay.innerText = '฿' + grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
};

// --- 8. ลบรายการออก ---
window.removeItemFromBill = function(index) {
    if (window.currentBillItems && window.currentBillItems[index]) {
        window.currentBillItems.splice(index, 1);
        renderBillItems();
        
        // ถ้ามีฟังก์ชันคำนวณส่วนลดหรือภาษีเพิ่มเติม ให้เรียกที่นี่
        if (typeof updateTaxAndDiscount === 'function') updateTaxAndDiscount();
    }
};

// --- 9. บันทึกบิล (ฉบับอัปเกรดระบบหักคอร์สเศษส่วน 2/5 และ ID แม่นยำ) ---
window.confirmFinalPayment = function() {
    try {
        const paymentValue = window.selectedPaymentMethod;
        const dateInput = document.getElementById('billDate');
        const billDate = dateInput ? dateInput.value : new Date().toISOString().split('T')[0];
        
        const customerName = document.getElementById('billFullName').innerText;
        const customerHN = document.getElementById('billHN').innerText;

        if (customerHN === "-" || !customerName) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาค้นหาและเลือกข้อมูลคนไข้ก่อนค่ะ', 'warning');
            return;
        }
        if (window.currentBillItems.length === 0) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเพิ่มรายการคอร์ส/ยา อย่างน้อย 1 รายการค่ะ', 'warning');
            return;
        }
        if (!paymentValue) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณากดเลือกช่องทางชำระเงินด้านล่างด้วยค่ะ', 'warning');
            return;
        }

        const user = (typeof window.getCurrentUserSafe === 'function')
            ? window.getCurrentUserSafe()
            : (JSON.parse(localStorage.getItem('currentUser')) || {});

        const staffBranch = (typeof window.getUserHomeBranch === 'function')
            ? window.getUserHomeBranch()
            : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

        const totalAmount = window.currentBillItems.reduce((sum, item) => {
            return sum + (Number(item.qty || 0) * Number(item.price || 0));
        }, 0);

        const newBillEntry = {
            id: Date.now(),
            date: billDate,
            hn: customerHN,
            customerName: customerName,
            items: [...window.currentBillItems],
            total: totalAmount,
            totalDisplay: '฿' + totalAmount.toLocaleString(undefined, { minimumFractionDigits: 2 }),
            payment: paymentValue,
            status: "เสร็จสิ้น",
            type: "รายรับ",
            branch: staffBranch,
            seller: user.name || '-',
            timestamp: new Date().getTime(),
            courseRestored: false
        };

        // 1. บันทึกลงฐานข้อมูลบัญชี
        let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
        accountDB.push(newBillEntry);
        localStorage.setItem('accountDB', JSON.stringify(accountDB));

        // 2. อัปเดตคอร์สใน Database ลูกค้า
        let customers = JSON.parse(localStorage.getItem('customerDB')) || [];
        const cIdx = customers.findIndex(c => c.hn === customerHN);

        if (cIdx !== -1) {
            if (!Array.isArray(customers[cIdx].courses)) customers[cIdx].courses = [];

            window.currentBillItems.forEach(item => {
                // ตรวจสอบว่าเป็นคอร์สหรือไม่ (ถ้าหมวดหมู่คือ course หรือระบุว่าเป็นคอร์ส)
                const isCourse = item.cat === 'course' || item.type === 'course' || !item.cat; 

                if (isCourse) {
                    const itemName = item.name || '-';
                    const qty = parseInt(item.qty) || 0;

                    // 🎯 เช็คว่ามีคอร์สเดิมอยู่แล้วหรือไม่ (อ้างอิงชื่อที่ normalize แล้ว)
                    const foundCourseIdx = customers[cIdx].courses.findIndex(c => 
                        window.normalizeCourseName(c.name) === window.normalizeCourseName(itemName)
                    );

                    if (foundCourseIdx !== -1) {
                        // ถ้ามีอยู่แล้ว ให้บวกจำนวนเพิ่มเข้าไปทั้ง 2 ค่า เพื่อรักษาอัตราส่วนเศษส่วน
                        customers[cIdx].courses[foundCourseIdx].amount += qty;      // จำนวนคงเหลือ
                        customers[cIdx].courses[foundCourseIdx].totalAmount += qty; // จำนวนทั้งหมดที่ซื้อสะสม
                        customers[cIdx].courses[foundCourseIdx].date = billDate;
                    } else {
                        // ถ้าเป็นคอร์สใหม่ ให้บันทึกค่าเริ่มต้น
                        customers[cIdx].courses.push({
                            id: "C-" + Date.now() + Math.random().toString(36).substr(2, 5),
                            name: itemName,
                            amount: qty,       // ครั้งที่เหลือ (เช่น 5)
                            totalAmount: qty,  // ครั้งทั้งหมด (เช่น 5) -> ผลลัพธ์ตอนโชว์คือ 0/5
                            date: billDate,
                            fromBranch: staffBranch,
                            status: 'active'
                        });
                    }
                }
            });

            localStorage.setItem('customerDB', JSON.stringify(customers));
        }

        Swal.fire({
            icon: 'success',
            title: 'บันทึกบิลสำเร็จ!',
            text: `ยอดเงินและคอร์สถูกบันทึกเรียบร้อยค่ะ`,
            timer: 2000,
            showConfirmButton: false
        }).then(() => {
            if (typeof renderSalesPage === 'function') renderSalesPage();
        });

    } catch (e) {
        Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + e.message, 'error');
    }
};

//  คืนคอร์สลูกค้า
function restoreCustomerCoursesFromReceipt(receipt){

    if(!receipt || !receipt.customerHn || !Array.isArray(receipt.items)) return;

    const customerDB = JSON.parse(localStorage.getItem("customerDB")) || [];
    const index = customerDB.findIndex(c => c.hn === receipt.customerHn);

    if(index === -1) return;

    const customer = customerDB[index];
    customer.courseRemain = Array.isArray(customer.courseRemain) ? customer.courseRemain : [];

    receipt.items.forEach(item=>{

        const isCourse = item.type === "course";
        if(!isCourse) return;

        const qty = Number(item.qty || 0);
        if(qty <= 0) return;

        const name = String(item.item || "").trim();
        const unit = item.unit || "ครั้ง";

        const remainIndex = customer.courseRemain.findIndex(c=>c.name === name);

        if(remainIndex !== -1){

            customer.courseRemain[remainIndex].remain =
            Number(customer.courseRemain[remainIndex].remain || 0) + qty;

        }else{

            customer.courseRemain.push({
                name:name,
                remain:qty,
                unit:unit
            });

        }

    });

    customerDB[index] = customer;

    localStorage.setItem("customerDB",JSON.stringify(customerDB));

}

                amount: amount,
                account: document.getElementById('expAccount').value
            };
        }
    }).then((result) => {
        if (result.isConfirmed) {
            window.saveExpense(result.value);
        }
    });
};

// 3. ฟังก์ชัน Save (บันทึกและสั่งโหลดหน้าซ้ำ) — ล็อกสาขาตามผู้บันทึก
window.saveExpense = function(data) {
    let accountDB = [];
    try {
        accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    } catch (e) {
        accountDB = [];
    }

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const staffBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

    const amountNumber = Number(data.amount || 0);

    const newEntry = {
        id: "EXP" + Date.now(),
        date: data.date,
        detail: data.detail,
        category: data.category,
        amount: amountNumber,
        total: amountNumber,
        account: data.account,
        type: "รายจ่าย",
        status: "เสร็จสิ้น",
        branch: staffBranch,
        createdBy: user.name || user.fullName || '-',
        timestamp: new Date().getTime()
    };

    accountDB.push(newEntry);
    localStorage.setItem('accountDB', JSON.stringify(accountDB));

    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ',
        text: `รายการนี้ถูกบันทึกในสาขา ${staffBranch}`,
        showConfirmButton: false,
        timer: 1500
    });

    window.renderExpensePage();
};

// 4. ฟังก์ชันลบ — กันลบข้ามสาขา
window.deleteExpense = function(id) {
    let accountDB = [];
    try {
        accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    } catch (e) {
        accountDB = [];
    }

    const idx = accountDB.findIndex(item => item.id === id);

    if (idx === -1) {
        Swal.fire('ไม่พบข้อมูล', 'ไม่พบรายการที่ต้องการลบ', 'warning');
        return;
    }

    const row = accountDB[idx];
    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(row.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire('ไม่อนุญาต', 'คุณไม่สามารถลบรายจ่ายของสาขาอื่นได้ค่ะ', 'error');
        return;
    }

    Swal.fire({
        title: 'ยืนยันการลบรายการนี้?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ลบรายการ',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#ef4444'
    }).then((result) => {
        if (!result.isConfirmed) return;

        accountDB = accountDB.filter(item => item.id !== id);
        localStorage.setItem('accountDB', JSON.stringify(accountDB));

        Swal.fire({
            icon: 'success',
            title: 'ลบสำเร็จ',
            timer: 1200,
            showConfirmButton: false
        });

        window.renderExpensePage();
    });
};

/* =======================================================
   🖨️ ฟังก์ชันพิมพ์ใบเสร็จล่าสุดจากหน้าตารางลูกค้า
   ======================================================= */
window.printLatestReceipt = function(name, hn) {
    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    
    // ประวัติลูกค้าอนุญาตให้ดูข้ามสาขาได้
    const customerBills = accountDB.filter(b => 
        (b.hn === hn || b.customerHn === hn || b.customerName === name || b.customer === name) && 
        b.type === "รายรับ" && 
        b.status === "เสร็จสิ้น"
    );

    if (customerBills.length === 0) {
        Swal.fire({
            icon: 'info',
            title: 'ไม่พบประวัติการซื้อ',
            text: `คุณ ${name} ยังไม่มีประวัติการชำระเงินในระบบค่ะ`,
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // 2. เอาบิลล่าสุด (ตัวที่ timestamp มากที่สุด)
    customerBills.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    const latestBill = customerBills[0];

    // 3. ถามว่าอยากพิมพ์ขนาดไหน
    Swal.fire({
        title: 'เลือกขนาดใบเสร็จ',
        text: `บิลล่าสุดวันที่ ${latestBill.date} ยอด ฿${parseFloat(latestBill.total || 0).toLocaleString()}`,
        icon: 'question',
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: 'สลิป 80mm',
        denyButtonText: 'ใบเสร็จ A5 (ครึ่ง A4)',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#000',
        denyButtonColor: '#D48197',
    }).then((result) => {
        if (result.isConfirmed) {
            if(typeof window.printReceipt === 'function') window.printReceipt(latestBill.id, latestBill.hn || latestBill.customerHn, '80mm');
        } else if (result.isDenied) {
            if(typeof window.printReceipt === 'function') window.printReceipt(latestBill.id, latestBill.hn || latestBill.customerHn, 'A5');
        }
    });
};

window.saveNewMasterCourse = function() {
    const name = document.getElementById('newCourseName').value.trim();
    const cat = document.getElementById('newCourseCat').value.trim();
    const price = document.getElementById('newCoursePrice').value || 0;
    const amount = document.getElementById('newCourseAmount').value || 1;
    const unit = document.getElementById('newCourseUnit').value.trim() || 'ครั้ง';
    const staffDF = document.getElementById('newCourseDF').value || 0;
    const doctorDF = document.getElementById('newCourseDoctorDF').value || 0;

    if (!name || !cat) {
        alert("⚠️ กรุณาระบุชื่อคอร์สและหมวดหมู่ด้วยนะคะ");
        return;
    }

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const staffBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

    const newCourse = {
        id: "C-" + Date.now(),
        name: name,
        category: cat,
        price: parseFloat(price) || 0,
        amount: parseInt(amount) || 1,
        unit: unit,
        staffDF: parseFloat(staffDF) || 0,
        doctorDF: parseFloat(doctorDF) || 0,
        createdAt: new Date().toLocaleDateString('th-TH'),
        branch: staffBranch,
        createdBy: user.name || user.fullName || '-'
    };

    let masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    masterDB.unshift(newCourse);
    localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));

    alert(`✅ บันทึกคอร์ส "${name}" เรียบร้อยแล้วค่ะ!`);
    closeCourseModal();
    if (typeof updateCourseMasterTable === "function") updateCourseMasterTable();
};

window.editMasterCourse = function(idx) {
    const masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const c = masterDB[idx];
    if (!c) return;

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(c.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        alert("⚠️ คุณไม่มีสิทธิ์แก้ไขคอร์สของสาขาอื่น");
        return;
    }

    openAddCourseModal();

    document.querySelector('#courseModal h3').innerText = "📝 แก้ไขรายการคอร์ส";
    const saveBtn = document.querySelector('#courseModal button[onclick="saveNewMasterCourse()"]');
    saveBtn.innerText = "อัปเดตข้อมูล";

    document.getElementById('newCourseName').value = c.name || '';
    document.getElementById('newCourseCat').value = c.category || '';
    document.getElementById('newCoursePrice').value = String(c.price || '').replace(/,/g, '');
    document.getElementById('newCourseAmount').value = c.amount || 1;
    document.getElementById('newCourseUnit').value = c.unit || 'ครั้ง';
    document.getElementById('newCourseDF').value = String(c.staffDF || '').replace(/,/g, '');
    document.getElementById('newCourseDoctorDF').value = String(c.doctorDF || '').replace(/,/g, '');

    saveBtn.removeAttribute('onclick');
    saveBtn.onclick = function() {
        const name = document.getElementById('newCourseName').value.trim();
        const cat = document.getElementById('newCourseCat').value.trim();
        const price = document.getElementById('newCoursePrice').value || 0;
        const amount = document.getElementById('newCourseAmount').value || 1;
        const unit = document.getElementById('newCourseUnit').value.trim() || 'ครั้ง';
        const staffDF = document.getElementById('newCourseDF').value || 0;
        const doctorDF = document.getElementById('newCourseDoctorDF').value || 0;

        if (!name || !cat) {
            alert("⚠️ กรุณาระบุชื่อคอร์สและหมวดหมู่ด้วยนะคะ");
            return;
        }

        masterDB[idx] = {
            ...masterDB[idx],
            name: name,
            category: cat,
            price: parseFloat(price) || 0,
            amount: parseInt(amount) || 1,
            unit: unit,
            staffDF: parseFloat(staffDF) || 0,
            doctorDF: parseFloat(doctorDF) || 0
        };

        localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));
        alert(`✅ อัปเดตคอร์ส "${name}" เรียบร้อยแล้วค่ะ!`);

window.updateStockTable = function() {
    const tbody = document.getElementById('stockTableBody');
    if (!tbody) return;

    tbody.innerHTML = '';

    let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    const searchTerm = (document.getElementById('stockSearchInput')?.value || "").toLowerCase().trim();

    // ล็อกสาขา
    if (typeof window.filterByBranch === 'function' && typeof window.canViewAllBranches === 'function') {
        if (!window.canViewAllBranches()) {
            stockDB = window.filterByBranch(stockDB, item => item.branch);
        }
    }

    const filteredStock = stockDB.filter(s => {
        const nameText = String(s.name || "").toLowerCase();
        const codeText = String(s.code || "").toLowerCase();
        return nameText.includes(searchTerm) || codeText.includes(searchTerm);
    });

    if (filteredStock.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center italic text-slate-300 font-normal">📦 ยังไม่มีข้อมูลสต๊อกในขณะนี้</td></tr>`;
        return;
    }

    tbody.innerHTML = filteredStock.map((s, idx) => {
    // ไม่จำเป็นต้องหา realIdx จากลำดับแถวอีกต่อไป 
    // เพราะเราจะใช้ s.id ในการระบุตัวตนโดยตรง

    const expValue = s.expDate || s.exp || '';
    let isExpiring = false;

    if (expValue) {
        const expDateObj = new Date(expValue);
        if (!isNaN(expDateObj.getTime())) {
            const warnDate = new Date();
            warnDate.setDate(warnDate.getDate() + 30);
            isExpiring = expDateObj < warnDate;
        }
    }

    return `
        <tr class="border-b border-pink-50 hover:bg-pink-50/20 transition-all font-normal text-slate-600" style="height: 75px;">
            <td class="p-2 text-center text-[10px] text-slate-400 font-normal">${idx + 1}</td>
            <td class="p-2 text-center text-slate-500 italic font-light">${s.receiveDate || s.date || '-'}</td>
            <td class="p-4 text-left">
                <div class="font-bold text-slate-700 text-[14px] leading-tight">${s.name || '-'}</div>
                <div class="text-[9px] text-pink-400 italic mt-1 font-light uppercase">
                    📦 หน่วยเรียก: ${s.unit || 'ชิ้น'} ${s.branch ? `| สาขา: ${s.branch}` : ''}
                </div>
            </td>
            <td class="p-2 text-center font-black ace-pink text-base">
                ${Number(s.qty || 0)} <span class="text-[10px] font-normal text-slate-400">${s.unit || 'หน่วย'}</span>
            </td>
            <td class="p-2 text-center text-slate-500 font-normal">
                ฿${parseFloat(s.cost || 0).toLocaleString(undefined, { minimumFractionDigits: 2 })}
            </td>
            <td class="p-2 text-center">
                <span class="px-3 py-1.5 rounded-full text-[10px] ${isExpiring ? 'bg-red-50 text-red-500 font-bold' : 'bg-slate-50 text-slate-400'}">
                    ${s.expDate || s.exp || 'ไม่ระบุ'}
                </span>
            </td>
            <td class="p-2 text-center">
                <div class="flex items-center justify-center gap-3">
                    <button onclick="window.editStockById('${s.id}')" class="text-[11px] text-slate-400 hover:text-pink-500 transition-all font-bold">📝 แก้ไข</button>
                    
                    <button onclick="window.deleteStockItemById('${s.id}')" class="p-2 opacity-20 hover:opacity-100 transition-all">
                        <img src="https://cdn-icons-png.flaticon.com/128/3096/3096673.png" class="w-4 h-4">
                    </button>
                </div>
            </td>
        </tr>
    `;
}).join('');

// 1. ฟังก์ชันลบสต๊อกด้วย ID
window.deleteStockItemById = function(stockId) {
    let db = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    
    // 🎯 ค้นหาตำแหน่ง Index จริงๆ จาก ID
    const realIdx = db.findIndex(item => String(item.id) === String(stockId));
    if (realIdx === -1) {
        Swal.fire('Error', 'ไม่พบรหัสสินค้าในระบบ', 'error');
        return;
    }

    const row = db[realIdx];

    // 🔐 เช็คสิทธิ์สาขา
    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(row.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire('ไม่อนุญาต', "⚠️ คุณไม่มีสิทธิ์ลบสต๊อกของสาขาอื่น", 'warning');
        return;
    }

    // ✅ ยืนยันการลบ
    Swal.fire({
        title: 'ยืนยันการลบสินค้า?',
        text: `คุณต้องการลบรายการ "${row.name}" ออกจากคลังใช่หรือไม่?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'ใช่, ลบเลย',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            db.splice(realIdx, 1);
            localStorage.setItem('clinicStockDB', JSON.stringify(db));
            
            Swal.fire({
                icon: 'success',
                title: 'ลบสำเร็จ!',
                timer: 1500,
                showConfirmButton: false
            });
            
            if (typeof updateStockTable === "function") updateStockTable();
        }
    });
};

    const isAdminAll = (typeof window.canViewAllBranches === 'function')

window.saveEditStockById = function(stockId) {
    let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    
    // 🎯 หา Index จาก ID
    const realIdx = stockDB.findIndex(item => String(item.id) === String(stockId));
    if (realIdx === -1) return;

    const row = stockDB[realIdx];

    // 🔐 เช็คสิทธิ์สาขา (Re-check ก่อนเซฟ)
    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(row.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire('Error', "คุณไม่มีสิทธิ์บันทึกสต๊อกของสาขาอื่น", 'error');
        return;
    }

    // 🔄 อัปเดตข้อมูล
    stockDB[realIdx] = {
        ...stockDB[realIdx],
        receiveDate: document.getElementById('editDate').value || '',
        date: document.getElementById('editDate').value || '',
        name: document.getElementById('editName').value || '',
        qty: parseInt(document.getElementById('editQty').value) || 0,
        unit: document.getElementById('editUnit').value || 'หน่วย',
        cost: parseFloat(document.getElementById('editCost').value) || 0,
        expDate: document.getElementById('editExp').value || '',
        exp: document.getElementById('editExp').value || ''
    };

    localStorage.setItem('clinicStockDB', JSON.stringify(stockDB));
    document.getElementById('editStockModal')?.remove();

    Swal.fire({
        toast: true,
        position: 'top-end',
        icon: 'success',
        title: 'แก้ไขข้อมูลสำเร็จแล้วค่ะ',
        showConfirmButton: false,
        timer: 2000
    });

    if (typeof updateStockTable === "function") updateStockTable();
};

window.autoFillDrugInfo = function(drugName) {
    const drugDB = JSON.parse(localStorage.getItem('drugMasterDB')) || [];
    const drug = drugDB.find(d => d.name === drugName);
    if (drug) {
        if(document.getElementById('lblUsage')) document.getElementById('lblUsage').value = drug.usage || '';
        if(document.getElementById('lblDetail')) document.getElementById('lblDetail').value = drug.detail || '';
    }
};

window.saveDrugMaster = function() {
    const name = document.getElementById('mDrugName').value.trim();
    const usage = document.getElementById('mDrugUsage').value;
    const detail = document.getElementById('mDrugDetail').value;

    if (!name) { alert("⚠️ ระบุชื่อยาด้วยค่ะ"); return; }

    alert("✅ บันทึกสูตรยามาตรฐานเรียบร้อย!");

    document.getElementById('newCourseName').value = c.name || '';
    document.getElementById('newCourseCat').value = c.category || '';
    document.getElementById('newCoursePrice').value = c.price || 0;
    document.getElementById('newCourseAmount').value = c.amount || 1;
    document.getElementById('newCourseUnit').value = c.unit || 'ครั้ง';
    document.getElementById('newCourseDF').value = c.staffDF || 0;
    document.getElementById('newCourseDoctorDF').value = c.doctorDF || 0;

    saveBtn.onclick = function() {
        masterDB[idx] = {

        };

    };

window.showStaffModalById = function(mode, staffId) {
    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    // ค้นหาลำดับ (Index) จริงๆ จาก Database โดยใช้ staffId
    const idx = staffDB.findIndex(s => String(s.staffId) === String(staffId));
    
    // ส่งลำดับที่หาเจอไปให้ฟังก์ชันหน้ากากเดิมทำงานต่อ
    window.showStaffModal(mode, idx !== -1 ? idx : null);
};

window.viewStaffDetailById = function(staffId) {
    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const idx = staffDB.findIndex(s => String(s.staffId) === String(staffId));
    
    if (idx !== -1) {
        window.viewStaffDetail(idx);
    } else {
        Swal.fire('Error', 'ไม่พบรหัสพนักงานนี้ในระบบ Database', 'error');
    }
};

    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];

window.saveStaffComplete = function(idx, mode) {
    const name = document.getElementById('newName')?.value;
    const phone = document.getElementById('newPhone')?.value;
    const status = document.getElementById('newStatus')?.value; // ดึงค่าสถานะ ลาออก/ทำงาน

    if (!name || !phone) return alert("กรุณากรอกชื่อและเบอร์โทรศัพท์ด้วยค่ะ");

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const imgElement = document.getElementById('previewImg');
    const imgData = imgElement ? imgElement.src : '';

    const data = {
        name: name, 
        nickname: document.getElementById('newNickname').value,
        role: document.getElementById('newRole').value, 
        branch: document.getElementById('newBranch').value || 'บางพลี', 
        status: status, // เก็บสถานะลาออก
        bankName: document.getElementById('newBank').value, 
        bankAcc: document.getElementById('newAcc').value, 
        phone: phone, 
        startDate: document.getElementById('newStart').value,
        address: document.getElementById('newAddress').value, 
        salary: parseFloat(document.getElementById('newSalary').value || 0),
        img: imgData.startsWith('data:') ? imgData : (mode === 'edit' && staffDB[idx] ? staffDB[idx].img : ''),
        updatedAt: new Date().toLocaleDateString('th-TH')
    };

    // 🎯 จุดสำคัญ: ระบบตรวจสอบการระงับสิทธิ์อัตโนมัติ
    if (status === 'ออก') {
        data.isLocked = true; // ถ้าเลือกสถานะลาออก ให้ระงับสิทธิ์การล็อกอินทันที
    } else {
        // ถ้าเป็นโหมดแก้ไข และคนเดิมเคยถูกปลดล็อกไว้ ก็ให้คงค่าเดิม หรือถ้าเป็นพนักงานใหม่ก็ให้ใช้งานได้
        data.isLocked = (mode === 'edit' && staffDB[idx]) ? (staffDB[idx].isLocked || false) : false;
    }

    if (mode === 'edit' && idx !== null) {
        // รักษา ID เดิมไว้
        data.staffId = staffDB[idx].staffId; 
        staffDB[idx] = data;
    } else {
        const branchCode = data.branch === 'บางพลี' ? 'P' : (data.branch === 'ชลบุรี' ? 'S' : 'O');
        const thaiYear = (new Date().getFullYear() + 543).toString().slice(-2);
        data.staffId = branchCode + thaiYear + String(staffDB.length + 1).padStart(4, '0');
        staffDB.push(data);
    }

    localStorage.setItem('staffDB', JSON.stringify(staffDB));
    document.getElementById('staffModalContainer').remove();
    
    Swal.fire({
        icon: 'success',
        title: 'บันทึกเรียบร้อย',
        text: status === 'ออก' ? 'ย้ายข้อมูลไปแฟ้มพนักงานลาออก และระงับสิทธิ์เข้าใช้งานแล้วค่ะ' : 'อัปเดตข้อมูลพนักงานสำเร็จค่ะ',
        timer: 2000,
        showConfirmButton: false
    });

    if(typeof renderStaffProfileList === 'function') renderStaffProfileList();
};

window.showStaffAttendance = function(idx) {
    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staff = staffDB[idx];
    if (!staff) return;

    const totalWorkDays = 26; 
    const absentDays = parseInt(staff.lastAbsentReg || 0); 
    const lateMins = parseInt(staff.lastLateMins || 0);   
    const leaveDays = parseInt(staff.lastLeaveDays || 0); 

    const attendanceRate = Math.max(0, ((totalWorkDays - absentDays) / totalWorkDays) * 100).toFixed(0);

    let suggestion = "เหมาะสมสำหรับปรับขึ้น 1-5% ค่ะ";
    if (attendanceRate < 90) suggestion = "สถิติการมาทำงานค่อนข้างน้อย ควรพิจารณาตามความเหมาะสม";
    if (lateMins > 120) suggestion = "มีการมาสายสะสมเกินเกณฑ์ ควรตักเตือนก่อนปรับเงินเดือน";

    document.getElementById('staffSubDisplay').innerHTML = `
        <div class="animate-in fade-in duration-300 text-left">
            <div class="flex justify-between items-center mb-6 border-b pb-2">
                <h4 class="text-lg font-black text-blue-600 uppercase italic">📊 วิเคราะห์การมาทำงาน (Attendance)</h4>
                <button onclick="openAttendanceEntryModal(${idx})" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl text-[10px] font-bold hover:bg-black transition-all">+ บันทึก ขาด/ลา/สาย</button>
            </div>
            <div class="grid grid-cols-4 gap-4 mb-8">
                <div class="bg-green-50 p-6 rounded-[2.5rem] text-center border border-green-100 shadow-sm">

                    <h5 class="text-4xl font-black text-green-600">${attendanceRate}%</h5>
                </div>
                <div class="col-span-3 bg-slate-50 p-6 rounded-[2.5rem] flex justify-around items-center border border-slate-100">
                    <div class="text-center">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">สายรวม</p>
                        <p class="text-xl font-black text-slate-700">${lateMins} น.</p>
                    </div>
                    <div class="text-center border-l border-slate-200 pl-8">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">ขาดงาน</p>
                        <p class="text-xl font-black text-red-500">${absentDays} วัน</p>
                    </div>
                    <div class="text-center border-l border-slate-200 pl-8">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">ลากิจ/ป่วย</p>
                        <p class="text-xl font-black text-blue-400">${leaveDays} วัน</p>
                    </div>
                </div>
            </div>
            <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 text-center animate-pulse">
                <p class="text-xs font-bold text-blue-700 underline underline-offset-4">💡 คำแนะนำปรับเงินเดือน 1 ม.ค.: ${suggestion}</p>
            </div>
        </div>`;
};

window.renderPayrollSystem = function() {
    const target = document.getElementById('dynamicContent');
    if(!target) return;

    // 1. ดึงข้อมูลพื้นฐาน
    const allStaff = JSON.parse(localStorage.getItem('staffDB')) || [];
    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
    const payrollHistory = JSON.parse(localStorage.getItem('payrollHistoryDB')) || [];
    
    // 🎯 2. ดึงชื่อสาขาที่ระบบกำลังเปิดดูอยู่ (อ้างอิงจาก Header)
    const viewingBranch = (currentUser.branch || '').replace('สาขา', '').trim();
    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(currentUser.role);

    // 🔍 3. กรองพนักงาน: ต้อง "ทำงานอยู่" และ "สังกัดสาขาที่เลือกดู"
    const filteredStaff = allStaff.filter(s => {
        const isWorking = s.status === 'ทำงาน';
        const staffBranch = String(s.branch || '').replace('สาขา', '').trim();
        const homeBranch = (currentUser.homeBranch || currentUser.branch || '').replace('สาขา', '').trim();

        // 🔒 ด่านที่ 1: ถ้าไม่ใช่ Admin/CEO และพยายามดูสาขาอื่นที่ไม่ใช่บ้านเกิดตัวเอง -> ไม่ให้เห็นข้อมูล
        if (!isAdmin && viewingBranch !== homeBranch) return false;

        // 📍 ด่านที่ 2: กรองเฉพาะคนที่สังกัดสาขาที่เลือกอยู่ (ถ้าเลือก 'ทุกสาขา' ให้เห็นหมด)
        const matchBranch = (viewingBranch === 'ทุกสาขา') || (staffBranch === viewingBranch);
        
        return isWorking && matchBranch;
    });

    // 📅 การจัดการงวดเดือน
    const now = new Date();
    const selM = document.getElementById('filterMonth')?.value || (now.getMonth() + 1);
    const selY = document.getElementById('filterYear')?.value || (now.getFullYear() + 543);
    const selectedPeriod = `${parseInt(selM)}/${selY}`;

    target.innerHTML = `
        <div class="animate-in fade-in duration-500 p-6 -mt-10 text-left pb-24 font-normal bg-[#FDF7F8]">
            <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-black text-slate-800 italic uppercase leading-none">PAYROLL</h1>
                    <p class="text-[9px] text-[#D48197] font-black uppercase mt-2 tracking-[0.3em] italic">
                        งวดสาขา: <span class="text-slate-800 underline">${viewingBranch}</span>
                    </p>
                </div>
                <div class="flex gap-2 bg-white p-3 rounded-[1.5rem] shadow-sm border border-pink-100 items-end">
                    <div class="flex flex-col">
                        <label class="text-[8px] font-black text-[#C5A059] uppercase ml-2 mb-0.5 italic">เดือน</label>
                        <select id="filterMonth" onchange="window.renderPayrollSystem()" class="bg-slate-50 border border-pink-50 rounded-lg px-2 py-1 text-[10px] font-bold outline-none cursor-pointer">
                            ${[...Array(12)].map((_, i) => `<option value="${i+1}" ${selM == i+1 ? 'selected' : ''}>${new Intl.DateTimeFormat('th-TH', {month: 'short'}).format(new Date(2026, i, 1))}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[8px] font-black text-[#C5A059] uppercase ml-2 mb-0.5 italic">ปี (พ.ศ.)</label>
                        <select id="filterYear" onchange="window.renderPayrollSystem()" class="bg-slate-50 border border-pink-50 rounded-lg px-2 py-1 text-[10px] font-bold outline-none cursor-pointer">
                            <option value="2569" ${selY == 2569 ? 'selected' : ''}>2569</option>
                            <option value="2570" ${selY == 2570 ? 'selected' : ''}>2570</option>
                        </select>
                    </div>
                    <button onclick="window.renderStaffManagement()" class="bg-slate-800 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg mb-0.5">❮</button>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                ${filteredStaff.length > 0 ? filteredStaff.map((s) => {
                    const record = payrollHistory.find(p => p.staffId === s.staffId && p.period === selectedPeriod);
                    const originalIndex = allStaff.findIndex(item => item.staffId === s.staffId);
                    return `
                    <div class="bg-white rounded-[2.5rem] p-6 border border-slate-50 shadow-lg hover:shadow-2xl transition-all text-center relative overflow-hidden group">
                        <div class="w-14 h-14 bg-[#FFF5F7] rounded-2xl flex items-center justify-center mb-4 border border-pink-50 mx-auto overflow-hidden">
                            <img src="${s.img || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                        <h3 class="text-lg font-black text-slate-800 leading-tight mb-0.5 italic text-center">${s.name}</h3>
                        <p class="text-[8px] text-[#D48197] font-black uppercase tracking-widest mb-4 italic text-center">${s.role || 'Staff'}</p>
                        
                        <div class="space-y-2 border-t border-slate-50 pt-4 mb-6 font-bold italic text-[10px]">
                            <div class="flex justify-between"><span>เงินเดือน</span><span class="text-slate-700 font-black">฿${parseFloat(s.salary || 0).toLocaleString()}</span></div>
                            <div class="flex justify-between"><span>สาขา</span><span class="text-pink-400 font-black">${s.branch}</span></div>
                            <div class="flex justify-between"><span>สถานะ</span><span class="${record ? 'text-green-500' : 'text-orange-400'} font-black">${record ? 'สำเร็จ' : 'รอดำเนินการ'}</span></div>
                        </div>

                        <button onclick="window.openLuxuryPayroll(${originalIndex}, '${selectedPeriod}')" class="w-full py-3 rounded-xl font-black text-[9px] uppercase tracking-[0.2em] shadow-md transition-all ${record ? 'bg-slate-100 text-slate-400' : 'bg-[#D48197] text-white hover:bg-black'}">
                            ${record ? 'ดูข้อมูล / แก้ไข' : 'เริ่มคำนวณ'}
                        </button>
                    </div>`;
                }).join('') : `
                    <div class="col-span-full py-20 text-center bg-white rounded-[3rem] border-2 border-dashed border-pink-100">
                        <p class="text-slate-300 italic">ไม่พบรายชื่อพนักงานที่ต้องคำนวณเงินเดือนในสาขา ${viewingBranch} ค่ะ</p>
                    </div>
                `}
            </div>
        </div>`;

window.calcPayrollLogic = function() {
    const salary = parseFloat(document.getElementById('mSalary').value) || 0;
    const comm = parseFloat(document.getElementById('mComm').value) || 0;
    const hourRate = (salary / 30) / 8;

    const absD = parseFloat(document.getElementById('mAbsDays').value) || 0;
    const absDayDeduct = absD * (salary / 30);
    const commDeduct = (absD > 0) ? (comm / 30) * absD : 0;
    document.getElementById('valAbsDayDeduct').innerText = `หัก: ฿${(absDayDeduct + commDeduct).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const absHIn = parseFloat(document.getElementById('mAbsHours').value) || 0;
    const h = Math.floor(absHIn);
    const m = (absHIn - h) * 100;
    const absHourDeduct = (h + (m/60)) * hourRate;
    document.getElementById('valAbsHourDeduct').innerText = `หัก: ฿${absHourDeduct.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const lateM = parseFloat(document.getElementById('mLateMin').value) || 0;
    let lateDeduct = 0;
    if (lateM > 10 && lateM <= 30) lateDeduct = lateM * 5;
    else if (lateM > 30) lateDeduct = (lateM / 60) * hourRate;
    document.getElementById('valLateDeduct').innerText = `หัก: ฿${lateDeduct.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const totalD = absDayDeduct + commDeduct + absHourDeduct + lateDeduct;
    document.getElementById('resDeductTotal').innerText = `- ฿${totalD.toLocaleString(undefined, {minimumFractionDigits: 3})}`;

    const sso = Math.min(875, salary * 0.05);
    document.getElementById('mSSO').value = sso.toFixed(0);

    const income = salary + comm + (parseFloat(document.getElementById('mDF').value) || 0) + (parseFloat(document.getElementById('mOT').value) || 0);
    const net = income - totalD - sso - (parseFloat(document.getElementById('mTax').value) || 0);
    document.getElementById('mNet').innerText = `฿${net.toLocaleString(undefined, {minimumFractionDigits: 3})}`;
};

window.saveAndPrintPayroll = function(idx, period) {
    const allStaff = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staff = allStaff[idx];
    if(!staff) return Swal.fire('Error', 'ไม่พบข้อมูลพนักงาน', 'error');

    const data = {
        staffId: staff.staffId,
        period: period,
        salary: parseFloat(document.getElementById('mSalary').value) || 0,
        comm: parseFloat(document.getElementById('mComm').value) || 0,
        df: parseFloat(document.getElementById('mDF').value) || 0,
        ot: parseFloat(document.getElementById('mOT').value) || 0,
        tax: parseFloat(document.getElementById('mTax').value) || 0,
        absDays: parseFloat(document.getElementById('mAbsDays').value) || 0,
        absHours: parseFloat(document.getElementById('mAbsHours').value) || 0,
        lateMins: parseFloat(document.getElementById('mLateMin').value) || 0,
        netPay: document.getElementById('mNet').innerText,
        timestamp: new Date().getTime()
    };

    let history = JSON.parse(localStorage.getItem('payrollHistoryDB')) || [];
    const exIdx = history.findIndex(p => p.staffId === staff.staffId && p.period === period);
    
    if(exIdx !== -1) { history[exIdx] = data; } 
    else { history.push(data); }
    
    localStorage.setItem('payrollHistoryDB', JSON.stringify(history));

    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ',
        text: 'ข้อมูลเงินเดือนงวด ' + period + ' ถูกบันทึกแล้ว',
        showConfirmButton: false,
        timer: 1500
    }).then(() => {
        if (window.printSlip) window.printSlip(data, staff); 
        document.getElementById('payrollModal').remove();
        renderPayrollSystem(); 
    });
};

window.drawCalendar = function() {
    const grid = document.getElementById('calendarGrid');
    const label = document.getElementById('monthYearLabel');
    if (!grid || !label) return;

    const year = window.currentViewDate.getFullYear();
    const month = window.currentViewDate.getMonth();
    const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
    
    label.innerText = `${monthNames[month]} ${year + 543}`;

    const holidays = JSON.parse(localStorage.getItem('clinicHolidaysDB')) || [];
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const daysHeader = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัส', 'ศุกร์', 'เสาร์'];
    grid.innerHTML = daysHeader.map(d => `
        <div class="text-[12px] font-black text-white bg-[#D48197] py-4 rounded-2xl mb-2 shadow-sm uppercase italic flex items-center justify-center text-center">
            ${d}
        </div>
    `).join('');

    for(let i=0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    for(let d=1; d <= daysInMonth; d++) {
        const checkDate = new Date(year, month, d);
        checkDate.setHours(0,0,0,0);
        
        const isHoliday = holidays.find(h => {
            const start = new Date(h.start);
            const end = new Date(h.end);
            start.setHours(0,0,0,0);
            end.setHours(0,0,0,0);
            return checkDate >= start && checkDate <= end;
        });

        const isToday = d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();

        grid.innerHTML += `
            <div class="relative h-24 border-2 border-slate-50 rounded-[2rem] flex flex-col items-center justify-center transition-all shadow-sm
                ${isHoliday ? 'bg-pink-100 border-pink-300' : 'bg-white hover:border-pink-200'}">
                <span class="text-sm font-black ${isToday ? 'bg-[#D48197] text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg' : 'text-slate-600'}">${d}</span>
                ${isHoliday ? `<span class="text-[9px] text-[#D48197] font-black mt-2 px-1 truncate w-full text-center uppercase italic">${isHoliday.title}</span>` : ''}
            </div>
        `;
    }
};

window.refreshGlobalBoard = function(period, btn) {
    window.currentGlobalPeriod = period;
    if(btn) {
        document.querySelectorAll('.gp-btn').forEach(b => {
            b.classList.remove('active', 'bg-[#D48197]', 'text-white');
            b.classList.add('text-slate-400');
        });
        btn.classList.add('active', 'bg-[#D48197]', 'text-white');
        btn.classList.remove('text-slate-400');
    }

    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const selM = document.getElementById('globalMonth')?.value;
    const selY = document.getElementById('globalYear')?.value;
    const today = new Date().toISOString().split('T')[0];

    const branches = ['บางพลี', 'ชลบุรี', 'อุดมสุข'];

    branches.forEach(br => {
        let branchData = accountDB.filter(item => item.branch === br || item.branch === `สาขา${br}`);
        
        // 🎯 กรองตามเดือนและปีที่เลือกจากเมนู
        branchData = branchData.filter(i => {
            if (!i.date) return false;
            return i.date.startsWith(`${selY}-${selM}`);
        });

        // ถ้าเลือก "รายวัน" ให้กรองเฉพาะวันนี้ (ของเดือนที่เลือก)
        if (period === 'day') branchData = branchData.filter(i => i.date === today);

        const income = branchData.filter(i => i.type === "รายรับ" && i.status === "เสร็จสิ้น")
                        .reduce((sum, i) => sum + (parseFloat(String(i.total).replace(/[^0-9.-]+/g,"")) || 0), 0);
        const expense = branchData.filter(i => i.type === "รายจ่าย")
                        .reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
        const net = income - expense;

        document.getElementById(`totalIn_${br}`).innerText = `฿${income.toLocaleString()}`;
        document.getElementById(`totalEx_${br}`).innerText = `฿${expense.toLocaleString()}`;
        document.getElementById(`net_${br}`).innerText = `฿${net.toLocaleString()}`;
        
        const calcInput = document.getElementById(`calcIn_${br}`);
        if (calcInput) { calcInput.value = net; window.calcShare(br); }
    });
};

window.calcShare = function(br) {
    const amount = parseFloat(document.getElementById(`calcIn_${br}`).value) || 0;
    let s1 = 0, s2 = 0, s3 = 0;
    if (br === 'บางพลี') { s1 = amount * 0.30; s2 = amount * 0.30; s3 = amount * 0.40; } 
    else if (br === 'ชลบุรี') { s1 = amount * 0.35; s2 = amount * 0.35; s3 = amount * 0.30; }

    if (document.getElementById(`share_สร้อย_${br}`)) {
        document.getElementById(`share_สร้อย_${br}`).innerText = `฿${s1.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById(`share_เบส_${br}`).innerText = `฿${s2.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById(`share_แก้ว_${br}`).innerText = `฿${s3.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }
};

window.fixMobileTables = function(root = document) {
    if (window.innerWidth > 768) return;

    const tables = root.querySelectorAll('#dynamicContent table');

    tables.forEach(table => {
        const parent = table.parentElement;
        if (parent && parent.classList.contains('mobile-table-wrap')) return;

        table.classList.remove('w-full');
        table.classList.add('mobile-table');

        const wrap = document.createElement('div');
        wrap.className = 'mobile-table-wrap';

        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
};

const mobileTableObserver = new MutationObserver(() => {
    if (typeof window.fixMobileTables === 'function') {
        window.fixMobileTables(document);
    }

    if (typeof window.manageBtnVisibility === 'function') {
        window.manageBtnVisibility();
    }
});

            subtree: true
        });

});

function aceToggleSidebar() {
    const body = document.body;
    const arrow = document.getElementById('ace-arrow-icon');

    // มือถือ
    if (window.innerWidth <= 768) {
        const isOpen = body.classList.toggle('sidebar-open');
        body.classList.remove('sidebar-collapsed');

        if (arrow) {
            arrow.innerText = isOpen ? '❯' : '❮';
        }

        if (isOpen) {
            resetSidebarAutoCloseTimer();
        } else {
            clearTimeout(aceSidebarAutoCloseTimer);
        }
        return;
    }

    // เดสก์ท็อป
    const isCollapsed = body.classList.toggle('sidebar-collapsed');
    body.classList.remove('sidebar-open');

    if (arrow) {
        arrow.innerText = isCollapsed ? '❯' : '❮';
    }

    if (window.lucide) {
        window.lucide.createIcons();
    }
}
window.aceToggleSidebar = aceToggleSidebar;

function manageBtnVisibility() {
    const loginPage = document.getElementById('loginPage');
    const btn = document.getElementById('ace-toggle-btn');
    if (!btn) return;

    const loginVisible =
        loginPage &&
        !loginPage.classList.contains('hidden') &&
        loginPage.style.display !== 'none';

    if (loginVisible) {
        btn.style.display = 'none';
        document.body.classList.remove('sidebar-open');
    } else {
        btn.style.display = (window.innerWidth <= 768) ? 'flex' : 'none';
    }
}
window.manageBtnVisibility = manageBtnVisibility;

const aceObserver = new MutationObserver(() => {
    manageBtnVisibility();
});

// กดนอกเมนูให้หุบ
document.addEventListener('click', function(e) {
    if (window.innerWidth > 768) return;

    const sidebar = document.getElementById('appSidebar');
    const toggleBtn = document.getElementById('ace-toggle-btn');

    if (!document.body.classList.contains('sidebar-open')) return;

    if (sidebar && sidebar.contains(e.target)) {
        resetSidebarAutoCloseTimer();
        return;
    }

    if (toggleBtn && toggleBtn.contains(e.target)) return;

    document.body.classList.remove('sidebar-open');
    const arrow = document.getElementById('ace-arrow-icon');
    if (arrow) arrow.innerText = '❮';
});

// แตะหน้าจอใหม่ ให้นับเวลาหุบเมนูใหม่
document.addEventListener('touchstart', function() {
    resetSidebarAutoCloseTimer();
}, { passive: true });

window.requestNotificationPermission = function() {
    if (!("Notification" in window)) return;
    if (Notification.permission === 'default') {
        Notification.requestPermission().catch(() => {});
    }
};

}, 2000);

window.processNewRegistration = function() {
    const name = document.getElementById('regName')?.value.trim() || '';
    const phone = document.getElementById('regUser')?.value.trim() || '';
    const password = document.getElementById('regPass')?.value.trim() || '';
    const role = document.getElementById('regRole')?.value || '';
    const branch = window.normalizeBranch(document.getElementById('regBranch')?.value || '');

    if (!name || !phone || !password) {
        return Swal.fire({
            icon: 'warning',
            text: 'กรุณากรอกข้อมูลพนักงานให้ครบถ้วนนะคะ',
            confirmButtonColor: '#D48197'
        });
    }

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];

    if (staffDB.some(s => String(s.phone || '').trim() === phone)) {
        return Swal.fire({
            icon: 'error',
            text: 'เบอร์โทรศัพท์นี้ถูกใช้งานในระบบแล้วค่ะ',
            confirmButtonColor: '#D48197'
        });
    }

    staffDB.push({
        staffId: 'ST' + Date.now().toString().slice(-6),
        name,
        phone,
        password,
        role,
        branch,
        homeBranch: branch,
        status: 'ทำงาน',
        isLocked: false,
        createdAt: new Date().toLocaleDateString('th-TH')
    });

    localStorage.setItem('staffDB', JSON.stringify(staffDB));

    Swal.fire({
        icon: 'success',
        title: 'สมัครสิทธิ์สำเร็จ!',
        text: `คุณ ${name} เข้าใช้งานได้แล้วค่ะ`,
        confirmButtonColor: '#D48197'
    });

    if (document.getElementById('regName')) document.getElementById('regName').value = '';
    if (document.getElementById('regUser')) document.getElementById('regUser').value = '';
    if (document.getElementById('regPass')) document.getElementById('regPass').value = '';
};

window.linkToQueue = function(courseName) {

            queueId: "Q-" + Date.now(),
            hn: "Walk-in",

            finishTime: '',
            branch: window.getCurrentViewingBranch()

        todayQueue.push(newQ);
        localStorage.setItem('todayQueueDB', JSON.stringify(todayQueue));

        if (typeof window.loadPage === 'function') {
            window.loadPage(52, 'ห้องจัดการคิว');

};
