/* ============================= */
/* เอฟเฟกต์ไฟกะพริบแจ้งคิว */
/* ============================= */
@keyframes blink-pink {
    0% { background-color: rgba(212,129,151,0); }
    50% { background-color: rgba(212,129,151,0.2); }
    100% { background-color: rgba(212,129,151,0); }
}

.animate-blink{
    animation: blink-pink 1.5s infinite;
}


/* ============================= */
/* 🖨️ ตั้งค่าพิมพ์รายงานนัดหมาย */
/* ============================= */

@media print {

    /* ซ่อนทุกอย่างก่อน */
    body *{
        visibility:hidden;
    }

    aside,
    header,
    button,
    select,
    input,
    .no-print{
        display:none !important;
    }

    /* แสดงเฉพาะพื้นที่รายงาน */
    #dynamicContent,
    #dynamicContent *{
        visibility:visible;
    }

    #dynamicContent{
        position:absolute;
        left:0;
        top:0;
        width:100%;
        margin:0;
        padding:0;
    }

    /* ปรับตารางให้เต็มหน้า */
    #dynamicContent table{
        width:100%;
        border-collapse:collapse;
        table-layout:fixed;
    }

    #dynamicContent th,
    #dynamicContent td{
        font-size:11px;
        padding:6px;
        word-wrap:break-word;
    }

    /* ตั้งกระดาษแนวนอน */
    @page{
        size:A4 landscape;
        margin:1cm;
    }
}



/* ============================= */
/* 🖨️ พิมพ์ OPD CARD */
/* ============================= */

@media print {

    /* ซ่อนทุกอย่าง */
    body *{
        visibility:hidden;
    }

    /* แสดงเฉพาะ OPD */
    #opd-card-printable,
    #opd-card-printable *{
        visibility:visible;
    }

    #opd-card-printable{
        position:absolute;
        left:0;
        top:0;
        width:100%;
        max-height:14.8cm; /* ครึ่ง A4 */
        padding:15px;
        margin:0;
        border:1px solid #eee !important;
        box-shadow:none !important;
        overflow:hidden;
    }

    @page{
        size:A4 portrait;
        margin:0.5cm;
    }
}

<style id="ace-simple-theme">

:root{
  --ace-pink:#D48197;
  --ace-gold:#C5A059;
  --ace-bg:#F7F8FC;
  --ace-card:#FFFFFF;
  --ace-border:#E2E8F0;
  --ace-text:#0F172A;
  --ace-muted:#64748B;
  --ace-muted2:#94A3B8;
  --ace-shadow: 0 10px 24px rgba(15,23,42,.06);
}

/* Typography */
html,body{
  background:var(--ace-bg)!important;
  color:var(--ace-text)!important;
  font-family: "Sarabun", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"!important;
  font-size:14px;
  line-height:1.5;
}
h1,h2,h3{letter-spacing:-.02em!important;}
/* Make UI clearer (less decorative) */
.italic{font-style:normal!important;}
.uppercase{text-transform:none!important;}
.tracking-widest,.tracking-[0\.2em],.tracking-tighter{letter-spacing:normal!important;}

/* Sidebar */
aside{
  background:var(--ace-card)!important;
  border-right:1px solid var(--ace-border)!important;
}
.sidebar-item{
  border-radius:14px!important;
  box-shadow:none!important;
  transform:none!important;
  font-weight:700!important;
  color:var(--ace-text)!important;
}
.sidebar-item:hover{
  background:#F1F5F9!important;
  color:var(--ace-text)!important;
}
.sidebar-item:hover svg{color:var(--ace-pink)!important;}
.active-menu{
  background:rgba(212,129,151,.12)!important;
  color:var(--ace-text)!important;
  border:1px solid rgba(212,129,151,.25)!important;
}
.active-menu svg{color:var(--ace-pink)!important;}
/* Header chips / pills */
.gold-bg{background:var(--ace-pink)!important;}

/* Cards / panels */
.glass-card,
.bg-white.rounded-\[2\.5rem\],
.bg-white.rounded-\[2\.2rem\],
.bg-white.rounded-\[3rem\]{
  border-radius:20px!important;
  border:1px solid var(--ace-border)!important;
  box-shadow:var(--ace-shadow)!important;
}
.border-pink-50,.border-pink-100,.border-red-50,.border-red-100{
  border-color:var(--ace-border)!important;
}
.shadow-xl,.shadow-2xl,.shadow-lg,.shadow-sm{
  box-shadow:var(--ace-shadow)!important;
}

/* Inputs */
input,select,textarea{
  border-color:var(--ace-border)!important;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--ace-pink)!important;
  box-shadow:0 0 0 3px rgba(212,129,151,.14)!important;
}

/* Tables: clearer grid */
table{border-collapse:separate!important;border-spacing:0!important;}
thead th{
  background:#F8FAFC!important;
  color:var(--ace-muted)!important;
  border-bottom:1px solid var(--ace-border)!important;
}
td,th{border-bottom:1px solid var(--ace-border)!important;}
tbody tr:hover{background:#FAFAFF!important;}
/* Ensure outer border looks clear when wrapper exists */
.table-wrap{border:1px solid var(--ace-border)!important;border-radius:18px!important;overflow:hidden!important;}

/* Small text colors */
.text-slate-400{color:var(--ace-muted2)!important;}
.text-slate-600{color:var(--ace-muted)!important;}
.ace-pink{color:var(--ace-pink)!important;}

</style>

</head>

// --- 1. ระบบ Suggestion บัญชีที่บันทึกไว้ (แบบ Google เด้งใต้ช่องพิมพ์) ---
window.initAccountSuggestion = function() {
    const uInput = document.getElementById('uIn');
    if (!uInput) return;

    const oldContainer = document.getElementById('savedAccountsContainer');
    if (oldContainer) oldContainer.style.display = 'none';

    let suggestionBox = document.getElementById('accountSuggestionBox');
    if (!suggestionBox) {
        suggestionBox = document.createElement('div');
        suggestionBox.id = 'accountSuggestionBox';
        
        // บังคับให้ช่องพิมพ์เป็นจุดอ้างอิงตำแหน่ง (Relative)
        uInput.parentElement.style.position = 'relative';
        
        // สร้างกล่องให้อยู่ใต้ช่องพิมพ์พอดี (top: calc(100% + 4px))
        suggestionBox.style.cssText = `
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: white; border: 1px solid #ffe4e6; border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 9999;
            display: none; max-height: 180px; overflow-y: auto; text-align: left;
        `;
        uInput.insertAdjacentElement('afterend', suggestionBox);
    }

    uInput.addEventListener('focus', () => {
        const savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        if (savedList.length === 0) return;
        
        suggestionBox.innerHTML = savedList.map(acc => `
            <div onclick="window.selectAccount('${acc.user}', '${acc.pass}')" class="flex items-center gap-3 p-3 hover:bg-pink-50 cursor-pointer border-b border-pink-50 last:border-0">
                <div class="w-8 h-8 bg-[#D48197] text-white rounded-full flex items-center justify-center font-bold text-xs">${acc.name ? acc.name.substring(0,1) : '👤'}</div>
                <div class="flex-1">
                    <p class="text-[11px] font-bold text-slate-700 m-0">${acc.name}</p>
                    <p class="text-[9px] text-slate-400 uppercase m-0">${acc.role} | ${acc.branch || ''}</p>
                </div>
                <button onclick="event.stopPropagation(); window.removeSavedAccount('${acc.user}')" class="text-slate-300 hover:text-red-500 p-1 text-xs">✕</button>
            </div>
        `).join('');
        suggestionBox.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
        if (!uInput.contains(e.target) && !suggestionBox.contains(e.target)) {
            suggestionBox.style.display = 'none';
        }
    });
};

window.selectAccount = function(u, p) {
    document.getElementById('uIn').value = u;
    document.getElementById('pIn').value = p;
    document.getElementById('rememberMe').checked = true;
    document.getElementById('accountSuggestionBox').style.display = 'none';
};

window.removeSavedAccount = function(u) {
    let savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
    savedList = savedList.filter(acc => acc.user !== u);
    localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
    document.getElementById('uIn').focus(); // โหลดรายการใหม่หลังจากลบ

// --- 3. ฟังก์ชันเข้าสู่ระบบ (Login) ฉบับ Super Admin ส่วนตัว ---
window.doLogin = function() {
    const u = document.getElementById('uIn').value.trim();
    const p = document.getElementById('pIn').value.trim();

    if (!u || !p) {
        Swal.fire({ icon: 'warning', text: 'กรุณากรอกชื่อผู้ใช้และรหัสผ่านค่ะ', confirmButtonColor: '#D48197' });
        return;
    }

    /* -------------------------------------------------------
       🔒 ส่วนที่ 1: บัญชีแอดมินหลัก (Super Admin) - ฝังรหัสส่วนตัว
       ------------------------------------------------------- */
    if (u === 'onouma39' && p === 'Onouma2539') {
        const superUser = { 
            name: 'คุณอรอุมา (Owner)', 
            role: 'แอดมินหลัก', 
            branch: 'ทุกสาขา',
            homeBranch: 'ทุกสาขา'
        };
        // บังคับปลดล็อกสิทธิ์หน้าจอให้เข้าได้ทุกเมนู (รวมถึงหน้าตั้งค่า)
        const existingPermissions = JSON.parse(localStorage.getItem('ace_permissions')) || {};

existingPermissions["แอดมินหลัก"] = ["1", "2", "3", "9", "4", "52", "51", "53", "6", "7", "8", "10"];

localStorage.setItem('ace_permissions', JSON.stringify(existingPermissions));
        executeLogin(superUser, u, p);
        return;
    }

    /* -------------------------------------------------------
       🔑 ส่วนที่ 2: เช็ครหัสผ่านระดับสูงอื่นๆ จากหน้าตั้งค่า (ถ้ามีการตั้งไว้)
       ------------------------------------------------------- */
    const masterPass = JSON.parse(localStorage.getItem('ace_master_pass')) || { admin: '', ceo: '', doctor: '' };

    // เช็คสิทธิ์ CEO (ถ้าตั้งรหัสไว้ในหน้า 8.5)
    if (masterPass.ceo && u === 'ceo' && p === masterPass.ceo) {
        executeLogin({ name: 'ผู้บริหาร (CEO)', role: 'CEO', branch: 'ทุกสาขา', homeBranch: 'ทุกสาขา' }, u, p);
        return;
    }
    // เช็คสิทธิ์ หมอ (ถ้าตั้งรหัสไว้ในหน้า 8.5)
    if (masterPass.doctor && u === 'doctor' && p === masterPass.doctor) {
        executeLogin({ name: 'แพทย์ผู้ตรวจ', role: 'หมอ', branch: 'ทุกสาขา', homeBranch: 'ทุกสาขา' }, u, p);
        return;
    }

    /* -------------------------------------------------------
       👥 ส่วนที่ 3: ตรวจสอบพนักงานทั่วไป (StaffDB)
       ------------------------------------------------------- */
    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staffUser = staffDB.find(s => (s.phone === u || s.staffId === u) && s.status !== 'ออก');

    if (staffUser) {
        // ตรวจสอบว่าพนักงานถูกปิดสิทธิ์ (Locked) หรือไม่
        if (staffUser.isLocked) {
            Swal.fire({ icon: 'error', title: 'บัญชีถูกระงับ', text: 'กรุณาติดต่อแอดมินค่ะ', confirmButtonColor: '#D48197' });
            return;
        }

        const validPass = staffUser.password || (staffUser.phone ? staffUser.phone.slice(-4) : '9999');
        if (p === validPass) { 
            executeLogin({ 
                staffId: staffUser.staffId, 
                name: staffUser.name, 
                role: staffUser.role || 'พนักงานทรีทเม้นท์', 
                branch: staffUser.branch || 'บางพลี',
                homeBranch: staffUser.branch || 'บางพลี'
            }, u, p);
            return;
        }
    }

    Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้องค่ะ', confirmButtonColor: '#D48197' });
};

window.executeLogin = function(user, loginUserStr, loginPassStr) {
    // 💾 1. บันทึกบัญชีถ้าติ๊กถูก "จำรหัสผ่าน"
    const remember = document.getElementById('rememberMe')?.checked;
    if (remember) {
        let savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        savedList = savedList.filter(acc => acc.user !== loginUserStr);
        savedList.unshift({ user: loginUserStr, pass: loginPassStr, name: user.name, role: user.role });
        if(savedList.length > 3) savedList.pop();
        localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
    }

    window.currentUser = user; 
    localStorage.setItem('currentUser', JSON.stringify(user));

    // 🚪 2. สลับหน้าจอจาก Login ไป Dashboard
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainDashboard').classList.remove('hidden');
    
    // 👤 3. อัปเดตข้อมูลบนเมนูด้านซ้ายล่าง
    const nameLabel = document.getElementById('userNameLabel');
    if(nameLabel) nameLabel.innerText = `${user.name} (${user.role})`;
    
    const branchBadge = document.getElementById('userBranchBadge');
    if (branchBadge) branchBadge.innerText = `สาขา: ${user.branch}`;
    
    const initialBadge = document.getElementById('userInitial');
    if (initialBadge) initialBadge.innerText = user.name.substring(0, 2);

    // ✨ 4. อัปเดตข้อมูลกล่อง Dropdown มุมขวาบน (ปุ่มชมพู)
    const initialStr = user.name ? user.name.substring(0, 2).toUpperCase() : 'ON';
    
    const topInit = document.getElementById('topProfileInitial');
    if(topInit) topInit.innerText = initialStr;
    
    const dropInit = document.getElementById('dropProfileInitial');
    if(dropInit) dropInit.innerText = initialStr;
    
    const dropName = document.getElementById('dropProfileName');
    if(dropName) dropName.innerText = user.name;
    
    const dropRole = document.getElementById('dropProfileRole');
    if(dropRole) dropRole.innerText = user.role;
    
    const dropContact = document.getElementById('dropProfileContact');
    if(dropContact) dropContact.innerText = user.phone || 'พนักงานคลินิก';

    // 📋 5. วาดเมนูตามสิทธิ์การใช้งาน
    if (typeof renderMenuByRole === 'function') renderMenuByRole(user.role);
    
    // 🏠 6. อัปเดตกล่องสาขา (ปุ่มบ้าน) ให้ตรงกับคนล็อกอิน
    if(typeof renderBranchDropdown === 'function') renderBranchDropdown();
    
    // 🚀 7. เลือกหน้าแรกที่จะแสดงตามตำแหน่ง
    if (user.role === 'พนักงานทรีทเม้นท์') { 
        loadPage(52, 'ห้องจัดการคิว'); 
    } else { 
        loadPage(1, 'Dashboard ภาพรวม'); 
    }
    
    // 🎉 8. แจ้งเตือนสำเร็จ
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `ยินดีต้อนรับ ${user.name}`, showConfirmButton: false, timer: 1500 });
};

// --- 5. ระบบสลับสาขา (แบบ Dropdown ใต้ปุ่มบ้าน) ---
window.renderBranchDropdown = function() {
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = user.role || '';
    const currentBranch = user.branch || 'บางพลี';
    const homeBranch = user.homeBranch || user.branch || 'บางพลี';
    const roleName = role || 'พนักงาน';

    const branches = ['บางพลี', 'อุดมสุข', 'ชลบุรี'];
    let html = '';

    branches.forEach(b => {
        // พนักงานทั่วไป: แสดงเฉพาะสาขาตัวเอง
        if (!['แอดมินหลัก', 'CEO', 'ผู้จัดการ'].includes(role) && b !== homeBranch) return;

        const isActive = b === currentBranch;

        html += `
            <div onclick="changeBranch('${b}')" class="flex items-center gap-4 p-3 rounded-2xl cursor-pointer transition-all hover:bg-pink-50 ${isActive ? 'bg-slate-50 shadow-sm border border-slate-100' : 'border border-transparent'}">
                <img src="ace-logo.jpg" class="w-12 h-12 rounded-full object-cover border-2 border-white shadow-sm shrink-0" onerror="this.src='https://via.placeholder.com/150'">
                <div class="flex-1 text-left">
                    <h4 class="text-[13px] font-bold text-slate-800 leading-tight mb-1">เอซ คลินิกสาขา${b}</h4>
                    <div class="flex items-center gap-2">
                        <span class="text-[11px] text-slate-500 font-bold">${roleName}</span>
                        ${isActive ? '<span class="px-2 py-[2px] border border-green-500 text-green-500 rounded-full text-[9px] font-bold tracking-wider">ใช้งาน</span>' : ''}
                    </div>
                </div>
            </div>
        `;
    });

    // 🌐 ทุกสาขา: ให้เฉพาะแอดมินหลัก / CEO
    if (['แอดมินหลัก', 'CEO'].includes(role)) {
        const isAllActive = currentBranch === 'ทุกสาขา';
        html += `
            <div class="mt-1 pt-2 border-t border-slate-100">
                <div onclick="changeBranch('ทุกสาขา')" class="w-full text-center p-3 rounded-xl ${isAllActive ? 'bg-[#C5A059]' : 'bg-slate-800 hover:bg-[#C5A059]'} text-white text-[11px] font-bold cursor-pointer transition-all uppercase tracking-widest shadow-sm">
                    🌐 ดูภาพรวมทุกสาขา
                </div>
            </div>
        `;
    }

    const container = document.getElementById('branchListContainer');
    if (container) container.innerHTML = html;
};

window.changeBranch = function(branchName) {
    Swal.close();

    let user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = user.role || '';
    const homeBranch = user.homeBranch || user.branch || '';

    // พนักงานทั่วไปห้ามเปลี่ยนสาขา
    if (!['แอดมินหลัก', 'CEO', 'ผู้จัดการ'].includes(role)) {
        user.branch = homeBranch;
        window.currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(user));

        Swal.fire({
            icon: 'warning',
            title: 'ไม่อนุญาต',
            text: 'ตำแหน่งนี้ใช้งานได้เฉพาะสาขาของตนเอง',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // ผู้จัดการห้ามดูทุกสาขา
    if (role === 'ผู้จัดการ' && branchName === 'ทุกสาขา') {
        Swal.fire({
            icon: 'warning',
            title: 'ไม่อนุญาต',
            text: 'ผู้จัดการสามารถดูได้เฉพาะรายสาขา',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    user.branch = branchName;
    window.currentUser = user;
    localStorage.setItem('currentUser', JSON.stringify(user));

    const branchBadge = document.getElementById('userBranchBadge');
    if (branchBadge) branchBadge.innerText = `สาขา: ${branchName}`;

    // สำคัญ: รีวาดเมนูใหม่ตาม role + branch
    if (typeof renderMenuByRole === 'function') renderMenuByRole(user.role);

    // รีวาด dropdown ใหม่
    if (typeof renderBranchDropdown === 'function') renderBranchDropdown();

    // ผู้จัดการถ้าข้ามสาขา ให้เด้งไปหน้าที่ได้รับอนุญาตแน่ ๆ
    if (role === 'ผู้จัดการ' && branchName !== homeBranch) {
        loadPage(2, 'จัดการลูกค้า/ประวัติ');
    } else {
        // role อื่น ๆ หรืออยู่สาขาตัวเอง โหลดหน้า active ใหม่ / หรือ dashboard
        const activeMenu = document.querySelector('.sidebar-item.active-menu');
        if (activeMenu) {
            activeMenu.click();
        } else {
            loadPage(1, 'Dashboard ภาพรวม');
        }
    }

    Swal.fire({
        toast: true,
        position: 'top-end',
        icon: 'success',
        title: `สลับเป็น "${branchName}" เรียบร้อย`,
        showConfirmButton: false,
        timer: 1500
    });
};

            const oldP = document.getElementById('oldPass').value;

            if (!oldP || !newP || !confP) { Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบทุกช่องค่ะ'); return false; }

window.processPasswordChange = function(oldPass, newPass) {
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    
    if (currentUser.role === 'แอดมินหลัก' || currentUser.role === 'CEO') {
        return Swal.fire('ไม่อนุญาต', 'บัญชีผู้บริหารระดับสูง ไม่สามารถเปลี่ยนรหัสผ่านหน้านี้ได้ค่ะ', 'error');
    }

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    let staffIndex = staffDB.findIndex(s => s.staffId === currentUser.staffId);
    
    if (staffIndex !== -1) {
        let staff = staffDB[staffIndex];
        const phoneLast4 = staff.phone ? staff.phone.slice(-4) : '9999';
        const actualPass = staff.password || phoneLast4; 
        
        if (oldPass !== actualPass && oldPass !== '1111') {
            return Swal.fire('ผิดพลาด', 'รหัสผ่านปัจจุบันไม่ถูกต้องค่ะ', 'error');
        }

        staffDB[staffIndex].password = newPass;
        localStorage.setItem('staffDB', JSON.stringify(staffDB));
        
        let savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        let savedIndex = savedList.findIndex(acc => acc.name === currentUser.name);
        if (savedIndex !== -1) {
            savedList[savedIndex].pass = newPass;
            localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
        }

        Swal.fire({ icon: 'success', title: 'เปลี่ยนรหัสผ่านสำเร็จ!', text: 'ใช้รหัสใหม่เข้าระบบครั้งหน้านะคะ', confirmButtonColor: '#D48197' });
    } else {
        Swal.fire('ข้อผิดพลาด', 'ไม่พบประวัติพนักงานของคุณในระบบ', 'error');
    }
};

window.filterByBranch = function(data){

    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const branch = user.branch || '';

    return data.filter(item => {

        if(branch === 'ทุกสาขา') return true;

        if(!item.branch) return true;

        return item.branch === branch;

    });

};


window.renderDashboard = function(target, period = 'day') {
    if (!target) return;

    // 1. ดึงข้อมูลผู้ใช้งานเพื่อเช็คสาขา
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const viewingBranch = user.branch || 'ทุกสาขา';
    
    // ถ้าเป็นแอดมินที่เลือก 'ทุกสาขา' จะให้ผ่านเงื่อนไข (โชว์ข้อมูลทั้งหมด)
    const isShowAll = (viewingBranch === 'ทุกสาขา'); 

    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const appointmentDB = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    const currentMonth = today.substring(0, 7);
    const currentYear = today.substring(0, 4);
    const todayThai = now.toLocaleDateString("th-TH");

    // 2. 💡 กรองข้อมูลตามสาขาที่กำลังดูอยู่ 
    let statsIncomes = accountDB.filter(item => item.type === "รายรับ" && item.status === "เสร็จสิ้น" && (isShowAll || item.branch === viewingBranch));
    let statsExpenses = accountDB.filter(item => item.type === "รายจ่าย" && (isShowAll || item.branch === viewingBranch));
    let statsApps = appointmentDB.filter(a => (isShowAll || a.branch === viewingBranch));
    let statsCustomers = customerDB.filter(c => (isShowAll || c.branch === viewingBranch)); 

    // 3. กรองตามช่วงเวลา (รายวัน / รายเดือน / รายปี)
    if (period === 'day') {
        statsIncomes = statsIncomes.filter(i => i.date === today);
        statsExpenses = statsExpenses.filter(e => e.date === today);
        statsApps = statsApps.filter(a => a.date === today);
        statsCustomers = statsCustomers.filter(c => c.date === today || c.createdAt === todayThai); 
    } else if (period === 'month') {
        statsIncomes = statsIncomes.filter(i => i.date && i.date.startsWith(currentMonth));
        statsExpenses = statsExpenses.filter(e => e.date && e.date.startsWith(currentMonth));
        statsApps = statsApps.filter(a => a.date && a.date.startsWith(currentMonth));
        statsCustomers = statsCustomers.filter(c => (c.date && c.date.startsWith(currentMonth)) || (c.createdAt && c.createdAt.includes("/" + String(now.getMonth()+1).padStart(2,'0') + "/")));
    } else if (period === 'year') {
        statsIncomes = statsIncomes.filter(i => i.date && i.date.startsWith(currentYear));
        statsExpenses = statsExpenses.filter(e => e.date && e.date.startsWith(currentYear));
        statsApps = statsApps.filter(a => a.date && a.date.startsWith(currentYear));
        statsCustomers = statsCustomers.filter(c => (c.date && c.date.startsWith(currentYear)) || (c.createdAt && c.createdAt.includes(String(now.getFullYear()+543))));
    }

   ======================================================= */
window.canAccessMenuByBranch = function(menuId) {
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const currentBranch = user.branch || '';
    const homeBranch = user.homeBranch || user.branch || '';
    const role = user.role || '';

    // แอดมินหลัก / CEO ดูได้ทุกอย่างทุกสาขา
    if (role === 'แอดมินหลัก' || role === 'CEO') return true;

    // ผู้จัดการ
    if (role === 'ผู้จัดการ') {
        // อยู่สาขาตัวเอง = ใช้ได้ทุกเมนูตามสิทธิ์ role
        if (currentBranch === homeBranch) return true;

        // ข้ามสาขา = ดูได้เฉพาะ ลูกค้า + นัดหมาย
        const allowedCrossBranchMenus = ['2', '4'];
        return allowedCrossBranchMenus.includes(String(menuId));
    }

    // พนักงานและบทบาททั่วไป: ใช้ได้เฉพาะสาขาต้นสังกัด
    return currentBranch === homeBranch;
};

// --- ฟังก์ชัน 2: โหลดหน้าและจัดการสีเมนู (กางเมนูย่อยอัตโนมัติ) ---
window.loadPage = function(id, title) {

    // กันเข้าหน้าโดยตรงตอนข้ามสาขา
    if (!window.canAccessMenuByBranch(id) && id !== -1) {
        Swal.fire({
            icon: 'error',
            title: 'ไม่มีสิทธิ์เข้าถึง',
            text: 'ตำแหน่งนี้ไม่สามารถดูเมนูนี้ในสาขาที่เลือกได้',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    const titleEl = document.getElementById('pageTitle');
    if (titleEl && id !== -1) titleEl.innerText = title.toUpperCase();
    
    const periodZone = document.getElementById('dynamicPeriodZone');
    if (periodZone && id !== -1) {
        periodZone.style.display = (id === 1) ? 'flex' : 'none';
    }
    
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active-menu'));

    const allSidebarItems = document.querySelectorAll('.sidebar-item');
    allSidebarItems.forEach(item => { 
        const searchTitle = title.replace('มาตรฐาน', '').trim();
        if(item.innerText.replace(/\s+/g, ' ').trim().toUpperCase().includes(searchTitle.toUpperCase())) { 
            item.classList.add('active-menu'); 
            
            const parentSubmenu = item.closest('.submenu');
            if (parentSubmenu) {
                parentSubmenu.classList.add('open');
                parentSubmenu.style.maxHeight = "300px"; 
                parentSubmenu.style.opacity = "1";
                parentSubmenu.style.marginTop = "5px";
                const arrow = parentSubmenu.previousElementSibling?.querySelector('.arrow-icon');
                if(arrow) arrow.classList.add('rotate');
            }
        } 
    });

    const target = document.getElementById('dynamicContent');
    if (!target || id === -1) return;

    if (id === 1) { if(typeof renderDashboard === 'function') renderDashboard(target); } 
    else if (id === 2) { if(typeof renderCustomerList === 'function') renderCustomerList(target); } 
    else if (id === 3) { if(typeof renderSalesPage === 'function') renderSalesPage(); } 
    else if (id === 4) { if(typeof renderAppointmentPage === 'function') renderAppointmentPage(); } 
    else if (id === 6) { if(typeof renderReportPage === 'function') renderReportPage(); } 
    else if (id === 7) { if(typeof renderStaffManagement === 'function') renderStaffManagement(); } 
    else if (id === 9) { if(typeof renderExpensePage === 'function') renderExpensePage(); } 
    else if (id === 11) { if(typeof renderPayrollSystem === 'function') renderPayrollSystem(); } 
    else if (id === 12) { if(typeof renderAttendanceRecord === 'function') renderAttendanceRecord(); } 
    else if (id === 51) { if(typeof renderCourseMasterPage === 'function') renderCourseMasterPage(); } 
    else if (id === 52) { if(typeof renderQueuePage === 'function') renderQueuePage(); } 
    else if (id === 53) { if(typeof renderStockPage === 'function') renderStockPage(); } 
    else if (id === 66) { if(typeof renderDFReportPage === 'function') renderDFReportPage(); } 
    else if (id === 8) { if(typeof renderSettingsPage === 'function') renderSettingsPage(); } 
    else if (id === 10) { 
        if(typeof renderSettingsPage === 'function') {
            renderSettingsPage();
            setTimeout(() => {
                const btn = document.querySelector('button[onclick*="allBranchBoard"]');
                if(btn) window.switchSettingsTab('allBranchBoard', btn);
            }, 100);
        }
    } 
    else { 
        target.innerHTML = `<div class="glass-card py-32 text-center text-slate-300 font-bold uppercase text-xl italic">เมนู ${title} <br> กำลังพัฒนา...</div>`; 
    }
};

// --- ค้นหาสินค้า (ใช้ฐานข้อมูลจากหน้า รายการคอร์ส) ---
window.searchProduct = function(val) {
    const resDiv = document.getElementById('searchResult');
    if (!val) { resDiv.classList.add('hidden'); return; }
    
    // 🎯 ดึงข้อมูลจากฐานข้อมูลคอร์สมาตรฐานที่เราตั้งไว้
    const masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    
    const matches = masterDB.filter(p => p.name.toLowerCase().includes(val.toLowerCase()));
    
    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(p => `
            <div onclick="selectProduct('${p.name}', ${p.price}, '${p.category}', '${p.unit}')" 
                class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between items-center bg-white transition-all shadow-sm">
                <div class="text-left">
                    <span class="text-sm font-bold text-slate-700 block">${p.name}</span>
                    <span class="text-[9px] text-slate-400 uppercase italic">${p.category} | ฿${parseFloat(p.price).toLocaleString()} / ${p.unit}</span>
                </div>
                <span class="text-[10px] bg-pink-100 text-[#D48197] px-3 py-1 rounded-full font-bold uppercase">เลือก</span>
            </div>`).join('');
        resDiv.classList.remove('hidden');
    } else {
        resDiv.classList.add('hidden');
    }
};

// ปรับฟังก์ชันรับค่าให้จำ "หน่วย" ด้วย
window.selectProduct = function(name, price, cat, unit) {
    document.getElementById('itemName').value = name;
    document.getElementById('billPrice').value = price;
    document.getElementById('itemName').dataset.category = cat;
    document.getElementById('itemName').dataset.unit = unit; // เก็บหน่วยไว้ใช้แสดงผล
    document.getElementById('searchResult').classList.add('hidden');
};

window.addItemToBill = function() {
    const name = document.getElementById('itemName').value;
    const price = parseFloat(document.getElementById('billPrice').value) || 0;
    const qty = parseFloat(document.getElementById('billQty').value) || 0;
    const cat = document.getElementById('itemName').dataset.category || 'general';

    if (!name || price <= 0) return;

    currentBillItems.push({ name, price, qty, cat, total: price * qty });
    if(typeof renderBillItems === 'function') renderBillItems();
    
    document.getElementById('itemName').value = '';
    document.getElementById('billPrice').value = '';
    document.getElementById('billQty').value = '1';
};

window.removeItemFromBill = function(index) {
    currentBillItems.splice(index, 1);
    if(typeof renderBillItems === 'function') renderBillItems();
};

window.viewReceiptDetail = function(billData) {
    if (typeof showReceiptPreview === 'function') {

};

window.initStaffAutocomplete = function() {
    const sellerInput = document.getElementById('modalSeller');

        if (!datalist) {

function applyCustomerFilter() {
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const branch = document.getElementById("branchFilter").value;
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];

    let filtered = customerDB.filter(c => {
        const matchKeyword =
            c.fullname?.toLowerCase().includes(keyword) ||
            c.hn?.toLowerCase().includes(keyword) ||
            c.phone?.includes(keyword);

        const matchBranch =
            branch === "ทั้งหมด" || c.branch === branch;

        return matchKeyword && matchBranch;
    });

    renderCustomerTable(filtered);
}

window.printOPD = function(index) {
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const c = customerDB[index];
    const target = document.getElementById('dynamicContent');
    
    window.autoFillCourse = function(courseName, amount, totalPrice) {
        const typeSelect = document.getElementById('opdTypeSelector');
        if (typeSelect.value !== 'skin_injection') {
            alert('กรุณาเลือกประเภท OPD เป็น "คอร์สฉีดผิว" ก่อนนะคะ');
            return;
        }
        const tables = document.querySelectorAll('#opd-dynamic-layout table');
        let allCells = []; 
        tables.forEach(table => {
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => allCells.push(row.cells[2]));
        });
        let startIndex = allCells.findIndex(cell => cell.innerText === "");
        if (startIndex === -1) return;
        for (let i = 0; i < amount; i++) {
            if (allCells[startIndex + i]) {
                allCells[startIndex + i].innerText = `${courseName} ${i+1}/${amount}`;
            }
        }
    };

    const getAge = (dateString) => {
        if (!dateString) return "-";
        const today = new Date();
        const birth = new Date(dateString.split('/').reverse().join('-'));
        let age = today.getFullYear() - birth.getFullYear();
        if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;
        return age;
    };

    window.renderOPDByType = function(type) {
        const printableArea = document.getElementById('opd-dynamic-layout');
        let layoutHtml = '';

        if (type === 'skin_injection') {
            const row = (i) => `<tr class="border-b border-slate-300 h-7">
                <td class="p-1 text-center border-r font-bold bg-slate-50">${i}</td>
                <td class="p-1 border-r w-20"></td>
                <td class="p-1 border-r font-normal text-[9px] text-slate-700 text-left pl-2"></td>
                <td class="p-1 w-24"></td>
            </tr>`;
            layoutHtml = `
                <div class="mt-[1cm] animate-in fade-in">

window.handleOPDPrint = function() {
    const type = document.getElementById('opdTypeSelector').value;
    if (type === 'general') {
        const notes = document.getElementById('treatmentNotesGeneral');
        document.getElementById('printNotesGeneral').innerText = notes ? notes.value : '';
    } else if (type === 'botox_filler' || type === 'varicose_veins') {
        const notes = document.getElementById('treatmentNotesSpec');
        document.getElementById('printNotesSpec').innerText = notes ? notes.value : '';
    } else if (type === 'skin_injection') {
        const notes = document.getElementById('treatmentNotesSkin');
        document.getElementById('printNotesSkin').innerText = notes ? notes.value : '';
    }
    window.print();
};

window.saveTreatmentHistory = function(index) {
    const typeSelect = document.getElementById('opdTypeSelector');
    const selectedType = typeSelect ? typeSelect.value : 'general';
    let detailToSave = "";
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];

    if (selectedType === 'skin_injection') {
        const tables = document.querySelectorAll('#opd-dynamic-layout table');
        let records = [];
        tables.forEach(table => {
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const courseText = row.cells[2].innerText.trim();
                if (courseText) {
                    records.push(`ครั้งที่ ${row.cells[0].innerText}: ${courseText}`);
                }
            });
        });
        detailToSave = records.length > 0 ? "💉 บันทึกฉีดผิว:\n" + records.join("\n") : "";
    } else {
        const notes = document.getElementById('treatmentNotes');
        detailToSave = notes ? notes.value.trim() : "บันทึกหัตถการ (วาดตำแหน่งลงในใบ OPD)";
    }

    if (!detailToSave) {
        alert("⚠️ ยังไม่มีข้อมูลรายการคอร์สหรือบันทึกเพื่อจัดเก็บค่ะ");
        return;
    }

    const record = {
        date: new Date().toLocaleDateString('th-TH'),
        time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
        detail: detailToSave,
        fileName: `OPD_${selectedType.toUpperCase()}_${Date.now()}`
    };

    if (!customerDB[index].treatments) customerDB[index].treatments = [];
    customerDB[index].treatments.push(record);
    localStorage.setItem('customerDB', JSON.stringify(customerDB));
    
    alert("✅ บันทึกประวัติการรักษาลงหน้า 'เอกสารแนบ' เรียบร้อยแล้วค่ะ!");
};

window.prepareAndPrintOPD = function() {
    const notes = document.getElementById('treatmentNotes').value;
    document.getElementById('printableNotesDisplay').innerText = notes;
    window.print();
};

window.deleteTreatmentRecord = function(customerIndex, recordIndex) {
    if(confirm("คุณต้องการลบบันทึกการรักษานี้ใช่หรือไม่?")) {
        const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
        customerDB[customerIndex].treatments.splice(recordIndex, 1);
        localStorage.setItem('customerDB', JSON.stringify(customerDB));
        switchProfileTab(4, customerIndex);
    }
};

  window.applyCustomerFilter = function () {
    const keyword = (document.getElementById("customerSearchInput")?.value || "").toLowerCase().trim();
    const branch = document.getElementById("branchFilterSelect")?.value || "ทั้งหมด";
    const pageSize = Number(document.getElementById("pageSizeSelect")?.value || "10");
    currentPageSize = pageSize;
    const db = getCustomerDB();

    const filtered = db.filter((c) => {
      const k =
        (c.fullname || "").toLowerCase().includes(keyword) ||
        (c.hn || "").toLowerCase().includes(keyword) ||
        String(c.phone || "").includes(keyword);
      const b = branch === "ทั้งหมด" || c.branch === branch;
      return k && b;
    });

    currentCustomerFilteredData = filtered;

    const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    if (currentCustomerPage > totalPages) currentCustomerPage = totalPages;
    if (currentCustomerPage < 1) currentCustomerPage = 1;

    const start = (currentCustomerPage - 1) * pageSize;
    const end = start + pageSize;

    window.renderCustomerTable(filtered.slice(start, end));
    renderCustomerPagination(filtered.length, pageSize);
  };

  function renderCustomerPagination(totalItems, pageSize) {
    const container = document.getElementById("customerPagination");
    if (!container) return;

    const totalPages = Math.ceil(totalItems / pageSize);

    if (totalPages <= 1) {
      container.innerHTML = "";
      return;
    }

    let html = "";

    html += `<button onclick="changeCustomerPage(${currentCustomerPage - 1})"
      class="px-3 py-2 rounded-xl text-xs font-bold border border-pink-100 bg-white ${currentCustomerPage === 1 ? 'opacity-40 pointer-events-none' : 'hover:bg-pink-50'}">ก่อนหน้า</button>`;

    for (let i = 1; i <= totalPages; i++) {
      html += `<button onclick="changeCustomerPage(${i})"
        class="px-3 py-2 rounded-xl text-xs font-bold border ${i === currentCustomerPage ? 'bg-[#D48197] text-white border-[#D48197]' : 'bg-white text-slate-600 border-pink-100 hover:bg-pink-50'}">${i}</button>`;
    }

    html += `<button onclick="changeCustomerPage(${currentCustomerPage + 1})"
      class="px-3 py-2 rounded-xl text-xs font-bold border border-pink-100 bg-white ${currentCustomerPage === totalPages ? 'opacity-40 pointer-events-none' : 'hover:bg-pink-50'}">ถัดไป</button>`;

    container.innerHTML = html;
  }

  window.changeCustomerPage = function (page) {
    currentCustomerPage = page;
    window.applyCustomerFilter();
  };

        window.applyCustomerFilter();

    target.addEventListener("keydown", (e) => {
      if (e.target.matches("#customerSearchInput") && e.key === "Enter") {
        currentCustomerPage = 1;
        window.applyCustomerFilter();
      }
    });

    target.addEventListener("change", (e) => {
      if (e.target.matches("#pageSizeSelect, #branchFilterSelect")) {
        currentCustomerPage = 1;
        window.applyCustomerFilter();
      }
    });
  }

  syncCustomerDB(getCustomerDB());

        <html>

                    <h2 style="color:#FF4B91;text-align:center;">ACE CLINIC</h2>

                    <hr style="border:0.5px solid #eee;">

window.searchCustomerForApp = function(val) {
    const resDiv = document.getElementById('appCustResults');
    if (!val) { resDiv.classList.add('hidden'); return; }
    const db = JSON.parse(localStorage.getItem('customerDB')) || [];
    const matches = db.filter(c => c.fullname.toLowerCase().includes(val.toLowerCase()) || c.hn.toLowerCase().includes(val.toLowerCase()));
    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(c => `<div onclick="selectCustForApp('${c.fullname}', '${c.hn}')" class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between font-normal"><span class="text-sm font-bold">${c.fullname}</span><span class="text-[10px] bg-slate-100 px-2 py-1 rounded-full uppercase font-bold">${c.hn}</span></div>`).join('');
        resDiv.classList.remove('hidden');
    } else { resDiv.classList.add('hidden'); }
};

window.selectCustForApp = function(name, hn) {
    const inp = document.getElementById('appCustSearch');
    inp.value = name; inp.dataset.hn = hn;
    document.getElementById('appCustResults').classList.add('hidden');
    selectedCoursesForApp = []; renderSelectedCourses();
};

window.searchCourseForApp = function() {
    const resDiv = document.getElementById('appCourseResults');
    const hn = document.getElementById('appCustSearch').dataset.hn;
    if (!hn) { alert("⚠️ กรุณาเลือกชื่อลูกค้าก่อนค่ะ"); return; }
    const db = JSON.parse(localStorage.getItem('customerDB')) || [];
    const customer = db.find(c => c.hn === hn);
    const courses = customer ? customer.courses || [] : [];
    if (courses.length > 0) {
        resDiv.innerHTML = courses.map(c => {
            const total = c.totalAmount || 10;
            const currentRound = (total - c.amount) + 1;
            return `<div onclick="selectCourseForApp('${c.name}', ${currentRound}, ${total})" class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between font-normal"><span class="text-sm font-bold">${c.name}</span><span class="text-[10px] text-pink-400 font-bold">ครั้งที่ ${currentRound}/${total}</span></div>`;
        }).join('');
        resDiv.classList.remove('hidden');
    } else { resDiv.innerHTML = `<div class="p-4 text-center text-slate-300 text-xs font-normal">ไม่มีคอร์สสะสม</div>`; resDiv.classList.remove('hidden'); }
};

window.selectCourseForApp = function(name, round, total) {
    const courseText = `${name} (${round}/${total})`;
    if (!selectedCoursesForApp.includes(courseText)) {
        selectedCoursesForApp.push(courseText); renderSelectedCourses();
    }
    document.getElementById('appCourseResults').classList.add('hidden');
    document.getElementById('appCourse').value = "";
};

window.renderSelectedCourses = function() {
    const container = document.getElementById('selectedCoursesContainer');
    if (container) {
        container.innerHTML = selectedCoursesForApp.map((c, i) => `<div class="bg-pink-50 text-[#FF4B91] border border-pink-200 px-3 py-1.5 rounded-xl text-[10px] font-bold flex items-center gap-2 font-normal animate-in slide-in-from-left"><span>✨ ${c}</span><button onclick="removeCourseFromApp(${i})" class="hover:text-red-500 font-normal">✕</button></div>`).join('');
    }
};

window.removeCourseFromApp = function(i) {
    selectedCoursesForApp.splice(i, 1);
    renderSelectedCourses();
};

window.saveNewAppointment = function(editIndex = null) {
    const hnInput = document.getElementById('appCustSearch');
    const name = hnInput ? hnInput.value.trim() : '';

    if (!name || selectedCoursesForApp.length === 0) {
        alert("⚠️ กรุณากรอกข้อมูลและเลือกคอร์สค่ะ");
        return;
    }

    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const branch = user.branch || '';

    const hnValue = hnInput?.dataset?.hn || hnInput?.getAttribute('data-hn') || "ทั่วไป";

    const newApp = {
        hn: hnValue,
        customerName: name,
        date: document.getElementById('appDate').value,
        time: document.getElementById('appHour').value + ":" + document.getElementById('appMin').value,
        doctor: document.getElementById('appDoc').value,
        staff: document.getElementById('appStaff').value || "-",
        course: selectedCoursesForApp.join(', '),
        status: document.getElementById('appStatus').value,
        note: document.getElementById('appNote').value,
        branch: branch,
        createdAt: new Date().getTime()
    };

    let db = JSON.parse(localStorage.getItem('appointmentDB')) || [];

    if (editIndex !== null && editIndex !== undefined && editIndex !== "") {
        // ถ้าแก้ไขนัดเก่า ให้คง createdAt เดิมไว้ถ้ามี
        if (db[editIndex] && db[editIndex].createdAt) {
            newApp.createdAt = db[editIndex].createdAt;
        }
        db[editIndex] = newApp;
    } else {
        db.push(newApp);
    }

    localStorage.setItem('appointmentDB', JSON.stringify(db));

    alert("✅ บันทึกนัดหมายสำเร็จ!");
    closeAppModal();
    renderAppointmentPage();
};

window.toggleAppActionMenu = function(event, index) {
    event.stopPropagation();

    const menuId = `app-action-menu-${index}`;
    const targetMenu = document.getElementById(menuId);
    if (!targetMenu) return;

    const isHidden = targetMenu.classList.contains('hidden');

    // ปิดเมนูอื่นก่อน
    document.querySelectorAll("[id^='app-action-menu-']").forEach(m => m.classList.add('hidden'));

    // รีเซ็ตทุกแถว
    document.querySelectorAll('#appointmentTableBody tr').forEach(tr => {
        tr.style.zIndex = "1";
        tr.style.position = "relative";
    });

    if (isHidden) {
        targetMenu.classList.remove('hidden');

        const parentRow = targetMenu.closest('tr');
        if (parentRow) {
            parentRow.style.zIndex = "9999";
            parentRow.style.position = "relative";
        }
    }
};

window.deleteQueueItem = function(qId) {
    if(confirm("ต้องการยกเลิกคิวนี้ใช่หรือไม่? (หากทำรายการเสร็จแล้ว ระบบจะคืนจำนวนคอร์สให้ลูกค้าค่ะ)")) {
        let db = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
        const targetIdx = db.findIndex(item => item.queueId === qId);
        
        if (targetIdx !== -1) {
            const item = db[targetIdx];
            if (item.status === "เสร็จสิ้น") {
                let customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
                const cIdx = customerDB.findIndex(c => c.hn === item.hn);
                if (cIdx !== -1) {
                    const courseIdx = customerDB[cIdx].courses.findIndex(bc => bc.name === item.course);
                    if (courseIdx !== -1) {
                        customerDB[cIdx].courses[courseIdx].amount = (parseInt(customerDB[cIdx].courses[courseIdx].amount) + 1);
                        localStorage.setItem('customerDB', JSON.stringify(customerDB));
                    }
                }
            }
            db.splice(targetIdx, 1);
            localStorage.setItem('todayQueueDB', JSON.stringify(db));
            renderQueuePage();
        }
    }
};

window.openProcessServiceModal = function(qId) {
    const todayQueue = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
    const q = todayQueue.find(item => item.queueId === qId);
    if(!q) return;

    q.isCalling = false; 
    localStorage.setItem('todayQueueDB', JSON.stringify(todayQueue));
    if (typeof renderQueuePage === "function") renderQueuePage();

    const masterCourses = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const courseDetail = masterCourses.find(c => c.name === q.course);
    
    const defaultStaffDF = courseDetail ? (courseDetail.staffDF || 0) : 0;
    const defaultDoctorDF = courseDetail ? (courseDetail.doctorDF || 0) : 0;

    const stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];

window.finishService = function(qId) {
    let allQueue = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
    const q = allQueue.find(item => item.queueId === qId);
    if(!q) return;

    const usedItem = document.getElementById('procStockItem')?.value; 
    const usedQty = parseInt(document.getElementById('procQty')?.value) || 0;

    if (usedItem && usedQty > 0) {
        let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
        const itemIdx = stockDB.findIndex(s => s.name === usedItem);

        if (itemIdx !== -1) {
            stockDB[itemIdx].qty = parseInt(stockDB[itemIdx].qty) - usedQty;
            localStorage.setItem('clinicStockDB', JSON.stringify(stockDB));
        }
    }

    const staffDF = parseFloat(document.getElementById('staffDF').value) || 0;
    const doctorDF = parseFloat(document.getElementById('doctorDF').value) || 0;
    const procNote = document.getElementById('procNote').value;
    const procStaff = document.getElementById('procStaffName').value;
    const procDoctor = document.getElementById('procDoctorName').value;

    q.status = "เสร็จสิ้น";
    q.staff = procStaff;
    q.doctor = procDoctor;
    q.staffDF = staffDF;
    q.doctorDF = doctorDF;
    q.note = procNote;
    q.finishTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

    if (q.courseIndex !== undefined) {
        let customers = JSON.parse(localStorage.getItem('clinicCustomers')) || [];
        let cust = customers.find(c => c.hn === q.hn);
        if (cust && cust.courses[q.courseIndex]) {
            cust.courses[q.courseIndex].remains -= 1;
            localStorage.setItem('clinicCustomers', JSON.stringify(customers));
        }
    }

    localStorage.setItem('todayQueueDB', JSON.stringify(allQueue));
    if (document.getElementById('processModal')) document.getElementById('processModal').remove();
    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', text: 'ระบบได้ตัดยอดสต๊อกยาและหักจำนวนคอร์สเรียบร้อยค่ะ', timer: 2000, showConfirmButton: false });
    renderQueuePage();
};

// --- ฟังก์ชันเปิด-ปิดเมนู ▼ (ฉบับแก้ไข: ดันแถวขึ้นมาอยู่หน้าสุด 100%) ---
window.safeToggleMenu = function(event, index) {
    event.stopPropagation();
    
    // 1. หาเมนูเป้าหมาย
    const targetMenu = document.getElementById(`action-menu-${index}`);
    if (!targetMenu) return;
    const isHidden = targetMenu.classList.contains('hidden');

    // 2. ปิดเมนูอื่นๆ ทั้งหมดที่เปิดค้างอยู่ก่อน
    document.querySelectorAll('[id^="action-menu-"]').forEach(m => m.classList.add('hidden'));
    
    // 3. รีเซ็ตค่าทุุกแถวในตารางให้กลับเป็นปกติก่อน (ป้องกันการทับซ้อนค้าง)
    document.querySelectorAll('#salesTableBody tr').forEach(tr => {
        tr.style.zIndex = "1"; // ตั้งค่าพื้นฐานต่ำๆ ไว้
        tr.style.position = "relative"; // ต้องเป็น relative เพื่อให้ z-index ของลูกทำงาน
    });

    // 4. ถ้าเมนูที่จะเปิดเดิมปิดอยู่ ให้เปิดและดัน "แถวนี้" ให้ลอยสูงสุด
    if (isHidden) {
        targetMenu.classList.remove('hidden');
        const parentRow = targetMenu.closest('tr');
        if (parentRow) {
            // 🎯 บังคับให้แถวที่เลือกมีค่า z-index สูงกว่าแถวอื่นๆ ทันที
            parentRow.style.zIndex = "9999"; 
        }
    }
};

// 💡 คลิกที่ว่างบนหน้าจอเพื่อปิดเมนู

// --- ❌ ฟังก์ชันยกเลิกบิล ---
window.cancelBillProcess = function(billId, hn) {
    Swal.fire({
        title: '🚨 ยืนยันการยกเลิกบิล?',
        text: "ระบบจะเปลี่ยนสถานะเป็น 'ยกเลิก' และคืนจำนวนคอร์สให้ลูกค้า (ถ้ามี)",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#888',
        confirmButtonText: 'ใช่, ยกเลิกบิลนี้!',
        cancelButtonText: 'ปิดหน้าต่าง',
        customClass: { popup: 'rounded-[2rem]' }
    }).then((result) => {
        if (result.isConfirmed) {
            try {
                let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
                const billIdx = accountDB.findIndex(b => b.id == billId);
                
                if (billIdx !== -1) {
                    if (accountDB[billIdx].status === "ยกเลิก") return;

                    accountDB[billIdx].status = "ยกเลิก";
                    
                    let customers = JSON.parse(localStorage.getItem('customerDB')) || [];
                    const cIdx = customers.findIndex(c => c.hn === hn);
                    
                    if (cIdx !== -1 && accountDB[billIdx].items) {
                        accountDB[billIdx].items.forEach(billItem => {
                            const cCourseIdx = customers[cIdx].courses.findIndex(bc => bc.name === billItem.name);
                            if (cCourseIdx !== -1) {
                                customers[cIdx].courses[cCourseIdx].amount -= (billItem.qty || 1);
                                if (customers[cIdx].courses[cCourseIdx].amount <= 0) {
                                    customers[cIdx].courses.splice(cCourseIdx, 1);
                                }
                            }
                        });
                        localStorage.setItem('customerDB', JSON.stringify(customers));
                    }

                    localStorage.setItem('accountDB', JSON.stringify(accountDB));
                    Swal.fire({ icon: 'success', title: 'ยกเลิกบิลสำเร็จ', showConfirmButton: false, timer: 1500 });
                    renderSalesPage(); 
                }
            } catch (e) { 
                Swal.fire('ข้อผิดพลาด', 'ไม่สามารถยกเลิกบิลได้', 'error'); 
            }
        }
    });
};

// --- ฟังก์ชันเลือกวิธีชำระเงิน (สลับสีปุ่มที่ถูกกด) ---
window.selectPaymentType = function(btn, type) {
    // ล้างสีปุ่มอื่น
    document.querySelectorAll('#paymentMethods button').forEach(b => {
        b.classList.remove('border-pink-400', 'text-[#FF4B91]', 'bg-pink-50', 'shadow-inner');
        b.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
    });
    // ระบายสีปุ่มที่เลือก
    btn.classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
    btn.classList.add('border-pink-400', 'text-[#FF4B91]', 'bg-pink-50', 'shadow-inner');
    
    // เก็บค่าลงตัวแปร
    window.selectedPaymentMethod = type; 
};

// --- 3. ฟังก์ชันค้นหาคนไข้ ---
window.searchCustomerForBill = function(val) {
    const resDiv = document.getElementById('customerSearchResult');
    if (!val || val.length < 1) { resDiv.classList.add('hidden'); return; }
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const matches = customerDB.filter(c => (c.fullname && c.fullname.includes(val)) || (c.hn && c.hn.includes(val)));
    
    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(c => `
            <div onclick="selectCustomerToBill('${c.hn}')" class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between items-center font-normal bg-white">
                <span class="text-sm text-slate-700 font-bold">${c.fullname}</span>
                <span class="text-[10px] bg-cyan-50 text-cyan-600 px-3 py-1 rounded-full uppercase font-bold">${c.hn}</span>
            </div>`).join('');
        resDiv.classList.remove('hidden');
    } else { 
        resDiv.classList.add('hidden'); 
    }
};

// --- 4. ฟังก์ชันเลือกคนไข้เข้ากล่อง ---
window.selectCustomerToBill = function(hn) {
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const c = customerDB.find(item => item.hn === hn);
    if (!c) return;
    window.activeCustomer = c;
    
    document.getElementById('billHN').innerText = c.hn || '-';
    document.getElementById('billFullName').innerText = c.fullname || '-';
    document.getElementById('billNickName').innerText = c.nickname || '-';
    document.getElementById('billPhone').innerText = c.phone || '-';
    document.getElementById('billAllergy').innerText = c.allergy || 'ไม่มี';
    document.getElementById('billNationality').innerText = c.nationality || '-';
    document.getElementById('billRight').innerText = c.right || 'ทั่วไป';

    const img = document.getElementById('billCustPhoto');
    const icon = document.getElementById('billPhotoIcon');
    if (c.photo) { 
        img.src = c.photo; 
        img.classList.remove('hidden'); 
        icon.classList.add('hidden'); 
    } else { 
        img.classList.add('hidden'); 
        icon.classList.remove('hidden'); 
    }

    document.getElementById('customerSearchResult').classList.add('hidden');
    document.getElementById('custSearchForBillInp').value = c.fullname;

    document.getElementById('billingFormArea').classList.remove('hidden', 'opacity-0');
    document.getElementById('noCustomerHint').classList.add('hidden');
};


// --- 6. เพิ่มรายการลงตาราง ---
window.addItemToBill = function() {
    const name = document.getElementById('itemName').value;
    const price = parseFloat(document.getElementById('billPrice').value) || 0;
    const qty = parseFloat(document.getElementById('billQty').value) || 0;
    const cat = document.getElementById('itemName').dataset.category || 'general';

    if (!name || price <= 0) return;

    window.currentBillItems.push({ name, price, qty, cat, total: price * qty });
    renderBillItems();
    
    document.getElementById('itemName').value = '';
    document.getElementById('billPrice').value = '';
    document.getElementById('billQty').value = '1';
};

// --- 7. วาดตารางบิล ---
window.renderBillItems = function() {
    const listBody = document.getElementById('billItemsList');
    if (!listBody) return;
    let grandTotal = 0;

    if (window.currentBillItems.length === 0) {
        listBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-300 font-normal italic">ยังไม่มีรายการ...</td></tr>`;
    } else {
        listBody.innerHTML = window.currentBillItems.map((item, index) => {
            grandTotal += item.total;
            return `
                <tr class="hover:bg-white transition-all group">
                    <td class="py-4 pl-4 text-left flex items-center gap-2">
                        <span class="bg-pink-50 text-[#FF4B91] px-2 py-0.5 rounded text-[9px] uppercase font-bold">${item.cat === 'medicine' ? 'สินค้า' : 'คอร์ส'}</span>
                        <span class="text-slate-700">${item.name}</span>
                    </td>
                    <td class="py-4 text-center text-slate-600">${item.qty}</td>
                    <td class="py-4 text-center text-slate-600">${parseFloat(item.price).toLocaleString()}</td>
                    <td class="py-4 text-right text-slate-700">฿${parseFloat(item.total).toLocaleString()}</td>
                    <td class="py-4 text-right pr-4">
                        <button onclick="removeItemFromBill(${index})" class="bg-white p-2 rounded-full shadow-sm border border-slate-100 hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all text-xs opacity-50 group-hover:opacity-100">✕</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    document.getElementById('grandTotalDisplay').innerText = '฿' + grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
};

// --- 8. ลบรายการออก ---
window.removeItemFromBill = function(index) {
    window.currentBillItems.splice(index, 1);
    renderBillItems();
};

// --- 9. บันทึกบิล ---
window.confirmFinalPayment = function() {
    try {
        const paymentValue = window.selectedPaymentMethod;
        const dateInput = document.getElementById('billDate');
        const billDate = dateInput ? dateInput.value : new Date().toISOString().split('T')[0];
        const totalRaw = document.getElementById('grandTotalDisplay').innerText;

        const customerName = document.getElementById('billFullName').innerText;
        const customerHN = document.getElementById('billHN').innerText;

        if (customerHN === "-" || !customerName) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาค้นหาและเลือกข้อมูลคนไข้ก่อนค่ะ', 'warning');
            return;
        }
        if (window.currentBillItems.length === 0) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเพิ่มรายการคอร์ส/ยา อย่างน้อย 1 รายการค่ะ', 'warning');
            return;
        }
        if (!paymentValue) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณากดเลือกช่องทางชำระเงินด้านล่างด้วยค่ะ', 'warning');
            return;
        }

        const user = JSON.parse(localStorage.getItem('currentUser')) || {};
        const branch = user.branch || '';

        const newBillEntry = {
            id: Date.now(),
            date: billDate,
            hn: customerHN,
            customerName: customerName,
            customer: customerName,
            items: [...window.currentBillItems],
            total: totalRaw,
            payment: paymentValue,
            status: "เสร็จสิ้น",
            type: "รายรับ",
            branch: branch,
            timestamp: new Date().getTime()
        };

        let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
        accountDB.push(newBillEntry);
        localStorage.setItem('accountDB', JSON.stringify(accountDB));

        let customers = JSON.parse(localStorage.getItem('customerDB')) || [];
        const cIdx = customers.findIndex(c => c.hn === customerHN);

        if (cIdx !== -1) {
            if (!customers[cIdx].branch) {
                customers[cIdx].branch = branch;
            }

            if (!customers[cIdx].courses) customers[cIdx].courses = [];

            window.currentBillItems.forEach(item => {
                customers[cIdx].courses.push({
                    name: item.name,
                    amount: item.qty || 1,
                    totalAmount: item.qty || 1,
                    date: billDate
                });
            });

            localStorage.setItem('customerDB', JSON.stringify(customers));
        }

        Swal.fire({
            icon: 'success',
            title: 'บันทึกบิลสำเร็จ!',
            text: `ออกใบเสร็จให้คุณ ${customerName} เรียบร้อยแล้ว`,
            timer: 2000,
            showConfirmButton: false
        }).then(() => {
            if (document.getElementById('dynamicContent').innerHTML.includes('สร้างรายการขาย')) {
                renderSalesPage();
            } else {
                switchProfileTab(3, window.__currentCustomerIndex);
            }
        });

    } catch (e) {
        Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + e.message, 'error');
    }
};

// 3. ฟังก์ชัน Save (บันทึกและสั่งโหลดหน้าซ้ำ)
window.saveExpense = function(data) {
    let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const newEntry = {
        id: "EXP" + Date.now(),
        date: data.date,
        detail: data.detail,
        category: data.category,
        amount: data.amount,
        total: data.amount,
        account: data.account,
        type: "รายจ่าย",
        status: "เสร็จสิ้น",
        timestamp: new Date().getTime()
    };
    accountDB.push(newEntry);
    localStorage.setItem('accountDB', JSON.stringify(accountDB));
    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', showConfirmButton: false, timer: 1500 });
    window.renderExpensePage(); // สั่งวาดหน้าใหม่ทันที
};

// 4. ฟังก์ชันลบ
window.deleteExpense = function(id) {
    if(confirm("ยืนยันการลบรายการนี้?")) {
        let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
        accountDB = accountDB.filter(item => item.id !== id);
        localStorage.setItem('accountDB', JSON.stringify(accountDB));
        window.renderExpensePage();
    }
};
/* =======================================================
   🖨️ ฟังก์ชันพิมพ์ใบเสร็จล่าสุดจากหน้าตารางลูกค้า
   ======================================================= */
window.printLatestReceipt = function(name, hn) {
    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    
    // 1. ค้นหาบิลทั้งหมดของลูกค้าคนนี้ (เช็คทั้งชื่อและ HN)
    const customerBills = accountDB.filter(b => 
        (b.hn === hn || b.customerName === name || b.customer === name) && 
        b.type === "รายรับ" && 
        b.status === "เสร็จสิ้น"
    );

    if (customerBills.length === 0) {
        Swal.fire({
            icon: 'info',
            title: 'ไม่พบประวัติการซื้อ',
            text: `คุณ ${name} ยังไม่มีประวัติการชำระเงินในระบบค่ะ`,
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // 2. เอาบิลล่าสุด (ตัวที่ timestamp มากที่สุด)
    customerBills.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    const latestBill = customerBills[0];

    // 3. ถามว่าอยากพิมพ์ขนาดไหน
    Swal.fire({
        title: 'เลือกขนาดใบเสร็จ',

// ปรับตารางคอร์ส
// เพิ่มตัวแปรสำหรับคุมหน้าปัจจุบัน (วางไว้ข้างนอกฟังก์ชัน หรือด้านบนสุดของ script ก็ได้ค่ะ)
window.currentCoursePage = 1;

window.updateCourseMasterTable = function() {
    const tbody = document.getElementById('courseMasterTableBody');
    if (!tbody) return;

    // 🎯 1. ดึงค่าจากแถบควบคุมด้านบน (ฟังคำสั่งจากปุ่มที่คุณเพิ่งสร้าง)
    const pageSize = parseInt(document.getElementById('coursePageSize')?.value) || 10;
    const catFilter = document.getElementById('courseCatFilter')?.value || "ทั้งหมด";
    const searchTerm = document.getElementById('searchCourseInput')?.value.toLowerCase().trim() || "";

    // 🎯 2. ดึงข้อมูลจาก LocalStorage
    let masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    
    // 🎯 3. กรองข้อมูลตามคำค้นหา และ หมวดหมู่ที่เลือก
    const filteredData = masterDB.filter(c => {
        const matchSearch = c.name.toLowerCase().includes(searchTerm) || (c.id && c.id.toLowerCase().includes(searchTerm));
        const matchCat = (catFilter === "ทั้งหมด") || (c.category === catFilter);
        return matchSearch && matchCat;
    });

    // 🎯 4. ตั้งค่าการแบ่งหน้า (Pagination)
    const totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    if (window.currentCoursePage > totalPages) window.currentCoursePage = totalPages;
    if (window.currentCoursePage < 1) window.currentCoursePage = 1;

    const startIndex = (window.currentCoursePage - 1) * pageSize;
    const paginatedData = filteredData.slice(startIndex, startIndex + pageSize);

    // 🎯 5. อัปเดตตัวเลขสรุปรายการ (แถบสีชมพู)
    const countDisplay = document.getElementById('courseCountDisplay');
    if (countDisplay) {
        countDisplay.remove(); 
    }

    tbody.innerHTML = ''; 

    if (paginatedData.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8" class="p-20 text-center italic text-slate-400 font-normal">📭 ไม่พบข้อมูลคอร์สที่ต้องการค้นหาค่ะ</td></tr>`;
        if(typeof renderCoursePagination === "function") renderCoursePagination(0);
        return;
    }

    // 🎯 6. วาดตาราง (ใช้ Font ปกติ สี Slate-500/600 ตามบรีฟ)
    tbody.innerHTML = paginatedData.map((c, idx) => {
        const realIdx = masterDB.findIndex(item => item.id === c.id);
        const displayIdx = startIndex + idx + 1; 
        
        return `
        <tr class="border-b border-pink-50 hover:bg-pink-50/20 transition-all group" style="height: 60px;">
            <td class="text-slate-400 font-normal w-16 text-center text-[10px]">${displayIdx}</td>
            <td class="text-pink-300 font-mono w-24 text-center text-[10px] font-normal">${c.id}</td>
            <td class="text-left pl-10">
                <div class="text-slate-600 text-[13.5px] font-normal leading-tight">${c.name}</div>
                <div class="text-[8px] text-slate-400 uppercase italic mt-0.5">สร้างเมื่อ: ${c.createdAt || '-'}</div>
            </td>
            <td class="text-center w-32">
                <span class="bg-pink-50/50 text-[#D48197] px-3 py-1 rounded-full text-[9px] font-normal border border-pink-100 uppercase italic">
                    ${c.category || 'ทั่วไป'}
                </span>
            </td>
            <td class="text-right pr-10 w-32">
                <div class="text-slate-500 text-[14px] font-normal">฿${parseFloat(c.price || 0).toLocaleString()}</div>
            </td>
            <td class="text-center w-32">
                <div class="text-slate-500 font-normal text-[13px] whitespace-nowrap">${c.amount} ${c.unit || 'ครั้ง'}</div>
            </td>
            <td class="text-[10px] text-left pl-10 leading-tight w-48 border-l border-slate-50 font-normal">
                <div class="flex items-center gap-2 text-slate-400 mb-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-slate-200"></span> พนักงาน: <span class="text-slate-500">฿${parseFloat(c.staffDF || 0).toLocaleString()}</span>
                </div>
                <div class="flex items-center gap-2 text-slate-300">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-100"></span> แพทย์: <span class="text-blue-400/70">฿${parseFloat(c.doctorDF || 0).toLocaleString()}</span>
                </div>
            </td>
            <td class="text-center w-28 relative">
                <div class="inline-flex items-center bg-[#D48197] text-white rounded-full p-1 shadow-sm relative">
                    <button onclick="editMasterCourse(${realIdx})" 
                        class="px-4 py-1.5 text-[10px] font-normal border-r border-white/30 hover:bg-white/10 rounded-l-full transition-all">แก้ไข</button>
                    
                    <button onclick="event.stopPropagation(); window.toggleCourseActionMenu(event, ${displayIdx-1})" 
                        class="px-2.5 py-1.5 text-[9px] hover:bg-white/10 rounded-r-full transition-all">▼</button>
                    
                    <div id="course-action-menu-${displayIdx-1}" 
                        class="hidden absolute right-0 top-10 w-40 bg-white border border-pink-50 rounded-2xl shadow-2xl z-[999] overflow-hidden text-left animate-in fade-in slide-in-from-top-2">
                        <button onclick="deleteMasterCourse(${realIdx})" 
                            class="w-full p-3 text-[11px] text-red-400 hover:bg-red-50 flex items-center gap-3 font-normal transition-all">
                            <span>🗑️</span> ลบรายการนี้
                        </button>
                    </div>
                </div>
            </td>
        </tr>`;
    }).join('');

    // 🎯 7. อัปเดตปุ่มเลขหน้า
    if(typeof renderCoursePagination === "function") renderCoursePagination(totalPages);
};

window.renderCoursePagination = function(totalPages) {
    let paginationWrap = document.getElementById('coursePagination');
    if (!paginationWrap) {
        paginationWrap = document.createElement('div');
        paginationWrap.id = 'coursePagination';
        // 🎯 ใช้ justify-between เพื่อดันปุ่มไปตรงกลาง และดันจำนวนรายการไปมุมขวาสุด
        paginationWrap.className = 'flex justify-between items-center mt-8 pb-6 px-10';
        const tableBox = document.getElementById('courseMasterTableBody').closest('.bg-white');
        if (tableBox) tableBox.appendChild(paginationWrap);
    }

    // ดึงข้อมูลจำนวนรายการมาแสดง
    const masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const countText = `จำนวน ${masterDB.length} รายการ`;

    if (totalPages <= 1) {
        // กรณีมีหน้าเดียว แสดงพื้นที่ว่างฝั่งซ้าย และจำนวนรายการที่มุมขวา
        paginationWrap.innerHTML = `<div></div><div class="text-[12px] font-bold text-slate-400 uppercase tracking-tight">${countText}</div>`;
        return;
    }

    // กรณีมีหลายหน้า แสดงปุ่มตรงกลาง และจำนวนรายการที่มุมขวา
    paginationWrap.innerHTML = `
        <div class="w-32"></div> <div class="flex items-center gap-4">
            <button onclick="changeCoursePage(${window.currentCoursePage - 1})" 
                ${window.currentCoursePage === 1 ? 'disabled' : ''}

            <div class="flex items-center gap-2">
                <span class="text-[13px] font-bold text-[#D48197] bg-pink-50 w-8 h-8 rounded-full flex items-center justify-center border border-pink-100">${window.currentCoursePage}</span>
                <span class="text-[11px] text-slate-400">/ ${totalPages}</span>
            </div>

            <button onclick="changeCoursePage(${window.currentCoursePage + 1})" 
                ${window.currentCoursePage === totalPages ? 'disabled' : ''} 
                class="px-5 py-2 border border-pink-100 rounded-2xl bg-white text-slate-400 text-[11px] font-normal hover:bg-pink-50 disabled:opacity-30 transition-all shadow-sm cursor-pointer">ถัดไป ❯</button>
        </div>

        <div class="text-[12px] font-bold text-slate-400 uppercase tracking-tight w-32 text-right">
            ${countText}
        </div>
    `;
};

window.toggleCourseActionMenu = function(event, index) {
    const menuId = `course-action-menu-${index}`;
    // ปิดเมนูอื่นก่อน
    document.querySelectorAll("[id^='course-action-menu-']").forEach(m => {
        if(m.id !== menuId) m.classList.add('hidden');
    });
    // สลับเปิด/ปิดเมนูที่เลือก
    const menu = document.getElementById(menuId);
    if(menu) menu.classList.toggle('hidden');
};

window.saveNewMasterCourse = function() {
    const name = document.getElementById('newCourseName').value.trim();
    const cat = document.getElementById('newCourseCat').value.trim();
    const price = document.getElementById('newCoursePrice').value || 0;
    const amount = document.getElementById('newCourseAmount').value || 1;
    const unit = document.getElementById('newCourseUnit').value.trim() || 'ครั้ง';
    const staffDF = document.getElementById('newCourseDF').value || 0;
    const doctorDF = document.getElementById('newCourseDoctorDF').value || 0;

    if (!name || !cat) { alert("⚠️ กรุณาระบุชื่อคอร์สและหมวดหมู่ด้วยนะคะ"); return; }

    const newCourse = {
        id: "C-" + Math.floor(1000 + Math.random() * 9000),
        name: name,
        category: cat,
        price: parseFloat(price),
        amount: parseInt(amount),
        unit: unit,
        staffDF: parseFloat(staffDF),
        doctorDF: parseFloat(doctorDF),
        createdAt: new Date().toLocaleDateString('th-TH')
    };

    let masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    masterDB.unshift(newCourse); 
    localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));

    alert(`✅ บันทึกคอร์ส "${name}" เรียบร้อยแล้วค่ะ!`);
    closeCourseModal();
    if (typeof updateCourseMasterTable === "function") updateCourseMasterTable(); 
};

window.editMasterCourse = function(idx) {
    const masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const c = masterDB[idx];
    
    openAddCourseModal();
    document.querySelector('#courseModal h3').innerText = "📝 แก้ไขรายการคอร์ส";
    const saveBtn = document.querySelector('#courseModal button[onclick="saveNewMasterCourse()"]');
    saveBtn.innerText = "อัปเดตข้อมูล";
    
    document.getElementById('newCourseName').value = c.name;
    document.getElementById('newCourseCat').value = c.category;
    document.getElementById('newCoursePrice').value = String(c.price).replace(/,/g, '');
    document.getElementById('newCourseAmount').value = c.amount;
    document.getElementById('newCourseDF').value = String(c.staffDF).replace(/,/g, '');
    document.getElementById('newCourseDoctorDF').value = String(c.doctorDF).replace(/,/g, '');

    saveBtn.onclick = function() {
        masterDB.splice(idx, 1);
        localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));
        saveNewMasterCourse();
    };
};

window.updateStockTable = function() {
    const tbody = document.getElementById('stockTableBody');
    if (!tbody) return;
    tbody.innerHTML = ''; 

    const stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    const searchTerm = document.getElementById('stockSearchInput')?.value.toLowerCase() || "";
    
    const filteredStock = stockDB.filter(s => (s.name || "").toLowerCase().includes(searchTerm));

    if (filteredStock.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center italic text-slate-300 font-normal">📦 ยังไม่มีข้อมูลสต๊อกในขณะนี้</td></tr>`;
        return;
    }

    tbody.innerHTML = filteredStock.map((s, idx) => {
        const isExpiring = s.expDate && new Date(s.expDate) < new Date(new Date().setDate(new Date().getDate() + 30));
        return `
            <tr class="border-b border-pink-50 hover:bg-pink-50/20 transition-all font-normal text-slate-600" style="height: 75px;">
                <td class="p-2 text-center text-[10px] text-slate-400 font-normal">${idx + 1}</td>
                <td class="p-2 text-center text-slate-500 italic font-light">${s.receiveDate || s.date || '23/02/2026'}</td>
                <td class="p-4 text-left">
                    <div class="font-bold text-slate-700 text-[14px] leading-tight">${s.name}</div>
                    <div class="text-[9px] text-pink-400 italic mt-1 font-light uppercase">📦 หน่วยเรียก: ${s.unit || 'ชิ้น'}</div>
                </td>
                <td class="p-2 text-center font-black ace-pink text-base">
                    ${s.qty} <span class="text-[10px] font-normal text-slate-400">${s.unit || 'หน่วย'}</span>
                </td>
                <td class="p-2 text-center text-slate-500 font-normal">
                    ฿${parseFloat(s.cost || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}
                </td>
                <td class="p-2 text-center">
                    <span class="px-3 py-1.5 rounded-full text-[10px] ${isExpiring ? 'bg-red-50 text-red-500 font-bold' : 'bg-slate-50 text-slate-400'}">
                        ${s.expDate || s.exp || 'ไม่ระบุ'}
                    </span>
                </td>
                <td class="p-2 text-center">
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="editStock(${idx})" class="text-[11px] text-slate-400 hover:text-pink-500 transition-all font-bold">📝 แก้ไข</button>
                        <button onclick="deleteStockItem(${idx})" class="p-2 opacity-20 hover:opacity-100 transition-all">
                            <img src="https://cdn-icons-png.flaticon.com/128/3096/3096673.png" class="w-4 h-4">
                        </button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
};

window.saveStockItem = function() {
    const name = document.getElementById('stockItemName').value.trim();
    const qty = document.getElementById('stockQty').value || 0;
    const unit = document.getElementById('stockUnit').value.trim() || 'หน่วย'; 
    const cost = document.getElementById('stockCost').value || 0;
    const date = document.getElementById('stockDate').value;
    const exp = document.getElementById('stockExp').value;

    if (!name || qty <= 0) { alert("⚠️ กรุณาระบุชื่อยาและจำนวนรับเข้าด้วยนะคะ"); return; }

    const newItem = {
        name: name, qty: qty, unit: unit, 
        cost: parseFloat(cost).toLocaleString(),
        date: date.split('-').reverse().join('/'),
        exp: exp ? exp.split('-').reverse().join('/') : 'ไม่ระบุ'
    };

    let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    stockDB.unshift(newItem);
    localStorage.setItem('clinicStockDB', JSON.stringify(stockDB));

    alert("✅ บันทึกสต๊อกเรียบร้อยแล้วค่ะ!");
    closeStockModal(); 
    if (typeof updateStockTable === "function") updateStockTable();
};

window.deleteStockItem = function(idx) {
    if (confirm("✅ ต้องการลบรายการนี้ใช่หรือไม่คะ?")) {
        let db = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
        db.splice(idx, 1);
        localStorage.setItem('clinicStockDB', JSON.stringify(db));
        updateStockTable();
    }
};
