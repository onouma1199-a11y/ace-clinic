window.saveStaffComplete = async function(idx, mode, directId = '') {
    const name = document.getElementById('newName')?.value?.trim() || '';
    const phone = document.getElementById('newPhone')?.value?.trim() || '';
    const email = document.getElementById('newEmail')?.value?.trim() || '';
    const status = document.getElementById('newStatus')?.value || 'ทำงาน';

    if (!name || !phone || !email) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อ เบอร์โทรศัพท์ และอีเมล', 'warning');
    }

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];

    const imgElement = document.getElementById('previewImg');
    const imgData = imgElement ? imgElement.src : '';

    const staffCode = document.getElementById('newHN')?.value?.trim() || generateStaffCode();

    let existingIndex = -1;

    if (mode === 'edit' && idx !== null && idx !== undefined && staffDB[idx]) {
        existingIndex = idx;
    } else if (directId) {
        existingIndex = staffDB.findIndex(s => String(s.id || '') === String(directId));
    } else if (staffCode) {
        existingIndex = staffDB.findIndex(s => String(s.staffId || s.staff_code || '') === String(staffCode));
    }

    const oldItem = existingIndex !== -1 ? (staffDB[existingIndex] || {}) : {};

    const data = {
        id: oldItem.id || directId || crypto.randomUUID(),
        staffId: oldItem.staffId || oldItem.staff_code || staffCode,
        name: name,
        nickname: document.getElementById('newNickname')?.value || '',
        gender: document.getElementById('newGender')?.value || 'ไม่ระบุ',
        role: document.getElementById('newRole')?.value || '',
        branch: document.getElementById('newBranch')?.value || 'บางพลี',
        status: status,
        phone: phone,
        email: email,
        username: email,
        password: phone,
        bankName: document.getElementById('newBank')?.value || '',
        bankAcc: document.getElementById('newAcc')?.value || '',
        startDate: document.getElementById('newStart')?.value || '',
        address: document.getElementById('newAddress')?.value || '',
        salary: parseFloat(document.getElementById('newSalary')?.value || 0),
        img: imgData && imgData.startsWith('data:')
            ? imgData
            : (oldItem.img || ''),
        isLocked: status === 'ออก',
        updatedAt: new Date().toISOString()
    };

    if (existingIndex !== -1) {
        staffDB[existingIndex] = { ...staffDB[existingIndex], ...data };
    } else {
        staffDB.push(data);
    }

    localStorage.setItem('staffDB', JSON.stringify(staffDB));

    if (window.supabaseClient) {
        const payload = {
            staff_code: data.staffId,
            full_name: data.name,
            phone: data.phone,
            email: data.email,
            role: data.role,
            branch: window.normalizeBranch ? window.normalizeBranch(data.branch) : data.branch,
            employment_status: data.status,
            is_active: data.status !== 'ออก'
        };

        const { error } = await window.supabaseClient
            .from('staff_profiles')
            .upsert([payload], { onConflict: 'staff_code' });

        if (error) {
            console.error('saveStaffComplete supabase error:', error);
            return Swal.fire({
                icon: 'error',
                title: 'บันทึกลง Supabase ไม่สำเร็จ',
                text: error.message || 'ไม่สามารถบันทึกข้อมูลพนักงานได้',
                confirmButtonColor: '#D48197'
            });
        }
    }

    document.getElementById('staffModalContainer')?.remove();

    Swal.fire({
        icon: 'success',
        title: 'บันทึกเรียบร้อย',
        text: status === 'ออก' ? 'ระงับสิทธิ์พนักงานแล้ว' : 'อัปเดตข้อมูลสำเร็จ',
        timer: 1500,
        showConfirmButton: false
    });

    if (typeof renderStaffProfileList === 'function') {
        renderStaffProfileList();
    }

    const activeBtn = document.querySelector('.settings-nav-btn.active');
    if (activeBtn && typeof window.switchSettingsTab === 'function') {
        await window.switchSettingsTab('users', activeBtn);
    }
};

window.generateStaffCode = function() {
    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const codes = staffDB
        .map(s => String(s.staffId || s.staff_code || ''))
        .filter(Boolean);

    let maxNum = 0;
    codes.forEach(code => {
        const num = parseInt(String(code).replace(/[^\d]/g, ''), 10);
        if (!isNaN(num) && num > maxNum) maxNum = num;
    });

    return 'ST' + String(maxNum + 1).padStart(4, '0');
};

function generateStaffCode() {
    return window.generateStaffCode();
}

window.saveStaffProfile = async function(staffId) {
    if (!window.supabaseClient) {
        return Swal.fire('Error', 'ยังไม่พบการเชื่อมต่อ Supabase', 'error');
    }

    const name = document.getElementById('newName')?.value?.trim() || '';
    const phone = document.getElementById('newPhone')?.value?.trim() || '';
    const email = document.getElementById('newEmail')?.value?.trim() || '';
    const role = document.getElementById('newRole')?.value || '';
    const branch = document.getElementById('newBranch')?.value || '';
    const status = document.getElementById('newStatus')?.value || 'ทำงาน';
    const gender = document.getElementById('newGender')?.value || 'ไม่ระบุ';
    const nickname = document.getElementById('newNickname')?.value || '';
    const bankName = document.getElementById('newBank')?.value || '';
    const bankAcc = document.getElementById('newAcc')?.value || '';
    const startDate = document.getElementById('newStart')?.value || '';
    const address = document.getElementById('newAddress')?.value || '';
    const salary = parseFloat(document.getElementById('newSalary')?.value || 0);

    if (!name || !phone || !email) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อ เบอร์โทรศัพท์ และอีเมล', 'warning');
    }

    // ✅ เช็คอีเมลซ้ำ โดยต้องใช้ window.supabaseClient
    const { data: exist, error: checkError } = await window.supabaseClient
        .from('staff_profiles')
        .select('staff_code,email')
        .eq('email', email);

    if (checkError) {
        console.error('check duplicate email error:', checkError);
        return Swal.fire('ตรวจสอบไม่สำเร็จ', checkError.message || 'เช็คอีเมลซ้ำไม่ได้', 'error');
    }

    const duplicate = (exist || []).filter(e => String(e.staff_code || '') !== String(staffId || ''));
    if (duplicate.length > 0) {
        return Swal.fire('ซ้ำ', 'อีเมลนี้ถูกใช้แล้ว', 'warning');
    }

    const payload = {
        full_name: name,
        phone: phone,
        email: email,
        role: role,
        branch: window.normalizeBranch ? window.normalizeBranch(branch) : branch,
        employment_status: status,
        is_active: status === 'ทำงาน',
        gender: gender,
        nickname: nickname,
        bank_name: bankName,
        bank_acc: bankAcc,
        start_date: startDate,
        address: address,
        salary: salary,
        updated_at: new Date().toISOString()
    };

    const { data, error } = await window.supabaseClient
        .from('staff_profiles')
        .update(payload)
        .eq('staff_code', staffId)
        .select();

    if (error) {
        console.error('saveStaffProfile error:', error);
        return Swal.fire('บันทึกไม่สำเร็จ', error.message || 'เกิดข้อผิดพลาด', 'error');
    }

    if (!data || data.length === 0) {
        return Swal.fire('บันทึกไม่สำเร็จ', 'ไม่พบ staff_code ที่ต้องการแก้ไข', 'error');
    }

    Swal.fire({
        icon: 'success',
        title: 'บันทึกข้อมูลสำเร็จ!',
        timer: 1500,
        showConfirmButton: false
    });

    document.getElementById('staffModalContainer')?.remove();

    if (typeof window.renderStaffProfileList === 'function') {
        await window.renderStaffProfileList();
    }
};

window.calcPayrollLogic = function() {
    // 1. ดึงค่าจาก Input (แก้ไข ID ให้ตรงกับ HTML)
    const salary = parseFloat(document.getElementById('mSalary').value) || 0;
    const comm = parseFloat(document.getElementById('mComm').value) || 0;
    const df = parseFloat(document.getElementById('mDF').value) || 0;
    const ot = parseFloat(document.getElementById('mOT').value) || 0;
    const tax = parseFloat(document.getElementById('mTax').value) || 0;
    
    // ดึงค่ารายการหัก (ใช้ mLateMin ให้ตรงกับ HTML ในบรรทัดที่ 2187)
    const absD = parseFloat(document.getElementById('mAbsDays').value) || 0;
    const absHIn = parseFloat(document.getElementById('mAbsHours').value) || 0;
    const lateM = parseFloat(document.getElementById('mLateMin').value) || 0; 

    const hourRate = (salary / 30) / 8;

    // 2. คำนวณรายการหัก
    const absDayDeduct = absD * (salary / 30);
    const commDeduct = (absD > 0) ? (comm / 30) * absD : 0;
    document.getElementById('valAbsDayDeduct').innerText = `หัก: ฿${(absDayDeduct + commDeduct).toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const h = Math.floor(absHIn);
    const m = (absHIn - h) * 100;
    const absHourDeduct = (h + (m/60)) * hourRate;
    document.getElementById('valAbsHourDeduct').innerText = `หัก: ฿${absHourDeduct.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    let lateDeduct = 0;
    if (lateM > 10 && lateM <= 30) lateDeduct = lateM * 5;
    else if (lateM > 30) lateDeduct = (lateM / 60) * hourRate;
    document.getElementById('valLateDeduct').innerText = `หัก: ฿${lateDeduct.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    const totalD = absDayDeduct + commDeduct + absHourDeduct + lateDeduct;
    document.getElementById('resDeductTotal').innerText = `- ฿${totalD.toLocaleString(undefined, {minimumFractionDigits: 2})}`;

    // 3. คำนวณประกันสังคม (SSO)
    const sso = Math.min(750, salary * 0.05); // ปกติฐานสูงสุดคือ 15,000 หัก 750
    document.getElementById('mSSO').value = sso.toFixed(0);

    // 4. คำนวณยอดสุทธิ (Net Pay)
    const income = salary + comm + df + ot;
    const net = income - totalD - sso - tax;
    
    // แสดงผลยอดรับสุทธิ
    document.getElementById('mNet').innerText = `฿${net.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
};

window.saveAndPrintPayrollById = async function(staffId, period) {
    if (!window.supabaseClient) {
        return Swal.fire('Error', 'ยังไม่พบการเชื่อมต่อ Supabase', 'error');
    }

    const { data: staff, error: staffErr } = await window.supabaseClient
        .from('staff_profiles')
        .select('*')
        .eq('staff_code', staffId)
        .single();

    if (staffErr || !staff) {
        console.error('saveAndPrintPayrollById staff error:', staffErr);
        return Swal.fire('Error', 'ไม่พบข้อมูลพนักงาน', 'error');
    }

    const payload = {
        staff_code: staffId,
        period: period,
        salary: parseFloat(document.getElementById('mSalary')?.value || 0),
        comm: parseFloat(document.getElementById('mComm')?.value || 0),
        df: parseFloat(document.getElementById('mDF')?.value || 0),
        ot: parseFloat(document.getElementById('mOT')?.value || 0),
        tax: parseFloat(document.getElementById('mTax')?.value || 0),
        abs_days: parseFloat(document.getElementById('mAbsDays')?.value || 0),
        abs_hours: parseFloat(document.getElementById('mAbsHours')?.value || 0),
        late_mins: parseFloat(document.getElementById('mLateMin')?.value || 0),
        sick_days: 0,
        net_pay: document.getElementById('mNet')?.innerText || '฿0.00',
        updated_at: new Date().toISOString()
    };

    const { error } = await window.supabaseClient
        .from('payroll_history')
        .upsert(payload, {
            onConflict: 'staff_code,period'
        });

    if (error) {
        console.error('saveAndPrintPayrollById upsert error:', error);
        return Swal.fire({
            icon: 'error',
            title: 'บันทึกไม่สำเร็จ',
            text: error.message || 'เกิดข้อผิดพลาดในการบันทึก Payroll'
        });
    }

    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ',
        text: `ข้อมูลเงินเดือนงวด ${period} ถูกบันทึกแล้ว`,
        showConfirmButton: false,
        timer: 1500
    }).then(() => {
        if (window.printSlip) window.printSlip(payload, staff);
        document.getElementById('payrollModal')?.remove();
        if (typeof window.renderPayrollSystem === 'function') {
            window.renderPayrollSystem();
        }
    });
};

    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};

    if (!window.attViewMode) window.attViewMode = 'monthly';
    const selMonth = window.selectedAttMonth || String(new Date().getMonth() + 1).padStart(2, '0');
    const selYearThai = window.selectedAttYear || "2569";

    // ✅ ดึงข้อมูล payroll_history จาก Supabase
    const { data: payrollHistory, error: payrollError } = await window.supabaseClient
        .from('payroll_history')
        .select('*');

    if (payrollError) {
        console.error('renderAttendanceRecord payroll_history error:', payrollError);
        target.innerHTML = `<div class="py-20 text-center text-red-400 font-bold">โหลดประวัติ Attendance ไม่สำเร็จ</div>`;
        return;
    }

    // ✅ ดึงข้อมูล staff_profiles จาก Supabase
    let staffQuery = window.supabaseClient
        .from('staff_profiles')
        .select('*');

    const viewingBranchRaw = currentUser.branch || 'ทุกสาขา';
    const viewingBranch = String(viewingBranchRaw).replace('สาขา', '').trim();

    if (!(typeof window.canViewAllBranches === 'function' && window.canViewAllBranches()) && viewingBranch !== 'ทุกสาขา') {
        staffQuery = staffQuery.eq('branch', window.normalizeBranch ? window.normalizeBranch(viewingBranch) : viewingBranch);
    }

    const { data: staffProfiles, error: staffError } = await staffQuery;

    if (staffError) {
        console.error('renderAttendanceRecord staff_profiles error:', staffError);
        target.innerHTML = `<div class="py-20 text-center text-red-400 font-bold">โหลดข้อมูลพนักงานไม่สำเร็จ</div>`;
        return;
    }

    const staffMap = {};
    (staffProfiles || []).forEach(s => {
        const code = String(s.staff_code || s.staffId || '');
        if (code) staffMap[code] = s;
    });

    let displayData = [];
    let titleText = "";

    if (window.attViewMode === 'monthly') {
        const periodKey = `${parseInt(selMonth)}/${selYearThai}`;
        titleText = `สรุปสถิติงวดเดือน ${monthNames[parseInt(selMonth) - 1]} ${selYearThai}`;

        displayData = (payrollHistory || [])
            .filter(p => p.period === periodKey)
            .filter(record => {
                const staffCode = String(record.staff_code || record.staffId || '');
                if (typeof window.canViewAllBranches === 'function' && window.canViewAllBranches()) return true;

                const staffInfo = staffMap[staffCode];
                if (!staffInfo) return false;

                const staffBranch = String(staffInfo.branch || '').replace('สาขา', '').trim();
                return viewingBranch === 'ทุกสาขา' || staffBranch === viewingBranch;
            })
            .map(record => {
                const staffCode = String(record.staff_code || record.staffId || '');
                const staffInfo = staffMap[staffCode];

                return {
                    ...record,
                    displayName: staffInfo ? (staffInfo.full_name || staffInfo.name || 'ไม่ระบุชื่อ') : (record.name || 'ไม่ระบุชื่อ'),
                    lateMins: parseFloat(record.late_mins || record.lateMins || record.lateCount || 0),
                    absDays: parseFloat(record.abs_days || record.absDays || 0),
                    sickDays: parseFloat(record.sick_days || record.sickDays || 0),
                    netAmount: parseFloat(
                        String(record.net_pay || record.netPay || record.netAmount || 0).replace(/[^\d.-]/g, '')
                    ) || 0
                };
            });

    } else {
        titleText = `สรุปสถิติรวมทั้งปี พ.ศ. ${selYearThai}`;
        const yearlyMap = {};

        (payrollHistory || []).forEach(record => {
            if (!record.period || !String(record.period).endsWith(selYearThai)) return;

            const staffCode = String(record.staff_code || record.staffId || '');
            const staffInfo = staffMap[staffCode];

            if (!(typeof window.canViewAllBranches === 'function' && window.canViewAllBranches())) {
                if (!staffInfo) return;
                const staffBranch = String(staffInfo.branch || '').replace('สาขา', '').trim();
                if (!(viewingBranch === 'ทุกสาขา' || staffBranch === viewingBranch)) return;
            }

            if (!yearlyMap[staffCode]) {
                yearlyMap[staffCode] = {
                    staffCode: staffCode,
                    displayName: staffInfo ? (staffInfo.full_name || staffInfo.name || 'ไม่ระบุชื่อ') : (record.name || 'ไม่ระบุชื่อ'),
                    lateMins: 0,
                    absDays: 0,
                    sickDays: 0,
                    netAmount: 0,
                    monthsCount: 0
                };
            }

            yearlyMap[staffCode].lateMins += parseFloat(record.late_mins || record.lateMins || record.lateCount || 0);
            yearlyMap[staffCode].absDays += parseFloat(record.abs_days || record.absDays || 0);
            yearlyMap[staffCode].sickDays += parseFloat(record.sick_days || record.sickDays || 0);
            yearlyMap[staffCode].netAmount += parseFloat(
                String(record.net_pay || record.netPay || record.netAmount || 0).replace(/[^\d.-]/g, '')
            ) || 0;
            yearlyMap[staffCode].monthsCount += 1;
        });

        displayData = Object.values(yearlyMap);

    target.innerHTML = `

                    <p class="text-[10px] text-[#D48197] font-black uppercase mt-2 italic tracking-widest text-left">${titleText}</p>
                </div>
                
                <div class="flex flex-wrap items-center gap-3 bg-slate-50 p-3 rounded-3xl border border-pink-50">
                    <div class="flex bg-white rounded-xl p-1 shadow-sm border border-pink-100 mr-2">
                        <button onclick="window.attViewMode='monthly'; window.renderAttendanceRecord()" class="px-4 py-1.5 text-[10px] font-black rounded-lg transition-all ${window.attViewMode === 'monthly' ? 'bg-[#D48197] text-white' : 'text-slate-400'}">รายเดือน</button>
                        <button onclick="window.attViewMode='yearly'; window.renderAttendanceRecord()" class="px-4 py-1.5 text-[10px] font-black rounded-lg transition-all ${window.attViewMode === 'yearly' ? 'bg-[#D48197] text-white' : 'text-slate-400'}">รายปี</button>
                    </div>

                    ${window.attViewMode === 'monthly' ? `
                        <select onchange="window.selectedAttMonth = this.value; window.renderAttendanceRecord()" class="bg-white border border-pink-200 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                            ${monthNames.map((m, i) => `<option value="${String(i + 1).padStart(2, '0')}" ${selMonth == String(i + 1).padStart(2, '0') ? 'selected' : ''}>${m}</option>`).join('')}
                        </select>

                    <select onchange="window.selectedAttYear = this.value; window.renderAttendanceRecord()" class="bg-white border border-pink-200 rounded-xl px-4 py-2 text-xs font-bold outline-none cursor-pointer">
                        <option value="2568" ${selYearThai == '2568' ? 'selected' : ''}>2568</option>

window.changeMonth = async function(offset) {
    if (!window.currentViewDate) {
        window.currentViewDate = new Date();
    }
    window.currentViewDate.setMonth(window.currentViewDate.getMonth() + offset);
    await window.updateHolidayDisplay();
};

window.drawCalendar = async function(holidays = []) {
    const grid = document.getElementById('calendarGrid');
    const label = document.getElementById('monthYearLabel');
    if (!grid || !label) return;

    if (!window.currentViewDate) {
        window.currentViewDate = new Date();
    }

    const year = window.currentViewDate.getFullYear();
    const month = window.currentViewDate.getMonth();
    const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
    
    label.innerText = `${monthNames[month]} ${year + 543}`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    const daysHeader = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัส', 'ศุกร์', 'เสาร์'];
    grid.innerHTML = daysHeader.map(d => `
        <div class="text-[12px] font-black text-white bg-[#D48197] py-4 rounded-2xl mb-2 shadow-sm uppercase italic flex items-center justify-center text-center">
            ${d}
        </div>
    `).join('');

    for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
        const checkDate = new Date(year, month, d);
        checkDate.setHours(0, 0, 0, 0);
        
        const isHoliday = holidays.find(h => {
            const start = new Date(h.start_date);
            const end = new Date(h.end_date);
            start.setHours(0, 0, 0, 0);
            end.setHours(0, 0, 0, 0);
            return checkDate >= start && checkDate <= end;
        });

        const today = new Date();
        const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();

        grid.innerHTML += `
            <div class="relative h-24 border-2 border-slate-50 rounded-[2rem] flex flex-col items-center justify-center transition-all shadow-sm
                ${isHoliday ? 'bg-pink-100 border-pink-300' : 'bg-white hover:border-pink-200'}">
                <span class="text-sm font-black ${isToday ? 'bg-[#D48197] text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg' : 'text-slate-600'}">${d}</span>
                ${isHoliday ? `<span class="text-[9px] text-[#D48197] font-black mt-2 px-1 truncate w-full text-center uppercase italic">${isHoliday.title}</span>` : ''}
            </div>
        `;
    }
};

window.updateHolidayDisplay = async function() {
    const listArea = document.getElementById('holidayList');
    if (!listArea) return;

    if (!window.supabaseClient) {
        listArea.innerHTML = `<div class="py-20 text-center text-red-400 italic">ยังไม่พบการเชื่อมต่อ Supabase</div>`;
        return;
    }

    const { data, error } = await window.supabaseClient
        .from('clinic_holidays')
        .select('*')
        .order('start_date', { ascending: true });

    if (error) {
        console.error('updateHolidayDisplay error:', error);
        listArea.innerHTML = `<div class="py-20 text-center text-red-400 italic">โหลดวันหยุดไม่สำเร็จ</div>`;
        return;
    }

    const holidays = (data || []).filter(h => h && h.start_date && h.end_date);

    listArea.innerHTML = holidays.length === 0 
        ? `<div class="py-20 text-center text-slate-300 italic">ไม่มีบันทึกวันหยุด</div>`
        : holidays.map(h => `
            <div class="group p-4 bg-white border-l-8 border-[#D48197] rounded-r-3xl mb-3 flex justify-between items-center shadow-sm hover:shadow-md transition-all border border-pink-50">
                <div class="text-left font-normal">
                    <p class="text-[10px] text-[#D48197] font-black uppercase">
                        ${String(h.start_date).split('-').reverse().join('/')} - ${String(h.end_date).split('-').reverse().join('/')}
                    </p>
                    <p class="text-sm font-bold text-slate-800">${h.title}</p>
                </div>
                <button onclick="window.deleteHoliday('${h.id}')" class="text-slate-300 hover:text-red-500 font-bold p-2 transition-colors">✕</button>
            </div>
        `).join('');

    await window.drawCalendar(holidays);
};

        confirmButtonColor: '#D48197',
        showCancelButton: true,
        cancelButtonText: 'ยกเลิก',
        preConfirm: () => {
            const title = document.getElementById('hTitle')?.value?.trim();
            const start = document.getElementById('hStart')?.value;
            const end = document.getElementById('hEnd')?.value;

            if (!title || !start || !end) {
                Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบถ้วนค่ะ');
                return false;
            }

                Swal.showValidationMessage('วันที่เริ่มต้องไม่มากกว่าวันสิ้นสุด');
                return false;
            }

            return { title, start, end };

        if (!window.supabaseClient) {
            return Swal.fire('Error', 'ยังไม่พบการเชื่อมต่อ Supabase', 'error');

            .from('clinic_holidays')
            .insert([{
                title: result.value.title,
                start_date: result.value.start,
                end_date: result.value.end
            }]);

        if (error) {
            console.error('openAddHolidayModal insert error:', error);
            return Swal.fire({
                icon: 'error',
                title: 'บันทึกไม่สำเร็จ',
                text: error.message || 'ไม่สามารถบันทึกวันหยุดได้'
            });
        }

        await window.updateHolidayDisplay();

        Swal.fire({
            icon: 'success',
            title: 'บันทึกสำเร็จ!',
            showConfirmButton: false,
            timer: 1500
        });
    });
};

window.refreshGlobalBoard = function(period, btn) {
    window.currentGlobalPeriod = period;
    if(btn) {
        document.querySelectorAll('.gp-btn').forEach(b => {
            b.classList.remove('active', 'bg-[#D48197]', 'text-white');
            b.classList.add('text-slate-400');
        });
        btn.classList.add('active', 'bg-[#D48197]', 'text-white');
        btn.classList.remove('text-slate-400');
    }

    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const selM = document.getElementById('globalMonth')?.value;
    const selY = document.getElementById('globalYear')?.value;
    const today = new Date().toISOString().split('T')[0];

    const branches = ['บางพลี', 'ชลบุรี', 'อุดมสุข'];

    branches.forEach(br => {
        let branchData = accountDB.filter(item => item.branch === br || item.branch === `สาขา${br}`);
        
        // 🎯 กรองตามเดือนและปีที่เลือกจากเมนู
        branchData = branchData.filter(i => {
            if (!i.date) return false;
            return i.date.startsWith(`${selY}-${selM}`);
        });

        // ถ้าเลือก "รายวัน" ให้กรองเฉพาะวันนี้ (ของเดือนที่เลือก)
        if (period === 'day') branchData = branchData.filter(i => i.date === today);

        const income = branchData.filter(i => i.type === "รายรับ" && i.status === "เสร็จสิ้น")
                        .reduce((sum, i) => sum + (parseFloat(String(i.total).replace(/[^0-9.-]+/g,"")) || 0), 0);
        const expense = branchData.filter(i => i.type === "รายจ่าย")
                        .reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
        const net = income - expense;

        document.getElementById(`totalIn_${br}`).innerText = `฿${income.toLocaleString()}`;
        document.getElementById(`totalEx_${br}`).innerText = `฿${expense.toLocaleString()}`;
        document.getElementById(`net_${br}`).innerText = `฿${net.toLocaleString()}`;
        
        const calcInput = document.getElementById(`calcIn_${br}`);
        if (calcInput) { calcInput.value = net; window.calcShare(br); }
    });
};

window.calcShare = function(br) {
    const amount = parseFloat(document.getElementById(`calcIn_${br}`).value) || 0;
    let s1 = 0, s2 = 0, s3 = 0;
    if (br === 'บางพลี') { s1 = amount * 0.30; s2 = amount * 0.30; s3 = amount * 0.40; } 
    else if (br === 'ชลบุรี') { s1 = amount * 0.35; s2 = amount * 0.35; s3 = amount * 0.30; }

    if (document.getElementById(`share_สร้อย_${br}`)) {
        document.getElementById(`share_สร้อย_${br}`).innerText = `฿${s1.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById(`share_เบส_${br}`).innerText = `฿${s2.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById(`share_แก้ว_${br}`).innerText = `฿${s3.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }
};

window.saveRolePermissions = async function() {
    if (!window.supabaseClient) {
        return Swal.fire({
            icon: 'error',
            title: 'ระบบยังไม่พร้อม',
            text: 'ยังไม่พบการเชื่อมต่อ Supabase',
            confirmButtonColor: '#D48197'
        });
    }

    const roles = ['แอดมินหลัก', 'CEO', 'ผู้จัดการ', 'พนักงานทรีทเม้นท์', 'หมอ'];
    const rows = [];

    roles.forEach(role => {
        document.querySelectorAll(`.role-checkbox[data-role="${role}"]`).forEach(cb => {
            rows.push({
                role: role,
                menu_id: String(cb.dataset.menuid || ''),
                allowed: !!cb.checked
            });
        });
    });

    try {
        Swal.fire({
            title: 'กำลังบันทึกสิทธิ์',
            text: 'กรุณารอสักครู่นะคะ...',
            allowOutsideClick: false,
            showConfirmButton: false,
            didOpen: () => Swal.showLoading()
        });

        const { error } = await window.supabaseClient
            .from('role_menu_permissions')
            .upsert(rows, {
                onConflict: 'role,menu_id'
            });

        Swal.close();

        if (error) {
            console.error('saveRolePermissions error:', error);
            return Swal.fire({
                icon: 'error',
                title: 'บันทึกไม่สำเร็จ',
                text: error.message || 'ไม่สามารถบันทึกสิทธิ์ได้',
                confirmButtonColor: '#D48197'
            });
        }

        await window.loadPermissionsFromSupabase();

        Swal.fire({
            icon: 'success',
            title: 'บันทึกสิทธิ์เรียบร้อย!',
            timer: 1500,
            showConfirmButton: false
        });

        if (window.currentUser && typeof window.renderMenuByRole === 'function') {
            window.renderMenuByRole(window.currentUser.role || '');
        }

    } catch (e) {
        Swal.close();
        console.error('saveRolePermissions exception:', e);
        Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: e?.message || 'ไม่สามารถบันทึกสิทธิ์ได้',
            confirmButtonColor: '#D48197'
        });
    }
};

window.fixMobileTables = function(root = document) {
    if (window.innerWidth > 768) return;

    const tables = root.querySelectorAll('#dynamicContent table');

    tables.forEach(table => {
        const parent = table.parentElement;
        if (parent && parent.classList.contains('mobile-table-wrap')) return;

        table.classList.remove('w-full');
        table.classList.add('mobile-table');

        const wrap = document.createElement('div');
        wrap.className = 'mobile-table-wrap';

        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
};

let aceSidebarAutoCloseTimer = null;

function resetSidebarAutoCloseTimer() {
    clearTimeout(aceSidebarAutoCloseTimer);

    if (window.innerWidth > 768) return;
    if (!document.body.classList.contains('sidebar-open')) return;

    aceSidebarAutoCloseTimer = setTimeout(() => {
        document.body.classList.remove('sidebar-open');
        const arrow = document.getElementById('ace-arrow-icon');
        if (arrow) arrow.innerText = '❮';
    }, 4000);
}

function aceToggleSidebar() {
    const body = document.body;
    const arrow = document.getElementById('ace-arrow-icon');

    // มือถือ
    if (window.innerWidth <= 768) {
        const isOpen = body.classList.toggle('sidebar-open');
        body.classList.remove('sidebar-collapsed');

        if (arrow) {
            arrow.innerText = isOpen ? '❯' : '❮';
        }

        if (isOpen) {
            resetSidebarAutoCloseTimer();
        } else {
            clearTimeout(aceSidebarAutoCloseTimer);
        }
        return;
    }

    // เดสก์ท็อป
    const isCollapsed = body.classList.toggle('sidebar-collapsed');
    body.classList.remove('sidebar-open');

    if (arrow) {
        arrow.innerText = isCollapsed ? '❯' : '❮';
    }

    if (window.lucide) {
        window.lucide.createIcons();
    }
}
window.aceToggleSidebar = aceToggleSidebar;

function manageBtnVisibility() {
    const loginPage = document.getElementById('loginPage');
    const btn = document.getElementById('ace-toggle-btn');
    if (!btn) return;

    // เช็คว่าหน้า Login แสดงอยู่หรือไม่
    const loginVisible =
        loginPage &&
        !loginPage.classList.contains('hidden') &&
        loginPage.style.display !== 'none';

    if (loginVisible) {
        btn.style.display = 'none'; // ถ้าอยู่หน้า Login ให้ซ่อนปุ่ม
        document.body.classList.remove('sidebar-open');
    } else {
        // 🎯 แก้บรรทัดนี้: ให้แสดงปุ่ม 'flex' ตลอดเวลาหลังจาก Login แล้ว (ไม่ว่าจะจอคอมหรือมือถือ)
        btn.style.display = 'flex'; 
    }
}

window.processNewRegistration = async function() {
    const name = document.getElementById('regName')?.value.trim() || '';
    const user = document.getElementById('regUser')?.value.trim() || '';   // email
    const pass = document.getElementById('regPass')?.value.trim() || '';   // phone
    const role = document.getElementById('regRole')?.value || '';
    const branch = window.normalizeBranch(document.getElementById('regBranch')?.value || '');

    if (!name || !user || !pass) {
        return Swal.fire({
            icon: 'warning',
            title: 'ข้อมูลไม่ครบ',
            text: 'กรุณาเลือกชื่อพนักงาน และตรวจสอบอีเมลกับเบอร์โทรให้ครบถ้วนนะคะ',
            confirmButtonColor: '#D48197'
        });
    }

    if (!window.supabaseClient) {
        return Swal.fire({
            icon: 'error',
            title: 'ระบบยังไม่พร้อม',
            text: 'ยังไม่ได้เชื่อมต่อ Supabase',
            confirmButtonColor: '#D48197'
        });
    }

    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];

    const idx = staffDB.findIndex(s => String(s.name || '').trim() === name);

    if (idx === -1) {
        return Swal.fire({
            icon: 'error',
            title: 'ไม่พบพนักงาน',
            text: 'กรุณาเพิ่มพนักงานจากหน้า "เพิ่มพนักงานใหม่" ก่อนค่ะ',
            confirmButtonColor: '#D48197'
        });
    }

    if (staffDB[idx].hasLoginAccess || staffDB[idx].authUserId) {
        return Swal.fire({
            icon: 'warning',
            title: 'มีสิทธิ์แล้ว',
            text: 'พนักงานคนนี้มีสิทธิ์เข้าใช้งานแล้วค่ะ',
            confirmButtonColor: '#D48197'
        });
    }

    const email = user.toLowerCase();

    const confirmResult = await Swal.fire({
        icon: 'question',
        title: 'ยืนยันสมัครสิทธิ์ใช้งาน',
        html: `
            <div class="text-left text-sm leading-7">
                <div><b>ชื่อพนักงาน:</b> ${name}</div>
                <div><b>ชื่อผู้ใช้:</b> ${email}</div>
                <div><b>รหัสผ่าน:</b> ${pass}</div>
                <div><b>สิทธิ์:</b> ${role || '-'}</div>
                <div><b>สาขา:</b> ${branch || '-'}</div>
            </div>
        `,
        showCancelButton: true,
        confirmButtonText: 'ยืนยันสมัคร',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#D48197'
    });

    if (!confirmResult.isConfirmed) return;

    let authUserId = null;

    try {
        Swal.fire({
            title: 'กำลังสร้างสิทธิ์เข้าใช้งาน',
            text: 'กรุณารอสักครู่นะคะ...',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        // ใช้ client แยก เพื่อไม่ให้ session คนที่กำลังใช้งานอยู่หลุด
        const tempAuthClient = supabase.createClient(
            SUPABASE_URL,
            SUPABASE_KEY,
            {
                auth: {
                    persistSession: false,
                    autoRefreshToken: false,
                    detectSessionInUrl: false
                }
            }
        );

        // 1) สร้าง user ใน Supabase Auth
        const { data: signUpData, error: signUpError } = await tempAuthClient.auth.signUp({
            email: email,
            password: pass,
            options: {
                data: {
                    full_name: name,
                    role: role,
                    branch: branch,
                    staff_code: staffDB[idx]?.staffId || ''
                }
            }
        });

        if (signUpError) {
            Swal.close();
            return Swal.fire({
                icon: 'error',
                title: 'สมัครไม่สำเร็จ',
                text: signUpError.message || 'ไม่สามารถสร้างบัญชีเข้าสู่ระบบได้',
                confirmButtonColor: '#D48197'
            });
        }

        authUserId = signUpData?.user?.id || null;

        if (!authUserId) {
            Swal.close();
            return Swal.fire({
                icon: 'error',
                title: 'สมัครไม่สำเร็จ',
                text: 'ระบบไม่ได้รับรหัสผู้ใช้งานจาก Supabase',
                confirmButtonColor: '#D48197'
            });
        }

        // 2) อัปเดต staffDB เดิม
        staffDB[idx] = {
            ...staffDB[idx],
            email: email,
            username: email,
            phone: pass,
            password: pass,
            role: role || staffDB[idx].role || '',
            branch: branch || staffDB[idx].branch || '',
            homeBranch: branch || staffDB[idx].homeBranch || '',
            hasLoginAccess: true,
            isLocked: false,
            authUserId: authUserId,
            updatedAt: new Date().toISOString()
        };

        localStorage.setItem('staffDB', JSON.stringify(staffDB));

        // 3) upsert staff_profiles
        const profilePayload = {
            auth_user_id: authUserId,
            staff_code: staffDB[idx]?.staffId || '',
            full_name: staffDB[idx]?.name || name,
            phone: pass,
            email: email,
            role: role || staffDB[idx]?.role || '',
            branch: branch || staffDB[idx]?.branch || '',
            employment_status: staffDB[idx]?.status || 'ทำงาน',
            is_active: staffDB[idx]?.status !== 'ออก'
        };

        // ลอง update ด้วย auth_user_id ก่อน
        let profileSaved = false;

        const { error: insertProfileError } = await window.supabaseClient
            .from('staff_profiles')
            .insert([profilePayload]);

        if (!insertProfileError) {
            profileSaved = true;
        } else {
            // ถ้า insert ไม่ได้ ลอง update จาก staff_code
            const { error: updateProfileError } = await window.supabaseClient
                .from('staff_profiles')
                .update({
                    auth_user_id: authUserId,
                    full_name: profilePayload.full_name,
                    phone: profilePayload.phone,
                    email: profilePayload.email,
                    role: profilePayload.role,
                    branch: profilePayload.branch,
                    employment_status: profilePayload.employment_status,
                    is_active: profilePayload.is_active
                })
                .eq('staff_code', profilePayload.staff_code);

            if (!updateProfileError) {
                profileSaved = true;
            } else {
                console.error('staff_profiles insert error:', insertProfileError);
                console.error('staff_profiles update error:', updateProfileError);
            }
        }

        Swal.close();

        if (!profileSaved) {
            return Swal.fire({
                icon: 'warning',
                title: 'สร้างบัญชีสำเร็จ แต่บันทึกโปรไฟล์ไม่ครบ',
                text: 'บัญชีล็อกอินถูกสร้างแล้ว แต่ staff_profiles ยังไม่สมบูรณ์ กรุณาตรวจสอบอีกครั้ง',
                confirmButtonColor: '#D48197'
            });
        }

        await Swal.fire({
            icon: 'success',
            title: 'สมัครสิทธิ์สำเร็จ!',
            html: `
                <div class="text-left text-sm leading-7">
                    <div><b>ชื่อ:</b> ${name}</div>
                    <div><b>Username:</b> ${email}</div>
                    <div><b>Password:</b> ${pass}</div>
                    <div><b>สิทธิ์:</b> ${role || '-'}</div>
                    <div><b>สาขา:</b> ${branch || '-'}</div>
                </div>
            `,
            confirmButtonColor: '#D48197'
        });

        if (document.getElementById('regName')) document.getElementById('regName').value = '';
        if (document.getElementById('regUser')) document.getElementById('regUser').value = '';
        if (document.getElementById('regPass')) document.getElementById('regPass').value = '';

        if (typeof window.switchSettingsTab === 'function') {
            const activeBtn = document.querySelector('.settings-nav-btn.active');
            if (activeBtn) {
                window.switchSettingsTab('users', activeBtn);
            }
        }

    } catch (e) {
        Swal.close();
        console.error('processNewRegistration exception:', e);
        return Swal.fire({
            icon: 'error',
            title: 'เกิดข้อผิดพลาด',
            text: e?.message || 'ไม่สามารถสมัครสิทธิ์พนักงานได้',
            confirmButtonColor: '#D48197'
        });
    }
};

window.deleteMasterCourse = function(courseId) {
    let masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];

    const realIdx = masterDB.findIndex(c => String(c.id) === String(courseId));
    if (realIdx === -1) {
        Swal.fire('Error', 'ไม่พบรหัสคอร์สนี้ในระบบ', 'error');
        return;
    }

    const course = masterDB[realIdx];

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const role = String(user.role || '').trim();
    const isAdminAll = ['แอดมินหลัก', 'CEO'].includes(role);

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(course.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire({
            icon: 'warning',
            title: 'ไม่มีสิทธิ์ลบ',
            text: 'คุณไม่สามารถลบคอร์สของสาขาอื่นได้',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    Swal.fire({
        title: '<span class="text-slate-800 font-black italic uppercase">🗑️ ยืนยันการลบข้อมูล?</span>',
        html: `คุณกำลังจะลบรายการ <b class="text-rose-500">"${course.name}"</b><br>ออกจากระบบถาวร ไม่สามารถย้อนคืนได้ค่ะ`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#94a3b8',
        confirmButtonText: 'ใช่, ลบเลย!',
        cancelButtonText: 'ยกเลิก',
        customClass: {
            popup: 'rounded-[2.5rem]',
            confirmButton: 'rounded-2xl px-6 py-3 font-bold uppercase italic',
            cancelButton: 'rounded-2xl px-6 py-3 font-bold uppercase italic'
        }
    }).then((result) => {
        if (result.isConfirmed) {
            masterDB.splice(realIdx, 1);
            localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));

            Swal.fire({
                icon: 'success',
                title: 'ลบสำเร็จ!',
                text: 'รายการคอร์สถูกตัดออกจากฐานข้อมูลแล้วค่ะ',
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-[2.5rem]' }
            });

            if (typeof updateCourseMasterTable === "function") {
                updateCourseMasterTable();
            }
        }
    });
};

// 1. ฟังก์ชันระงับการใช้งานพนักงาน (Toggle Lock)
window.suspendStaff = function(idx) {
    let staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staff = staffDB[idx];
    if (!staff) return;

    const isLocked = staff.isLocked || false;
    const actionText = isLocked ? "เปิดสิทธิ์ใช้งาน" : "ระงับการใช้งาน";

    Swal.fire({
        title: `ยืนยัน${actionText}?`,
        text: `คุณต้องการ${actionText} คุณ ${staff.name} ใช่หรือไม่`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: isLocked ? '#2ecc71' : '#d33',
        confirmButtonText: 'ใช่, ดำเนินการ',
        cancelButtonText: 'ยกเลิก',
        customClass: { popup: 'rounded-[2rem]' }
    }).then((result) => {
        if (result.isConfirmed) {
            staffDB[idx].isLocked = !isLocked;
            localStorage.setItem('staffDB', JSON.stringify(staffDB));
            
            Swal.fire({
                icon: 'success',
                title: 'สำเร็จ!',
                text: `${actionText}เรียบร้อยแล้วค่ะ`,
                timer: 1500,
                showConfirmButton: false

// 🌍 ฟังก์ชันโหลดข้อมูลรวมทุกสาขา (ฉบับสมบูรณ์)
window.refreshGlobalBoard = function(period, btn) {
    window.currentGlobalPeriod = period;
    if(btn) {
        document.querySelectorAll('.gp-btn').forEach(b => {
            b.classList.remove('active', 'bg-[#D48197]', 'text-white', 'shadow-md');
            b.classList.add('text-slate-400');
        });
        btn.classList.add('active', 'bg-[#D48197]', 'text-white', 'shadow-md');
        btn.classList.remove('text-slate-400');
    }

    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const selM = document.getElementById('globalMonth')?.value;
    const selY = document.getElementById('globalYear')?.value;
    const today = new Date().toISOString().split('T')[0];

    ['บางพลี', 'ชลบุรี', 'อุดมสุข'].forEach(br => {
        let branchData = accountDB.filter(item => item.branch === br || item.branch === `สาขา${br}`);
        
        // กรองตามเดือน/ปี ที่เลือก
        branchData = branchData.filter(i => i.date && i.date.startsWith(`${selY}-${selM}`));

        // ถ้าเลือกรายวัน ให้เจาะจงเฉพาะวันนี้ของเดือนนั้น
        if (period === 'day') branchData = branchData.filter(i => i.date === today);

        const income = branchData.filter(i => i.type === "รายรับ" && i.status === "เสร็จสิ้น")
                        .reduce((sum, i) => sum + (parseFloat(String(i.total).replace(/[^0-9.-]+/g,"")) || 0), 0);
        const expense = branchData.filter(i => i.type === "รายจ่าย")
                        .reduce((sum, i) => sum + (parseFloat(i.amount) || 0), 0);
        const net = income - expense;

        if(document.getElementById(`totalIn_${br}`)) document.getElementById(`totalIn_${br}`).innerText = `฿${income.toLocaleString()}`;
        if(document.getElementById(`totalEx_${br}`)) document.getElementById(`totalEx_${br}`).innerText = `฿${expense.toLocaleString()}`;
        if(document.getElementById(`net_${br}`)) document.getElementById(`net_${br}`).innerText = `฿${net.toLocaleString()}`;
        
        const calcInput = document.getElementById(`calcIn_${br}`);
        if (calcInput) { calcInput.value = net; window.calcShare(br); }
    });
};

// ⚖️ ฟังก์ชันหารกำไร CEO
window.calcShare = function(br) {
    const amount = parseFloat(document.getElementById(`calcIn_${br}`).value) || 0;
    let s1=0, s2=0, s3=0;
    if (br === 'บางพลี') { s1 = amount * 0.30; s2 = amount * 0.30; s3 = amount * 0.40; } 
    else if (br === 'ชลบุรี') { s1 = amount * 0.35; s2 = amount * 0.35; s3 = amount * 0.30; }

    if (document.getElementById(`share_สร้อย_${br}`)) {
        document.getElementById(`share_สร้อย_${br}`).innerText = `฿${s1.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById(`share_เบส_${br}`).innerText = `฿${s2.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById(`share_แก้ว_${br}`).innerText = `฿${s3.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
    }
};

window.fixMobileTables = function(root = document) {
    if (window.innerWidth > 768) return;

    const tables = root.querySelectorAll('#dynamicContent table');

    tables.forEach(table => {
        const parent = table.parentElement;
        if (parent && parent.classList.contains('mobile-table-wrap')) return;

        table.classList.remove('w-full');
        table.classList.add('mobile-table');

        const wrap = document.createElement('div');
        wrap.className = 'mobile-table-wrap';

        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);
    });
};

window.updateNotificationBadges = function() {
    const appointments = typeof window.getAppointments === 'function'
        ? window.getAppointments()
        : [];

    const customers = typeof window.getCustomers === 'function'
        ? window.getCustomers()
        : [];

    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    const todayThaiDayMonth = today.toLocaleDateString('th-TH', {
        day: 'numeric',
        month: 'numeric'
    });

    const todayApps = appointments.filter(a => a.date === todayStr && a.status !== 'ยกเลิก');
    const notiEl = document.getElementById('notiCount');
    if (notiEl) {
        notiEl.innerText = todayApps.length;
        notiEl.classList.toggle('hidden', todayApps.length === 0);
    }

    const bdayToday = customers.filter(c => {
        const raw = String(c.birthDate || c.birth_date || '').trim();
        if (!raw) return false;

        if (raw.includes('/')) {
            const parts = raw.split('/');
            if (parts.length < 2) return false;
            return `${parseInt(parts[0], 10)}/${parseInt(parts[1], 10)}` === todayThaiDayMonth;
        }

        if (raw.includes('-')) {
            const d = new Date(raw);
            if (isNaN(d.getTime())) return false;

            const dm = d.toLocaleDateString('th-TH', {
                day: 'numeric',
                month: 'numeric'
            });

            return dm === todayThaiDayMonth;
        }

        return false;
    });

    const birthEl = document.getElementById('birthCount');
    if (birthEl) {
        birthEl.innerText = bdayToday.length > 99 ? '99+' : bdayToday.length;
        birthEl.classList.toggle('hidden', bdayToday.length === 0);
    }
};

            last_name: payload.last_name || '',
            fullname: payload.fullname || `${payload.first_name || ''} ${payload.last_name || ''}`.trim(),

            birth_date: payload.birth_date || null,
            citizen_id: payload.citizen_id || '',
            address: payload.address || '',
            allergy: payload.allergy || 'ไม่มี',
            branch: payload.branch || 'สาขาบางพลี',
            status: payload.status || 'ปกติ',
            photo: payload.photo || '',
            avatar_url: payload.avatar_url || payload.photo || '',
            created_at: payload.created_at || new Date().toISOString(),
            updated_at: new Date().toISOString()
        };

        const { data, error } = await window.supabaseClient
            .from('customers')
            .upsert([safePayload], { onConflict: 'id' })
            .select()
            .single();

        if (error) {
            console.error('saveCustomerToSupabase error:', error);
            Swal.fire('บันทึกไม่สำเร็จ', error.message || 'บันทึกลูกค้าไม่สำเร็จ', 'error');
            return null;
        }

        return data || null;
    } catch (e) {
        console.error('saveCustomerToSupabase exception:', e);
        Swal.fire('บันทึกไม่สำเร็จ', 'เกิดข้อผิดพลาดในการเชื่อมต่อ Supabase', 'error');
        return null;
    }
};
	function convertThaiDateToISO(dateStr) {
    if (!dateStr) return null;

    const raw = String(dateStr).trim();

    // ถ้าเป็น format อยู่แล้ว เช่น 1996-11-29
    if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) {
        return raw;
    }

    // รองรับ 29/11/2539 หรือ 29-11-2539
    const parts = raw.split(/[\/-]/);
    if (parts.length !== 3) return null;

    let [day, month, year] = parts.map(x => String(x).trim());

    if (!day || !month || !year) return null;

    let y = parseInt(year, 10);
    if (y > 2500) y -= 543; // พ.ศ. -> ค.ศ.

    return `${String(y).padStart(4, '0')}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
}
