window.searchCustomerForApp = function(val) {
    const resDiv = document.getElementById('appCustResults');
    if (!resDiv) return;

    if (!val || val.length < 1) {
        resDiv.classList.add('hidden');
        return;
    }

    const db = window.getCustomers() || [];
    const keyword = String(val || '').toLowerCase();

    const matches = db.filter(c => {
        return (c.fullname && String(c.fullname).toLowerCase().includes(keyword)) ||
               (c.id && String(c.id).toLowerCase().includes(keyword)) ||
               (c.hn && String(c.hn).toLowerCase().includes(keyword)) ||
               (c.phone && String(c.phone).includes(keyword));
    });

    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(c => `
            <div onclick="window.selectCustForApp(
                '${String(c.fullname || '').replace(/'/g, "\\'")}',
                '${String(c.id || '').replace(/'/g, "\\'")}',
                '${String(c.hn || '').replace(/'/g, "\\'")}'
            )"
                 class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-100 flex justify-between font-normal bg-white transition-colors">
                <div class="text-left">
                    <span class="text-sm font-bold text-slate-700">${c.fullname || '-'}</span>
                    <p class="text-[9px] text-[#D48197] font-bold uppercase italic">📍 สาขาต้นสังกัด: ${c.branch || 'ไม่ระบุ'}</p>
                </div>
                <span class="text-[10px] bg-slate-100 px-3 py-1 rounded-full uppercase font-bold h-max">${c.hn || c.id || '-'}</span>
            </div>
        `).join('');

        resDiv.classList.remove('hidden');
    } else {
        resDiv.innerHTML = '<div class="p-4 text-center text-xs text-slate-300 italic">ไม่พบรายชื่อในระบบ...</div>';
        resDiv.classList.remove('hidden');
    }
};

// ✅ 6. เลือกลูกค้าสำหรับนัดหมาย (ID BASED)
window.selectCustForApp = function(fullname, customerId, hn = '') {
    const input = document.getElementById('appCustSearch');
    const resDiv = document.getElementById('appCustResults');

    if (!input) return;

    input.value = fullname || '';
    input.dataset.customerId = customerId || '';
    input.dataset.hn = hn || '';

    if (resDiv) resDiv.classList.add('hidden');

    // เปลี่ยนลูกค้า = reset คอร์ส
    window.selectedCoursesForApp = [];
    window.renderSelectedCourses();
};

// ✅ 7. ค้นหาคอร์สของลูกค้าที่เลือก (ID BASED)
window.searchCourseForApp = function() {
    const resDiv = document.getElementById('appCourseResults');
    const customerId = document.getElementById('appCustSearch')?.dataset?.customerId || '';

    if (!resDiv) return;

    if (!customerId) {
        Swal.fire('เตือน', 'กรุณาเลือกลูกค้าก่อนค่ะ', 'warning');
        return;
    }

    const db = window.getCustomers() || [];
    const customer = db.find(c => String(c.id) === String(customerId));

    if (!customer) {
        resDiv.innerHTML = `<div class="p-4 text-center text-slate-300 text-xs font-normal">ไม่พบข้อมูลลูกค้า</div>`;
        resDiv.classList.remove('hidden');
        return;
    }

    const courseList = Array.isArray(customer.courses)
        ? customer.courses
        : (Array.isArray(customer.courseRemain) ? customer.courseRemain : []);

    if (courseList.length === 0) {
        resDiv.innerHTML = `<div class="p-4 text-center text-slate-300 text-xs font-normal">ไม่มีคอร์สสะสม</div>`;
        resDiv.classList.remove('hidden');
        return;
    }

    resDiv.innerHTML = courseList.map(c => {
        const courseName = c.name || c.courseName || '-';
        const remain = Number(c.remain ?? c.amount ?? 0);
        const total = Number(c.totalAmount ?? c.amount ?? remain ?? 1);
        const unit = c.unit || 'ครั้ง';

        return `
            <div onclick="window.selectCourseForApp('${String(courseName).replace(/'/g, "\\'")}')"
                 class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between font-normal">
                <span class="text-sm font-bold">${courseName}</span>
                <span class="text-[10px] text-pink-400 font-bold">
                    คงเหลือ ${remain} / ${total} ${unit}
                </span>
            </div>
        `;
    }).join('');

    resDiv.classList.remove('hidden');
};

   ======================================================= */

window.toggleAppActionMenu = function(event, appId) {
    event.stopPropagation();

    // ✅ ใช้ appId (UUID) เป็นชื่อ ID ของ Element เพื่อความแม่นยำ 100%
    const menuId = `app-action-menu-${appId}`;
    const targetMenu = document.getElementById(menuId);
    if (!targetMenu) return;

    const isHidden = targetMenu.classList.contains('hidden');

    // ปิดเมนูอื่นๆ ทั้งหมด
    document.querySelectorAll("[id^='app-action-menu-']").forEach(m => m.classList.add('hidden'));

    // รีเซ็ต z-index ทุกแถวเพื่อให้เมนูที่เปิดลอยอยู่ด้านบนสุด
    document.querySelectorAll('#appointmentTableBody tr').forEach(tr => {
        tr.style.zIndex = "1";
        tr.style.position = "relative";
    });

    if (isHidden) {
        targetMenu.classList.remove('hidden');
        const parentRow = targetMenu.closest('tr');
        if (parentRow) {
            // 🎯 ดันแถวที่มีเมนูเปิดอยู่ให้ลอยทับแถวอื่น
            parentRow.style.zIndex = "9999";
            parentRow.style.position = "relative";
        }
    }
};

// ✅ แก้ไข: ค้นหาข้อมูลนัดหมายด้วย ID (ID/UUID) แทนการใช้ลำดับเพียงอย่างเดียว
window.editAppointmentById = async function(appId) {
    // 1. พยายามดึงข้อมูลล่าสุดจาก Supabase ก่อนเพื่อให้ได้ข้อมูลที่อัปเดตที่สุด
    let db = [];
    try {
        const { data, error } = await window.supabaseClient
            .from('appointments')
            .select('*');
        db = error ? (JSON.parse(localStorage.getItem('appointmentDB')) || []) : data;
    } catch (e) {
        db = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    }

    // 🎯 2. ค้นหาตำแหน่งที่ถูกต้องจาก ID (Primary Key) หรือ createdAt (กรณีข้อมูลเก่า)
    const realIndex = db.findIndex(item => String(item.id || item.createdAt) === String(appId));
    
    if (realIndex === -1) {
        Swal.fire({
            icon: 'error',
            title: 'ไม่พบข้อมูลนัดหมาย',
            text: 'รหัสอ้างอิงไม่ถูกต้องหรือข้อมูลถูกลบไปแล้วค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // 3. เก็บ ID ที่กำลังแก้ไขไว้ใน Global State เพื่อใช้ตอนบันทึก (Update)
    window.editingAppId = appId; 
    
    // 4. ส่ง Index ใน Array ปัจจุบันไปให้ Modal วาดข้อมูล
    window.openAppointmentModal(realIndex);
};

/* =========================
   Appointment Page (ฉบับแก้ไขระบบ ID และล็อกสาขาสมบูรณ์)
========================= */
window.renderAppointmentPage = function() {
    const target = document.getElementById('dynamicContent');
    if (!target) return;

    // ✅ ใช้ Helper กลางดึงข้อมูล User และสาขา เพื่อความปลอดภัยระดับ ID
    const currentUser = window.getCurrentUserSafe(); 
    const viewingBranch = window.getCurrentViewingBranch();
    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(currentUser.role);

    // ✅ ดึงข้อมูลนัดหมายผ่านระบบกรองสาขา (ID-Based)
    const allAppointments = window.getAppointmentDBByBranch(); 

    // 🎯 ดึงค่าตัวกรองจาก UI
    const dateEl = document.getElementById('filterDate');
    const dateFilter = dateEl ? dateEl.value : ""; 
    
    const currentSearch = document.getElementById('appSearchInput')?.value || "";
    const statusFilter = document.getElementById('statusFilter')?.value || "ทั้งหมด";
    const appRowsPerPage = parseInt(document.getElementById('appPageSize')?.value) || 10;

    const formatDateTH = (dateStr) => {
        if (!dateStr) return "-";
        const [y, m, d] = dateStr.split("-");
        const yearTH = parseInt(y) < 2500 ? parseInt(y) + 543 : y;
        return `${d}/${m}/${yearTH}`;
    };

    // 🎯 3. กรองข้อมูลละเอียด: ล็อกสาขาและค้นหาผ่าน ID/ชื่อ
    let filteredData = allAppointments.filter(ap => {
        const apBranch = window.normalizeBranch(ap.branch);
        const matchBranch = (viewingBranch === 'ทุกสาขา' && isAdmin) || (apBranch === viewingBranch);
        
        // ✅ ค้นหาครอบคลุมทั้งชื่อคนไข้ และ customer_id (UUID)
        const matchSearch =
            String(ap.customerName || '').toLowerCase().includes(currentSearch.toLowerCase()) ||
            String(ap.customer_id || '').toLowerCase().includes(currentSearch.toLowerCase());

        const matchStatus = statusFilter === "ทั้งหมด" || ap.status === statusFilter;
        const matchDate = !dateFilter || ap.date === dateFilter;

        return matchBranch && matchSearch && matchStatus && matchDate;
    });

    // 🎯 4. จัดเรียงลำดับความสำคัญของสถานะ
    filteredData.sort((a, b) => {
        const priority = { "รอดำเนินการ": 0, "ส่งเข้าคิวแล้ว": 1, "ไม่มาตามนัด": 2, "เสร็จสิ้น": 3, "ยกเลิก": 4 };
        const scoreA = priority[a.status] !== undefined ? priority[a.status] : 99;
        const scoreB = priority[b.status] !== undefined ? priority[b.status] : 99;
        if (scoreA !== scoreB) return scoreA - scoreB;
        return String(a.time || '').localeCompare(String(b.time || ''));
    });

    const totalPages = Math.ceil(filteredData.length / appRowsPerPage) || 1;
    window.currentAppPage = Math.min(window.currentAppPage, totalPages);

                            <option value="ส่งเข้าคิวแล้ว" ${statusFilter === 'ส่งเข้าคิวแล้ว' ? 'selected' : ''}>🔵 ส่งเข้าคิวแล้ว</option>

// ✅ ฟังก์ชันบันทึกนัดหมาย (เชื่อมต่อ Supabase & UUID 100%)
window.saveNewAppointment = async function(appId = '') {
    try {
        const customerInput = document.getElementById('appCustSearch');
        const customerName = customerInput?.value?.trim() || '';
        const customerId = customerInput?.dataset?.customerId || '';
        const customerHn = customerInput?.dataset?.hn || '';

        const date = document.getElementById('appDate')?.value || '';
        const hour = document.getElementById('appHour')?.value || '00';
        const min = document.getElementById('appMin')?.value || '00';
        const doctor = document.getElementById('appDoc')?.value || '-';
        const staff = document.getElementById('appStaff')?.value || '-';
        const status = document.getElementById('appStatus')?.value || 'รอดำเนินการ';
        const note = document.getElementById('appNote')?.value || '';
        const course = Array.isArray(window.selectedCoursesForApp)
            ? window.selectedCoursesForApp.join(', ')
            : '';

        if (!customerName || !customerId) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกลูกค้าจากรายการก่อนค่ะ', 'warning');
            return;
        }

        if (!date) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกวันที่นัดหมายค่ะ', 'warning');
            return;
        }

        if (!course) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกรายการคอร์สอย่างน้อย 1 รายการค่ะ', 'warning');
            return;
        }

        let db = [];
        try {
            db = JSON.parse(localStorage.getItem('appointmentDB')) || [];
        } catch (e) {
            db = [];
        }

        const payload = {
            id: appId || crypto.randomUUID(),
            appointmentId: appId || crypto.randomUUID(),
            customer_id: customerId,
            customerHn: customerHn,
            customer_name: customerName,
            customerName: customerName,
            date: date,
            time: `${hour}:${min}`,
            doctor: doctor,
            staff: staff,
            course: course,
            note: note,
            status: status,
            branch: typeof window.getCurrentViewingBranch === 'function'
                ? window.getCurrentViewingBranch()
                : 'บางพลี',
            createdAt: appId ? undefined : Date.now(),
            updatedAt: Date.now()
        };

        const existingIndex = db.findIndex(a =>
            String(a.id) === String(appId) ||
            String(a.appointmentId) === String(appId) ||
            String(a.createdAt) === String(appId)
        );

        if (existingIndex !== -1) {
            db[existingIndex] = { ...db[existingIndex], ...payload };
        } else {
            db.unshift(payload);
        }

        localStorage.setItem('appointmentDB', JSON.stringify(db));

        Swal.fire({
            icon: 'success',
            title: 'บันทึกนัดหมายสำเร็จ',
            timer: 1200,
            showConfirmButton: false
        });

        window.closeAppModal();

        if (typeof window.renderAppointmentPage === 'function') {
            window.renderAppointmentPage();
        }
    } catch (e) {
        console.error('saveNewAppointment error:', e);
        Swal.fire('เกิดข้อผิดพลาด', e.message || 'บันทึกนัดหมายไม่สำเร็จ', 'error');
    }
};

window.printDailyReport = async function() {

        .order('time', { ascending: true });

    if (viewingBranch !== 'ทุกสาขา') {
        query = query.eq('branch', viewingBranch);
    }
    if (dateFilter) {
        query = query.eq('date', dateFilter);
    }

    const { data: dailyList, error } = await query;

    if (error || !dailyList || dailyList.length === 0) {
        Swal.fire({
            icon: 'info',
            title: 'ไม่พบข้อมูล',
            text: dateFilter ? `ไม่พบข้อมูลนัดหมายในวันที่เลือกค่ะ` : 'ไม่พบข้อมูลนัดหมายในระบบค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;

// 1. ฟังก์ชันสลับสถานะการยืนยันนัดหมาย (Confirm/Unconfirm)
window.toggleConfirmAppById = async function(appId) {
    // 🎯 ดึงข้อมูลปัจจุบันเพื่อตรวจสอบสถานะเดิม
    const { data: currentApp, error: fetchError } = await window.supabaseClient
        .from('appointments')
        .select('is_confirm')
        .eq('id', appId)
        .single();

    if (fetchError) {
        console.error("Fetch error:", fetchError);
        return;
    }

    // 🔄 สลับสถานะจริงใน Supabase
    const { error: updateError } = await window.supabaseClient
        .from('appointments')
        .update({ is_confirm: !currentApp.is_confirm })
        .eq('id', appId);

    if (updateError) {
        console.error("Update confirm error:", updateError);
        return;
    }

    // 🔄 รีเฟรชหน้าจอเพื่อให้เครื่องหมายติ๊กถูกเปลี่ยนตามฐานข้อมูล Cloud
    if (typeof renderAppointmentPage === 'function') {
        renderAppointmentPage();
    }
};

// 2. ฟังก์ชันส่งนัดหมายเข้าสู่ "ห้องจัดการคิว" (Queue Management)
window.sendToServiceQueueById = async function(appId) {
    // 🎯 ดึงข้อมูลนัดหมายล่าสุดจาก Supabase ผ่าน ID
    const { data: appData, error: appError } = await window.supabaseClient
        .from('appointments')
        .select('*')
        .eq('id', appId)
        .single();

    if (appError || !appData) {
        Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูลนัดหมาย', confirmButtonColor: '#D48197' });
        return;
    }

    // 🛡️ ตรวจสอบว่าคนไข้คนนี้ถูกส่งเข้าคิวไปแล้วหรือยัง (ป้องกันคิวซ้ำ)
    const { data: existingQueue } = await window.supabaseClient
        .from('queues')
        .select('id')
        .eq('appointment_id', appId)
        .not('status', 'in', '("เสร็จสิ้น","ยกเลิก")');

    if (existingQueue && existingQueue.length > 0) {
        Swal.fire({
            icon: 'warning',
            title: 'คนไข้อยู่ในคิวแล้ว',
            text: 'รายการนัดหมายนี้ถูกส่งเข้าห้องคิวเรียบร้อยแล้วค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    const nowTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const viewingBranch = window.getCurrentViewingBranch();

    // 📦 1. เตรียมข้อมูล Object สำหรับเพิ่มลงตารางคิว (ใช้ UUID เชื่อมโยง)
    const newQueueItem = {
        id: crypto.randomUUID(),
        customer_id: appData.customer_id,
        appointment_id: appId, // ✅ ผูก ID นัดหมายต้นทาง
        customer_name: appData.customer_name,
        course: appData.course,
        course_labels: appData.course_labels || [],
        doctor: appData.doctor || '-',
        staff: appData.staff || '-',
        time: appData.time || nowTime,
        status: "รอรับบริการ",
        branch: appData.branch || viewingBranch,
        date: new Date().toLocaleDateString('th-TH'),
        created_at: new Date().toISOString()
    };

    // 🚀 2. บันทึกลงตาราง Queues ใน Supabase
    const { error: queueError } = await window.supabaseClient
        .from('queues')
        .insert([newQueueItem]);

    if (queueError) {
        console.error("Queue insert error:", queueError);
        return Swal.fire('ผิดพลาด', 'ไม่สามารถสร้างคิวได้', 'error');
    }

    // 🔄 3. อัปเดตสถานะในตาราง Appointments เป็น "ส่งเข้าคิวแล้ว"
    await window.supabaseClient
        .from('appointments')
        .update({ status: "ส่งเข้าคิวแล้ว" })
        .eq('id', appId);

    Swal.fire({
        icon: 'success',
        title: 'ส่งเข้าห้องคิวสำเร็จ!',
        text: `คุณ ${newQueueItem.customer_name} เข้าสู่คิวแล้วค่ะ`,
        timer: 1500,
        showConfirmButton: false
    }).then(() => {
        if (typeof renderAppointmentPage === 'function') renderAppointmentPage();
        if (typeof loadPage === 'function') loadPage(52, 'ห้องจัดการคิว');
    });
};

window.renderQueuePage = async function() { // ✅ ปรับเป็น async เพื่อรอข้อมูลจาก Supabase
    const target = document.getElementById('dynamicContent') || document.getElementById('pageContent');
    if (!target) return;

    // 1. ดึงข้อมูลคิวจาก Supabase (ตามเงื่อนไขเชื่อมต่อ Cloud)
    let allQueue = [];
    try {
        const { data, error } = await window.supabaseClient
            .from('queues')
            .select('*')
            .order('created_at', { ascending: true });
        
        if (error) throw error;
        allQueue = data || [];
    } catch (e) {
        console.error("Supabase fetch error, falling back to local:", e);
        allQueue = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
    }

    const todayStr = new Date().toLocaleDateString('th-TH');
    if (!window.currentQDateFilter) window.currentQDateFilter = todayStr;

    // 2. ดึงสถานะผู้ใช้และสาขาด้วยระบบ ID Safe
    const currentUser = window.getCurrentUserSafe();
    const viewingBranch = window.getCurrentViewingBranch();
    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(currentUser.role || '');

    // 3. ดึงค่า Filter จาก UI
    const searchTerm = (document.getElementById('qSearchInput')?.value || "").toLowerCase().trim();
    const statusFilter = document.getElementById('qStatusFilter')?.value || "ทั้งหมด";
    const pageSize = parseInt(document.getElementById('qPageSize')?.value) || 10;
    const currentPage = window.currentQPage || 1;

    // 4. กรองข้อมูล (ID & Branch Based Security)
    let filteredData = allQueue.filter(item => {
        // ✅ ใช้ normalizeBranch เพื่อให้การเปรียบเทียบชื่อสาขาแม่นยำ
        const itemBranch = window.normalizeBranch(item.branch);
        const matchBranch = (viewingBranch === 'ทุกสาขา' && isAdmin) || (itemBranch === viewingBranch);

        // ✅ รองรับฟีลด์ชื่อจาก Supabase (customer_name)
        const nameVal = String(item.customer_name || item.name || "").toLowerCase();
        const hnVal = String(item.hn || "").toLowerCase();
        const matchSearch = nameVal.includes(searchTerm) || hnVal.includes(searchTerm);

        const matchStatus = (statusFilter === "ทั้งหมด" || item.status === statusFilter);
        const matchDate = !window.currentQDateFilter || (item.date === window.currentQDateFilter);

        return matchBranch && matchSearch && matchStatus && matchDate;
    });

   // 5. เรียงลำดับ (จัดกลุ่ม "เสร็จสิ้น" ไว้ท้ายสุด และเรียงตามเวลาเช็คอิน)
    filteredData.sort((a, b) => {
        const statusA = a.status === "เสร็จสิ้น" ? 1 : 0;
        const statusB = b.status === "เสร็จสิ้น" ? 1 : 0;
        if (statusA !== statusB) return statusA - statusB;
        // ✅ ใช้เวลาเช็คอินจริงในระบบเป็นตัวเรียงลำดับ
        return String(a.time || '').localeCompare(String(b.time || ''));
    });

    // 6. Pagination Logic (อ้างอิงตาม ID หน้าปัจจุบัน)
    const startIndex = (currentPage - 1) * pageSize;
    const paginatedData = filteredData.slice(startIndex, startIndex + pageSize);

    // 7. สั่งเรนเดอร์ HTML (ฉบับปรับปรุงใหม่: แถวเดียว All-in-one)
    target.innerHTML = `
    <div class="animate-in fade-in duration-500 font-light p-4 -mt-6 text-left">
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-pink-100 mb-6 flex flex-col gap-4">

                        <option value="10" ${pageSize == 10 ? 'selected' : ''}>📄 10 รายการ</option>
                        <option value="30" ${pageSize == 30 ? 'selected' : ''}>📄 30 รายการ</option>
                        <option value="50" ${pageSize == 50 ? 'selected' : ''}>📄 50 รายการ</option>
                    </select>
                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-pink-300 pointer-events-none">▼</span>
                </div>

                        <option value="ทั้งหมด" ${statusFilter === 'ทั้งหมด' ? 'selected' : ''}>🔍 สถานะ: ทั้งหมด</option>
                        <option value="รอรับบริการ" ${statusFilter === 'รอรับบริการ' ? 'selected' : ''}>⏳ รอรับบริการ</option>
                        <option value="พนักงานรับคิวแล้ว" ${statusFilter === 'พนักงานรับคิวแล้ว' ? 'selected' : ''}>🟣 รับคิวแล้ว</option>
                        <option value="เสร็จสิ้น" ${statusFilter === 'เสร็จสิ้น' ? 'selected' : ''}>🟢 เสร็จสิ้น</option>

window.deleteQueueItemById = async function(qId) {
    // 🎯 1. ดึงข้อมูลคิวจาก Supabase ผ่าน ID เพื่อตรวจสอบสถานะก่อนลบ
    const { data: item, error: fetchError } = await window.supabaseClient
        .from('queues')
        .select('*')
        .eq('id', qId)
        .single();

    if (fetchError || !item) {
        Swal.fire('ไม่พบข้อมูล', 'ไม่สามารถหาคิวที่ต้องการลบได้ค่ะ', 'error');
        return;
    }

    // 🎯 2. ใช้ SweetAlert2 ถามยืนยันก่อนลบ
    Swal.fire({
        title: '<span class="text-slate-800 font-black italic uppercase">🗑️ ยืนยันการยกเลิกคิว?</span>',
        html: `คุณต้องการลบคิวของคุณ <b class="text-[#D48197]">${item.customer_name}</b><br><small class="text-slate-400">*(หากทำรายการเสร็จแล้ว ระบบจะคืนคอร์สให้ลูกค้าอัตโนมัติ)*</small>`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#94a3b8',
        confirmButtonText: 'ใช่, ลบและคืนคอร์ส!',
        cancelButtonText: 'ยกเลิก',
        customClass: { popup: 'rounded-[2.5rem]' }
    }).then(async (result) => {
        if (result.isConfirmed) {
            
            // 🎯 3. ถ้าสถานะเป็น "เสร็จสิ้น" ให้ทำการคืนจำนวนคอร์สให้ลูกค้าใน Supabase
            if (item.status === "เสร็จสิ้น") {
                const customerId = item.customer_id;
                
                // ดึงข้อมูลคอร์สปัจจุบันของคนไข้
                const { data: customer, error: custError } = await window.supabaseClient
                    .from('customers')
                    .select('courses')
                    .eq('id', customerId)
                    .single();

                if (!custError && customer && Array.isArray(customer.courses)) {
                    let updatedCourses = [...customer.courses];
                    const courseList = String(item.course || '').split(',').map(x => x.trim()).filter(Boolean);

                    courseList.forEach(courseName => {
                        const courseIdx = updatedCourses.findIndex(bc => 
                            window.normalizeCourseName(bc.name || '') === window.normalizeCourseName(courseName)
                        );
                        
                        if (courseIdx !== -1) {
                            // ✅ คืนจำนวนคอร์ส +1
                            let currentAmount = parseInt(updatedCourses[courseIdx].amount || 0);
                            updatedCourses[courseIdx].amount = currentAmount + 1;
                        }
                    });

                    // บันทึกการคืนคอร์สกลับลง Supabase
                    await window.supabaseClient
                        .from('customers')
                        .update({ courses: updatedCourses })
                        .eq('id', customerId);
                }
            }

            // 🎯 4. ลบคิวออกจาก Supabase
            const { error: deleteError } = await window.supabaseClient
                .from('queues')
                .delete()
                .eq('id', qId);

            if (deleteError) {
                Swal.fire('ผิดพลาด', 'ไม่สามารถลบคิวจากฐานข้อมูลได้', 'error');
                return;
            }

            // 🎯 5. แจ้งเตือนสำเร็จและวาดตารางใหม่
            Swal.fire({
                icon: 'success',
                title: 'ยกเลิกคิวสำเร็จ!',
                text: 'ระบบคืนจำนวนคอร์สให้คนไข้เรียบร้อยแล้วค่ะ',
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-[2.5rem]' }
            });

            if (typeof renderQueuePage === 'function') {
                renderQueuePage();
            }
        }
    });
};

    const normalized = window.normalizeCourseName(courseName);

        window.normalizeCourseName(c.name || '') === normalized
    );

    const staffDFInput = document.getElementById('staffDF');
    const doctorDFInput = document.getElementById('doctorDF');

    if (!staffDFInput || !doctorDFInput) return;

    if (found) {
        staffDFInput.value = found.staffDF || 0;

        doctorDFInput.value = 0;

window.syncProcessCourseSelection = function() {
    const checks = [...document.querySelectorAll('.process-course-check:checked')];
    const selectedNames = checks.map(c => c.value);

    const displayBox = document.getElementById('processCourseSelectedSummary');
    if (displayBox) {
        displayBox.innerHTML = selectedNames.length > 0
            ? selectedNames.map(name => `
                <span class="inline-flex items-center px-2.5 py-1 rounded-xl bg-white border border-pink-100 text-[10px] text-slate-600 mr-1 mb-1 font-medium">

                </span>
            `).join('')
            : `<span class="text-slate-300 text-xs">ยังไม่ได้เลือกรายการ</span>`;
    }

    let staffDF = 0;
    let doctorDF = 0;

    checks.forEach(chk => {
        staffDF += parseFloat(chk.dataset.staffdf || 0);
        doctorDF += parseFloat(chk.dataset.doctordf || 0);
    });

    const staffDFInput = document.getElementById('staffDF');
    const doctorDFInput = document.getElementById('doctorDF');

    if (staffDFInput) staffDFInput.value = staffDF;
    if (doctorDFInput) doctorDFInput.value = doctorDF;
};

window.finishService = async function(qId) {
    // 1. ดึงข้อมูลคิวจาก Supabase แทน LocalStorage เพื่อความแม่นยำ
    const { data: qData, error: qError } = await window.supabaseClient

        courseId: String(chk.dataset.courseId || '').trim(),
        courseName: String(chk.value || '').trim()
    }));

    if (selectedCourses.length === 0) {
        Swal.fire('กรุณาเลือกรายการ', 'กรุณาเลือกคอร์สที่ทำจริงเพื่อหักยอดค่ะ', 'warning');
        return;
    }

    // 3. เริ่มกระบวนการหักคอร์สใน Database ลูกค้า (Supabase)
    const { data: customer, error: custError } = await window.supabaseClient
        .from('customers')
        .select('courses')
        .eq('id', qData.customer_id)
        .single();

    if (!custError && customer && Array.isArray(customer.courses)) {
        let updatedCourses = [...customer.courses];

        selectedCourses.forEach(selected => {
            let courseIdx = -1;
            
            // ✅ หาโดย ID (ถ้ามี)
            if (selected.courseId) {
                courseIdx = updatedCourses.findIndex(c => String(c.id) === selected.courseId);
            }
            
            // ✅ fallback: หาโดยชื่อคอร์ส
            if (courseIdx === -1) {
                courseIdx = updatedCourses.findIndex(c => 
                    window.normalizeCourseName(c.name || '') === window.normalizeCourseName(selected.courseName)
                );
            }

            if (courseIdx !== -1) {
                const currentCourse = updatedCourses[courseIdx];
                let currentAmt = parseInt(currentCourse.amount || 0, 10);
                let currentUsed = parseInt(currentCourse.usedAmount || 0, 10);

                if (currentAmt > 0) {
                    currentCourse.amount = currentAmt - 1;
                    currentCourse.usedAmount = currentUsed + 1;
                    currentCourse.lastUsedAt = new Date().toISOString();
                    currentCourse.status = currentCourse.amount <= 0 ? 'completed' : 'active';
                }
            }
        });

        // บันทึกยอดคอร์สใหม่กลับไปที่ Cloud
        await window.supabaseClient
            .from('customers')
            .update({ courses: updatedCourses })
            .eq('id', qData.customer_id);
    }

    // 4. เตรียมข้อมูลอัปเดตสถานะคิว
    const finishTime = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const updatePayload = {
        status: "เสร็จสิ้น",
        finish_time: finishTime,
        staff_df: parseFloat(document.getElementById('staffDF')?.value || 0),
        doctor_df: parseFloat(document.getElementById('doctorDF')?.value || 0),
        staff: document.getElementById('procStaffName')?.value || qData.staff,
        doctor: document.getElementById('procDoctorName')?.value || qData.doctor,
        note: document.getElementById('procNote')?.value || qData.note,
        updated_at: new Date().toISOString()
    };

    // 5. อัปเดตสถานะคิวใน Supabase
    await window.supabaseClient.from('queues').update(updatePayload).eq('id', qId);

    // 6. ⚡ Sync สถานะกลับไปที่หน้านัดหมาย (ใช้ ID อ้างอิง)
    const appRefId = qData.appointment_id; 
    if (appRefId) {
        await window.supabaseClient
            .from('appointments')
            .update({ status: "เสร็จสิ้น" })
            .eq('id', appRefId);
    }

    // ปิด Modal และรีเฟรชหน้าจอ
    document.getElementById('processModal')?.remove();

    Swal.fire({ 
        icon: 'success', 
        title: 'บันทึกสำเร็จ', 
        text: 'หักคอร์สและอัปเดตสถานะนัดหมายเรียบร้อยแล้วค่ะ',
        timer: 1500, 
        showConfirmButton: false 
    });

    renderQueuePage();
    if (typeof renderAppointmentPage === 'function') renderAppointmentPage();
};

// 🎯 ฟังก์ชันยกเลิกคิวและคืนคอร์ส (ID-Based)
window.deleteQueueItem = function(qId) {
    Swal.fire({
        title: 'ยืนยันการลบคิว?',
        text: "หากคิวนี้หักคอร์สไปแล้ว ระบบจะคืนคอร์สให้ลูกค้าอัตโนมัติค่ะ",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ใช่, ลบและคืนคอร์ส',
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#94a3b8'
    }).then(async (result) => {
        if (result.isConfirmed) {
            // 1. ดึงข้อมูลคิวจาก Cloud
            const { data: qData, error: qError } = await window.supabaseClient
                .from('queues')
                .select('*')
                .eq('id', qId)
                .single();

            if (qError || !qData) return;

            // 2. คืนคอร์สถ้าสถานะคือเสร็จสิ้น
            if (qData.status === "เสร็จสิ้น") {
                const { data: customer } = await window.supabaseClient
                    .from('customers')
                    .select('courses')
                    .eq('id', qData.customer_id)
                    .single();

                if (customer && Array.isArray(customer.courses)) {
                    let updatedCourses = [...customer.courses];
                    const coursesDone = String(qData.course).split(',').map(x => x.trim());

                    coursesDone.forEach(cName => {
                        const bcIdx = updatedCourses.findIndex(bc => 
                            window.normalizeCourseName(bc.name) === window.normalizeCourseName(cName)
                        );
                        if (bcIdx !== -1) {
                            updatedCourses[bcIdx].amount = (parseInt(updatedCourses[bcIdx].amount || 0) + 1);
                            updatedCourses[bcIdx].usedAmount = Math.max(0, parseInt(updatedCourses[bcIdx].usedAmount || 0) - 1);
                        }
                    });

                    await window.supabaseClient
                        .from('customers')
                        .update({ courses: updatedCourses })
                        .eq('id', qData.customer_id);
                }
            }

            // 3. ลบคิวออกจาก Cloud
            await window.supabaseClient.from('queues').delete().eq('id', qId);

            renderQueuePage();
            Swal.fire('ลบสำเร็จ', 'ระบบลบคิวและคืนคอร์สเรียบร้อยแล้วค่ะ', 'success');
        }
    });
};

// --- ฟังก์ชันเปิด-ปิดเมนู ▼ (ฉบับแก้ไข: ID 100% และดันแถวขึ้นหน้าสุด) ---
window.safeToggleMenu = function(event, billId) {
    event.stopPropagation();
    
    // 1. หาเมนูเป้าหมายโดยใช้ ID ของบิล (ไม่ใช่ index)
    const targetMenu = document.getElementById(`action-menu-${billId}`);
    if (!targetMenu) return;
    
    const isHidden = targetMenu.classList.contains('hidden');

    // 2. ปิดเมนูอื่นๆ ทั้งหมดที่เปิดค้างอยู่ (ใช้ Selector หา ID ที่ขึ้นต้นด้วย action-menu-)
    document.querySelectorAll('[id^="action-menu-"]').forEach(m => m.classList.add('hidden'));
    
    // 3. รีเซ็ต z-index ทุกแถวในตารางให้กลับเป็นปกติ
    document.querySelectorAll('#salesTableBody tr').forEach(tr => {
        tr.style.zIndex = "1"; 
        tr.style.position = "relative"; 
    });

    // 4. ถ้าเมนูเดิมปิดอยู่ ให้เปิดและดัน "แถวนี้" ให้ลอยสูงสุดด้วย z-index
    if (isHidden) {
        targetMenu.classList.remove('hidden');
        const parentRow = targetMenu.closest('tr');
        if (parentRow) {
            // 🎯 บังคับให้แถวที่มีเมนูเปิดอยู่ ลอยทับแถวอื่น 100%
            parentRow.style.zIndex = "9999"; 
        }
    }
};

// 💡 คลิกที่ว่างบนหน้าจอเพื่อปิดเมนู (ฉบับ ID 100% และ Clean Up)

// --- ❌ ฟังก์ชันยกเลิกบิล (ฉบับแก้ไข Logic คืนคอร์สให้แม่นยำ 100%) ---
window.cancelBillProcess = function(billId, customerId) {
    Swal.fire({
        title: '🚨 ยืนยันการยกเลิกบิล?',
        text: "ระบบจะเปลี่ยนสถานะเป็น 'ยกเลิก' และหักจำนวนคอร์สที่เคยเพิ่มให้ออก",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#888',
        confirmButtonText: 'ใช่, ยกเลิกบิลนี้!',
        cancelButtonText: 'ปิดหน้าต่าง',
        customClass: { popup: 'rounded-[2rem]' }
    }).then((result) => {
        if (!result.isConfirmed) return;

        try {
            let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
            const billIdx = accountDB.findIndex(b => String(b.id) === String(billId));

            if (billIdx === -1) {
                Swal.fire('ไม่พบข้อมูล', 'ไม่พบเลขที่บิลนี้ในระบบ', 'error');
                return;
            }

            if (accountDB[billIdx].status === "ยกเลิก") {
                Swal.fire('แจ้งเตือน', 'บิลนี้ถูกยกเลิกไปแล้ว', 'info');
                return;
            }

            const targetBill = accountDB[billIdx];

            let customers = window.getCustomers() || [];
            const cIdx = customers.findIndex(c =>
    String(c.id || '') === String(customerId || targetBill.customer_id || '') ||
    String(c.hn || '') === String(targetBill.hn || '')
);

            if (cIdx !== -1 && Array.isArray(targetBill.items) && targetBill.items.length > 0) {
                if (!Array.isArray(customers[cIdx].courses)) {
                    customers[cIdx].courses = [];
                }

                targetBill.items.forEach(billItem => {
                    const cCourseIdx = customers[cIdx].courses.findIndex(bc =>
                        String(bc.name || '').trim() === String(billItem.name || '').trim() &&
                        String(bc.receiptId || '') === String(targetBill.id)
                    );

                    if (cCourseIdx !== -1) {
                        const qtyToSubtract = parseInt(billItem.qty || 1, 10) || 1;

                        customers[cIdx].courses[cCourseIdx].amount =
                            (parseInt(customers[cIdx].courses[cCourseIdx].amount || 0, 10) || 0) - qtyToSubtract;

                        customers[cIdx].courses[cCourseIdx].remain =
                            (parseInt(customers[cIdx].courses[cCourseIdx].remain || 0, 10) || 0) - qtyToSubtract;

                        customers[cIdx].courses[cCourseIdx].totalAmount =
                            (parseInt(customers[cIdx].courses[cCourseIdx].totalAmount || 0, 10) || 0) - qtyToSubtract;

                        if (
                            customers[cIdx].courses[cCourseIdx].amount <= 0 ||
                            customers[cIdx].courses[cCourseIdx].totalAmount <= 0
                        ) {
                            customers[cIdx].courses.splice(cCourseIdx, 1);
                        }
                    }
                });

                if (typeof window.saveCustomers === 'function') {
                    window.saveCustomers(customers);
                } else {
                    localStorage.setItem('customerDB', JSON.stringify(customers));
                }
            }

            accountDB[billIdx].status = "ยกเลิก";
            accountDB[billIdx].cancelledAt = new Date().toISOString();

            localStorage.setItem('accountDB', JSON.stringify(accountDB));

            Swal.fire({
                icon: 'success',
                title: 'ยกเลิกบิลสำเร็จ',
                text: 'หักคืนจำนวนคอร์สเรียบร้อยแล้ว',
                showConfirmButton: false,
                timer: 1500
            });

            if (typeof renderSalesPage === 'function') renderSalesPage();

        } catch (e) {
            console.error(e);
            Swal.fire('ข้อผิดพลาด', 'เกิดปัญหาทางเทคนิคในการยกเลิกบิล', 'error');
        }
    });
};

// --- ฟังก์ชันเลือกวิธีชำระเงิน (สลับสีปุ่มที่ถูกกด) ---
window.selectPaymentType = function(btn, type) {
    // ล้างสีปุ่มอื่น
    document.querySelectorAll('#paymentMethods button').forEach(b => {
        b.classList.remove('border-pink-400', 'text-[#FF4B91]', 'bg-pink-50', 'shadow-inner');
        b.classList.add('border-slate-200', 'bg-white', 'text-slate-600');
    });
    // ระบายสีปุ่มที่เลือก
    btn.classList.remove('border-slate-200', 'bg-white', 'text-slate-600');
    btn.classList.add('border-pink-400', 'text-[#FF4B91]', 'bg-pink-50', 'shadow-inner');
    
    // เก็บค่าลงตัวแปร
    window.selectedPaymentMethod = type; 
};

// --- 3. ฟังก์ชันค้นหาคนไข้ (ฉบับปลดล็อกให้ดึงชื่อใช้ได้ทุกสาขา 100%) ---
window.searchCustomerForBill = function(val) {
    const resDiv = document.getElementById('customerSearchResult');
    if (!resDiv) return;

    const keyword = String(val || '').trim().toLowerCase();

    if (!keyword) {
        resDiv.innerHTML = '';
        resDiv.classList.add('hidden');
        return;
    }

    const customerDB = window.getCustomers() || [];

    const matches = customerDB.filter(c => {
        const fullName = String(c.fullname || c.fullName || '').toLowerCase();
        const hn = String(c.hn || '').toLowerCase();
        const phone = String(c.phone || '');
        const id = String(c.id || '').toLowerCase();

        return fullName.includes(keyword) ||
               hn.includes(keyword) ||
               phone.includes(keyword) ||
               id.includes(keyword);
    });

    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(c => `
            <div onclick="window.selectCustomerToBill('${c.id}')"
                class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between items-center bg-white transition-all">
                <div>
                    <span class="text-sm text-slate-700 font-bold">${c.fullname || c.fullName || '-'}</span>
                    <p class="text-[9px] text-slate-400 font-bold uppercase italic">📌 สาขาที่สมัคร: ${c.branch || 'ไม่ระบุ'}</p>
                </div>
                <div class="text-right">
                    <span class="text-[10px] bg-cyan-50 text-cyan-600 px-3 py-1 rounded-full font-bold">${c.hn || c.id || '-'}</span>
                </div>
            </div>
        `).join('');
    } else {
        resDiv.innerHTML = '<div class="p-4 text-center text-xs text-slate-300 italic">ไม่พบรายชื่อในฐานข้อมูล...</div>';
    }

    resDiv.classList.remove('hidden');
};

// --- 4. ฟังก์ชันเลือกคนไข้เข้ากล่อง (ฉบับดั้งเดิมที่ใช้กับไฟล์คุณได้ 100%) ---
window.selectCustomerToBill = function(customerId) {
    if (typeof window.requirePermission === 'function' && !window.requirePermission(3, 'เลือกคนไข้เพื่อตีบิล')) return;

    const customerDB = window.getCustomers() || [];
    const c = customerDB.find(item => String(item.id || '') === String(customerId || ''));
    if (!c) return;

    window.activeCustomer = c;

    if (document.getElementById('billHN')) document.getElementById('billHN').innerText = c.hn || '-';
    if (document.getElementById('billFullName')) document.getElementById('billFullName').innerText = c.fullname || '-';
    if (document.getElementById('billNickName')) document.getElementById('billNickName').innerText = c.nickname || '-';
    if (document.getElementById('billPhone')) document.getElementById('billPhone').innerText = c.phone || '-';
    if (document.getElementById('billAllergy')) document.getElementById('billAllergy').innerText = c.allergy || 'ไม่มี';
    if (document.getElementById('billNationality')) document.getElementById('billNationality').innerText = c.nationality || '-';
    if (document.getElementById('billRight')) document.getElementById('billRight').innerText = c.right || 'ทั่วไป';

    const img = document.getElementById('billCustPhoto');
    const icon = document.getElementById('billPhotoIcon');

    if (img && icon) {
        if (c.photo) {
            img.src = c.photo;
            img.classList.remove('hidden');
            icon.classList.add('hidden');
        } else {
            img.src = "";
            img.classList.add('hidden');
            icon.classList.remove('hidden');
        }
    }

    const resDiv = document.getElementById('customerSearchResult');
    if (resDiv) resDiv.classList.add('hidden');

    const searchInp = document.getElementById('custSearchForBillInp');
    if (searchInp) searchInp.value = c.fullname || '';

    const billArea = document.getElementById('billingFormArea');
    if (billArea) billArea.classList.remove('hidden', 'opacity-0');

    const hint = document.getElementById('noCustomerHint');
    if (hint) hint.classList.add('hidden');
};

// --- 6. เพิ่มรายการลงตาราง (ฉบับปรับปรุงแก้ไขการเพิ่มรายการไม่ได้) ---
window.addItemToBill = function() {
    // 🛡️ 1. เช็คสิทธิ์การเข้าถึง (ID 3 คือ ระบบบัญชี)
    if (!window.requirePermission(3, 'เพิ่มรายการบิล')) return;

    const nameInp = document.getElementById('itemName');
    const priceInp = document.getElementById('billPrice');
    const qtyInp = document.getElementById('billQty');

    const name = nameInp ? nameInp.value.trim() : "";
    const price = priceInp ? parseFloat(priceInp.value) || 0 : 0;
    const qty = qtyInp ? parseFloat(qtyInp.value) || 0 : 0;
    
    // ดึงหมวดหมู่จาก Dataset (ที่มาจากฟังก์ชันค้นหา)
    const cat = nameInp.dataset.category || 'general';

    // ⚠️ 2. ตรวจสอบความถูกต้องก่อนเพิ่ม
    if (!name) {
        Swal.fire({ icon: 'warning', text: 'กรุณาระบุชื่อรายการก่อนค่ะ', confirmButtonColor: '#D48197' });
        return;
    }
    if (price <= 0) {
        Swal.fire({ icon: 'warning', text: 'กรุณาระบุราคาที่ถูกต้องค่ะ', confirmButtonColor: '#D48197' });
        return;
    }

    // ➕ 3. เพิ่มลงในรายการบิลชั่วคราว
    window.currentBillItems.push({ 
        name: name, 
        price: price, 
        qty: qty, 
        cat: cat, 
        total: price * qty 
    });

    // 🔄 4. รีเฟรชตารางแสดงผลด้านล่าง
    if(typeof renderBillItems === 'function') renderBillItems();
    
    // 🧹 5. ล้างช่องพิมพ์เพื่อรอรายการถัดไป
    nameInp.value = '';
    priceInp.value = '';
    qtyInp.value = '1';
    delete nameInp.dataset.category; // ล้างค่าหมวดหมู่เก่าทิ้งเพื่อป้องกันข้อมูลปนกัน
};
// --- 7. วาดตารางบิล (ฉบับดึงข้อมูลและแสดงผลประเภทรายการ) ---
window.renderBillItems = function() {
    const listBody = document.getElementById('billItemsList');
    if (!listBody) return;
    
    let grandTotal = 0;

    if (!window.currentBillItems || window.currentBillItems.length === 0) {
        listBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-slate-300 font-normal italic">ยังไม่มีรายการ...</td></tr>`;
        // รีเซ็ตยอดรวมเป็น 0 เมื่อไม่มีรายการ
        const totalDisplay = document.getElementById('grandTotalDisplay');
        if (totalDisplay) totalDisplay.innerText = '฿0.00';
    } else {
        listBody.innerHTML = window.currentBillItems.map((item, index) => {
            // คำนวณยอดรวมสะสม
            const itemTotal = parseFloat(item.total || 0);
            grandTotal += itemTotal;

            // กำหนดป้ายกำกับประเภท (สินค้า หรือ คอร์ส)
            const categoryTag = item.cat === 'medicine' || item.type === 'product' 
                ? '<span class="bg-blue-50 text-blue-500 px-2 py-0.5 rounded text-[9px] uppercase font-bold">สินค้า</span>'
                : '<span class="bg-pink-50 text-[#FF4B91] px-2 py-0.5 rounded text-[9px] uppercase font-bold">คอร์ส</span>';

            return `
                <tr class="hover:bg-slate-50 transition-all group border-b border-slate-100">
                    <td class="py-4 pl-4 text-left">
                        <div class="flex items-center gap-2">
                            ${categoryTag}
                            <span class="text-slate-700 font-bold">${item.name}</span>
                        </div>
                    </td>
                    <td class="py-4 text-center text-slate-600 font-bold">${item.qty}</td>
                    <td class="py-4 text-center text-slate-600">${parseFloat(item.price || 0).toLocaleString()}</td>
                    <td class="py-4 text-right text-slate-700 font-black">฿${itemTotal.toLocaleString()}</td>
                    <td class="py-4 text-right pr-4">
                        <button onclick="removeItemFromBill(${index})" 
                                class="bg-white p-2 rounded-full shadow-sm border border-slate-100 hover:bg-red-50 text-slate-300 hover:text-red-500 transition-all text-xs opacity-50 group-hover:opacity-100">
                            ✕
                        </button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    // อัปเดตตัวเลขยอดรวมสุทธิ (Grand Total)
    const totalDisplay = document.getElementById('grandTotalDisplay');
    if (totalDisplay) {
        totalDisplay.innerText = '฿' + grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
};

// --- 8. ลบรายการออก ---
window.removeItemFromBill = function(index) {
    if (window.currentBillItems && window.currentBillItems[index]) {
        window.currentBillItems.splice(index, 1);
        renderBillItems();
        
        // ถ้ามีฟังก์ชันคำนวณส่วนลดหรือภาษีเพิ่มเติม ให้เรียกที่นี่
        if (typeof updateTaxAndDiscount === 'function') updateTaxAndDiscount();
    }
};

// --- 9. บันทึกบิล (ฉบับอัปเกรดระบบหักคอร์สเศษส่วน 2/5 และ ID แม่นยำ) ---
window.confirmFinalPayment = function() {
    try {
        const paymentValue = window.selectedPaymentMethod;
        const dateInput = document.getElementById('billDate');
        const billDate = dateInput ? dateInput.value : new Date().toISOString().split('T')[0];

        const customerName = document.getElementById('billFullName')?.innerText || '';
        const customerHN = document.getElementById('billHN')?.innerText || '-';
        const activeCustomer = window.activeCustomer || null;
        const customerId = activeCustomer?.id || '';

        if (customerHN === "-" || !customerName) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาค้นหาและเลือกข้อมูลคนไข้ก่อนค่ะ', 'warning');
            return;
        }

        if (!Array.isArray(window.currentBillItems) || window.currentBillItems.length === 0) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเพิ่มรายการคอร์ส/ยา อย่างน้อย 1 รายการค่ะ', 'warning');
            return;
        }

        if (!paymentValue) {
            Swal.fire('ข้อมูลไม่ครบ', 'กรุณากดเลือกช่องทางชำระเงินด้านล่างด้วยค่ะ', 'warning');
            return;
        }

        const user = (typeof window.getCurrentUserSafe === 'function')
            ? window.getCurrentUserSafe()
            : (JSON.parse(localStorage.getItem('currentUser')) || {});

        const staffBranch = (typeof window.getUserHomeBranch === 'function')
            ? window.getUserHomeBranch()
            : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

        const totalAmount = window.currentBillItems.reduce((sum, item) => {
            return sum + (Number(item.qty || 0) * Number(item.price || 0));
        }, 0);

        const billId = crypto.randomUUID();

        const newBillEntry = {
            id: billId,
            billId: billId,
            customer_id: customerId || '',
            hn: customerHN,
            customerName: customerName,
            customer_name: customerName,
            date: billDate,
            items: [...window.currentBillItems],
            total: totalAmount,
            totalDisplay: '฿' + totalAmount.toLocaleString(undefined, { minimumFractionDigits: 2 }),
            payment: paymentValue,
            status: "เสร็จสิ้น",
            type: "รายรับ",
            branch: staffBranch,
            seller: user.name || '-',
            timestamp: Date.now(),
            courseRestored: false
        };

        // 1) บันทึกบิลลง localStorage
        let accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
        accountDB.push(newBillEntry);
        localStorage.setItem('accountDB', JSON.stringify(accountDB));

        // 2) เติมคอร์สให้ลูกค้า (ID BASED ก่อน / fallback HN)
        let customers = window.getCustomers() || [];
        const cIdx = customers.findIndex(c =>
            String(c.id || '') === String(customerId || '') ||
            String(c.hn || '') === String(customerHN || '')
        );

        if (cIdx !== -1) {
            if (!Array.isArray(customers[cIdx].courses)) customers[cIdx].courses = [];

            window.currentBillItems.forEach(item => {
                const itemName = String(item.name || '').trim();
                const unitRaw = String(item.unit || '').trim();
                const unitLower = unitRaw.toLowerCase();
                const qty = parseInt(item.qty || item.amount || item.totalAmount || 1, 10) || 1;

                const isCourse =
                    unitRaw === 'ครั้ง' ||
                    unitLower === 'ครั้ง' ||
                    itemName.includes('เลเซอร์') ||
                    itemName.includes('คอร์ส') ||
                    itemName.includes('ทรีทเม้นท์') ||
                    itemName.includes('ฉีด') ||
                    itemName.toLowerCase().includes('botox') ||
                    itemName.toLowerCase().includes('filler');

                if (!isCourse || !itemName) return;

                const foundCourseIdx = customers[cIdx].courses.findIndex(c =>
                    String(c.name || '').trim() === itemName &&
                    String(c.receiptId || '') === String(newBillEntry.id)
                );

                if (foundCourseIdx !== -1) {
                    const oldRemain = parseInt(customers[cIdx].courses[foundCourseIdx].amount || 0, 10) || 0;
                    const oldTotal = parseInt(customers[cIdx].courses[foundCourseIdx].totalAmount || 0, 10) || 0;

                    customers[cIdx].courses[foundCourseIdx].amount = oldRemain + qty;
                    customers[cIdx].courses[foundCourseIdx].totalAmount = oldTotal + qty;
                    customers[cIdx].courses[foundCourseIdx].usedAmount = parseInt(customers[cIdx].courses[foundCourseIdx].usedAmount || 0, 10) || 0;
                    customers[cIdx].courses[foundCourseIdx].date = billDate;
                    customers[cIdx].courses[foundCourseIdx].branch = staffBranch;
                    customers[cIdx].courses[foundCourseIdx].fromBranch = staffBranch;
                    customers[cIdx].courses[foundCourseIdx].unit = customers[cIdx].courses[foundCourseIdx].unit || unitRaw || 'ครั้ง';
                    customers[cIdx].courses[foundCourseIdx].status = 'active';
                    customers[cIdx].courses[foundCourseIdx].receiptId = newBillEntry.id;
                } else {
                    customers[cIdx].courses.push({
                        courseId: item.courseId || item.code || (typeof window.generateUID === 'function' ? window.generateUID('COURSE') : crypto.randomUUID()),
                        code: item.code || '',
                        name: itemName,
                        amount: qty,
                        totalAmount: qty,
                        usedAmount: 0,
                        remain: qty,
                        date: billDate,
                        fromBranch: staffBranch,
                        branch: staffBranch,
                        unit: unitRaw || 'ครั้ง',
                        status: 'active',
                        receiptId: newBillEntry.id
                    });
                }
            });

            if (typeof window.saveCustomers === 'function') {
                window.saveCustomers(customers);
            } else {
                localStorage.setItem('customerDB', JSON.stringify(customers));
            }
        }

        Swal.fire({
            icon: 'success',
            title: 'บันทึกบิลสำเร็จ!',
            text: `ยอดเงินและคอร์สถูกบันทึกเรียบร้อยค่ะ`,
            timer: 2000,
            showConfirmButton: false
        }).then(() => {
            if (typeof renderSalesPage === 'function') renderSalesPage();
        });

    } catch (e) {
        console.error(e);
        Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + e.message, 'error');
    }
};


//  คืนคอร์สลูกค้า
function restoreCustomerCoursesFromReceipt(receipt){

    if(!receipt || !receipt.customerHn || !Array.isArray(receipt.items)) return;

    const customerDB = JSON.parse(localStorage.getItem("customerDB")) || [];
    const index = customerDB.findIndex(c => c.hn === receipt.customerHn);

    if(index === -1) return;

    const customer = customerDB[index];
    customer.courseRemain = Array.isArray(customer.courseRemain) ? customer.courseRemain : [];

    receipt.items.forEach(item=>{

        const isCourse = item.type === "course";
        if(!isCourse) return;

        const qty = Number(item.qty || 0);
        if(qty <= 0) return;

        const name = String(item.item || "").trim();
        const unit = item.unit || "ครั้ง";

        const remainIndex = customer.courseRemain.findIndex(c=>c.name === name);

        if(remainIndex !== -1){

            customer.courseRemain[remainIndex].remain =
            Number(customer.courseRemain[remainIndex].remain || 0) + qty;

        }else{

            customer.courseRemain.push({
                name:name,
                remain:qty,
                unit:unit
            });

        }

    });

    customerDB[index] = customer;

    localStorage.setItem("customerDB",JSON.stringify(customerDB));

}

window.renderExpensePage = function() {
    const target =
        document.getElementById('dynamicContent') ||
        document.getElementById('pageContent');

    if (!target) return;
    
    // 🎯 1. ดึงค่าจากฟิลเตอร์ (ถ้ายังไม่มีให้ใช้ค่าเริ่มต้น)
    const pageSize = parseInt(document.getElementById('expPageSize')?.value) || 10;
    const catFilter = document.getElementById('expCatFilter')?.value || "ทั้งหมด";
    const dateFilterVal = document.getElementById('expDateFilter')?.value || "";
    const searchTerm = (document.getElementById('expSearchInput')?.value || "").toLowerCase().trim();

    // 🎯 2. ดึงข้อมูลรายจ่าย
    let accountDB = [];
    try {
        accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    } catch (e) {
        accountDB = [];
    }

    let expenseData = accountDB.filter(item => item.type === "รายจ่าย");

    // 🎯 3. ล็อกสาขา
    if (typeof window.filterByBranch === 'function' && typeof window.canViewAllBranches === 'function') {
        if (!window.canViewAllBranches()) {
            expenseData = window.filterByBranch(expenseData, item => item.branch);
        }
    }

    // 🎯 4. กรองตาม UI
    expenseData = expenseData.filter(item => {
        const matchCat = (catFilter === "ทั้งหมด") || (item.category === catFilter);
        const matchDate = (dateFilterVal === "") || (item.date === dateFilterVal);
        const detailText = String(item.detail || item.customer || "").toLowerCase();
        const accountText = String(item.account || item.payment || "").toLowerCase();
        const matchSearch = detailText.includes(searchTerm) || accountText.includes(searchTerm);

        return matchCat && matchDate && matchSearch;
    });
    
    // เรียงใหม่สุดขึ้นก่อน
    expenseData.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

    // ตัดจำนวนตามแสดงลำดับ
    const paginatedData = expenseData.slice(0, pageSize);

    target.innerHTML = `
    <div class="animate-in fade-in duration-500 font-sans pb-20 p-4 -mt-6 text-left">
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-pink-100 mb-6 flex flex-wrap items-end gap-4">
            
            <div class="flex flex-col gap-1">

// 3. ฟังก์ชัน Save (บันทึกและสั่งโหลดหน้าซ้ำ) — เวอร์ชันปลอดภัย ไม่พังระบบเดิม
window.saveExpense = async function(data) {
    let accountDB = [];
    try {
        accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    } catch (e) {
        accountDB = [];
    }

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const staffBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

    const amountNumber = Number(data.amount || 0);

    const newEntry = {
        id: "EXP-" + Date.now(),
        date: data.date || new Date().toISOString().split('T')[0],
        detail: data.detail || "",
        category: data.category || "ทั่วไป",
        amount: amountNumber,
        total: amountNumber,
        account: data.account || "เงินสด",
        type: "รายจ่าย",
        status: "เสร็จสิ้น",
        branch: staffBranch,
        createdBy: user.name || user.fullName || '-',
        timestamp: Date.now()
    };

    // ✅ บันทึก localStorage ก่อน เพื่อให้ระบบเดิมยังใช้ได้
    accountDB.push(newEntry);
    localStorage.setItem('accountDB', JSON.stringify(accountDB));

    // ✅ ถ้ามี Supabase ค่อย sync ขึ้นไป
    try {
        if (window.supabaseClient) {
            const { error } = await window.supabaseClient
                .from('account')
                .insert([{
                    id: newEntry.id,
                    date: newEntry.date,
                    detail: newEntry.detail,
                    category: newEntry.category,
                    amount: newEntry.amount,
                    total: newEntry.total,
                    account: newEntry.account,
                    type: newEntry.type,
                    status: newEntry.status,
                    branch: newEntry.branch,
                    createdBy: newEntry.createdBy,
                    timestamp: newEntry.timestamp
                }]);

            if (error) {
                console.error('saveExpense supabase error:', error);
            }
        }
    } catch (e) {
        console.error('saveExpense supabase catch:', e);
    }

    Swal.fire({
        icon: 'success',
        title: 'บันทึกสำเร็จ',
        text: `รายการนี้ถูกบันทึกในสาขา ${staffBranch}`,
        showConfirmButton: false,
        timer: 1500
    });

    if (typeof window.renderExpensePage === 'function') {
        window.renderExpensePage();
    }
};

// 4. ฟังก์ชันลบ — กันลบข้ามสาขา
window.deleteExpense = function(id) {
    let accountDB = [];
    try {
        accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    } catch (e) {
        accountDB = [];
    }

    const idx = accountDB.findIndex(item => item.id === id);

    if (idx === -1) {
        Swal.fire('ไม่พบข้อมูล', 'ไม่พบรายการที่ต้องการลบ', 'warning');
        return;
    }

    const row = accountDB[idx];
    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(row.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire('ไม่อนุญาต', 'คุณไม่สามารถลบรายจ่ายของสาขาอื่นได้ค่ะ', 'error');
        return;
    }

    Swal.fire({
        title: 'ยืนยันการลบรายการนี้?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ลบรายการ',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#ef4444'
    }).then((result) => {
        if (!result.isConfirmed) return;

        accountDB = accountDB.filter(item => item.id !== id);
        localStorage.setItem('accountDB', JSON.stringify(accountDB));

        Swal.fire({
            icon: 'success',
            title: 'ลบสำเร็จ',
            timer: 1200,
            showConfirmButton: false
        });

        window.renderExpensePage();
    });
};

/* =======================================================
   🖨️ ฟังก์ชันพิมพ์ใบเสร็จล่าสุดจากหน้าตารางลูกค้า
   ======================================================= */
window.printLatestReceipt = function(name, hn, customerId = '') {
    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];

    const activeCustomer = window.activeCustomer || {};

    // ✅ ใช้ ID เป็นหลัก + fallback เป็น HN (กันข้อมูลเก่า)
    const customerBills = accountDB.filter(b =>
        (
            String(b.customer_id || '') === String(customerId || activeCustomer.id || '') ||
            String(b.hn || '') === String(hn || '') ||
            String(b.customerHn || '') === String(hn || '')
        ) &&
        b.type === "รายรับ" &&
        b.status === "เสร็จสิ้น"
    );

    if (customerBills.length === 0) {
        Swal.fire({
            icon: 'info',
            title: 'ไม่พบประวัติการซื้อ',
            text: `คุณ ${name} ยังไม่มีประวัติการชำระเงินในระบบค่ะ`,
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // เอาบิลล่าสุด
    customerBills.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
    const latestBill = customerBills[0];

    Swal.fire({
        title: 'เลือกขนาดใบเสร็จ',
        text: `บิลล่าสุดวันที่ ${latestBill.date} ยอด ฿${parseFloat(latestBill.total || 0).toLocaleString()}`,
        icon: 'question',
        showDenyButton: true,
        showCancelButton: true,
        confirmButtonText: 'สลิป 80mm',
        denyButtonText: 'ใบเสร็จ A5 (ครึ่ง A4)',
        cancelButtonText: 'ยกเลิก',
        confirmButtonColor: '#000',
        denyButtonColor: '#D48197',
    }).then((result) => {
        const targetHN = latestBill.hn || latestBill.customerHn || '';

        if (result.isConfirmed) {
            if (typeof window.printReceipt === 'function') {
                window.printReceipt(latestBill.id, targetHN, '80mm');
            }
        } else if (result.isDenied) {
            if (typeof window.printReceipt === 'function') {
                window.printReceipt(latestBill.id, targetHN, 'A5');
            }
        }
    });
};

window.saveNewMasterCourse = function() {
    const name = document.getElementById('newCourseName').value.trim();
    const cat = document.getElementById('newCourseCat').value.trim();
    const price = document.getElementById('newCoursePrice').value || 0;
    const amount = document.getElementById('newCourseAmount').value || 1;
    const unit = document.getElementById('newCourseUnit').value.trim() || 'ครั้ง';
    const staffDF = document.getElementById('newCourseDF').value || 0;
    const doctorDF = document.getElementById('newCourseDoctorDF').value || 0;

    if (!name || !cat) {
        alert("⚠️ กรุณาระบุชื่อคอร์สและหมวดหมู่ด้วยนะคะ");
        return;
    }

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const staffBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

    const newCourse = {
        id: "C-" + Date.now(),
        name: name,
        category: cat,
        price: parseFloat(price) || 0,
        amount: parseInt(amount) || 1,
        unit: unit,
        staffDF: parseFloat(staffDF) || 0,
        doctorDF: parseFloat(doctorDF) || 0,
        createdAt: new Date().toLocaleDateString('th-TH'),
        branch: staffBranch,
        createdBy: user.name || user.fullName || '-'
    };

    let masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    masterDB.unshift(newCourse);
    localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));

    alert(`✅ บันทึกคอร์ส "${name}" เรียบร้อยแล้วค่ะ!`);
    closeCourseModal();
    if (typeof updateCourseMasterTable === "function") updateCourseMasterTable();
};

window.editMasterCourse = function(idx) {
    const masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const c = masterDB[idx];
    if (!c) return;

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(c.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        alert("⚠️ คุณไม่มีสิทธิ์แก้ไขคอร์สของสาขาอื่น");
        return;
    }

    openAddCourseModal();

    document.querySelector('#courseModal h3').innerText = "📝 แก้ไขรายการคอร์ส";
    const saveBtn = document.querySelector('#courseModal button[onclick="saveNewMasterCourse()"]');
    saveBtn.innerText = "อัปเดตข้อมูล";

    document.getElementById('newCourseName').value = c.name || '';
    document.getElementById('newCourseCat').value = c.category || '';
    document.getElementById('newCoursePrice').value = String(c.price || '').replace(/,/g, '');
    document.getElementById('newCourseAmount').value = c.amount || 1;
    document.getElementById('newCourseUnit').value = c.unit || 'ครั้ง';
    document.getElementById('newCourseDF').value = String(c.staffDF || '').replace(/,/g, '');
    document.getElementById('newCourseDoctorDF').value = String(c.doctorDF || '').replace(/,/g, '');

    saveBtn.removeAttribute('onclick');
    saveBtn.onclick = function() {
        const name = document.getElementById('newCourseName').value.trim();
        const cat = document.getElementById('newCourseCat').value.trim();
        const price = document.getElementById('newCoursePrice').value || 0;
        const amount = document.getElementById('newCourseAmount').value || 1;
        const unit = document.getElementById('newCourseUnit').value.trim() || 'ครั้ง';
        const staffDF = document.getElementById('newCourseDF').value || 0;
        const doctorDF = document.getElementById('newCourseDoctorDF').value || 0;

        if (!name || !cat) {
            alert("⚠️ กรุณาระบุชื่อคอร์สและหมวดหมู่ด้วยนะคะ");
            return;
        }

        masterDB[idx] = {
            ...masterDB[idx],
            name: name,
            category: cat,
            price: parseFloat(price) || 0,
            amount: parseInt(amount) || 1,
            unit: unit,
            staffDF: parseFloat(staffDF) || 0,
            doctorDF: parseFloat(doctorDF) || 0
        };

        localStorage.setItem('courseMasterDB', JSON.stringify(masterDB));
        alert(`✅ อัปเดตคอร์ส "${name}" เรียบร้อยแล้วค่ะ!`);
        closeCourseModal();
        if (typeof updateCourseMasterTable === "function") updateCourseMasterTable();
    };
};

window.updateStockTable = function() {
    const tbody = document.getElementById('stockTableBody');
    if (!tbody) return;

    tbody.innerHTML = '';

    let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    const searchTerm = (document.getElementById('stockSearchInput')?.value || "").toLowerCase().trim();

    // ล็อกสาขา
    if (typeof window.filterByBranch === 'function' && typeof window.canViewAllBranches === 'function') {
        if (!window.canViewAllBranches()) {
            stockDB = window.filterByBranch(stockDB, item => item.branch);
        }
    }

    const filteredStock = stockDB.filter(s => {
        const nameText = String(s.name || "").toLowerCase();
        const codeText = String(s.code || "").toLowerCase();
        return nameText.includes(searchTerm) || codeText.includes(searchTerm);
    });

    if (filteredStock.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-12 text-center italic text-slate-300 font-normal">📦 ยังไม่มีข้อมูลสต๊อกในขณะนี้</td></tr>`;
        return;
    }

    tbody.innerHTML = filteredStock.map((s, idx) => {

window.saveStockItem = function() {
    const name = document.getElementById('stockItemName').value.trim();
    const qty = document.getElementById('stockQty').value || 0;
    const unit = document.getElementById('stockUnit').value.trim() || 'หน่วย';
    const cost = document.getElementById('stockCost').value || 0;
    const date = document.getElementById('stockDate').value;
    const exp = document.getElementById('stockExp').value;

    if (!name || Number(qty) <= 0) {
        alert("⚠️ กรุณาระบุชื่อยาและจำนวนรับเข้าด้วยนะคะ");
        return;
    }

    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const staffBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || 'บางพลี').replace('สาขา', '').trim();

    const newItem = {
        id: "STK-" + Date.now(),
        name: name,
        qty: parseInt(qty) || 0,
        unit: unit,
        cost: parseFloat(cost) || 0,
        receiveDate: date || '',
        date: date || '',
        expDate: exp || '',
        exp: exp || '',
        branch: staffBranch,
        createdBy: user.name || user.fullName || '-',
        createdAt: Date.now()
    };

    let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    stockDB.unshift(newItem);
    localStorage.setItem('clinicStockDB', JSON.stringify(stockDB));

    alert("✅ บันทึกสต๊อกเรียบร้อยแล้วค่ะ!");
    closeStockModal();
    if (typeof updateStockTable === "function") updateStockTable();
};

// 1. ฟังก์ชันลบสต๊อกด้วย ID
window.deleteStockItemById = function(stockId) {
    let db = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    
    // 🎯 ค้นหาตำแหน่ง Index จริงๆ จาก ID
    const realIdx = db.findIndex(item => String(item.id) === String(stockId));
    if (realIdx === -1) {
        Swal.fire('Error', 'ไม่พบรหัสสินค้าในระบบ', 'error');
        return;
    }

    const row = db[realIdx];

    // 🔐 เช็คสิทธิ์สาขา
    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(row.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire('ไม่อนุญาต', "⚠️ คุณไม่มีสิทธิ์ลบสต๊อกของสาขาอื่น", 'warning');
        return;
    }

    // ✅ ยืนยันการลบ
    Swal.fire({
        title: 'ยืนยันการลบสินค้า?',
        text: `คุณต้องการลบรายการ "${row.name}" ออกจากคลังใช่หรือไม่?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        confirmButtonText: 'ใช่, ลบเลย',
        cancelButtonText: 'ยกเลิก'
    }).then((result) => {
        if (result.isConfirmed) {
            db.splice(realIdx, 1);
            localStorage.setItem('clinicStockDB', JSON.stringify(db));
            
            Swal.fire({
                icon: 'success',
                title: 'ลบสำเร็จ!',
                timer: 1500,
                showConfirmButton: false
            });
            
            if (typeof updateStockTable === "function") updateStockTable();
        }
    });
};

window.saveEditStockById = function(stockId) {
    let stockDB = JSON.parse(localStorage.getItem('clinicStockDB')) || [];
    
    // 🎯 หา Index จาก ID
    const realIdx = stockDB.findIndex(item => String(item.id) === String(stockId));
    if (realIdx === -1) return;

    const row = stockDB[realIdx];

    // 🔐 เช็คสิทธิ์สาขา (Re-check ก่อนเซฟ)
    const user = (typeof window.getCurrentUserSafe === 'function')
        ? window.getCurrentUserSafe()
        : (JSON.parse(localStorage.getItem('currentUser')) || {});

    const isAdminAll = (typeof window.canViewAllBranches === 'function')
        ? window.canViewAllBranches()
        : false;

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String(user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    const rowBranch = String(row.branch || '').replace('สาขา', '').trim();

    if (!isAdminAll && rowBranch !== homeBranch) {
        Swal.fire('Error', "คุณไม่มีสิทธิ์บันทึกสต๊อกของสาขาอื่น", 'error');
        return;
    }

    // 🔄 อัปเดตข้อมูล
    stockDB[realIdx] = {
        ...stockDB[realIdx],
        receiveDate: document.getElementById('editDate').value || '',
        date: document.getElementById('editDate').value || '',

window.autoFillDrugInfo = function(drugName) {
    const drugDB = JSON.parse(localStorage.getItem('drugMasterDB')) || [];
    const drug = drugDB.find(d => d.name === drugName);
    if (drug) {
        if(document.getElementById('lblUsage')) document.getElementById('lblUsage').value = drug.usage || '';
        if(document.getElementById('lblDetail')) document.getElementById('lblDetail').value = drug.detail || '';
    }
};

window.saveDrugMaster = function() {
    const name = document.getElementById('mDrugName').value.trim();
    const usage = document.getElementById('mDrugUsage').value;
    const detail = document.getElementById('mDrugDetail').value;

    if (!name) { alert("⚠️ ระบุชื่อยาด้วยค่ะ"); return; }
    let drugDB = JSON.parse(localStorage.getItem('drugMasterDB')) || [];
    drugDB.unshift({ name, usage, detail });
    localStorage.setItem('drugMasterDB', JSON.stringify(drugDB));

    alert("✅ บันทึกสูตรยามาตรฐานเรียบร้อย!");
    document.getElementById('drugMasterModal').remove();
    openDrugMasterSettings(); 
};

    const c = masterDB[idx];

    document.getElementById('newCourseCat').value = c.category || '';
    document.getElementById('newCoursePrice').value = c.price || 0;
    document.getElementById('newCourseAmount').value = c.amount || 1;

window.getStaffProfileByCode = async function(staffCode) {
    if (!window.supabaseClient) return null;

    const { data, error } = await window.supabaseClient
        .from('staff_profiles')
        .select('*')
        .eq('staff_code', staffCode)
        .single();

    if (error) {
        console.error('getStaffProfileByCode error:', error);
        return null;
    }

    return data || null;
};
