<style>
/* 🎯 [ส่วนสำคัญ] ป้องกันหน้าจอซ้อน: ล็อกหน้า Login ให้บังหน้าอื่น 100% */
#loginPage {
    position: fixed;
    inset: 0;
    z-index: 99999; 
    background-color: #FDF7F8;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

/* ซ่อนหน้า Login เมื่อล็อกอินสำเร็จ */
#loginPage.hidden {
    display: none !important;
}

/* ซ่อนหน้า Dashboard หลักไว้ก่อนจนกว่าจะล็อกอิน */
#mainDashboard {
    display: none;
}

/* แสดงหน้า Dashboard เมื่อได้รับอนุญาตเท่านั้น */
#mainDashboard:not(.hidden) {
    display: flex;
}

/* ========================================= */
/* 💎 สไตล์ความสวยงามเดิมของคุณ (อลิซเก็บไว้ให้ครบค่ะ) */
/* ========================================= */

body { font-family: 'Sarabun', sans-serif; background-color: #FDF7F8; color: #4B5563; font-weight: 300; }

/* เอฟเฟกต์ไฟกะพริบแจ้งคิว */
@keyframes blink-pink {
    0% { background-color: rgba(212,129,151,0); }
    50% { background-color: rgba(212,129,151,0.2); }
    100% { background-color: rgba(212,129,151,0); }
}
.animate-blink { animation: blink-pink 1.5s infinite; }

/* 🖨️ ตั้งค่าการพิมพ์รายงาน และ OPD */
@media print {
    body * { visibility:hidden; }
    aside, header, button, select, input, .no-print { display:none !important; }
    #dynamicContent, #dynamicContent *, #opd-card-printable, #opd-card-printable * { visibility:visible; }
    #dynamicContent, #opd-card-printable { position:absolute; left:0; top:0; width:100%; }
    @page { size:A4 landscape; margin:1cm; }
}

/* ตารางรายการคอร์ส (Luxury ACE Look) */
.course-tag {
    background: transparent !important;
    color: #1a1a1a !important;
    padding: 2px 0;
    font-weight: 500;
    display: block;
    font-size: 13px;
}

.course-header-row {
    background-color: #D48197 !important;
    color: white !important;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 1px;
    text-align: center;
}

.course-header-row th {
    padding-top: 12px !important;
    padding-bottom: 12px !important;
    white-space: nowrap;
}

.glass-card {
    background: white;
    border-radius: 1.5rem;
    padding: 1rem;
    border: 1px solid #FDF2F4;
    box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    overflow-x: auto;
}

/* Sidebar และ Navigation */
.sidebar-item { transition: 0.3s; border-radius: 15px; cursor: pointer; display: flex; align-items: center; padding: 0.9rem 1.2rem; margin-bottom: 5px; font-weight: 600; }
.sidebar-item:hover { background-color: #FFF0F3; color: #D48197; transform: translateX(5px); }
.active-menu { background-color: #D48197 !important; color: white !important; }

/* แท็บโปรไฟล์ลูกค้า */
.profile-tab {
    padding: 12px 25px;
    color: #9CA3AF;
    background: transparent !important;
    border-bottom: 2px solid transparent;
    transition: all 0.3s ease;
    cursor: pointer;
}
.profile-tab.active {
    color: #D48197 !important;
    border-bottom: 2px solid #D48197;
    font-weight: 600;
}

/* ไฟกะพริบสีเขียว (Live Indicator) */
.live-indicator { 
    width: 8px; height: 8px; 
    background-color: #2ecc71; 
    border-radius: 50%; 
    display: inline-block; 
    animation: blink 2s infinite;
    box-shadow: 0 0 8px rgba(46, 204, 113, 0.6); 
}
@keyframes blink { 
    0% { opacity: 1; transform: scale(1); } 
    50% { opacity: 0.4; transform: scale(1.1); } 
    100% { opacity: 1; transform: scale(1); } 
}

/* เอาลูกศรออกจากช่องตัวเลข */
input[type=number]::-webkit-inner-spin-button, 
input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; margin: 0; 
}

.gold-bg { background: linear-gradient(45deg, #D48197, #C5A059) !important; }
</style>


<style id="ace-simple-theme">

:root{
  --ace-pink:#D48197;
  --ace-gold:#C5A059;
  --ace-bg:#F7F8FC;
  --ace-card:#FFFFFF;
  --ace-border:#E2E8F0;
  --ace-text:#0F172A;
  --ace-muted:#64748B;
  --ace-muted2:#94A3B8;
  --ace-shadow: 0 10px 24px rgba(15,23,42,.06);
}

/* Typography */
html,body{
  background:var(--ace-bg)!important;
  color:var(--ace-text)!important;
  font-family: "Sarabun", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"!important;
  font-size:14px;
  line-height:1.5;
}
h1,h2,h3{letter-spacing:-.02em!important;}
/* Make UI clearer (less decorative) */
.italic{font-style:normal!important;}
.uppercase{text-transform:none!important;}
.tracking-widest,.tracking-[0\.2em],.tracking-tighter{letter-spacing:normal!important;}

/* Sidebar */
aside{
  background:var(--ace-card)!important;
  border-right:1px solid var(--ace-border)!important;
}
.sidebar-item{
  border-radius:14px!important;
  box-shadow:none!important;
  transform:none!important;
  font-weight:700!important;
  color:var(--ace-text)!important;
}
.sidebar-item:hover{
  background:#F1F5F9!important;
  color:var(--ace-text)!important;
}
.sidebar-item:hover svg{color:var(--ace-pink)!important;}
.active-menu{
  background:rgba(212,129,151,.12)!important;
  color:var(--ace-text)!important;
  border:1px solid rgba(212,129,151,.25)!important;
}
.active-menu svg{color:var(--ace-pink)!important;}
/* Header chips / pills */
.gold-bg{background:var(--ace-pink)!important;}

/* Cards / panels */
.glass-card,
.bg-white.rounded-\[2\.5rem\],
.bg-white.rounded-\[2\.2rem\],
.bg-white.rounded-\[3rem\]{
  border-radius:20px!important;
  border:1px solid var(--ace-border)!important;
  box-shadow:var(--ace-shadow)!important;
}
.border-pink-50,.border-pink-100,.border-red-50,.border-red-100{
  border-color:var(--ace-border)!important;
}
.shadow-xl,.shadow-2xl,.shadow-lg,.shadow-sm{
  box-shadow:var(--ace-shadow)!important;
}

/* Inputs */
input,select,textarea{
  border-color:var(--ace-border)!important;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--ace-pink)!important;
  box-shadow:0 0 0 3px rgba(212,129,151,.14)!important;
}

/* Tables: clearer grid */
table{border-collapse:separate!important;border-spacing:0!important;}
thead th{
  background:#F8FAFC!important;
  color:var(--ace-muted)!important;
  border-bottom:1px solid var(--ace-border)!important;
}
td,th{border-bottom:1px solid var(--ace-border)!important;}
tbody tr:hover{background:#FAFAFF!important;}
/* Ensure outer border looks clear when wrapper exists */
.table-wrap{border:1px solid var(--ace-border)!important;border-radius:18px!important;overflow:hidden!important;}

/* Small text colors */
.text-slate-400{color:var(--ace-muted2)!important;}
.text-slate-600{color:var(--ace-muted)!important;}
.ace-pink{color:var(--ace-pink)!important;}

</style>

</head>

// --- 1. ระบบ Suggestion บัญชีที่บันทึกไว้ (แบบ Google เด้งใต้ช่องพิมพ์) ---
window.initAccountSuggestion = function() {
    const uInput = document.getElementById('uIn');
    if (!uInput) return;

    const oldContainer = document.getElementById('savedAccountsContainer');
    if (oldContainer) oldContainer.style.display = 'none';

    let suggestionBox = document.getElementById('accountSuggestionBox');
    if (!suggestionBox) {
        suggestionBox = document.createElement('div');
        suggestionBox.id = 'accountSuggestionBox';
        
        // บังคับให้ช่องพิมพ์เป็นจุดอ้างอิงตำแหน่ง (Relative)
        uInput.parentElement.style.position = 'relative';
        
        // สร้างกล่องให้อยู่ใต้ช่องพิมพ์พอดี (top: calc(100% + 4px))
        suggestionBox.style.cssText = `
            position: absolute; top: calc(100% + 4px); left: 0; right: 0;
            background: white; border: 1px solid #ffe4e6; border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 9999;
            display: none; max-height: 180px; overflow-y: auto; text-align: left;
        `;
        uInput.insertAdjacentElement('afterend', suggestionBox);
    }

    uInput.addEventListener('focus', () => {
        const savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        if (savedList.length === 0) return;
        
        suggestionBox.innerHTML = savedList.map(acc => `
            <div onclick="window.selectAccount('${acc.user}', '${acc.pass}')" class="flex items-center gap-3 p-3 hover:bg-pink-50 cursor-pointer border-b border-pink-50 last:border-0">
                <div class="w-8 h-8 bg-[#D48197] text-white rounded-full flex items-center justify-center font-bold text-xs">${acc.name ? acc.name.substring(0,1) : '👤'}</div>
                <div class="flex-1">
                    <p class="text-[11px] font-bold text-slate-700 m-0">${acc.name}</p>
                    <p class="text-[9px] text-slate-400 uppercase m-0">${acc.role} | ${acc.branch || ''}</p>
                </div>
                <button onclick="event.stopPropagation(); window.removeSavedAccount('${acc.user}')" class="text-slate-300 hover:text-red-500 p-1 text-xs">✕</button>
            </div>
        `).join('');
        suggestionBox.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
        if (!uInput.contains(e.target) && !suggestionBox.contains(e.target)) {
            suggestionBox.style.display = 'none';
        }
    });
};

};

    savedList = savedList.filter(acc => acc.user !== u);
    localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));

        // สั่งให้ระบบล็อกอินเข้าหน้า Dashboard ทันทีโดยไม่ต้องกรอกรหัสผ่านใหม่
        // ส่งค่ารหัสผ่านเป็นค่าว่างไป เพราะ executeLogin ของคุณไม่ได้เช็ครหัสซ้ำข้างใน
        window.executeLogin(userObj, userObj.phone || userObj.staffId, '');

// --- 2. ฟังก์ชันเปิด/ปิดตาดูรหัสผ่าน ---
window.togglePasswordVisibility = function() {
    const pIn = document.getElementById('pIn');
    const eye = document.getElementById('eyeIcon');
    if (pIn.type === 'password') { 
        pIn.type = 'text'; 
        eye.innerText = '🙈'; 
    } else {

        eye.innerText = '👁️'; 
    }
};

// --- 3. ฟังก์ชันเข้าสู่ระบบ (Login) ฉบับสมบูรณ์ (ล็อกสิทธิ์ CEO/Admin ให้ออโต้) ---
window.doLogin = function() {
    const u = document.getElementById('uIn').value.trim();
    const p = document.getElementById('pIn').value.trim();

    if (!u || !p) {
        Swal.fire({ icon: 'warning', text: 'กรุณากรอกชื่อผู้ใช้และรหัสผ่านค่ะ', confirmButtonColor: '#D48197' });
        return;
    }

    /* 🔒 ส่วนที่ 1: บัญชีแอดมินหลัก (Super Admin) - ล็อกรหัสส่วนตัว */
    if (u === 'onouma39' && p === 'Onouma2539') {
        const superUser = { 
            name: 'คุณอรอุมา (Owner)', 
            role: 'แอดมินหลัก', 
            branch: 'ทุกสาขา',
            homeBranch: 'ทุกสาขา'
        };
        // ปลดล็อกสิทธิ์ทุกเมนูให้ Admin เสมอ รวมถึงบอร์ด CEO (เลข 10)
        const perms = JSON.parse(localStorage.getItem('ace_permissions')) || {};
        perms["แอดมินหลัก"] = ["1", "2", "3", "9", "4", "52", "51", "53", "6", "7", "8", "10"];
        localStorage.setItem('ace_permissions', JSON.stringify(perms));
        
        executeLogin(superUser, u, p);
        return;
    }

    /* 🔑 ส่วนที่ 2: เช็ครหัสผ่าน CEO / แพทย์ จากหน้าตั้งค่า */
    const masterPass = JSON.parse(localStorage.getItem('ace_master_pass')) || { admin: '', ceo: '', doctor: '' };
    if (masterPass.ceo && u === 'ceo' && p === masterPass.ceo) {
        executeLogin({ name: 'ผู้บริหาร (CEO)', role: 'CEO', branch: 'ทุกสาขา', homeBranch: 'ทุกสาขา' }, u, p);
        return;
    }

    /* 👥 ส่วนที่ 3: ตรวจสอบพนักงานทั่วไป (StaffDB) */
    const staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    const staffUser = staffDB.find(s => (s.phone === u || s.staffId === u) && s.status !== 'ออก');

    if (staffUser) {
        if (staffUser.isLocked) {
            Swal.fire({ icon: 'error', title: 'บัญชีถูกระงับ', text: 'กรุณาติดต่อแอดมินค่ะ', confirmButtonColor: '#D48197' });
            return;
        }
        const validPass = staffUser.password || (staffUser.phone ? staffUser.phone.slice(-4) : '9999');
        if (p === validPass) { 
            executeLogin({ 
                staffId: staffUser.staffId, 
                name: staffUser.name, 
                role: staffUser.role || 'พนักงานทรีทเม้นท์', 
                branch: staffUser.branch || 'บางพลี',
                homeBranch: staffUser.branch || 'บางพลี'
            }, u, p);
            return;
        }
    }

    Swal.fire({ icon: 'error', title: 'เข้าสู่ระบบไม่สำเร็จ', text: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้องค่ะ', confirmButtonColor: '#D48197' });
};

window.executeLogin = function(user, loginUserStr, loginPassStr) {
    // 💾 1. บันทึกบัญชีถ้าติ๊กถูก "จำรหัสผ่าน" (คงเดิม)
    const remember = document.getElementById('rememberMe')?.checked;
    if (remember) {
        let savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
        savedList = savedList.filter(acc => acc.user !== loginUserStr);
        savedList.unshift({ user: loginUserStr, pass: loginPassStr, name: user.name, role: user.role });
        if(savedList.length > 3) savedList.pop();
        localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
    }

    window.currentUser = user; 
    localStorage.setItem('currentUser', JSON.stringify(user));

    // 🚪 2. สลับหน้าจอจาก Login ไป Dashboard
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('mainDashboard').classList.remove('hidden');
    
    // 👤 3. อัปเดตข้อมูลบนเมนู (คงเดิม)
    if(document.getElementById('userNameLabel')) document.getElementById('userNameLabel').innerText = `${user.name} (${user.role})`;
    if(document.getElementById('userBranchBadge')) document.getElementById('userBranchBadge').innerText = `สาขา: ${user.branch}`;
    if(document.getElementById('userInitial')) document.getElementById('userInitial').innerText = user.name.substring(0, 2);

    // ✨ 4. อัปเดตข้อมูลกล่อง Dropdown (คงเดิม)
    const initialStr = user.name ? user.name.substring(0, 2).toUpperCase() : 'ON';
    if(document.getElementById('topProfileInitial')) document.getElementById('topProfileInitial').innerText = initialStr;
    if(document.getElementById('dropProfileInitial')) document.getElementById('dropProfileInitial').innerText = initialStr;
    if(document.getElementById('dropProfileName')) document.getElementById('dropProfileName').innerText = user.name;
    if(document.getElementById('dropProfileRole')) document.getElementById('dropProfileRole').innerText = user.role;
    if(document.getElementById('dropProfileContact')) document.getElementById('dropProfileContact').innerText = user.phone || 'พนักงานคลินิก';

    // 📋 5. วาดเมนูตามสิทธิ์การใช้งาน
    if (typeof renderMenuByRole === 'function') renderMenuByRole(user.role);
    
    // 🏠 6. อัปเดตกล่องสาขา (ปุ่มบ้าน)
    if(typeof renderBranchDropdown === 'function') renderBranchDropdown();
    
    // 🚀 7. [จุดที่แก้ไข] เลือกหน้าแรกที่จะแสดงตามตำแหน่งและความปลอดภัย
    const viewingBranch = (user.branch || '').replace('สาขา', '').trim();
    const homeBranch = (user.homeBranch || user.branch || '').replace('สาขา', '').trim();
    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(user.role);
    const urlParams = new URLSearchParams(window.location.search);

    // A. กรณีดูภาพรวม CEO
    if (urlParams.get('target') === 'ceo_board') {
        loadPage(10, 'บอร์ดรวมทุกสาขา');
        window.history.replaceState({}, document.title, window.location.pathname);
    } 
    // B. กรณีดูข้ามสาขา (ไม่ใช่ Admin และสาขาไม่ตรงบ้านเกิด)
    else if (!isAdmin && viewingBranch !== homeBranch) {
        // บังคับไปหน้าจัดการลูกค้า/ประวัติ ทันที
        loadPage(2, 'จัดการลูกค้า/ประวัติ');
    } 
    // C. กรณีตำแหน่งพนักงานทรีทเม้นท์ในสาขาตัวเอง
    else if (user.role === 'พนักงานทรีทเม้นท์') { 
        loadPage(52, 'ห้องจัดการคิว'); 
    } 
    // D. กรณี Admin หรือ ผู้จัดการในสาขาตัวเอง
    else {

    branches.forEach(b => {

                        ${isActive ? '<span class="px-2 py-[2px] border border-green-500 text-green-500 rounded-full text-[9px] font-bold tracking-wider">ใช้งาน</span>' : ''}
                    </div>
                </div>
            </div>

    if (['แอดมินหลัก', 'CEO'].includes(role)) {
        const isAllActive = currentBranch === 'ทุกสาขา';

    <div class="mt-1 pt-2 border-t border-slate-100">
        <div onclick="loadPage(10, 'บอร์ดรวมทุกสาขา')" class="w-full text-center p-3 rounded-xl bg-slate-800 hover:bg-[#C5A059] text-white text-[11px] font-bold cursor-pointer transition-all uppercase tracking-widest shadow-sm">

        </div>
    </div>
`;

window.changeBranch = function(branchName) {
    Swal.close();

    let user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = user.role || '';
    const homeBranch = user.homeBranch || user.branch || '';

    // 🔒 1. ล็อกสิทธิ์: พนักงานทั่วไปห้ามเปลี่ยนสาขา
    if (!['แอดมินหลัก', 'CEO', 'ผู้จัดการ'].includes(role)) {
        user.branch = homeBranch;
        localStorage.setItem('currentUser', JSON.stringify(user));
        Swal.fire({
            icon: 'warning',
            title: 'ไม่อนุญาต',
            text: 'ตำแหน่งของคุณใช้งานได้เฉพาะสาขาต้นสังกัดเท่านั้นค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // 🔒 2. ล็อกสิทธิ์: ผู้จัดการห้ามดู "ทุกสาขา"
    if (role === 'ผู้จัดการ' && branchName === 'ทุกสาขา') {
        Swal.fire({
            icon: 'warning',
            title: 'ไม่อนุญาต',
            text: 'ผู้จัดการสามารถดูข้อมูลแยกได้ตามรายสาขาเท่านั้นค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // ✅ 3. อัปเดตข้อมูลสาขาใหม่ลงในระบบ
    user.branch = branchName;
    // สำคัญ: ต้องเซฟลง localStorage เพื่อให้ตอนรีโหลดระบบยังจำได้ว่าเปลี่ยนเป็นสาขานี้แล้ว
    localStorage.setItem('currentUser', JSON.stringify(user));
    window.currentUser = user; 

    // 🔄 4. แสดงสถานะการโหลด
    Swal.fire({
        title: `กำลังสลับไป "${branchName}"`,
        text: 'ระบบกำลังกรองข้อมูลสาขาใหม่ค่ะ...',
        allowOutsideClick: false,
        showConfirmButton: false,
        didOpen: () => {
            Swal.showLoading();
        }
    });

    // หน่วงเวลาเล็กน้อยเพื่อให้ความรู้สึกสมูท แล้วค่อยรีโหลด
    setTimeout(() => {
        location.reload(); 
    }, 600);
};

            <div class="space-y-4 mt-4 text-left">

                <div>
                    <label class="text-[10px] font-bold text-[#D48197] ml-2 uppercase">ยืนยันรหัสผ่านใหม่</label>

            </div>
        `,

            if (!oldP || !newP || !confP) { Swal.showValidationMessage('กรุณากรอกข้อมูลให้ครบทุกช่องค่ะ'); return false; }
            if (newP !== confP) { Swal.showValidationMessage('รหัสผ่านใหม่ไม่ตรงกันค่ะ'); return false; }

window.processPasswordChange = function(oldPass, newPass) {
    const currentUser = window.getCurrentUserSafe ? window.getCurrentUserSafe() : (() => {
        try {
            return JSON.parse(localStorage.getItem('currentUser')) || {};
        } catch (e) {
            return {};
        }
    })();

    if (!currentUser || !currentUser.staffId) {
        return Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูลผู้ใช้งานปัจจุบัน กรุณาเข้าสู่ระบบใหม่', 'error');
    }

    if (currentUser.role === 'แอดมินหลัก' || currentUser.role === 'CEO') {
        return Swal.fire('ไม่อนุญาต', 'บัญชีผู้บริหารระดับสูง ไม่สามารถเปลี่ยนรหัสผ่านหน้านี้ได้ค่ะ', 'error');
    }

    const safeOldPass = String(oldPass || '').trim();
    const safeNewPass = String(newPass || '').trim();

    if (!safeOldPass || !safeNewPass) {
        return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกรหัสผ่านปัจจุบันและรหัสผ่านใหม่ให้ครบค่ะ', 'warning');
    }

    if (safeNewPass.length < 4) {
        return Swal.fire('รหัสผ่านสั้นเกินไป', 'รหัสผ่านใหม่ต้องมีอย่างน้อย 4 ตัวอักษรค่ะ', 'warning');
    }

    let staffDB = [];
    try {
        staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    } catch (e) {
        staffDB = [];
    }

    const staffIndex = staffDB.findIndex(s => String(s.staffId || '') === String(currentUser.staffId || ''));

    if (staffIndex === -1) {
        return Swal.fire('ข้อผิดพลาด', 'ไม่พบประวัติพนักงานของคุณในระบบ', 'error');
    }

    const staff = staffDB[staffIndex] || {};
    const phoneLast4 = staff.phone ? String(staff.phone).slice(-4) : '9999';
    const actualPass = String(staff.password || phoneLast4);

    if (safeOldPass !== actualPass && safeOldPass !== '1111') {
        return Swal.fire('ผิดพลาด', 'รหัสผ่านปัจจุบันไม่ถูกต้องค่ะ', 'error');
    }

    staffDB[staffIndex].password = safeNewPass;
    localStorage.setItem('staffDB', JSON.stringify(staffDB));

    let savedList = [];
    try {
        savedList = JSON.parse(localStorage.getItem('ace_saved_accounts')) || [];
    } catch (e) {
        savedList = [];
    }

    const savedIndex = savedList.findIndex(acc =>
        String(acc.staffId || '') === String(currentUser.staffId || '') ||
        String(acc.name || '') === String(currentUser.name || '')
    );

    if (savedIndex !== -1) {
        savedList[savedIndex].pass = safeNewPass;
        localStorage.setItem('ace_saved_accounts', JSON.stringify(savedList));
    }

    Swal.fire({
        icon: 'success',
        title: 'เปลี่ยนรหัสผ่านสำเร็จ!',
        text: 'ใช้รหัสใหม่เข้าระบบครั้งหน้านะคะ',
        confirmButtonColor: '#D48197'
    });
};

// --- Branch Helper (single source of truth) ---
window.normalizeBranch = function(branch = '') {
    return String(branch || '')
        .replace(/^สาขา/, '')
        .trim();
};

window.getCurrentUserSafe = function() {
    try {
        return JSON.parse(localStorage.getItem('currentUser')) || {};
    } catch (e) {
        return {};
    }
};

window.getCurrentViewingBranch = function() {
    const currentUser = window.getCurrentUserSafe();
    return window.normalizeBranch(currentUser.branch || 'ทุกสาขา');
};

window.getUserHomeBranch = function() {
    const currentUser = window.getCurrentUserSafe();
    return window.normalizeBranch(currentUser.homeBranch || currentUser.branch || '');
};

window.canViewAllBranches = function() {
    const currentUser = window.getCurrentUserSafe();
    return ['แอดมินหลัก', 'CEO'].includes(currentUser.role || '') &&
           window.getCurrentViewingBranch() === 'ทุกสาขา';
};

window.filterByBranch = function(data = [], getBranchValue = (item) => item?.branch) {
    const viewingBranch = window.getCurrentViewingBranch();
    const isAllBranches = window.canViewAllBranches();

    return (Array.isArray(data) ? data : []).filter(item => {
        const itemBranch = window.normalizeBranch(getBranchValue(item) || '');
        if (isAllBranches) return true;
        return itemBranch === viewingBranch;
    });
};

window.renderDashboard = function(target, period = 'day') {
    if (!target) return;

    // 1. ดึงข้อมูลผู้ใช้งานเพื่อเช็คสาขา
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const viewingBranch = user.branch || 'ทุกสาขา';
    
    // ถ้าเป็นแอดมินที่เลือก 'ทุกสาขา' จะให้ผ่านเงื่อนไข (โชว์ข้อมูลทั้งหมด)
    const isShowAll = (viewingBranch === 'ทุกสาขา'); 

    const accountDB = JSON.parse(localStorage.getItem('accountDB')) || [];
    const appointmentDB = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    
    const now = new Date();
    const today = now.toISOString().split('T')[0];
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    const currentMonth = today.substring(0, 7);
    const currentYear = today.substring(0, 4);
    const todayThai = now.toLocaleDateString("th-TH");

    // 2. 💡 กรองข้อมูลตามสาขาที่กำลังดูอยู่ (ปรับปรุงให้รองรับชื่อสาขาทุกรูปแบบ)
    // ล้างคำว่า "สาขา" ออกจากชื่อสาขาที่กำลังดูเพื่อใช้เปรียบเทียบ
    const cleanViewingBranch = viewingBranch.replace('สาขา', '').trim();

    let statsIncomes = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายรับ" && 
               item.status === "เสร็จสิ้น" && 
               (isShowAll || itemBranch === cleanViewingBranch);
    });

    let statsExpenses = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายจ่าย" && 
               (isShowAll || itemBranch === cleanViewingBranch);
    });

    let statsApps = appointmentDB.filter(a => {
        const aBranch = String(a.branch || '').replace('สาขา', '').trim();
        return (isShowAll || aBranch === cleanViewingBranch);
    });

    let statsCustomers = customerDB.filter(c => {
        const cBranch = String(c.branch || '').replace('สาขา', '').trim();
        return (isShowAll || cBranch === cleanViewingBranch);
    });

    // 3. กรองตามช่วงเวลา (รายวัน / รายเดือน / รายปี)
    if (period === 'day') {
        statsIncomes = statsIncomes.filter(i => i.date === today);
        statsExpenses = statsExpenses.filter(e => e.date === today);
        statsApps = statsApps.filter(a => a.date === today);
        statsCustomers = statsCustomers.filter(c => c.date === today || c.createdAt === todayThai); 
    } else if (period === 'month') {
        statsIncomes = statsIncomes.filter(i => i.date && i.date.startsWith(currentMonth));
        statsExpenses = statsExpenses.filter(e => e.date && e.date.startsWith(currentMonth));
        statsApps = statsApps.filter(a => a.date && a.date.startsWith(currentMonth));
        statsCustomers = statsCustomers.filter(c => (c.date && c.date.startsWith(currentMonth)) || (c.createdAt && c.createdAt.includes("/" + String(now.getMonth()+1).padStart(2,'0') + "/")));
    } else if (period === 'year') {
        statsIncomes = statsIncomes.filter(i => i.date && i.date.startsWith(currentYear));
        statsExpenses = statsExpenses.filter(e => e.date && e.date.startsWith(currentYear));
        statsApps = statsApps.filter(a => a.date && a.date.startsWith(currentYear));
        statsCustomers = statsCustomers.filter(c => (c.date && c.date.startsWith(currentYear)) || (c.createdAt && c.createdAt.includes(String(now.getFullYear()+543))));
    }

  // 4. 💡 ส่วนแสดงผลตารางด้านล่าง (ปรับให้ใช้ตัวเปรียบเทียบที่แม่นยำขึ้น)
    const incomesToday = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายรับ" && item.status === "เสร็จสิ้น" && item.date === today && (isShowAll || itemBranch === cleanViewingBranch);
    });

    const expensesToday = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายจ่าย" && item.date === today && (isShowAll || itemBranch === cleanViewingBranch);
    });

    const appsToday = appointmentDB.filter(a => {
        const aBranch = String(a.branch || '').replace('สาขา', '').trim();
        return a.date === today && (isShowAll || aBranch === cleanViewingBranch);
    });

    // คำนวณสรุปยอดเงิน
    const totalSales = statsIncomes.reduce((sum, item) => sum + (parseFloat(String(item.total).replace(/[^0-9.-]+/g,"")) || 0), 0);
    const totalExp = statsExpenses.reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);
    const netProfit = totalSales - totalExp;
    
    // ยอดขายเมื่อวาน (ปรับให้แม่นยำขึ้นเช่นกัน)
    const salesYesterday = accountDB.filter(item => {
        const itemBranch = String(item.branch || '').replace('สาขา', '').trim();
        return item.type === "รายรับ" && item.status === "เสร็จสิ้น" && item.date === yesterday && (isShowAll || itemBranch === cleanViewingBranch);
    }).reduce((sum, item) => sum + (parseFloat(String(item.total).replace(/[^0-9.-]+/g,"")) || 0), 0);

    const titleLabel = period === 'day' ? "วันนี้" : (period === 'month' ? "เดือนนี้" : "ปีนี้");

    
    target.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8 font-black italic uppercase animate-in slide-in-from-bottom duration-500">
            <div class="glass-card border-l-8 border-[#C5A059] shadow-sm">
                <p class="text-[10px] text-gray-400 font-bold uppercase">ยอดขาย${titleLabel}</p>
                <p class="text-3xl text-gray-800 mt-2 font-black italic">฿${totalSales.toLocaleString()}</p>
                <p class="text-[9px] text-slate-400 font-bold mt-1">(เมื่อวานนี้: ฿${salesYesterday.toLocaleString()})</p>
            </div>
            
            <div class="glass-card border-l-8 border-[#D48197] shadow-sm">
                <p class="text-[10px] text-gray-400 font-bold uppercase">ลูกค้าใหม่${titleLabel}</p>
                <p class="text-3xl text-gray-800 mt-2 font-black italic">${statsCustomers.length.toLocaleString()} คน</p>
                <p class="text-[9px] text-slate-400 font-bold mt-1">(สะสมทั้งหมด: ${customerDB.length.toLocaleString()} คน)</p>
            </div>
            
            <div class="glass-card border-l-8 border-blue-400 shadow-sm">
                <p class="text-[10px] text-gray-400 font-bold uppercase">คิวนัด${titleLabel}</p>
                <p class="text-3xl text-gray-800 mt-2 font-black italic">${statsApps.length.toLocaleString()} นัด</p>
            </div>
            
            <div class="glass-card border-l-8 border-green-400 shadow-sm">
                <p class="text-[10px] text-gray-400 font-bold uppercase">สุทธิ${titleLabel}</p>
                <p class="text-3xl text-green-600 mt-2 font-black italic">฿${netProfit.toLocaleString()}</p>
            </div>
        </div>

        <div class="glass-card shadow-lg mb-8 border-t-4 border-blue-400">
            <h3 class="text-lg font-black ace-pink mb-6 uppercase italic">📅 รายการคิวนัดหมายวันนี้ (${appsToday.length} นัด)</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[11px] font-black italic uppercase">
                    <thead class="bg-slate-50 text-gray-500 border-b">
                        <tr>
                            <th class="p-3">ลำดับ</th>
                            <th class="p-3">HN</th>
                            <th class="p-3">เวลา</th>
                            <th class="p-3">เบอร์โทร</th>
                            <th class="p-3">ชื่อ-นามสกุล</th>
                            <th class="p-3">ชื่อเล่น</th>

// 1. ฟังก์ชันเช็คสิทธิ์เข้าถึงตามสาขาและบทบาท
window.canAccessMenuByBranch = function(menuId) {
    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = user.role || '';
    const currentBranch = (user.branch || '').replace('สาขา', '').trim();
    const homeBranch = (user.homeBranch || user.branch || '').replace('สาขา', '').trim();

    // แอดมินหลัก และ CEO เข้าได้ทุกสาขา
    if (role === 'แอดมินหลัก' || role === 'CEO') return true;

    // 💼 ล็อกสิทธิ์ผู้จัดการ: ถ้าอยู่สาขาอื่น ให้ผ่านแค่เมนู 2 (ลูกค้า) และ 4 (นัดหมาย)
    if (role === 'ผู้จัดการ') {
        if (currentBranch === homeBranch) return true;
        return ['2', '4'].includes(String(menuId)); // 👈 เห็นแค่ 2 เมนูนี้เท่านั้น
    }

    // พนักงานทั่วไป: ต้องตรงสาขาเท่านั้น
    return currentBranch === homeBranch;
};

// 3. ฟังก์ชันหลักในการเปลี่ยนหน้าจอ
window.loadPage = function(id, title) {
    const target = document.getElementById('dynamicContent');
    if (!target || id === -1) return;

    // ระบบ Branch Guard
    if (!window.canAccessMenuByBranch(id)) {
        Swal.fire({
            icon: 'error',
            title: 'ไม่มีสิทธิ์เข้าถึง',
            text: 'ตำแหน่งนี้ไม่สามารถดูเมนูนี้ในสาขาที่เลือกได้ค่ะ',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    // อัปเดต UI หัวข้อและแถบสีเมนู
    const titleEl = document.getElementById('pageTitle');
    if (titleEl) titleEl.innerText = title.toUpperCase();
    
    const periodZone = document.getElementById('dynamicPeriodZone');
    if (periodZone) periodZone.style.display = (id === 1) ? 'flex' : 'none';

    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active-menu'));
    
    // Highlight เมนูที่ถูกกด (รวมถึงเมนูย่อย)
    const allSidebarItems = document.querySelectorAll('.sidebar-item');
    allSidebarItems.forEach(item => { 
        if(item.innerText.toUpperCase().includes(title.replace('มาตรฐาน', '').trim().toUpperCase())) { 
            item.classList.add('active-menu'); 
            const parentSubmenu = item.closest('.submenu');
            if (parentSubmenu) {
                parentSubmenu.style.maxHeight = "300px"; 
                parentSubmenu.style.opacity = "1";
                const arrow = parentSubmenu.previousElementSibling?.querySelector('.arrow-icon');
                if(arrow) arrow.classList.add('rotate');
            }
        } 
    });

    // เรียกฟังก์ชันวาดหน้าจอ (ตรวจสอบความมีอยู่ก่อนรัน)
    const routes = {
        1: () => typeof renderDashboard === 'function' && renderDashboard(target),
        2: () => typeof renderCustomerList === 'function' && renderCustomerList(target),
        3: () => typeof renderSalesPage === 'function' && renderSalesPage(),
        4: () => typeof renderAppointmentPage === 'function' && renderAppointmentPage(),
        6: () => typeof renderReportPage === 'function' && renderReportPage(),
        7: () => typeof renderStaffManagement === 'function' && renderStaffManagement(),
        8: () => typeof renderSettingsPage === 'function' && renderSettingsPage(),
        9: () => typeof renderExpensePage === 'function' && renderExpensePage(),
        11: () => typeof renderPayrollSystem === 'function' && renderPayrollSystem(),
        12: () => typeof renderAttendanceRecord === 'function' && renderAttendanceRecord(),
        51: () => typeof renderCourseMasterPage === 'function' && renderCourseMasterPage(),
        52: () => typeof renderQueuePage === 'function' && renderQueuePage(),
        53: () => typeof renderStockPage === 'function' && renderStockPage(),
        66: () => typeof renderDFReportPage === 'function' && renderDFReportPage(),
        10: () => {
            if(typeof renderSettingsPage === 'function') {
                renderSettingsPage();
                setTimeout(() => {
                    const btn = document.querySelector('button[onclick*="allBranchBoard"]');
                    if(btn) window.switchSettingsTab('allBranchBoard', btn);
                }, 100);
            }
        }
    };

    if (routes[id]) {
        routes[id]();
    } else {
        target.innerHTML = `<div class="glass-card py-32 text-center text-slate-300 font-bold uppercase text-xl italic">เมนู ${title} <br> กำลังพัฒนา...</div>`; 
    }
};

// 4. ระบบจัดการ Submenu
window.toggleBillingMenu = () => window.handleSubmenu('billingSubmenu', 'billingArrow', 'serviceSubmenu', 'serviceArrow');
window.toggleServiceSubmenu = () => window.handleSubmenu('serviceSubmenu', 'serviceArrow', 'billingSubmenu', 'billingArrow');

window.handleSubmenu = function(targetId, targetArrowId, otherId, otherArrowId) {
    const target = document.getElementById(targetId);
    const arrow = document.getElementById(targetArrowId);
    window.closeSubmenu(otherId, otherArrowId);

    if (target.style.maxHeight === "0px" || !target.style.maxHeight) {
        target.style.maxHeight = "300px";
        target.style.opacity = "1";
        target.style.marginTop = "5px";
        arrow.style.transform = "rotate(180deg)";
    } else {
        window.closeSubmenu(targetId, targetArrowId);
    }
};

window.closeSubmenu = function(id, arrowId) {
    const el = document.getElementById(id);
    const arrow = document.getElementById(arrowId);
    if (el) {
        el.style.maxHeight = "0px";
        el.style.opacity = "0";
        el.style.marginTop = "0px";
    }
    if (arrow) arrow.style.transform = "rotate(0deg)";
};

window.searchProduct = function(val) {
    const resDiv = document.getElementById('searchResult');
    if (!val) { resDiv.classList.add('hidden'); return; }
    
    const masterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];
    const matches = masterDB.filter(p => p.name.toLowerCase().includes(val.toLowerCase()));
    
    if (matches.length > 0) {
        resDiv.innerHTML = matches.map(p => `
            <div onclick="window.selectProduct('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.category}', '${p.unit}')" 
                class="p-4 hover:bg-pink-50 cursor-pointer border-b border-pink-50 flex justify-between items-center bg-white transition-all shadow-sm">
                <div class="text-left">
                    <span class="text-sm font-bold text-slate-700 block">${p.name}</span>
                    <span class="text-[9px] text-slate-400 uppercase italic">${p.category} | ฿${parseFloat(p.price).toLocaleString()} / ${p.unit}</span>
                </div>
                <span class="text-[10px] bg-pink-100 text-[#D48197] px-3 py-1 rounded-full font-bold uppercase">เลือก</span>
            </div>`).join('');
        resDiv.classList.remove('hidden');
    } else {
        resDiv.classList.add('hidden');
    }
};

// ปรับฟังก์ชันรับค่า (เรียกผ่าน window เพื่อความชัวร์)
window.selectProduct = function(name, price, cat, unit) {
    const nameInp = document.getElementById('itemName');
    if (nameInp) {
        nameInp.value = name;
        nameInp.dataset.category = cat;
        nameInp.dataset.unit = unit;

};

function applyCustomerFilter() {
    const keyword = document.getElementById("searchInput").value.toLowerCase();
    const branch = document.getElementById("branchFilter").value;
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];

    let filtered = customerDB.filter(c => {
        const matchKeyword =
            c.fullname?.toLowerCase().includes(keyword) ||
            c.hn?.toLowerCase().includes(keyword) ||
            c.phone?.includes(keyword);

        const matchBranch =
            branch === "ทั้งหมด" || c.branch === branch;

        return matchKeyword && matchBranch;
    });

    renderCustomerTable(filtered);
}

window.printOPD = function(hn) {
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const c = customerDB.find(item => String(item.hn) === String(hn));
    if (!c) return;

    const target = document.getElementById('dynamicContent');
    
    // ฟังก์ชัน autoFillCourse (ปรับให้ใช้งานได้ตามปกติภายใน scope)
    window.autoFillCourse = function(courseName, amount, totalPrice) {
        const typeSelect = document.getElementById('opdTypeSelector');
        if (typeSelect && typeSelect.value !== 'skin_injection') {
            alert('กรุณาเลือกประเภท OPD เป็น "คอร์สฉีดผิว" ก่อนนะคะ');
            return;
        }
        const tables = document.querySelectorAll('#opd-dynamic-layout table');
        let allCells = []; 
        tables.forEach(table => {
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => { if(row.cells[2]) allCells.push(row.cells[2]); });
        });
        
        let startIndex = allCells.findIndex(cell => cell.innerText.trim() === "");
        if (startIndex === -1) return;
        
        for (let i = 0; i < amount; i++) {
            if (allCells[startIndex + i]) {
                allCells[startIndex + i].innerText = `${courseName} ${i+1}/${amount}`;

        if (!dateString) return "-";
        const today = new Date();
        const birth = new Date(dateString.split('/').reverse().join('-'));
        let age = today.getFullYear() - birth.getFullYear();
        if (today.getMonth() < birth.getMonth() || (today.getMonth() === birth.getMonth() && today.getDate() < birth.getDate())) age--;

window.handleOPDPrint = function() {
    const type = document.getElementById('opdTypeSelector').value;
    if (type === 'general') {
        const notes = document.getElementById('treatmentNotesGeneral');
        document.getElementById('printNotesGeneral').innerText = notes ? notes.value : '';
    } else if (type === 'botox_filler' || type === 'varicose_veins') {
        const notes = document.getElementById('treatmentNotesSpec');
        document.getElementById('printNotesSpec').innerText = notes ? notes.value : '';
    } else if (type === 'skin_injection') {
        const notes = document.getElementById('treatmentNotesSkin');
        document.getElementById('printNotesSkin').innerText = notes ? notes.value : '';
    }
    window.print();
};

window.saveTreatmentHistory = function(hn) {
    const typeSelect = document.getElementById('opdTypeSelector');
    const selectedType = typeSelect ? typeSelect.value : 'general';
    let detailToSave = "";
    
    // 🎯 เปลี่ยนการดึงข้อมูลเป็นแบบหาด้วย HN (ID 100%)
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const cIdx = customerDB.findIndex(c => String(c.hn) === String(hn));
    
    if (cIdx === -1) return alert("❌ ไม่พบข้อมูลคนไข้ในระบบ");

    if (selectedType === 'skin_injection') {
        const tables = document.querySelectorAll('#opd-dynamic-layout table');
        let records = [];
        tables.forEach(table => {
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const courseText = row.cells[2].innerText.trim();
                if (courseText) {
                    records.push(`ครั้งที่ ${row.cells[0].innerText}: ${courseText}`);
                }
            });
        });
        detailToSave = records.length > 0 ? "💉 บันทึกฉีดผิว:\n" + records.join("\n") : "";
    } else {
        const notes = document.getElementById('treatmentNotes');
        detailToSave = notes ? notes.value.trim() : "บันทึกหัตถการ (วาดตำแหน่งลงในใบ OPD)";
    }

    if (!detailToSave) {
        alert("⚠️ ยังไม่มีข้อมูลรายการคอร์สหรือบันทึกเพื่อจัดเก็บค่ะ");
        return;
    }

    const record = {
        id: Date.now(), // 🆔 สร้าง Unique ID ให้ตัวบันทึกเองด้วย
        date: new Date().toLocaleDateString('th-TH'),
        time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }),
        detail: detailToSave,
        fileName: `OPD_${selectedType.toUpperCase()}_${Date.now()}`
    };

    if (!customerDB[cIdx].treatments) customerDB[cIdx].treatments = [];
    customerDB[cIdx].treatments.push(record);
    localStorage.setItem('customerDB', JSON.stringify(customerDB));
    
    alert("✅ บันทึกประวัติการรักษาเรียบร้อยแล้วค่ะ!");
};

window.prepareAndPrintOPD = function() {
    const notesEl = document.getElementById('treatmentNotes');
    if (notesEl) {
        const notes = notesEl.value;
        const displayEl = document.getElementById('printableNotesDisplay');
        if (displayEl) displayEl.innerText = notes;
    }
    window.print();
};

window.deleteTreatmentRecord = function(hn, recordId) {
    if(confirm("คุณต้องการลบบันทึกการรักษานี้ใช่หรือไม่?")) {
        const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
        const cIdx = customerDB.findIndex(c => String(c.hn) === String(hn));
        
        if (cIdx !== -1 && customerDB[cIdx].treatments) {
            // 🆔 ลบโดยหาจาก Record ID แทน Index ป้องกันการลบผิดชุด
            const rIdx = customerDB[cIdx].treatments.findIndex(r => String(r.id) === String(recordId));
            if (rIdx !== -1) {
                customerDB[cIdx].treatments.splice(rIdx, 1);
                localStorage.setItem('customerDB', JSON.stringify(customerDB));
                // สั่งรีเฟรชหน้า Profile โดยใช้ HN
                if (typeof viewCustomerDetail === 'function') viewCustomerDetail(hn);
            }
        }
    }
};

    if (branch && document.getElementById("modalBranch")) {
      document.getElementById("modalBranch").value = branch;

    if (lines[0]) {
      const firstLine = lines[0];
      if (!/0\d{8,9}/.test(firstLine) && firstLine.length <= 90) {
        const parts = firstLine.split(" ").filter(Boolean);

    addr = addr.trim();

    if (!firstName || !lastName || !phone) {

    // 🎯 ค้นหาตำแหน่งคนที่จะแก้ไขด้วย HN (ถ้าเป็นการแก้ไข)
    let cIdx = -1;

    let seller = document.getElementById("modalSeller")?.value?.trim() || "";

        seller = db[cIdx].seller || db[cIdx].sellerName || seller;
    }

    const data = {
        hn: document.getElementById("modalHN").value || getNextHNString(),
        firstName,
        lastName,
        fullname: firstName + " " + lastName,
        nickname: document.getElementById("modalNickname").value || "",
        birthDate: document.getElementById("modalBirthDate")?.value || "",
        phone,
        citizenId: document.getElementById("modalCitizenId")?.value || "",

        allergy: document.getElementById("modalAllergy").value || "ไม่มี",
        chronic: document.getElementById("modalChronic")?.value || "",
        seller,

        photo: currentPhotoData || (cIdx !== -1 ? db[cIdx].photo : ""),
        // รักษาวันที่สร้างและข้อมูลสำคัญเดิมไว้

    };

        // 🔄 อัปเดตข้อมูลคนเดิม

window.toggleDropdown = function (hn) {
    // ปิดเมนูอื่นๆ ทั้งหมดก่อน
    document.querySelectorAll("[id^='action-menu-']").forEach(el => {
        if (el.id !== `action-menu-${hn}`) el.classList.add("hidden");
    });
    
    // เปิด/ปิด เมนูที่เลือกโดยใช้ HN เป็นชื่อ ID
    const menu = document.getElementById(`action-menu-${hn}`);
    if (menu) menu.classList.toggle("hidden");
};

window.toggleActionMenu = function(event, hn) {
    event.stopPropagation();
    window.toggleDropdown(hn);
};

// 4. คลิกที่อื่นเพื่อปิดเมนู
document.addEventListener("click", function (e) {

        document.querySelectorAll("[id^='action-menu-']").forEach(el => el.classList.add("hidden"));
    }
});

// 5. ฟังก์ชันลบข้อมูลโดยใช้ HN ค้นหาตำแหน่งที่ถูกต้อง (Precision Delete)
window.deleteCustomer = function (hn) {
    const db = getCustomerDB();
    // 🎯 ค้นหาตำแหน่ง Index จริงจาก HN ก่อนลบ
    const targetIdx = db.findIndex(c => String(c.hn) === String(hn));
    
    if (targetIdx === -1) return;
    
    const customerName = db[targetIdx].fullname || "คนไข้รายนี้";
    if (!confirm(`คุณต้องการลบข้อมูลของ "${customerName}" ใช่หรือไม่?\n(การลบข้อมูลนี้ไม่สามารถย้อนกลับได้)`)) return;
    
    // ลบข้อมูลจากฐานข้อมูล
    db.splice(targetIdx, 1);
    
    // บันทึกและรีเฟรชหน้าจอ
    syncCustomerDB(db);
    if (window.__customerLastTarget) {
        window.renderCustomerList(window.__customerLastTarget);
    }
};

/* =======================================================
    📊 ฟังก์ชันวาด Tab คอร์ส (แสดง: ทำไปแล้ว / ทั้งหมด)
    ฉบับแก้ไข: ล็อกข้อมูลรายบุคคล 100% และเพิ่มความเสถียร
   ======================================================= */
function renderProfileTab(tab, hn) {
    const box = document.getElementById("profileTabContent");
    const customerDB = JSON.parse(localStorage.getItem("customerDB")) || [];
    
    // 🎯 1. ค้นหาคนไข้ด้วย HN ให้แม่นยำ (ID 100% Match)
    const c = customerDB.find(item => String(item.hn).trim() === String(hn).trim());
    
    if (!box || !c) return;
    box.innerHTML = ""; 

    if (tab === "courses") {
        // 🎯 2. ใช้ข้อมูลคอร์สเฉพาะของลูกค้า 'c' ที่หาเจอเท่านั้น
        let items = Array.isArray(c.courses) ? c.courses : [];
        
        if (items.length === 0) {
            box.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 opacity-30 animate-in zoom-in duration-300">
                    <span class="text-5xl mb-4">🎫</span>
                    <p class="font-bold italic text-slate-400">คนไข้ท่านนี้ยังไม่มีรายการคอร์สสะสมค่ะ</p>
                </div>`;
            return;
        }

        // 🎯 3. จัดเรียง: คอร์สที่ยังไม่หมด (amount > 0) ขึ้นก่อน
        items.sort((a, b) => {
            const amtA = parseInt(a.amount || 0);
            const amtB = parseInt(b.amount || 0);
            return (amtA === 0) - (amtB === 0);
        });

        box.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                ${items.map(x => {
                    const total = parseInt(x.totalAmount || x.amount || 0); 
                    const remain = parseInt(x.amount || 0);               
                    const used = Math.max(0, total - remain); 
                    const percent = total > 0 ? Math.min(100, Math.floor((used / total) * 100)) : 0;
                    
                    return `
                    <div class="bg-white border border-pink-100 rounded-3xl p-5 shadow-sm relative overflow-hidden ${remain === 0 ? 'bg-slate-50 opacity-70' : ''}">
                        <div class="absolute top-0 left-0 w-1.5 h-full ${remain === 0 ? 'bg-slate-300' : remain <= 2 ? 'bg-orange-400' : 'bg-[#D48197]'}"></div>
                        <div class="flex justify-between items-start mb-2">
                            <div class="text-left">
                                <h5 class="text-[15px] font-black text-slate-800 leading-tight">${x.name}</h5>
                                <p class="text-[9px] text-slate-400 font-bold mt-1">📅 ซื้อเมื่อ: ${x.date || '-'}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-black ${remain === 0 ? 'text-slate-400' : 'text-[#D48197]'}">${used}</span>
                                <span class="text-[12px] font-bold text-slate-400">/${total} ครั้ง</span>
                            </div>
                        </div>
                        <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-3">
                            <div class="h-full bg-gradient-to-r from-pink-300 to-[#D48197] transition-all duration-1000 ease-out" style="width: ${percent}%"></div>
                        </div>
                        <div class="flex justify-between items-center text-[9px] font-bold uppercase">
                            <span class="${remain === 0 ? 'text-slate-400' : 'text-[#D48197]'}">
                                ${remain === 0 ? '✔️ คอร์สเสร็จสมบูรณ์' : `คงเหลืออีก ${remain} ครั้ง`}
                            </span>
                            <div class="bg-pink-50 text-[#D48197] px-2 py-1 rounded-lg">${percent}% Completed</div>
                        </div>
                    </div>`;
                }).join("")}
            </div>`;
    }
}
    // 📌 กรณีหน้าอื่นๆ (คงเดิมหรือปรับปรุงตามความเหมาะสม)
    if (tab === "appointments") {
        const appointmentDB = JSON.parse(localStorage.getItem("appointmentDB")) || [];
        const items = appointmentDB.filter(a => a.hn === c.hn || a.customerName === c.fullname);
        box.innerHTML = items.length ? `<div class="space-y-2">${items.map(x => `<div class="border border-pink-50 rounded-2xl p-4 bg-white flex justify-between items-center shadow-sm"><div><div class="font-bold text-slate-700 text-sm">${x.date} | ${x.time}</div><div class="text-[10px] text-slate-400 uppercase font-bold mt-1">รายการ: ${x.course || '-'}</div></div><span class="px-3 py-1 rounded-full text-[9px] font-bold bg-blue-50 text-blue-500 border border-blue-100">${x.status}</span></div>`).join("")}</div>` : `<div class="text-center py-10 text-slate-300 italic text-sm">ไม่มีประวัตินัดหมายค่ะ</div>`;
    }

    if (tab === "receipts") {
        const accountDB = JSON.parse(localStorage.getItem("accountDB")) || [];
        const items = accountDB.filter(x => x.hn === c.hn || x.customer === c.fullname);
        box.innerHTML = items.length ? `<div class="space-y-2">${items.map((x, i) => `<div class="border border-pink-50 rounded-2xl p-4 bg-white flex items-center justify-between shadow-sm"><div><div class="font-bold text-slate-700 text-sm">วันที่ ${x.date} | ฿${parseFloat(String(x.total).replace(/[^0-9.-]+/g,"")).toLocaleString()}</div><div class="text-[10px] text-slate-400 font-bold uppercase mt-1">วิธีชำระ: ${x.payment}</div></div><button onclick="window.printReceipt('${x.id}', '${c.hn}', 'A5')" class="px-4 py-2 rounded-xl bg-[#D48197] text-white text-[10px] font-bold shadow-sm hover:bg-black transition-all">พิมพ์ใบเสร็จ</button></div>`).join("")}</div>` : `<div class="text-center py-10 text-slate-300 italic text-sm">ไม่มีประวัติใบเสร็จค่ะ</div>`;

        const items = c.files || [];
        box.innerHTML = items.length ? `<div class="grid grid-cols-2 gap-4">${items.map(x => `<div class="border border-pink-50 rounded-2xl p-4 bg-white text-xs font-bold text-slate-500 shadow-sm">${x.name || x}</div>`).join("")}</div>` : `<div class="text-center py-10 text-slate-300 italic text-sm">ยังไม่มีเอกสารแนบค่ะ</div>`;
    }
}

window.viewCustomerDetail = function (hn) {
    // 1. ปิดเมนูจัดการ (Dropdown) ทุกตัวทันที เพื่อไม่ให้ขวาง UI
    document.querySelectorAll('[id^="action-menu-"]').forEach(m => m.classList.add('hidden'));
    
    // 2. ดึงข้อมูลจากฐานข้อมูล (ใช้ตัวแปรชื่อเดียวกับระบบหลักเพื่อไม่ให้พัง)
    const db = (typeof getCustomerDB === 'function') ? getCustomerDB() : (JSON.parse(localStorage.getItem('customerDB')) || []);
    
    // 🎯 ค้นหาด้วย HN บังคับ String และลบช่องว่าง (ID 100% Match)
    const c = db.find(item => String(item.hn).trim() === String(hn).trim());
    
    if (!c) {
        Swal.fire('ไม่พบข้อมูล', 'ไม่สามารถดึงข้อมูลรหัส ' + hn + ' ได้ กรุณาลองใหม่ค่ะ', 'error');
        return;
    }

    // 3. ตรวจสอบโครงสร้าง Modal
    if (typeof ensureCustomerProfileModal === 'function') {
        ensureCustomerProfileModal();
    }
    
    const modal = document.getElementById("customerProfileModal");
    if (!modal) {
        console.error("หา Element 'customerProfileModal' ไม่เจอ");
        return;
    }

    // 🚩 4. เคลียร์ Tab Content เดิมทิ้งก่อน (ป้องกันเห็นข้อมูลลูกค้าคนก่อนหน้าแวบหนึ่ง)
    const box = document.getElementById("profileTabContent");
    if (box) box.innerHTML = '<div class="flex justify-center p-10"><span class="animate-spin text-3xl">⌛</span></div>';

    // 5. บันทึก HN ลง Dataset และ Global Variable (เพื่อให้ Tab อื่นๆ เรียกใช้ได้ตรงคน)
    modal.dataset.hn = String(c.hn); 
    window.activeCustomer = c; 

    // 6. อัปเดตข้อมูล Header (ใช้ TextContent เพื่อความปลอดภัย)
    const setEl = (id, val) => {
        const el = document.getElementById(id);
        if (el) el.textContent = val || "-";
    };

    setEl("profileName", c.fullname);
    setEl("profileNick", c.nickname ? `(${c.nickname})` : "");
    setEl("profileHN", c.hn);
    setEl("profilePhone", c.phone);
    setEl("profileBranch", c.branch);
    setEl("profileSeller", c.seller || c.sellerName);

    // 7. จัดการรูปภาพโปรไฟล์ (ตรวจสอบค่าว่างให้ละเอียดขึ้น)
    const img = document.getElementById("profilePhoto");
    const ph = document.getElementById("profilePhotoPlaceholder");
    if (img && ph) {
        if (c.photo && c.photo.length > 10) { // เช็คว่ามีข้อมูล Base64 จริงไหม
            img.src = c.photo;
            img.classList.remove("hidden");
            ph.classList.add("hidden");
        } else {
            img.src = "";
            img.classList.add("hidden");
            ph.classList.remove("hidden");
        }
    }

    // 8. สั่งวาด Tab เริ่มต้น (ส่งต่อ HN ไปยังฟังก์ชัน Render)
    if (typeof renderProfileTab === 'function') {
        // ดีเลย์เล็กน้อยเพื่อให้ UI หลักขยับเสร็จก่อน
        setTimeout(() => {
            renderProfileTab("courses", c.hn); 
        }, 50);
    }
    
    // 9. แสดง Modal และดัน Z-Index
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    modal.style.zIndex = "10001"; // ตั้งให้สูงกว่า Dropdown และ Sidebar เดิม

    // 10. ปิด Sidebar มือถืออัตโนมัติ (ถ้ามี) และเลื่อนขึ้นบนสุด
    document.body.classList.remove('sidebar-open');
    window.scrollTo({ top: 0, behavior: 'smooth' });
};

 window.applyCustomerFilter = function () {
    const keyword = (document.getElementById("customerSearchInput")?.value || "").toLowerCase().trim();
    const tableBranchSelect = document.getElementById("branchFilterSelect")?.value || "ทั้งหมด";
    const pageSize = Number(document.getElementById("pageSizeSelect")?.value || "10");
    
    // 🎯 ใช้ข้อมูลที่ผ่านการกรองสิทธิ์เบื้องต้นมาแล้ว
    const db = window.getCustomerDBByBranch(); 

    const filtered = db.filter((c) => {
        const k = (c.fullname || "").toLowerCase().includes(keyword) ||
                  (c.hn || "").toLowerCase().includes(keyword) ||
                  String(c.phone || "").includes(keyword);
        
        // 🎯 แก้ไข Logic: ถ้าเลือก "ทั้งหมด" หรือ "ทุกสาขา" ในตาราง ให้ปล่อยผ่านข้อมูลที่ db ส่งมา
        const b = tableBranchSelect === "ทั้งหมด" || 
                  tableBranchSelect === "ทุกสาขา" || 
                  c.branch === tableBranchSelect || 
                  c.branch === `สาขา${tableBranchSelect}`;
        
        return k && b;
    });

    currentCustomerFilteredData = filtered;
    // ... ส่วนที่เหลือคงเดิม ...
    const totalPages = Math.ceil(filtered.length / pageSize) || 1;
    const start = (currentCustomerPage - 1) * pageSize;
    window.renderCustomerTable(filtered.slice(start, start + pageSize));
    renderCustomerPagination(filtered.length, pageSize);
};

  function renderCustomerPagination(totalItems, pageSize) {
    const container = document.getElementById("customerPagination");
    if (!container) return;

    const totalPages = Math.ceil(totalItems / pageSize);

    if (totalPages <= 1) {
      container.innerHTML = "";
      return;
    }

    let html = "";

    html += `<button onclick="changeCustomerPage(${currentCustomerPage - 1})"
      class="px-3 py-2 rounded-xl text-xs font-bold border border-pink-100 bg-white ${currentCustomerPage === 1 ? 'opacity-40 pointer-events-none' : 'hover:bg-pink-50'}">ก่อนหน้า</button>`;

    for (let i = 1; i <= totalPages; i++) {
      html += `<button onclick="changeCustomerPage(${i})"
        class="px-3 py-2 rounded-xl text-xs font-bold border ${i === currentCustomerPage ? 'bg-[#D48197] text-white border-[#D48197]' : 'bg-white text-slate-600 border-pink-100 hover:bg-pink-50'}">${i}</button>`;
    }

    html += `<button onclick="changeCustomerPage(${currentCustomerPage + 1})"
      class="px-3 py-2 rounded-xl text-xs font-bold border border-pink-100 bg-white ${currentCustomerPage === totalPages ? 'opacity-40 pointer-events-none' : 'hover:bg-pink-50'}">ถัดไป</button>`;

    container.innerHTML = html;
  }

  window.changeCustomerPage = function (page) {
    currentCustomerPage = page;
    window.applyCustomerFilter();
  };

  function bindCustomerPageEvents(target) {
    if (!target || target.__boundCustomer) return;
    target.__boundCustomer = true;

    target.addEventListener("click", (e) => {
      if (e.target.closest("#btnAddCustomer")) {
        window.openModalForAdd();
        return;
      }
      if (e.target.closest("#btnCustomerSearch")) {
        currentCustomerPage = 1;
        window.applyCustomerFilter();
        return;
      }
    });

    target.addEventListener("keydown", (e) => {
      if (e.target.matches("#customerSearchInput") && e.key === "Enter") {
        currentCustomerPage = 1;
        window.applyCustomerFilter();
      }
    });

    target.addEventListener("change", (e) => {
      if (e.target.matches("#pageSizeSelect, #branchFilterSelect")) {
        currentCustomerPage = 1;
        window.applyCustomerFilter();
      }
    });
  }

  syncCustomerDB(getCustomerDB());
  ensureCustomerEnhancements();
})();

window.normalizeCourseName = function(name = '') {
    return String(name).replace(/\s*\(\d+\/\d+\)\s*$/, '').trim();
};

// ใช้ helper กลางจาก Branch Helper
// ห้ามประกาศ getCurrentViewingBranch / canViewAllBranches ซ้ำที่นี่

// 🎯 1. ลูกค้าใน "หน้าตารางลูกค้า" → แสดงเฉพาะสาขาที่กำลังดู
window.getCustomerDBByBranch = function() {
    let db = [];
    try {
        db = JSON.parse(localStorage.getItem('customerDB')) || [];
    } catch (e) {
        db = [];
    }

    const user = window.getCurrentUserSafe();
    const role = String(user.role || '').trim();
    const viewingBranch = window.getCurrentViewingBranch();
    const homeBranch = window.getUserHomeBranch();

    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(role);
    const isManager = role === 'ผู้จัดการ';

    // พนักงานทั่วไปห้ามเปิดข้ามสาขา
    if (!isAdmin && !isManager && viewingBranch !== homeBranch) {
        return [];
    }

    // แอดมิน/CEO ที่เลือก "ทุกสาขา" เห็นทั้งหมดได้
    if (window.canViewAllBranches()) {
        return db;
    }

    // นอกนั้นกรองตามสาขาที่กำลังดู
    return window.filterByBranch(db, c => c.branch);
};

// 🎯 1.1 ลูกค้าสำหรับ "ค้นหา / ประวัติ / ใช้งานข้ามสาขา"
// ใช้ตัวนี้ในช่องค้นหาลูกค้า, นัดหมาย, บิล, ประวัติคนไข้
window.getCustomerSharedDB = function() {
    let db = [];
    try {
        db = JSON.parse(localStorage.getItem('customerDB')) || [];
    } catch (e) {
        db = [];
    }

    const user = window.getCurrentUserSafe();
    const role = String(user.role || '').trim();
    const viewingBranch = window.getCurrentViewingBranch();
    const homeBranch = window.getUserHomeBranch();

    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(role);
    const isManager = role === 'ผู้จัดการ';

    // แอดมิน/CEO ดูทุกสาขาได้
    if (window.canViewAllBranches()) {
        return db;
    }

    // ผู้จัดการ: ให้ค้นหาลูกค้าข้ามสาขาได้
    if (isManager) {
        return db;
    }

    // พนักงานทั่วไป:
    // - ถ้าอยู่สาขาตัวเอง ให้ค้นหาลูกค้าข้ามสาขาได้ "เฉพาะเพื่ออ้างอิง/ดูประวัติ"
    // - แต่หน้าตารางลูกค้ายังต้องใช้ getCustomerDBByBranch()
    if (viewingBranch === homeBranch) {
        return db;
    }

    // ถ้าเปิดข้ามสาขาแบบผิดสิทธิ์ ไม่ให้ข้อมูล
    return [];
};

// 🎯 2. ตัวล็อกนัดหมาย (Appointment Lock) → ใช้เฉพาะข้อมูลสาขาที่กำลังดู

// 🎯 4. ตัวเลือกพนักงานตามสาขา
window.getBranchStaffOptions = function(roleNames = [], selectedValue = '') {
    const viewingBranch = window.getCurrentViewingBranch();

    let staffDB = [];
    try {
        staffDB = JSON.parse(localStorage.getItem('staffDB')) || [];
    } catch (e) {
        staffDB = [];
    }

    const normalizedRoles = roleNames.map(r => String(r || '').trim());

    const filtered = staffDB.filter(s => {
        const role = String(s.role || '').trim();
        const branch = window.normalizeBranch(s.branch || '');
        const isActive = !s.isLocked && s.status !== 'ออก';
        const matchRole = normalizedRoles.includes(role);

        if (!isActive || !matchRole) return false;

        if (window.canViewAllBranches()) return true;

        return branch === viewingBranch;
    });

    const used = new Set();

    return `
        <option value="">-- เลือก --</option>
        ${filtered.filter(s => {
            const key = String(s.name || '').trim();
            if (!key || used.has(key)) return false;
            used.add(key);
            return true;
        }).map(s => `
            <option value="${String(s.name || '').replace(/"/g, '&quot;')}" ${s.name === selectedValue ? 'selected' : ''}>${s.name}</option>
        `).join('')}
    `;
};

window.getDoctorOptionsForAppointment = function(selectedValue = '') {
    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
    const role = String(currentUser.role || '').trim();
    const name = String(currentUser.name || '').trim();

    if (['หมอ', 'แพทย์', 'doctor'].includes(role) && name) {
        return `

            <option value="${name}" selected>${name}</option>

    return window.getBranchStaffOptions(['หมอ', 'แพทย์', 'doctor'], selectedValue);
};

window.getCustomerRemainingCourses = function(hn) {
    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const customer = customerDB.find(c => c.hn === hn);
    if (!customer || !Array.isArray(customer.courses)) return [];

    const courseMasterDB = JSON.parse(localStorage.getItem('courseMasterDB')) || [];

    return customer.courses
        .map(c => {
            const remain = parseInt(c.amount || 0);
            const total = parseInt(c.totalAmount || c.amount || 1);
            const used = total - remain;
            const nextRound = used + 1;

            const master = courseMasterDB.find(m =>
                window.normalizeCourseName(m.name || '') === window.normalizeCourseName(c.name || '')
            ) || {};

            return {
                ...c,
                remain,
                total,
                used,
                nextRound,
                staffDF: parseFloat(master.staffDF || master.df || 0),
                doctorDF: parseFloat(master.doctorDF || 0),
                displayLabel: `${c.name} (${nextRound}/${total})`
            };
        })
        .filter(c => c.remain > 0);
};

// 1. ฟังก์ชันหาป้ายชื่อคอร์สพร้อมตัวเลขครั้งที่ทำ (แสดงผลเป็น 3/10)
window.getCustomerCourseDisplayLabel = function(hn, courseName) {
    if (!hn || hn === "ทั่วไป" || hn === "Walk-in") return courseName;

    const customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
    const customer = customerDB.find(c => String(c.hn || '') === String(hn || ''));
    if (!customer || !Array.isArray(customer.courses)) return courseName;

    const found = customer.courses.find(c =>
        window.normalizeCourseName(c.name || '') === window.normalizeCourseName(courseName || '')
    );

    if (!found) return courseName;

    const total = parseInt(found.totalAmount || found.amount || 1) || 1;
    const remain = parseInt(found.amount || 0) || 0;

    let nextRound = (total - remain) + 1;
    if (nextRound < 1) nextRound = 1;
    if (nextRound > total) nextRound = total;

    return `${window.normalizeCourseName(courseName)} (${nextRound}/${total})`;
};

window.editAppointmentById = function(appId) {
    let db = JSON.parse(localStorage.getItem('appointmentDB')) || [];

    // 🎯 ค้นหาตำแหน่งที่ถูกต้องจาก ID
    const realIndex = db.findIndex(item => String(item.createdAt) === String(appId));
    
    if (realIndex === -1) {
        Swal.fire({

            confirmButtonColor: '#D48197'
        });
        return;

    // เก็บ ID ที่กำลังแก้ไขไว้เผื่อใช้งานใน Modal
    window.editingAppId = appId; 
    window.openAppointmentModal(realIndex);
};

window.renderAppointmentPage = function() {
    const target = document.getElementById('dynamicContent');
    if (!target) return;

    const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};
    const viewingBranch = (currentUser.branch || 'ทุกสาขา').replace('สาขา', '');
    const isAdmin = ['แอดมินหลัก', 'CEO'].includes(currentUser.role);

    const allAppointments = window.getAppointmentDBByBranch(); 

    // 🎯 ดึงค่าตรงจาก Element เพื่อรองรับการกดล้างวันที่ (Clear)
    const dateEl = document.getElementById('filterDate');
    const dateFilter = dateEl ? dateEl.value : ""; // ถ้าล้างแล้วจะเป็นค่าว่าง
    
    const currentSearch = document.getElementById('appSearchInput')?.value || "";
    const statusFilter = document.getElementById('statusFilter')?.value || "ทั้งหมด";
    const appRowsPerPage = parseInt(document.getElementById('appPageSize')?.value) || 10;

   
const formatDateTH = (dateStr) => {
    if (!dateStr) return "-";
    const [y, m, d] = dateStr.split("-");
    // ตรวจสอบว่าเป็นปี พ.ศ. หรือ ค.ศ. (ถ้าเลขน้อยกว่า 2500 ให้บวกเพิ่ม)
    const yearTH = parseInt(y) < 2500 ? parseInt(y) + 543 : y;
    return `${d}/${m}/${yearTH}`;
};

    // 🎯 3. กรองข้อมูลละเอียด: ล็อกสาขาซ้ำเพื่อความแม่นยำ
    let filteredData = allAppointments.filter(ap => {
        const apBranch = String(ap.branch || '').replace('สาขา', '');
        const matchBranch = (viewingBranch === 'ทุกสาขา' && isAdmin) || (apBranch === viewingBranch);
        
        const matchSearch =
            String(ap.customerName || '').toLowerCase().includes(currentSearch.toLowerCase()) ||
            String(ap.hn || '').toLowerCase().includes(currentSearch.toLowerCase());

        const matchStatus = statusFilter === "ทั้งหมด" || ap.status === statusFilter;
        const matchDate = !dateFilter || ap.date === dateFilter;

        return matchBranch && matchSearch && matchStatus && matchDate;
    });

    // 🎯 4. จัดเรียงลำดับ: "รอดำเนินการ" ขึ้นก่อน -> "เสร็จสิ้น" ลงล่าง

        const priority = { "รอดำเนินการ": 0, "ส่งเข้าคิวแล้ว": 1, "ไม่มาตามนัด": 2, "เสร็จสิ้น": 3, "ยกเลิก": 4 };
        const scoreA = priority[a.status] !== undefined ? priority[a.status] : 99;
        const scoreB = priority[b.status] !== undefined ? priority[b.status] : 99;
        if (scoreA !== scoreB) return scoreA - scoreB;
        return String(a.time || '').localeCompare(String(b.time || ''));
    });

    const totalPages = Math.ceil(filteredData.length / appRowsPerPage) || 1;
    window.currentAppPage = Math.min(window.currentAppPage, totalPages);

window.saveNewAppointment = function(appId = null) {
    if (!window.requirePermission(4, 'บันทึกนัดหมาย')) return;
    
    const hnInput = document.getElementById('appCustSearch');
    const name = hnInput ? hnInput.value.trim() : '';
    const selectedDate = document.getElementById('appDate')?.value;

    // 1. ตรวจสอบข้อมูลเบื้องต้น
    if (!name || (window.selectedCoursesForApp || []).length === 0) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกชื่อลูกค้าและเลือกคอร์สค่ะ', 'warning');
        return;
    }
    if (!selectedDate) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุวันที่นัดหมายด้วยค่ะ', 'warning');
        return;
    }

    // 🎯 2. ตรวจสอบวันหยุดคลินิก (Holiday Check)
    const holidays = JSON.parse(localStorage.getItem('clinicHolidaysDB')) || [];
    const checkDate = new Date(selectedDate);
    checkDate.setHours(0, 0, 0, 0);

    const foundHoliday = holidays.find(h => {
        const start = new Date(h.start);
        const end = new Date(h.end);
        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);
        return checkDate >= start && checkDate <= end;
    });

    if (foundHoliday) {
        Swal.fire({
            icon: 'error',
            title: 'ขออภัยค่ะ วันนี้เป็นวันหยุด',
            html: `ไม่สามารถลงนัดได้เนื่องจากเป็นวัน: <br><b class="text-rose-500">"${foundHoliday.title}"</b>`,
            confirmButtonColor: '#D48197'
        });
        return; 
    }

    // 3. เตรียมฐานข้อมูลและค้นหาตำแหน่ง (ID 100%)
    let db = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    let targetIdx = -1;

    // 🎯 ค้นหาตำแหน่ง Index จาก appId (createdAt)
    if (appId && appId !== 'null' && appId !== '') {
        targetIdx = db.findIndex(item => String(item.createdAt) === String(appId));
    }

    const user = JSON.parse(localStorage.getItem('currentUser')) || {};
    const activeBranch = user.branch || user.homeBranch || 'บางพลี'; 
    const hnValue = hnInput?.dataset?.hn || "ทั่วไป";

    // 4. สร้าง Object ข้อมูลใหม่
    const appData = {
        hn: hnValue,
        customerName: name,
        name: name,
        date: selectedDate,
        time: document.getElementById('appHour').value + ":" + document.getElementById('appMin').value,
        doctor: document.getElementById('appDoc').value || "-",
        staff: document.getElementById('appStaff').value || "-",
        course: (window.selectedCoursesForApp || []).join(', '),
        status: document.getElementById('appStatus').value,
        note: document.getElementById('appNote').value,
        branch: targetIdx !== -1 ? (db[targetIdx].branch || activeBranch) : activeBranch, 
        createdAt: targetIdx !== -1 ? db[targetIdx].createdAt : new Date().getTime() // 🆔 ID หลัก
    };

    // 5. บันทึกข้อมูล (Update หรือ Add)
    if (targetIdx !== -1) {
        db[targetIdx] = appData;
    } else {
        db.push(appData);
    }

    localStorage.setItem('appointmentDB', JSON.stringify(db));

    Swal.fire({
        icon: 'success',
        title: 'บันทึกนัดหมายสำเร็จ!',
        text: `ลงนัดหมายสาขา ${appData.branch} เรียบร้อยแล้วค่ะ`,
        timer: 1500,
        showConfirmButton: false
    });

    if (typeof closeAppModal === 'function') closeAppModal();
    if (typeof renderAppointmentPage === 'function') renderAppointmentPage();
};

window.checkHolidayInstant = function(dateValue) {
    if (!dateValue) return;
    const holidays = JSON.parse(localStorage.getItem('clinicHolidaysDB')) || [];
    const checkDate = new Date(dateValue);
    checkDate.setHours(0, 0, 0, 0);

    const holiday = holidays.find(h => {
        const start = new Date(h.start);
        const end = new Date(h.end);
        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);
        return checkDate >= start && checkDate <= end;
    });

    if (holiday) {
        Swal.fire('แจ้งเตือนวันหยุด', `วันที่ท่านเลือกเป็นวันหยุด: ${holiday.title} ค่ะ`, 'info');
        document.getElementById('appDate').value = ''; // ล้างวันที่ออกถ้าเป็นวันหยุด
    }
};

// 1. ฟังก์ชันลบนัดหมาย (แก้ไขให้ลบด้วย ID เพื่อความแม่นยำ 100%)
window.deleteAppointmentById = function(appId) {
    let db = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    // ค้นหาตำแหน่งจริงในฐานข้อมูลจากรหัสเวลา (appId)
    const indexInDB = db.findIndex(item => String(item.createdAt) === String(appId));
    
    if (indexInDB === -1) {
        Swal.fire('ไม่พบข้อมูล', 'ขออภัยค่ะ ระบบหาข้อมูลนัดหมายนี้ไม่เจอ', 'error');
        return;
    }

    const appToDelete = db[indexInDB];

    Swal.fire({
        title: '<span class="text-slate-800 font-black italic uppercase">🗑️ ยืนยันการลบนัดหมาย?</span>',
        html: `คุณต้องการลบนัดหมายของ <b class="text-[#D48197]">${appToDelete.customerName}</b><br>ออกจากระบบใช่หรือไม่?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#94a3b8',
        confirmButtonText: 'ใช่, ลบเลย!',
        cancelButtonText: 'ยกเลิก',
        customClass: { popup: 'rounded-[2.5rem]' }
    }).then((result) => {
        if (result.isConfirmed) {
            db.splice(indexInDB, 1); // ลบข้อมูลจริงออกจากฐานข้อมูล
            localStorage.setItem('appointmentDB', JSON.stringify(db));

            Swal.fire({
                icon: 'success',
                title: 'ลบสำเร็จ!',
                text: 'รายการนัดหมายถูกตัดออกแล้วค่ะ',
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-[2.5rem]' }
            });

            // 🎯 สั่งรีเฟรชหน้าตารางทันที ข้อมูลจะหายไปจากจอแน่นอน
            if (typeof renderAppointmentPage === 'function') {
                renderAppointmentPage();
            }
        }
    });
};

window.sendToServiceQueueById = function(appId) {
    let appointments = [];
    try {
        appointments = JSON.parse(localStorage.getItem('appointmentDB')) || [];
    } catch (e) {
        appointments = [];
    }

    const appIndex = appointments.findIndex(item => String(item.createdAt) === String(appId));
    if (appIndex === -1) {
        Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูลนัดหมาย', confirmButtonColor: '#D48197' });
        return;
    }

    const appData = appointments[appIndex];

    let todayQueue = [];
    try {
        todayQueue = JSON.parse(localStorage.getItem('todayQueueDB')) || [];
    } catch (e) {
        todayQueue = [];
    }

    const viewingBranch = (typeof window.getCurrentViewingBranch === 'function')
        ? window.getCurrentViewingBranch()
        : String((JSON.parse(localStorage.getItem('currentUser')) || {}).branch || '').replace('สาขา', '').trim();

    const homeBranch = (typeof window.getUserHomeBranch === 'function')
        ? window.getUserHomeBranch()
        : String((JSON.parse(localStorage.getItem('currentUser')) || {}).homeBranch || '').replace('สาขา', '').trim();

    const activeBranch = String(
        appData.branch ||
        viewingBranch ||
        homeBranch ||
        'บางพลี'
    ).replace('สาขา', '').trim();

    const isInQueue = todayQueue.find(q =>
        String(q.appointmentRef || '') === String(appData.createdAt || '') &&
        q.status !== "เสร็จสิ้น" &&
        q.status !== "ยกเลิก"
    );

    if (isInQueue) {
        Swal.fire({
            icon: 'warning',
            title: 'คนไข้อยู่ในคิวแล้ว',
            confirmButtonColor: '#D48197'
        });
        return;
    }

    const nowTime = new Date().toLocaleTimeString('th-TH', {
        hour: '2-digit',
        minute: '2-digit'
    });

    const newQueueItem = {
        queueId: "Q-" + Date.now(),
        hn: appData.hn || '-',
        name: appData.customerName || appData.name || 'ไม่ระบุชื่อ',
        customerName: appData.customerName || appData.name || 'ไม่ระบุชื่อ',
        course: appData.course || '-',
        doctor: appData.doctor || '-',
        staff: appData.staff || '-',
        time: appData.time || nowTime,
        checkInTime: nowTime,
        status: "รอรับบริการ",
        appointmentRef: appData.createdAt,
        appointmentId: appData.createdAt,
        branch: activeBranch,
        date: new Date().toLocaleDateString('th-TH'),
        createdAt: Date.now()
    };

    todayQueue.push(newQueueItem);
    localStorage.setItem('todayQueueDB', JSON.stringify(todayQueue));

    appointments[appIndex].status = "ส่งเข้าคิวแล้ว";
    appointments[appIndex].queueStatus = "รอรับบริการ";
    appointments[appIndex].queueId = newQueueItem.queueId;
    appointments[appIndex].branch = activeBranch;

    localStorage.setItem('appointmentDB', JSON.stringify(appointments));

    Swal.fire({
        icon: 'success',
        title: 'ส่งเข้าห้องคิวสำเร็จ!',
        text: `คุณ ${newQueueItem.name} เข้าสู่คิวแล้วค่ะ`,
        timer: 1500,
        showConfirmButton: false
    }).then(() => {
        if (typeof renderAppointmentPage === 'function') renderAppointmentPage();
        if (typeof loadPage === 'function') loadPage(52, 'ห้องจัดการคิว');
    });
};

        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ef4444',
        cancelButtonColor: '#94a3b8',
        confirmButtonText: 'ใช่, ลบและคืนคอร์ส!',
        cancelButtonText: 'ยกเลิก',
        customClass: { popup: 'rounded-[2.5rem]' }
    }).then((result) => {
        if (result.isConfirmed) {
            // 🎯 3. ถ้าสถานะเป็น "เสร็จสิ้น" ให้ทำการคืนจำนวนคอร์สให้ลูกค้า
            if (item.status === "เสร็จสิ้น") {
                let customerDB = JSON.parse(localStorage.getItem('customerDB')) || [];
                const cIdx = customerDB.findIndex(c => c.hn === item.hn);

                if (cIdx !== -1 && Array.isArray(customerDB[cIdx].courses)) {
                    // แยกรายการคอร์สที่บันทึกไว้ในคิว (รองรับกรณีมีหลายคอร์ส)
                    const courseList = String(item.course || '').split(',').map(x => x.trim()).filter(Boolean);

                    courseList.forEach(courseName => {
                        // ค้นหาคอร์สในกระเป๋าคนไข้ที่ชื่อตรงกัน
                        const courseIdx = customerDB[cIdx].courses.findIndex(bc =>
                            window.normalizeCourseName(bc.name || '') === window.normalizeCourseName(courseName)
                        );
                        
                        if (courseIdx !== -1) {
                            // ✅ คืนจำนวนคอร์ส +1
                            let currentAmount = parseInt(customerDB[cIdx].courses[courseIdx].amount || 0);
                            customerDB[cIdx].courses[courseIdx].amount = currentAmount + 1;
                        }
                    });

                    // บันทึกการคืนคอร์สกลับลงฐานข้อมูลคนไข้
                    localStorage.setItem('customerDB', JSON.stringify(customerDB));
                }
            }

            // 🎯 4. ลบคิวออกจากรายการวันนี้
            db.splice(targetIdx, 1);
            localStorage.setItem('todayQueueDB', JSON.stringify(db));

            // 🎯 5. แจ้งเตือนสำเร็จและวาดตารางใหม่
            Swal.fire({
                icon: 'success',
                title: 'ยกเลิกคิวสำเร็จ!',
                text: 'ระบบคืนจำนวนคอร์สให้คนไข้เรียบร้อยแล้วค่ะ',
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-[2.5rem]' }
            });

            if (typeof renderQueuePage === 'function') {
                renderQueuePage();
            }
        }
    });
};

window.getProcessRoleOptions = function(roleNames = [], selectedValue = '') {
